<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 80: Road To Bangsaen42</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (For JSX compilation in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; }
        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        @keyframes breathe {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.02) translateY(-1px); }
        }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; transform-origin: bottom; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Component พลุเฉลิมฉลอง ---
        const Confetti = () => {
            return (
                <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 50 }).map((_, i) => {
                    const colors = ['#ef4444', '#f97316', '#eab308', '#3b82f6', '#10b981'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    const isCircle = Math.random() > 0.5;
                    return (
                    <div key={i} className="absolute top-[-10%]"
                        style={{
                        left: `${Math.random() * 100}%`,
                        width: `${Math.random() * 10 + 5}px`, height: `${Math.random() * 10 + 5}px`,
                        backgroundColor: randomColor, borderRadius: isCircle ? '50%' : '4px',
                        animation: `confetti-fall ${Math.random() * 2 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`,
                        animationDelay: `${Math.random() * 0.3}s`,
                        }}
                    />
                    );
                })}
                </div>
            );
        };

        // --- Component ตัวการ์ตูนผู้ชาย (Male Dynamic Avatar) ---
        const MaleAvatar = ({ weight, targetWeight, initialWeight }) => {
            const progress = Math.max(0, Math.min(1, (initialWeight - weight) / (initialWeight - targetWeight)));
            const bellyRx = 32 - (18 * progress);
            const chestRx = 24 + (8 * progress); // อกผายขึ้น

            return (
                <div className="relative w-28 h-28 flex items-center justify-center mx-2 group">
                    <div className="absolute -top-4 whitespace-nowrap bg-red-900/90 px-3 py-1 rounded-full text-[10px] font-black text-orange-400 shadow-md border border-red-700 z-10 transition-all duration-500">
                        {progress >= 1 ? 'พร้อมลุย Bangsaen42! 🏅' : progress > 0.5 ? 'หุ่นนักวิ่งเริ่มมาแล้ว! 🏃‍♂️' : 'ซ้อมให้ยับเลยลูกพี่! ⚡'}
                    </div>

                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg transition-transform duration-300">
                        <g className="animate-breathe">
                            <line x1="42" y1="65" x2="42" y2="90" stroke="#f97316" strokeWidth="6" strokeLinecap="round" />
                            <line x1="58" y1="65" x2="58" y2="90" stroke="#f97316" strokeWidth="6" strokeLinecap="round" />
                            <path d="M 38 88 L 45 88 L 45 92 L 37 92 Z" fill="#e2e8f0" rx="2" />
                            <path d="M 55 88 L 62 88 L 62 92 L 55 92 Z" fill="#e2e8f0" rx="2" />
                            <path d="M 35 40 L 25 55" stroke="#fcd5ce" strokeWidth={6 + (2 * progress)} strokeLinecap="round" className="transition-all duration-700 ease-out" />
                            <path d="M 65 40 L 75 55" stroke="#fcd5ce" strokeWidth={6 + (2 * progress)} strokeLinecap="round" className="transition-all duration-700 ease-out" />
                            <ellipse cx="50" cy="58" rx={bellyRx} ry="22" fill="#1e293b" className="transition-all duration-700 ease-out" />
                            <path d={`M ${50 - chestRx} 40 Q 50 35 ${50 + chestRx} 40 L ${50 + bellyRx} 58 L ${50 - bellyRx} 58 Z`} fill="#334155" className="transition-all duration-700 ease-out" />
                            <path d="M 45 38 L 50 48 L 55 38" fill="none" stroke="#f97316" strokeWidth="2" strokeLinecap="round" />
                            <circle cx="50" cy="22" r="13" fill="#fcd5ce" />
                            <path d="M 37 20 Q 50 5 63 20 Q 50 15 37 20" fill="#0f172a" />
                            <path d="M 37 20 C 37 10, 63 10, 63 20" fill="#0f172a" />
                            <circle cx="45" cy="23" r="1.5" fill="#0f172a" />
                            <circle cx="55" cy="23" r="1.5" fill="#0f172a" />
                            <path d="M 46 29 Q 50 31 54 29" fill="none" stroke="#475569" strokeWidth="1.5" strokeLinecap="round" />
                            {progress >= 0.6 && (
                                <g fill="none" stroke="#f97316" strokeWidth="1" opacity={progress * 0.8}>
                                    <rect x="44" y="48" width="5" height="4" rx="1" />
                                    <rect x="51" y="48" width="5" height="4" rx="1" />
                                    <rect x="44" y="53" width="5" height="4" rx="1" />
                                    <rect x="51" y="53" width="5" height="4" rx="1" />
                                    <rect x="44" y="58" width="5" height="4" rx="1" />
                                    <rect x="51" y="58" width="5" height="4" rx="1" />
                                </g>
                            )}
                        </g>
                    </svg>
                </div>
            );
        };

        // --- Custom Hook: ระบบ Save ข้อมูลอัตโนมัติแยกตาม User ---
        function useStickyState(defaultValue, key, resetDaily, currentUser) {
            const fullKey = `p80_${currentUser}_${key}`;
            const dateKey = `p80_${currentUser}_${key}_date`;

            const [value, setValue] = React.useState(() => {
                const todayStr = new Date().toDateString();
                const savedDate = window.localStorage.getItem(dateKey);
                
                if (resetDaily && savedDate !== todayStr) {
                    return defaultValue;
                }

                const stickyValue = window.localStorage.getItem(fullKey);
                return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
            });

            React.useEffect(() => {
                window.localStorage.setItem(fullKey, JSON.stringify(value));
                window.localStorage.setItem(dateKey, new Date().toDateString());
            }, [fullKey, value]);

            return [value, setValue];
        }

        // --- Component: หน้า Login ---
        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (name.trim()) {
                    onLogin(name.trim());
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-red-900 to-orange-900 flex items-center justify-center p-6 text-slate-200">
                    <div className="bg-slate-800 p-8 rounded-[32px] border border-slate-700 shadow-2xl w-full max-w-sm text-center">
                        <div className="text-6xl mb-4 animate-bounce">🔥</div>
                        <h1 className="text-2xl font-black text-orange-400 mb-2">เข้าสู่ระบบ</h1>
                        <p className="text-xs text-slate-400 mb-6 font-medium">พิมพ์ชื่อของคุณเพื่อเข้าสู่โปรแกรมเตรียมมาราธอนส่วนตัว (Project 80)</p>
                        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                            <input
                                type="text"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                placeholder="ตัวอย่าง: Peerapong"
                                className="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl px-4 py-3 text-sm font-bold text-slate-200 focus:outline-none focus:border-orange-500 transition-colors"
                            />
                            <button
                                type="submit"
                                className="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-black text-sm py-3.5 rounded-2xl shadow-lg shadow-orange-900/50 active:scale-95 transition-transform"
                            >
                                เข้าสู่แคมป์มาราธอน 🚀
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- Component: หน้า Dashboard หลัก ---
        const Dashboard = ({ currentUser, onLogout }) => {
            const [activeTab, setActiveTab] = useState('tracker'); 
            
            // Trackers ที่แยกตาม User
            const [weight, setWeight] = useStickyState(94.0, 'weight', false, currentUser);
            const [water, setWater] = useStickyState(0, 'water', true, currentUser);
            const [trainingType, setTrainingType] = useStickyState('easy', 'trainingType', true, currentUser); // โหมดซ้อม: rest, easy, speed, long

            const [breakfastDone, setBreakfastDone] = useStickyState(false, 'breakfast', true, currentUser);
            const [lunchDone, setLunchDone] = useStickyState(false, 'lunch', true, currentUser);
            const [snackDone, setSnackDone] = useStickyState(false, 'snack', true, currentUser);
            const [dinnerDone, setDinnerDone] = useStickyState(false, 'dinner', true, currentUser);
            const [exerciseChecks, setExerciseChecks] = useStickyState([false, false, false, false], 'exercises', true, currentUser);
            const [fastingSuccess, setFastingSuccess] = useStickyState(false, 'fasting', true, currentUser);
            
            const [showConfetti, setShowConfetti] = useState(false);

            // Targets
            const targetWeight = 80.0;
            const initialWeight = 94.0;

            const today = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = today.toLocaleDateString('th-TH', options);

            // อัปเดตวันเริ่มต้นแคมเปญเป็น 1 มิถุนายน 2026 (เดือนใน JavaScript เริ่มนับจาก 0 -> 5 = มิถุนายน)
            const planStartDate = new Date(2026, 5, 1); 
            const diffTime = today.getTime() - planStartDate.getTime();
            const diffDays = Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1); 
            const totalDays = 90; 
            const overallProgress = Math.min(Math.round((diffDays / totalDays) * 100), 100);

            const weighInFrequency = 7; 
            const currentCycleDay = diffDays > 0 ? (diffDays - 1) % weighInFrequency : 0;
            const isWeighInDay = currentCycleDay === 0 && diffDays > 0;
            const daysUntilNextWeighIn = diffDays > 0 ? weighInFrequency - currentCycleDay : Math.ceil(Math.abs(diffTime) / (1000 * 60 * 60 * 24));
            
            const nextWeighInDate = new Date(today);
            if (diffDays <= 0) nextWeighInDate.setTime(planStartDate.getTime());
            else if (!isWeighInDay) nextWeighInDate.setDate(today.getDate() + daysUntilNextWeighIn);
            const nextWeighInString = nextWeighInDate.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });

            const toggleExercise = (index) => {
                const newChecks = [...exerciseChecks];
                newChecks[index] = !newChecks[index];
                setExerciseChecks(newChecks);
            };

            // --- ระบบปรับจูนตารางอาหารและการซ้อมอัจฉริยะ (Sync with Marathon Plan) ---
            const getTrainingConfig = (type) => {
                switch(type) {
                case 'rest':
                    return {
                        id: 'rest', icon: '💤', color: 'blue',
                        title: 'วันพักฟื้น (Rest & Recovery)',
                        desc: 'เน้นโปรตีนซ่อมแซมกล้ามเนื้อ ลดคาร์บเพราะไม่ได้ใช้พลังงานหนัก',
                        water: 10,
                        meals: {
                            breakfast: 'ไข่ต้ม 3 ฟอง + นมโปรตีนสูง (ลดแป้ง)',
                            lunch: 'เกาเหลาไก่ฉีก หรือ สลัดปลาแซลมอน',
                            snack: 'ถั่วแระญี่ปุ่น หรือ กรีกโยเกิร์ต',
                            dinner: 'สเต็กเนื้อ/ไก่ + ผักย่าง (งดแป้งมื้อเย็น)'
                        },
                        exercises: [
                            'พักผ่อนร่างกายจากการวิ่ง (Active Rest)',
                            'กลิ้งโฟมโรลเลอร์ (Foam Roller) นวดกล้ามเนื้อ (15 นาที)',
                            'ยืดเหยียดโยคะ (Yoga for Runners) (15 นาที)',
                            'ฝึกแกนกลางเบาๆ: Plank (3 เซต)'
                        ]
                    };
                case 'speed':
                    return {
                        id: 'speed', icon: '⚡', color: 'orange',
                        title: 'ซ้อมความเร็ว (Speed / Interval)',
                        desc: 'เน้นคาร์บย่อยง่ายก่อนซ้อม เพื่อให้มีแรงระเบิดพลังงาน',
                        water: 12,
                        meals: {
                            breakfast: 'ขนมปังโฮลวีตทาเนยถั่ว + กล้วยหอม + กาแฟดำ',
                            lunch: 'ข้าวกล้อง 1.5 ทัพพี + กะเพราไก่ (ไม่มัน) + ไข่ดาว',
                            snack: 'ผลไม้สด หรือ Energy Gel (ก่อนซ้อม 30 นาที)',
                            dinner: 'ข้าว 1 ทัพพี + ปลาเผา/ปลาย่าง + ผักต้ม (เติมไกลโคเจน)'
                        },
                        exercises: [
                            'วอร์มอัพ (Dynamic Stretching) (10 นาที)',
                            'วิ่ง Interval หรือ Tempo (ดูระยะในตารางทีม)',
                            'บอดี้เวทแกนกลางลำตัว (Core Workout)',
                            'คูลดาวน์ และ ยืดเหยียด (Static Stretching)'
                        ]
                    };
                case 'long':
                    return {
                        id: 'long', icon: '🔥', color: 'red',
                        title: 'วิ่งยาว (Long Run)',
                        desc: 'โหลดคาร์บล่วงหน้า ดื่มน้ำให้เยอะ และให้รางวัลตัวเองหลังซ้อม!',
                        water: 15,
                        meals: {
                            breakfast: 'โหลดคาร์บ: ข้าวโอ๊ต/ขนมปังแยม + กาแฟดำ',
                            lunch: 'ก๋วยเตี๋ยวเส้นหมี่/เส้นเล็ก 1-2 ชาม (เติมคาร์บ)',
                            snack: 'แตงโมฉ่ำๆ หรือ เกลือแร่ (ฟื้นฟูหลังวิ่ง)',
                            dinner: 'หมูกระทะ/ชาบู (เน้นเนื้อโปรตีน รางวัลหลังวิ่งยาว!)'
                        },
                        exercises: [
                            'ทาครีมกันเสียดสี แบกเป้น้ำ/พกเจล ให้พร้อม',
                            'วิ่ง Long Run คุมโซนหัวใจ 2-3 (ดูระยะในตารางทีม)',
                            'ฝึกจิบน้ำและกินเจลทุกๆ 45-60 นาที',
                            'แช่น้ำเย็น (Ice bath) หรือยืดคลายกล้ามเนื้อชุดใหญ่'
                        ]
                    };
                case 'easy':
                default:
                    return {
                        id: 'easy', icon: '🏃‍♂️', color: 'emerald',
                        title: 'วิ่งจ๊อกกิ้ง (Easy Run)',
                        desc: 'กินอาหารตามปกติ คุมแคลอรีเพื่อลดไขมัน',
                        water: 12,
                        meals: {
                            breakfast: 'แซนวิชโฮลวีตไข่ต้ม 2 ฟอง + กาแฟดำ',
                            lunch: 'ข้าวกล้อง 1.5 ทัพพี + อกไก่ย่าง/ไก่อบ + ผักต้ม',
                            snack: 'กล้วยหอม 1 ลูก (ก่อนวิ่ง)',
                            dinner: 'สเต็กปลาแซลมอน/ปลาดอลลี่ ย่าง + สลัดผัก'
                        },
                        exercises: [
                            'วอร์มอัพข้อต่อแบบนักวิ่ง (Dynamic Stretching)',
                            'วิ่ง Easy Pace เรื่อยๆ สบายๆ (ดูระยะในตารางทีม)',
                            'เวทเทรนนิ่งแกนกลาง (Core for Runners)',
                            'ยืดเหยียดหลังวิ่งป้องกันตะคริว'
                        ]
                    };
                }
            };

            const currentConfig = getTrainingConfig(trainingType);
            const targetWater = currentConfig.water;

            let dailyScore = 0;
            if (breakfastDone) dailyScore += 10;
            if (lunchDone) dailyScore += 10;
            if (snackDone) dailyScore += 10;
            if (dinnerDone) dailyScore += 10;
            if (water >= targetWater) dailyScore += 20;
            const completedExercises = exerciseChecks.filter(Boolean).length;
            dailyScore += (completedExercises / 4) * 20;
            if (fastingSuccess) dailyScore += 20;
            dailyScore = Math.min(Math.round(dailyScore), 100);

            useEffect(() => {
                if (dailyScore === 100) {
                    setShowConfetti(true);
                    const timer = setTimeout(() => setShowConfetti(false), 5000);
                    return () => clearTimeout(timer);
                } else {
                    setShowConfetti(false);
                }
            }, [dailyScore]);

            const getMotivationalMessage = () => {
                if (dailyScore === 100) return "โคตรสุด! ภารกิจซ้อมวันนี้เคลียร์ 100% ⚡";
                if (dailyScore >= 70) return "อีกนิดเดียวลูกพี่ อัดให้เต็มร้อย! 💪";
                if (dailyScore >= 40) return "เครื่องกำลังร้อน ลุยต่ออย่าแผ่ว! 🏃‍♂️";
                return "พร้อมผูกเชือกรองเท้าออกไปซ้อมรึยัง? 🔥";
            };

            const rewardsList = [
                "เบอร์เกอร์เนื้อ/หมู (ชิ้นเด็ดเติมคาร์บ) 1 ชิ้น", "เบียร์เย็นๆ 1 กระป๋อง (ฮีลใจหลังซ้อม Long Run)", "ไก่ทอด Air-fryer (ไร้น้ำมัน) ฟินๆ 3 ชิ้น",
                "สเต็กเนื้อสันใน (Tenderloin) ย่างหอมๆ เติมโปรตีน", "ซูชิแซลมอนเซ็ตใหญ่ (ดีต่อกล้ามเนื้อ)",
                "ขนมปังซาวร์โด (Sourdough) ปิ้งทาเนยถั่ว", "หมูกระทะ/ชาบู (เน้นเนื้อไม่ติดมัน ทานฉลองกับทีม)"
            ];
            const todayReward = rewardsList[diffDays % rewardsList.length];

            return (
                <div className="min-h-screen text-slate-200 pb-24 selection:bg-orange-500 animation-fade-in">
                    {showConfetti && <Confetti />}

                    {/* Header */}
                    <header className="relative bg-gradient-to-br from-slate-900 via-red-900 to-orange-900 p-6 pb-14 rounded-b-[40px] shadow-lg border-b border-red-800/50 overflow-hidden text-white">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-red-500 opacity-20 rounded-full blur-3xl -translate-y-1/3 translate-x-1/4"></div>
                        <div className="relative z-10">
                            <div className="flex justify-between items-start mb-1">
                                <div>
                                    <p className="text-orange-400 font-black text-[11px] tracking-[0.2em] uppercase mb-1">📍 Road To Bangsaen42</p>
                                    <h1 className="text-4xl font-black tracking-tight leading-none mb-1 uppercase drop-shadow-md text-white">Project <span className="text-orange-400">80</span></h1>
                                    <h2 className="text-base font-bold text-white/90 tracking-wide mt-1">Hello, {currentUser}! 🔥</h2>
                                </div>
                                <button onClick={onLogout} className="bg-white/10 hover:bg-white/20 p-2.5 rounded-2xl backdrop-blur-md shadow-sm border border-white/20 flex flex-col items-center transition-colors">
                                    <span className="text-xl">🚪</span>
                                    <span className="text-[8px] font-bold mt-1 uppercase tracking-wider">ออกระบบ</span>
                                </button>
                            </div>
                            <p className="text-slate-400 font-medium text-xs mt-3">📅 {dateString}</p>
                        </div>
                    </header>

                    {/* Floating Cards */}
                    <div className="px-5 -mt-10 relative z-20 space-y-4">
                        
                        {/* แบนเนอร์ลิงก์ไปตารางซ้อมมาราธอน */}
                        <a 
                            href="https://bangsaen42-team.netlify.app/?room=1158ae49" 
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="block bg-gradient-to-r from-orange-600 to-red-600 rounded-[20px] p-4 shadow-lg shadow-orange-900/50 border border-orange-400/50 flex items-center justify-between transform transition-all active:scale-95"
                        >
                            <div className="flex items-center gap-3">
                                <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm text-2xl">📍</div>
                                <div>
                                    <h3 className="text-white font-black text-sm tracking-wide">ดูตารางซ้อมมาราธอนทีม</h3>
                                    <p className="text-orange-100 text-[10px] font-medium mt-0.5 opacity-90">Bangsaen42 Team Dashboard 🚀</p>
                                </div>
                            </div>
                            <span className="text-white/80 text-xl">🔗</span>
                        </a>

                        <div className="bg-slate-800 rounded-[24px] p-5 shadow-2xl shadow-black/50 border border-slate-700 flex flex-col">
                            <div className="mb-3">
                                {isWeighInDay ? (
                                    <div className="bg-red-900/50 text-orange-400 text-xs font-bold px-3 py-1.5 rounded-full inline-flex items-center gap-1.5 border border-orange-500/30 animate-pulse shadow-sm">

                            <>

                                    <div className="grid grid-cols-2 gap-3">

                                            <path className={`transition-all duration-1000 ease-out ${dailyScore === 100 ? 'text-white' : 'text-orange-400'}`} strokeDasharray={`${dailyScore}, 100`} strokeWidth="3.5" strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />

                                    <div className="flex items-center gap-4">
                                        <div className={`w-14 h-14 rounded-[18px] flex items-center justify-center shrink-0 text-2xl ${dailyScore === 100 ? 'bg-orange-500 text-slate-900 shadow-[0_0_15px_rgba(249,115,22,0.5)]' : 'bg-slate-900 border border-slate-700'}`}>🏆</div>
                                        <div>
                                            <h3 className={`font-black text-sm uppercase tracking-wide ${dailyScore === 100 ? 'text-orange-400' : 'text-slate-500'}`}>{dailyScore === 100 ? 'ปลดล็อกรางวัลนักวิ่ง!' : 'เป้าหมายรางวัลวันนี้'}</h3>

                                    <div className="grid gap-3">
                                        {[
                                            { state: breakfastDone, setter: setBreakfastDone, icon: '🥞', title: 'มื้อเช้า', time: '08:00', desc: currentConfig.meals.breakfast },

                                                        <h3 className={`font-extrabold text-sm transition-all ${meal.state ? 'text-slate-500 line-through decoration-slate-600' : 'text-slate-200'}`}>{meal.title} <span className="text-[10px] font-bold text-slate-400 ml-1 bg-slate-900 px-1.5 py-0.5 rounded uppercase border border-slate-700">{meal.time}</span></h3>

                                    <div className="grid gap-3">
                                        {currentConfig.exercises.map((ex, idx) => {
                                            const isDone = exerciseChecks[idx];

                                            <div key={idx} onClick={() => toggleExercise(idx)} className={`p-4 rounded-[20px] cursor-pointer flex items-center justify-between transition-all duration-300 active:scale-95 ${isDone ? 'bg-slate-800/40 border border-slate-700/50 opacity-60' : 'bg-slate-800 shadow-md border border-slate-700 hover:border-slate-600'}`}>

                                                    <div className="pr-2">

                                                </div>
                                                <div className={`relative w-7 h-7 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${isDone ? 'border-cyan-500 bg-cyan-500' : 'border-slate-600 bg-slate-900'}`}>

                                        <div className={`relative w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${fastingSuccess ? 'border-blue-500 bg-blue-500' : 'border-slate-600 bg-slate-900'}`}>
                                            {fastingSuccess && <span className="text-white text-[10px] font-bold">✓</span>}
                                        </div>
                                    </div>
                                    <div>
                                        <h3 className={`font-extrabold text-sm ${fastingSuccess ? 'text-blue-400' : 'text-slate-200'}`}>งดมื้อดึก (IF)</h3>

                                    </div>
                                </section>

                                <section className="bg-slate-800 rounded-[24px] p-6 shadow-lg border border-slate-700">

                                        <h2 className="font-extrabold text-lg text-white flex items-center gap-2">🍽️ ตารางเสบียงนักวิ่ง</h2>
                                    </div>
                                    <div className="space-y-4">
                                        {[
                                            { meal: 'มื้อเช้า', desc: currentConfig.meals.breakfast },

                                            { meal: 'มื้อว่าง', desc: currentConfig.meals.snack },

                                        <p>วันไหนซ้อม Long Run (วิ่งยาว) แนะนำให้โหลดคาร์โบไฮเดรตล่วงหน้า 1-2 วันนะครับ จะได้มีแรงฮึดจนจบ!</p>
                                    </div>
                                </section>

                                <section className="bg-slate-800 rounded-[24px] p-6 shadow-lg border border-slate-700 mb-10">
                                    <div className="mb-5">
                                        <h2 className="font-black text-lg text-white flex items-center gap-2 tracking-wide uppercase">🏃‍♂️ แผนการฝึกซ้อม</h2>
                                        <p className="text-xs font-bold text-orange-500 mt-1 uppercase tracking-widest">{currentConfig.title}</p>

                                    <div className="space-y-3">
                                        {currentConfig.exercises.map((ex, idx) => (

                                    <div className="mt-5 p-4 bg-blue-900/20 rounded-[16px] text-xs font-bold text-blue-300 flex items-start gap-3 border border-blue-800/30 leading-relaxed">
                                        <span className="text-lg animate-pulse">📍</span>
                                        <p>อย่าลืมกดปุ่ม <strong>"ดูตารางซ้อมมาราธอนทีม"</strong> ด้านบนสุด เพื่อเช็กระยะวิ่งที่ต้องเก็บในแต่ละวันจากโค้ชของคุณนะครับ!</p>
                                    </div>
                                </section>
                            </div>

        // --- Container หลักเพื่อสลับหน้าระหว่าง Login กับ Dashboard ---
        const MainContainer = () => {
            const [currentUser, setCurrentUser] = useState(() => {
                return window.localStorage.getItem('p80_current_user') || null;
            });

            const handleLogin = (name) => {
                setCurrentUser(name);
                window.localStorage.setItem('p80_current_user', name);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                window.localStorage.removeItem('p80_current_user');
            };

            if (!currentUser) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return <Dashboard key={currentUser} currentUser={currentUser} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainContainer />);
    </script>
</body>
</html>
