                        <div className="overflow-y-auto hide-scrollbar flex-1 pb-4 space-y-6">
                            <div>
                                <h3 className="text-sm font-black text-zinc-400 uppercase tracking-widest mb-3">1. Body Metrics</h3>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div className="bg-[#18181b] p-4 rounded-xl border border-zinc-700"><label className="text-xs text-zinc-400 font-bold uppercase block mb-1">Weight (KG)</label><input type="number" value={w} onChange={e=>setW(e.target.value)} className="w-full bg-transparent text-white font-black text-xl outline-none focus:suunto-accent" placeholder="90" /></div>
                                    <div className="bg-[#18181b] p-4 rounded-xl border border-zinc-700"><label className="text-xs text-zinc-400 font-bold uppercase block mb-1">Target (KG)</label><input type="number" value={tw} onChange={e=>setTw(e.target.value)} className="w-full bg-transparent text-white font-black text-xl outline-none focus:suunto-accent" placeholder="80" /></div>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div className="bg-[#18181b] p-4 rounded-xl border border-zinc-700"><label className="text-xs text-zinc-400 font-bold uppercase block mb-1">Height (CM)</label><input type="number" value={h} onChange={e=>setH(e.target.value)} className="w-full bg-transparent text-white font-bold text-lg outline-none focus:suunto-accent" placeholder="175" /></div>
                                    <div className="flex gap-2 bg-[#18181b] p-2 rounded-xl border border-zinc-700">
                                        <button onClick={()=>setGender('male')} className={`flex-1 rounded-lg text-sm font-bold transition-colors ${gender==='male' ? 'suunto-bg-accent' : 'bg-transparent text-zinc-500'}`}>M</button>
                                        <button onClick={()=>setGender('female')} className={`flex-1 rounded-lg text-sm font-bold transition-colors ${gender==='female' ? 'suunto-bg-accent' : 'bg-transparent text-zinc-500'}`}>F</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-[#18181b] p-4 rounded-xl border border-zinc-700"><label className="text-xs text-zinc-400 font-bold uppercase block mb-1">Age</label><input type="number" value={age} onChange={e=>setAge(e.target.value)} className="w-full bg-transparent text-white font-bold text-lg outline-none focus:suunto-accent" placeholder="35" /></div>
                                    <div className="bg-[#18181b] p-4 rounded-xl border border-zinc-700"><label className="text-xs text-zinc-400 font-bold uppercase block mb-1">Resting HR</label><input type="number" value={rhr} onChange={e=>setRhr(e.target.value)} className="w-full bg-transparent text-orange-400 font-bold text-lg outline-none focus:suunto-accent" placeholder="60" /></div>
                                </div>
                            </div>

                            <div className="border-t border-zinc-800 pt-5">
                                <h3 className="text-sm font-black text-zinc-400 uppercase tracking-widest mb-3">2. Fitness Level</h3>
                                <div className="bg-[#18181b] p-4 rounded-xl border border-cyan-900/40 mb-3">
                                    <div className="flex justify-between items-center mb-3">
                                        <label className="text-xs font-black text-cyan-400 uppercase">30-Min VCR Test</label>
                                        <div className="flex items-baseline gap-2"><input type="number" value={vcr} onChange={e=>setVcr(e.target.value)} className="w-20 bg-transparent border-b border-cyan-900 text-cyan-400 font-black text-xl outline-none text-center" placeholder="4500" /><span className="text-cyan-600 font-bold text-xs uppercase">Meters</span></div>
                                    </div>
                                    <div className="bg-[#121212] p-3 rounded-lg border border-zinc-800">
                                        <ul className="text-[10px] text-zinc-400 font-bold space-y-1.5">
                                            <li className="flex justify-between"><span>🔴 Beginner (> 7:30)</span><span>&lt; 4000m</span></li>
                                            <li className="flex justify-between"><span>🟡 Inter. (6:00 - 7:30)</span><span>4000 - 5000m</span></li>
                                            <li className="flex justify-between"><span>🟢 Advanced (&lt; 6:00)</span><span>&gt; 5000m</span></li>
                                        </ul>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <select value={injury} onChange={e=>setInjury(e.target.value)} className="w-full bg-[#18181b] text-zinc-300 p-3 rounded-xl border border-zinc-700 outline-none text-sm"><option value="none">No Injury</option><option value="knee">Knee/ITB</option><option value="plantar">Plantar</option><option value="shin">Shin Splints</option></select>
                                    <select value={lifestyle} onChange={e=>setLifestyle(e.target.value)} className="w-full bg-[#18181b] text-zinc-300 p-3 rounded-xl border border-zinc-700 outline-none text-sm"><option value="sedentary">Office</option><option value="active">Active</option><option value="heavy">Heavy Work</option></select>
                                </div>
                            </div>

                            <div className="border-t border-zinc-800 pt-5">
                                <h3 className="text-sm font-black text-zinc-400 uppercase tracking-widest mb-3">3. Training Plan (Kru Din Protocol)</h3>
                                <div className="bg-[#18181b] p-4 rounded-xl border border-zinc-700 mb-4">
                                    <label className="text-xs text-zinc-400 font-bold uppercase block mb-3">Race Goal</label>
                                    <div className="flex gap-2 mb-4">
                                        {[5,10,21.1,42.195].map(d => (<button key={d} onClick={()=>setTd(d)} className={`flex-1 py-3 rounded-lg text-sm font-black transition-colors ${td===d ? 'suunto-bg-accent' : 'bg-[#121212] text-zinc-400 border border-zinc-700 hover:bg-zinc-800'}`}>{d===42.195?'42K':d+'K'}</button>))}
                                    </div>
                                    <label className="text-xs text-zinc-400 font-bold uppercase block mb-2">Race Date</label>
                                    <input type="date" value={raceDateStr} onChange={e=>setRaceDateStr(e.target.value)} className="w-full bg-[#121212] text-white p-3 rounded-lg border border-zinc-700 outline-none text-sm font-bold focus:border-[#bef264]" />
                                </div>
                                <div className="mb-4">
                                    <label className="text-xs text-zinc-400 font-bold uppercase block mb-2 flex justify-between"><span>Training Days</span><span className="text-white">{Object.values(avail).filter(v=>v).length} Days/Wk</span></label>
                                    <div className="flex gap-1.5">
                                        {['S','M','T','W','T','F','S'].map((d,i) => (<button key={i} onClick={()=>setAvail({...avail, [i]:!avail[i]})} className={`flex-1 py-3 rounded-lg text-xs font-black transition-colors ${avail[i] ? 'bg-zinc-600 text-white' : 'bg-[#18181b] text-zinc-500 border border-zinc-700 hover:bg-zinc-800'}`}>{d}</button>))}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs text-zinc-400 font-bold uppercase block mb-2">Long Run Day</label>
                                    <select value={ld} onChange={e=>setLd(Number(e.target.value))} className="w-full bg-[#18181b] text-white p-3 rounded-xl border border-zinc-700 outline-none text-sm font-bold">
                                        {Object.keys(avail).filter(k=>avail[k]).map(k => (<option key={k} value={k}>Every {dayLabels[k]}</option>))}
                                        {Object.values(avail).filter(v=>v).length === 0 && (<option value={0}>Select days first</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div className="shrink-0 mt-3 pt-4 border-t border-zinc-800">
                            <button onClick={handleSave} className="w-full suunto-bg-accent py-5 rounded-xl uppercase tracking-widest text-base font-black active:scale-95 transition-all">SYNC SETTINGS</button>
                        </div>
                    </div>
                </div>
            );
        };

        // 🛠️ อัปเดต fetchWithRetry ให้ดึง Error จาก Google มาโชว์ชัดๆ
        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        // ดึงข้อความ Error จริงๆ จาก Google ทะลุออกมาเลย
                        const errData = await response.json().catch(() => ({}));
                        const errMsg = errData?.error?.message || `HTTP error! status: ${response.status}`;
                        throw new Error(errMsg);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        const TabTracker = ({ score, daily, updateDaily, cfg, inDist, setInDist, inPace, setInPace, inHr, setInHr, inAct, setInAct, saveRun, targetWater }) => {
            const [isScanning, setIsScanning] = useState(false);
            const [scanError, setScanError] = useState('');
            // เพิ่ม State สำหรับจัดการ API Key โดยดึงจากเครื่อง (Local Storage)
            const [aiKey, setAiKey] = useState(() => safeStorage.getItem('p80_gemini_key') || '');

            // ฟังก์ชัน AI สแกนภาพ
            const handleScanImage = async (e) => {
                const file = e.target.files[0];
                if(!file) return;

                // ตรวจสอบและขอดู API Key จากผู้ใช้ (ครั้งแรกครั้งเดียว)
                let currentKey = aiKey;
                if (!currentKey) {
                    currentKey = window.prompt("🔑 ระบบต้องการ API Key เพื่อใช้งาน AI\nกรุณานำรหัสที่สร้างจาก Google AI Studio มาวางที่นี่ (ทำครั้งเดียวแอปจะจำไว้ครับ):");
                    if (currentKey && currentKey.trim() !== '') {
                        setAiKey(currentKey.trim());
                        safeStorage.setItem('p80_gemini_key', currentKey.trim());
                    } else {
                        return; // ยกเลิกการสแกนถ้าไม่ใส่รหัส
                    }
                }

                setIsScanning(true);
                setScanError('');

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    try {
                        const base64Data = reader.result.split(',')[1];
                        
                        // ใช้รหัสที่ผู้ใช้กรอกเข้ามา
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${currentKey}`;
                        
                        const payload = {
                            contents: [{
                                role: "user",
                                parts: [
                                    { text: "Extract workout data from this fitness app screenshot (e.g., Zepp, Garmin, Strava). The UI is likely in Thai. Map Thai words correctly (e.g., 'ระยะทาง' = distance, 'ฝีเท้าเฉลี่ย' = pace, 'อัตราการเต้นหัวใจ' = hr). Return ONLY a valid JSON object without markdown. Keys needed: 'distance' (number, MUST be in kilometers. If image shows meters like 1550 ม., convert to 1.55), 'pace' (string, average pace MM:SS), 'hr' (number, average heart rate bpm), 'type' (string: strictly guess from 'Run', 'Trail', 'Swim', 'Bike', or 'Other' based on context like การวิ่งเทรล, ว่ายน้ำ). If unable to find a value, leave it empty." },
                                    { inlineData: { mimeType: file.type, data: base64Data } }
                                ]
                            }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        distance: { type: "NUMBER" },
                                        pace: { type: "STRING" },
                                        hr: { type: "NUMBER" },
                                        type: { type: "STRING" }
                                    }
                                }
                            }
                        };

                        const result = await fetchWithRetry(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if(text) {
                            // ป้องกันกรณี AI ตอบกลับมามี Markdown ```json ครอบอยู่
                            const cleanText = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                            const data = JSON.parse(cleanText);
                            if(data.distance) setInDist(data.distance.toString());
                            if(data.pace) setInPace(data.pace.toString());
                            if(data.hr) setInHr(data.hr.toString());
                            if(data.type) setInAct(data.type.toString());
                        } else {
                            setScanError("ไม่พบข้อมูลในรูปภาพนี้ครับ");
                        }
                    } catch (err) {
                        // 🛠️ โชว์ข้อความ Error จาก Google ให้อ่านง่ายๆ
                        setScanError("AI สแกนไม่ผ่าน: " + err.message);
                        
                        // ถ้ารหัสผิด ให้ลบออกจากระบบ จะได้เด้งให้กรอกใหม่
                        if (err.message.includes('API key not valid') || err.message.includes('API_KEY_INVALID') || err.message.includes('not found')) {
                            safeStorage.removeItem('p80_gemini_key');
                            setAiKey('');
                        }
                        console.error("รายละเอียด Error:", err);
                    } finally {
                        setIsScanning(false);
                    }
                };
            };

            return (
                <div className="space-y-5">
                    <section className={`p-6 suunto-card flex items-center justify-between border-l-4 transition-colors ${score===100 ? 'border-l-[#bef264] bg-[#bef264]/5' : 'border-l-zinc-700'}`}>
                        <div><h2 className="text-2xl font-black uppercase text-white">SCORE</h2><p className="text-xs font-bold text-zinc-400 uppercase tracking-widest mt-1">Daily Objective</p></div>
                        <div className={`text-6xl font-black italic ${score===100 ? 'suunto-accent' : 'text-zinc-300'}`}>{score}%</div>
                    </section>
                    
                    <section className="suunto-card p-6">
                        <h3 className="font-black text-sm uppercase text-zinc-300 mb-5 tracking-widest flex items-center gap-2"><span>🍏</span> NUTRITION LOG</h3>
                        <div className="grid grid-cols-2 gap-4">
                            {[ {k:'b',l:'Breakfast'}, {k:'l',l:'Lunch'}, {k:'s',l:'Snack'}, {k:'d',l:'Dinner'} ].map(m => (
                                <button key={m.k} onClick={()=>updateDaily(m.k, !daily[m.k])} className={`p-5 rounded-xl text-sm font-bold uppercase transition-all border ${daily[m.k] ? 'suunto-bg-accent border-[#bef264]' : 'bg-[#18181b] text-zinc-300 border-zinc-700 hover:bg-zinc-800'}`}>{m.l}</button>
                            ))}
                        </div>
                    </section>
                    
                    <section className="suunto-card p-6 flex items-center justify-between">
                        <div><h3 className="font-black text-sm uppercase text-cyan-500 tracking-widest flex items-center gap-2"><span>💧</span> HYDRATION</h3><p className="text-xs text-zinc-400 font-bold uppercase mt-2">Target: {targetWater} Glasses</p></div>
                        <div className="flex items-center gap-4">
                            <button onClick={()=>updateDaily('w', Math.max(0, daily.w-1))} className="w-14 h-14 bg-[#18181b] rounded-xl font-black text-3xl text-zinc-400 border border-zinc-700 active:scale-95">-</button>
                            <span className="text-4xl font-black text-white w-10 text-center italic">{daily.w}</span>
                            <button onClick={()=>updateDaily('w', daily.w+1)} className="w-14 h-14 bg-cyan-600/20 text-cyan-400 border border-cyan-800 rounded-xl font-black text-3xl active:scale-95 hover:bg-cyan-600/40">+</button>
                        </div>
                    </section>
                    
                    <section className="suunto-card p-6">
                        <h3 className="font-black text-base uppercase suunto-accent mb-3 tracking-widest">🏃‍♂️ {cfg.name}</h3>
                        <p className="text-base text-zinc-300 mb-6 leading-relaxed font-medium">{cfg.desc}</p>
                        <div className="space-y-4 mb-8">
                            {cfg.ex.map((ex, i) => (
                                <div key={i} onClick={()=>{let nx=[...(daily.ex||[false,false,false])]; nx[i]=!nx[i]; updateDaily('ex', nx);}} className={`p-5 rounded-xl border flex items-center gap-4 cursor-pointer transition-all ${daily.ex?.[i] ? 'bg-[#bef264]/10 border-[#bef264] suunto-accent' : 'bg-[#18181b] border-zinc-700 text-zinc-300 hover:border-zinc-500'}`}>
                                    <div className={`w-6 h-6 rounded flex items-center justify-center shrink-0 ${daily.ex?.[i] ? 'bg-[#bef264] text-black' : 'border-2 border-zinc-500'}`}>{daily.ex?.[i] && <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}</div>
                                    <span className="font-bold text-base tracking-wide">{ex}</span>
                                </div>
                            ))}
                        </div>
                        
                        {cfg.id !== 'rest' && !daily.rLog && (
                            <div className="bg-[#18181b] p-6 rounded-xl border border-zinc-700">
                                <div className="flex justify-between items-center mb-4">
                                    <p className="text-xs font-black text-zinc-400 uppercase tracking-widest">ACTIVITY LOGGER (MANUAL & AI)</p>
                                    {aiKey && (
                                        <button onClick={() => { safeStorage.removeItem('p80_gemini_key'); setAiKey(''); }} className="text-[10px] text-zinc-500 underline uppercase font-bold hover:text-zinc-300">
                                            เปลี่ยน API Key
                                        </button>
                                    )}
                                </div>
                                
                                {/* ส่วนเลือกกีฬา & ปุ่มสแกน AI */}
                                <div className="flex gap-2 mb-4">
                                    <select value={inAct} onChange={e=>setInAct(e.target.value)} className="bg-black p-4 rounded-xl border border-zinc-700 text-center font-bold text-xs text-white outline-none focus:border-[#bef264] flex-1">
                                        <option value="Run">🏃‍♂️ Run</option>
                                        <option value="Trail">⛰️ Trail</option>
                                        <option value="Swim">🏊‍♂️ Swim</option>
                                        <option value="Bike">🚴‍♂️ Bike</option>
                                        <option value="Other">🏋️‍♂️ Other</option>
                                    </select>
                                    <label className={`flex-[2] border ${isScanning ? 'bg-zinc-800 border-cyan-800 text-cyan-500' : 'bg-cyan-950/30 border-cyan-800 text-cyan-400 hover:bg-cyan-900/50'} p-4 rounded-xl text-center font-bold text-xs flex justify-center items-center gap-2 cursor-pointer active:scale-95 transition-all`}>
                                        {isScanning ? <span className="animate-pulse">🔄 AI กำลังสแกนรูป...</span> : <>📸 สแกนรูปจากนาฬิกา / Strava<input type="file" accept="image/*" className="hidden" onChange={handleScanImage} /></>}
                                    </label>
                                </div>
                                {scanError && <p className="text-red-400 text-xs font-bold text-center mb-4 bg-red-500/10 p-2 rounded-lg border border-red-500/20">{scanError}</p>}

                                <div className="grid grid-cols-3 gap-3 mb-6">
                                    <input type="number" value={inDist} onChange={e=>setInDist(e.target.value)} className="bg-black p-4 rounded-xl border border-zinc-700 text-center font-bold text-lg text-white outline-none focus:border-[#bef264]" placeholder="KM"/>
                                    <input type="text" value={inPace} onChange={e=>setInPace(e.target.value)} className="bg-black p-4 rounded-xl border border-zinc-700 text-center font-bold text-lg text-white outline-none focus:border-[#bef264]" placeholder="PACE"/>
                                    <input type="number" value={inHr} onChange={e=>setInHr(e.target.value)} className="bg-black p-4 rounded-xl border border-zinc-700 text-center font-bold text-lg text-white outline-none focus:border-[#bef264]" placeholder="HR"/>
                                </div>
                                <button onClick={saveRun} disabled={!inDist || !inPace} className="w-full suunto-bg-accent py-5 rounded-xl uppercase tracking-widest text-sm font-black disabled:opacity-30 disabled:grayscale transition-all active:scale-95 shadow-[0_0_15px_rgba(190,242,100,0.1)]">SAVE ACTIVITY</button>
                            </div>
                        )}
                        
                        {daily.rLog && (
                            <div className="bg-[#18181b] p-6 rounded-xl border border-zinc-700">
                                <div className="flex justify-between items-start mb-4">
                                    <p className="suunto-accent font-black text-sm uppercase tracking-widest">ACTIVITY LOGGED</p>
                                    <button onClick={()=>updateDaily('rLog', false)} className="text-xs text-zinc-400 uppercase font-bold hover:text-white underline">EDIT</button>
                                </div>
                                <div className="bg-black p-4 rounded-xl border border-zinc-800 mb-6 grid grid-cols-4 text-center gap-2">
                                    <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">TYPE</p><p className="text-white font-black text-lg italic">{daily.rType === 'Run' ? '🏃‍♂️' : daily.rType === 'Trail' ? '⛰️' : daily.rType === 'Swim' ? '🏊‍♂️' : daily.rType === 'Bike' ? '🚴‍♂️' : '🏋️‍♂️'}</p></div>
                                    <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">DIST</p><p className="text-white font-black text-lg italic">{daily.rDist} <span className="text-[10px] font-normal text-zinc-500">km</span></p></div>
                                    <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">PACE</p><p className="text-white font-black text-lg italic">{daily.rPace}</p></div>
                                    <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">HR</p><p className="text-white font-black text-lg italic">{daily.rHr}</p></div>
                                </div>
                                <h4 className="text-xs font-black text-orange-400 uppercase tracking-widest mb-3">🤖 AI COACH FEEDBACK</h4>
                                <p className="text-base font-bold text-zinc-200 leading-relaxed mb-5">{daily.aiFeedback}</p>
                                <span className="text-xs font-black text-black uppercase bg-[#bef264] px-3 py-1.5 rounded-lg inline-block">{daily.perfCondition}</span>
                                
                                {daily.vcrUpgraded && (
                                    <div className="mt-6 bg-fuchsia-500/10 border border-fuchsia-500/30 p-4 rounded-xl text-center animate-pulse">
                                        <p className="text-sm text-fuchsia-400 font-black uppercase tracking-widest">🎉 VCR Level Up!</p>
                                        <p className="text-xs text-zinc-300 mt-2 font-bold">สถิติดีขึ้น AI อัปเกรด VCR ให้เป็น {daily.newVcrVal}m อัตโนมัติ</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </section>
                </div>
            );
        };

        const TabPlan = ({ cfg, prof, weekIdx }) => {
            const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const scheduleMap = { 'rest': 'Rest', 'easy': 'Easy', 'speed': 'Speed Work', 'long': 'Long Run' };
            const colorMap = { 'rest': 'text-zinc-500', 'easy': 'text-lime-400', 'speed': 'text-orange-400', 'long': 'text-red-400' };
            const todayIdx = new Date().getDay();

            return (
                <div className="space-y-6 pb-12">
                    <section className="suunto-card p-8 border-t-4 border-t-zinc-700">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-4">💬 COACH'S BRIEFING</h2>
                        <p className="text-lg font-bold text-zinc-100 leading-relaxed italic">"{cfg.advice}"</p>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-6">TODAY'S PROTOCOL</h2>
                        <div className="mb-6 pb-6 border-b border-zinc-800">
                            <p className="text-3xl font-black text-white uppercase italic">{cfg.name}</p>
                            <div className="flex gap-3 mt-4">
                                <span className="bg-[#18181b] border border-zinc-700 px-4 py-2 rounded-lg text-cyan-400 font-black text-xs tracking-widest">PACE: {cfg.pace}</span>
                                <span className="bg-[#18181b] border border-zinc-700 px-4 py-2 rounded-lg text-red-400 font-black text-xs tracking-widest">HR: {cfg.hr}</span>
                            </div>
                        </div>
                        <div className="space-y-6">
                            <div><p className="text-xs font-black text-orange-400 uppercase mb-3 tracking-widest">WARM-UP</p><ul className="list-disc list-inside text-base font-bold text-zinc-300 space-y-2">{cfg.detailedWorkout.warmup.map((i,idx)=><li key={idx}>{i}</li>)}</ul></div>
                            <div><p className="text-xs font-black suunto-accent uppercase mb-3 tracking-widest">MAIN SET</p><p className="text-lg font-black text-white bg-[#18181b] p-5 rounded-xl border border-zinc-700 leading-relaxed">{cfg.detailedWorkout.main}</p></div>
                            <div><p className="text-xs font-black text-cyan-400 uppercase mb-3 tracking-widest">COOL-DOWN</p><ul className="list-disc list-inside text-base font-bold text-zinc-300 space-y-2">{cfg.detailedWorkout.cooldown.map((i,idx)=><li key={idx}>{i}</li>)}</ul></div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-6">NUTRITION GUIDE</h2>
                        <div className="space-y-4 mb-6">
                            {[ {k:'b', t:'Breakfast', c:'text-yellow-400'}, {k:'l', t:'Lunch', c:'text-orange-400'}, {k:'s', t:'Snack', c:'text-fuchsia-400'}, {k:'d', t:'Dinner', c:'text-blue-400'} ].map(m => {
                                const d = cfg.detailedMeals[m.k]; if(!d) return null;
                                return (
                                    <div key={m.k} className="bg-[#18181b] p-5 rounded-xl border border-zinc-800">
                                        <p className={`text-xs font-black uppercase tracking-widest mb-2 ${m.c}`}>{m.t}</p>
                                        <p className="text-base font-black text-white leading-relaxed">{d.menu}</p>
                                        <p className="text-sm text-zinc-400 mt-2 font-bold">{d.detail}</p>
                                    </div>
                                )
                            })}
                        </div>
                        <div className="bg-[#bef264]/10 border border-[#bef264]/30 p-5 rounded-xl flex items-start gap-4">
                            <span className="text-2xl">💡</span>
                            <div>
                                <p className="text-xs font-black text-[#bef264] uppercase tracking-widest mb-2">PROTEIN QUOTA</p>
                                <p className="text-base text-zinc-200 font-bold">{Math.round((prof.weight||90) * 1.5)} - {Math.round((prof.weight||90) * 1.8)} กรัม/วัน</p>
                            </div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-5 flex items-center gap-2"><span>📅</span> WEEKLY SCHEDULE</h2>
                        <div className="space-y-3">
                            {dayNames.map((day, idx) => {
                                const type = prof?.schedule?.[idx] || 'rest';
                                const isToday = todayIdx === idx;
                                
                                // Simulate ตารางล่วงหน้าของแต่ละวัน
                                const dummyDate = new Date();
                                dummyDate.setDate(dummyDate.getDate() + (idx - todayIdx));
                                const dayCfg = getDayConfig(dummyDate, weekIdx, false, prof);

                                return (
                                    <div key={idx} className={`p-5 rounded-xl border flex flex-col gap-2 transition-colors ${isToday ? 'bg-zinc-800 border-zinc-500 shadow-md' : 'bg-[#18181b] border-zinc-800'}`}>
                                        <div className="flex justify-between items-center">
                                            <span className={`text-sm font-black uppercase tracking-widest ${isToday ? 'text-white' : 'text-zinc-500'}`}>{day} {isToday && '(TODAY)'}</span>
                                            <span className={`text-sm font-black uppercase tracking-widest ${colorMap[type]}`}>{scheduleMap[type]}</span>
                                        </div>
                                        {type !== 'rest' && (
                                            <div className="mt-2 pt-3 border-t border-zinc-700/50">
                                                <p className={`text-xs font-bold leading-relaxed mb-3 ${isToday ? 'text-white' : 'text-zinc-400'}`}>{dayCfg.detailedWorkout.main}</p>
                                                <div className="flex gap-2">
                                                    <span className="text-[10px] font-black text-cyan-400 bg-cyan-400/10 px-2.5 py-1 rounded">PACE: {dayCfg.pace}</span>
                                                    <span className="text-[10px] font-black text-red-400 bg-red-400/10 px-2.5 py-1 rounded">HR: {dayCfg.hr}</span>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </section>
                </div>
            );
        };

        const TabRanking = ({ leaderboardData }) => (
            <section className="space-y-6 pb-12">
                <div className="text-center mb-8 pt-4">
                    <h2 className="text-4xl font-black text-white italic uppercase tracking-tighter">LEADERBOARD</h2>
                    <p className="text-xs font-bold text-zinc-400 uppercase tracking-widest mt-2">Weekly Mileage (7 Days)</p>
                </div>
                <div className="space-y-4">
                    {leaderboardData.length === 0 ? <div className="text-center p-10 suunto-card text-zinc-400 font-bold text-base tracking-widest uppercase">LOADING...</div> : 
                        leaderboardData.map((runner, idx) => {
                            let bg = 'bg-[#18181b] border-zinc-800', txt = 'text-white', numColor = 'text-zinc-500';
                            if (idx === 0) { bg = 'bg-zinc-900 border-[#bef264]/40 shadow-lg shadow-[#bef264]/5'; txt = 'suunto-accent'; numColor = 'suunto-accent'; }
                            else if (idx === 1) { txt = 'text-zinc-200'; numColor = 'text-zinc-400'; }
                            else if (idx === 2) { txt = 'text-zinc-400'; numColor = 'text-zinc-500'; }
                            return (
                                <div key={idx} className={`p-6 rounded-2xl border flex items-center justify-between ${bg}`}>
                                    <div className="flex items-center gap-5">
                                        <div className={`w-10 font-black text-3xl text-center italic ${numColor}`}>{idx + 1}</div>
                                        <div>
                                            <h3 className={`font-black text-lg uppercase tracking-wider ${txt}`}>{runner.name} {idx===0&&'👑'}</h3>
                                            <p className="text-xs text-zinc-500 font-bold uppercase mt-1.5 tracking-widest">All-Time: {runner.tKm.toFixed(1)} KM</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className={`text-4xl font-black italic ${idx===0?'text-white':'text-zinc-400'}`}>{runner.wKm.toFixed(1)}</p>
                                    </div>
                                </div>
                            )
                        })
                    }
                </div>
            </section>
        );

        const TabStats = ({ prof, vo2Value, tDist, pTime, pSource, fastest5kSecs, fastest10kSecs, longestRun, achievements }) => {
            let vo2Color = "#ef4444", vo2Label = "POOR";
            if (vo2Value >= 35) { vo2Color = "#f97316"; vo2Label = "FAIR"; }
            if (vo2Value >= 40) { vo2Color = "#a3e635"; vo2Label = "GOOD"; }
            if (vo2Value >= 45) { vo2Color = "#60a5fa"; vo2Label = "EXCELLENT"; }
            if (vo2Value >= 50) { vo2Color = "#e879f9"; vo2Label = "SUPERIOR"; }
            const offset = 126 - (Math.min(100, ((vo2Value - 20) / 40) * 100) / 100) * 126;
            const mapGoal = 600;
            const mapProgress = Math.min((tDist / mapGoal) * 100, 100);

            // กราฟ 7 วัน
            const chartData = useMemo(() => {
                const days = [];
                for (let i = 6; i >= 0; i--) {
                    let d = new Date(); d.setDate(d.getDate() - i);
                    const dtStr = d.toDateString(); const record = prof?.records?.[dtStr];
                    const dist = (record?.rLog && record?.rDist) ? parseFloat(record.rDist) : 0;
                    days.push({ day: dtStr.split(' ')[0], dist: dist || 0, isToday: i === 0 });
                }
                return days;
            }, [prof?.records]);

            const maxChartDist = Math.max(...chartData.map(d => d.dist), 5); 

            return (
                <div className="space-y-6 pb-14">
                    <section className="suunto-card p-10 text-center border-t-2 border-t-zinc-700">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-8">PEAK VO2 MAX</h2>
                        <div className="flex justify-center mb-8">
                            <div className="relative w-56 h-28 overflow-hidden">
                                <svg className="w-full h-full" viewBox="0 0 100 50">
                                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#27272a" strokeWidth="8" strokeLinecap="round" />
                                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={vo2Color} strokeWidth="8" strokeLinecap="round" className="gauge-arc" style={{strokeDashoffset: offset}} />
                                </svg>
                                <div className="absolute bottom-0 left-0 right-0 flex flex-col items-center">
                                    <span className="text-6xl font-black tracking-tighter italic" style={{color: vo2Color}}>{vo2Value}</span>
                                </div>
                            </div>
                        </div>
                        <span className="text-xs font-black uppercase tracking-widest px-4 py-2 rounded-lg bg-black border border-zinc-800" style={{color: vo2Color}}>{vo2Label}</span>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6 flex items-center gap-2"><span>📊</span> 7-DAY MILEAGE</h2>
                        <div className="flex items-end justify-between h-40 gap-1.5 sm:gap-3">
                            {chartData.map((data, i) => {
                                const heightPct = Math.max((data.dist / maxChartDist) * 100, 2);
                                return (
                                    <div key={i} className="flex flex-col items-center flex-1">
                                        <span className="text-[10px] sm:text-xs text-zinc-400 font-bold mb-2 h-4">{data.dist > 0 ? data.dist.toFixed(1) : ''}</span>
                                        <div className="w-full relative bg-[#18181b] rounded-t-md" style={{height: '100px'}}>
                                            <div className={`absolute bottom-0 left-0 w-full rounded-t-md transition-all duration-1000 ease-out ${data.isToday ? 'suunto-bg-accent' : 'bg-zinc-600'}`} style={{height: `${heightPct}%`}}></div>
                                        </div>
                                        <span className={`text-[10px] sm:text-xs font-black uppercase mt-3 tracking-wider ${data.isToday ? 'suunto-accent' : 'text-zinc-500'}`}>{data.day}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </section>
                    
                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6 flex items-center gap-2"><span>📍</span> VIRTUAL MAP</h2>
                        <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest mb-4">สะสมระยะทาง {tDist.toFixed(1)} / {mapGoal} KM</p>
                        <div className="relative w-full h-8 bg-[#18181b] rounded-full border border-zinc-800 overflow-visible">
                            <div className="absolute top-0 left-0 h-full bg-cyan-600/60 rounded-full transition-all duration-1000" style={{width: `${mapProgress}%`}}></div>
                            <div className="absolute top-1/2 -translate-y-1/2 text-3xl drop-shadow-md transition-all duration-1000 z-10" style={{left: `calc(${mapProgress}% - 16px)`}}>🏃‍♂️</div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6">🏆 PERSONAL BESTS</h2>
                        <div className="grid grid-cols-3 gap-4">
                            <div className="bg-[#18181b] p-5 rounded-xl border border-zinc-800 text-center"><p className="text-xs text-zinc-400 font-bold uppercase mb-2">5K</p><p className="text-xl font-black text-white italic">{formatPace(fastest5kSecs)}</p></div>
                            <div className="bg-[#18181b] p-5 rounded-xl border border-zinc-800 text-center"><p className="text-xs text-zinc-400 font-bold uppercase mb-2">10K</p><p className="text-xl font-black text-white italic">{formatPace(fastest10kSecs)}</p></div>
                            <div className="bg-[#18181b] p-5 rounded-xl border border-zinc-800 text-center"><p className="text-xs text-zinc-400 font-bold uppercase mb-2">MAX DIST</p><p className="text-xl font-black text-white italic">{longestRun.toFixed(1)}<span className="text-xs ml-1">K</span></p></div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6">🏅 TROPHY ROOM</h2>
                        <div className="grid grid-cols-3 gap-4">
                            <div className={`p-5 rounded-xl border text-center transition-all ${achievements.halfMarathon ? 'bg-yellow-500/10 border-yellow-500/30' : 'bg-[#18181b] border-zinc-800 opacity-50 grayscale'}`}><span className="text-3xl mb-3 block">{achievements.halfMarathon ? '🎖️' : '🔒'}</span><span className={`text-xs font-black uppercase tracking-wider block ${achievements.halfMarathon ? 'text-yellow-400' : 'text-zinc-500'}`}>Half-Way</span></div>
                            <div className={`p-5 rounded-xl border text-center transition-all ${achievements.streakMaster ? 'bg-orange-500/10 border-orange-500/30' : 'bg-[#18181b] border-zinc-800 opacity-50 grayscale'}`}><span className="text-3xl mb-3 block">{achievements.streakMaster ? '⚡' : '🔒'}</span><span className={`text-xs font-black uppercase tracking-wider block ${achievements.streakMaster ? 'text-orange-400' : 'text-zinc-500'}`}>Streak</span></div>
                            <div className={`p-5 rounded-xl border text-center transition-all ${achievements.aquaMan ? 'bg-cyan-500/10 border-cyan-500/30' : 'bg-[#18181b] border-zinc-800 opacity-50 grayscale'}`}><span className="text-3xl mb-3 block">{achievements.aquaMan ? '💦' : '🔒'}</span><span className={`text-xs font-black uppercase tracking-wider block ${achievements.aquaMan ? 'text-cyan-400' : 'text-zinc-500'}`}>Aqua Man</span></div>
                        </div>
                    </section>

                    <section className="suunto-card p-8 border-l-4 border-l-lime-500">
                        <h2 className="font-black text-xs text-zinc-400 uppercase tracking-widest mb-2">AI PREDICTOR</h2>
                        <p className="text-sm text-lime-400 font-black uppercase tracking-widest mb-4">EST. {prof.targetDist}K TIME</p>
                        <p className="text-6xl font-black text-white italic tracking-tighter mb-5">{pTime}</p>
                        <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest">REF: {pSource}</p>
                    </section>
                </div>
            );
        };

        const Dashboard = ({ profileName, onLogout }) => {
            const [activeTab, setActiveTab] = useState('tracker');
            const [showSetup, setShowSetup] = useState(false);
            const safeName = profileName.trim().toLowerCase();
            const localKey = `p80_v14_stable_${safeName}`;
            
            const [prof, setProf] = useState(() => JSON.parse(safeStorage.getItem(localKey)) || {
                initialWeight: null, weight: 90.0, targetWeight: 80.0, height: 175, gender: 'male',
                age: 35, rhr: 60, vcr: 4500, targetDist: 42.195, injury: 'none', lifestyle: 'active', raceDate: '2026-11-15',
                schedule: {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'}, records: {}
            });

            const todayStr = new Date().toDateString();
            const [daily, setDaily] = useState(prof.records?.[todayStr] || { w:0, b:false, l:false, s:false, d:false, ex:[false,false,false,false], rLog:false, rDist:'', rPace:'', rHr:'', rType:'Run', aiFeedback: '', perfCondition: '', vcrUpgraded: false, newVcrVal: 0 });
            
            // เพิ่ม State สำหรับ Activity Type และ Scanner
            const [inAct, setInAct] = useState(daily.rType || 'Run');
            const [inDist, setInDist] = useState(daily.rDist || '');
            const [inPace, setInPace] = useState(daily.rPace || '');
            const [inHr, setInHr] = useState(daily.rHr || '');
            
            const [leaderboardData, setLeaderboardData] = useState([]);
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeName);

            // คำนวณวัน Countdown ถอยหลัง
            const raceDateObj = new Date(prof.raceDate || '2026-11-15');
            const planStart = new Date(raceDateObj);
            planStart.setDate(planStart.getDate() - 168); // ถอยหลัง 24 สัปดาห์
            const diffDays = Math.ceil((new Date() - planStart)/(1000*3600*24));
            const weekIdx = Math.max(0, Math.min(23, Math.ceil(diffDays/7)-1));
            const progressPct = Math.max(0, Math.min(100, (diffDays / 168) * 100));
            const daysLeft = Math.ceil((raceDateObj - new Date())/(1000*3600*24));

            useEffect(() => {
                if(!prof.initialWeight) setShowSetup(true); 
                const unsub = onSnapshot(docRef, snap => {
                    if(snap.exists()) {
                        const d = snap.data();
                        setProf(prev => ({...prev, ...d}));
                        if(!d.isSetupComplete) setShowSetup(true); 
                        if(d.records?.[todayStr]) setDaily(d.records[todayStr]);
                    }
                });
                
                const boardRef = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                const unsubBoard = onSnapshot(boardRef, snap => {
                    let arr = [];
                    const last7 = Array.from({length:7}, (_,i) => { let d = new Date(); d.setDate(d.getDate()-6+i); return d.toDateString(); });
                    snap.forEach(docSnap => {
                        const data = docSnap.data(); const userName = docSnap.id;
                        let wKm = 0, tKm = 0;
                        if(data.records) {
                            last7.forEach(dt => { if(data.records[dt]?.rLog) wKm += Number(data.records[dt].rDist)||0; });
                            Object.values(data.records).forEach(r => { if(r.rLog) tKm += Number(r.rDist)||0; });
                        }
                        arr.push({ name: userName.toUpperCase(), wKm, tKm });
                    });
                    arr.sort((a, b) => b.wKm - a.wKm);
                    setLeaderboardData(arr);
                });

                return () => { unsub(); unsubBoard(); };
            }, []);

            const updateDaily = (key, val) => {
                const nd = {...daily, [key]:val};
                setDaily(nd);
                const nRecords = {...prof.records, [todayStr]: nd};
                setProf(p => ({...p, records: nRecords})); 
                setDoc(docRef, { records: nRecords }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify({...prof, records: nRecords}));
            };

            const saveRun = () => {
                const rSecs = parsePace(inPace); const dNum = parseFloat(inDist);
                let currentVcr = prof.vcr || 4500; let upgraded = false;
                if (rSecs !== Infinity && dNum >= 3 && inAct === 'Run') {
                    const equiv = (1800 / rSecs) * 1000;
                    if (equiv > currentVcr + 100) { currentVcr = Math.round(equiv); upgraded = true; }
                }
                const cfgToday = getDayConfig(new Date(), weekIdx, false, prof);
                // ส่ง inAct (ประเภทกีฬา) เข้าไปให้ AI โค้ชวิเคราะห์ด้วย
                const ai = generateFeedback(dNum, inPace, inHr, cfgToday.pace, inAct);
                const perf = calcCondition(inHr, inPace);
                const nd = {...daily, rLog: true, rDist: inDist, rPace: inPace, rHr: inHr, rType: inAct, aiFeedback: ai, perfCondition: perf, vcrUpgraded: upgraded, newVcrVal: currentVcr};
                
                setDaily(nd);
                const nProf = {...prof, vcr: currentVcr, records: {...prof.records, [todayStr]: nd}};
                setProf(nProf);
                setDoc(docRef, { vcr: currentVcr, records: nProf.records }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify(nProf));
            };

            const updateWeight = (amt) => {
                const w = Number((prof.weight + amt).toFixed(1));
                setProf(p => ({...p, weight: w}));
                setDoc(docRef, { weight: w }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify({...prof, weight: w}));
            };

            const cfg = getDayConfig(new Date(), weekIdx, daysLeft <= 0, prof);

            let tDist = 0, tSecs = 0, f5k = Infinity, f10k = Infinity, longestRun = 0, maxStreakCount = 0, streakCount = 0, maxAquaCount = 0, aquaCount = 0;
            const sortedDates = Object.keys(prof.records || {}).sort((a,b)=>new Date(a)-new Date(b));
            sortedDates.forEach(dt => {
                const r = prof.records[dt];
                if(r.rLog && r.rDist && r.rPace && (r.rType === 'Run' || !r.rType)) { // คิดสถิติเฉพาะการวิ่งถนน
                    const d = parseFloat(r.rDist), s = parsePace(r.rPace);
                    if(!isNaN(d) && isFinite(s)) {
                        tDist += d; tSecs += (s*d);
                        if(d>=5 && s<f5k) f5k = s; if(d>=10 && s<f10k) f10k = s;
                        if(d>longestRun) longestRun = d;
                    }
                    streakCount++;
                } else if(r.rLog) {
                    // ถ้าซ้อมอย่างอื่น ก็นับ streak ด้วย แต่ไม่เอาไปคิด Pace/Distance PB
                    streakCount++;
                } else streakCount = 0;
                
                if(streakCount > maxStreakCount) maxStreakCount = streakCount;
                if(r.w >= 8) aquaCount++; else aquaCount = 0;
                if(aquaCount > maxAquaCount) maxAquaCount = aquaCount;
            });

            const achievements = { halfMarathon: longestRun >= 21.1, streakMaster: maxStreakCount >= 7, aquaMan: maxAquaCount >= 3 };
            
            let bestMin = (prof.vcr || 4500) / 30;
            if (f5k !== Infinity) bestMin = Math.max(bestMin, 5000 / (f5k / 60));
            if (f10k !== Infinity) bestMin = Math.max(bestMin, 10000 / (f10k / 60));
            let vo2Value = parseFloat(((bestMin * 0.2) + 3.5).toFixed(1));

            let pTime = "NEED DATA", pSource = "Run 5K to unlock";
            if(f10k !== Infinity) { pTime = calcPredictor(f10k*10, 10, prof.targetDist).str; pSource = "Fastest 10K Record"; }
            else if(f5k !== Infinity) { pTime = calcPredictor(f5k*5, 5, prof.targetDist).str; pSource = "Fastest 5K Record"; }

            const targetWater = getTargetWater(prof.lifestyle);
            let score = 0;
            if(daily.b) score+=10; if(daily.l) score+=10; if(daily.s) score+=10; if(daily.d) score+=10;
            if(daily.w >= targetWater) score+=20; else score += Math.round((daily.w / targetWater) * 20);
            score += Math.round(((daily.ex||[]).filter(Boolean).length / cfg.ex.length) * 40);

            const [showConfetti, setShowConfetti] = useState(false);
            useEffect(() => { if (score === 100) { setShowConfetti(true); setTimeout(() => setShowConfetti(false), 5000); } }, [score]);

            return (
                <div className="min-h-screen bg-[#000000] p-5 pb-32 relative overflow-x-hidden">
                    {showConfetti && <Confetti />}
                    {showSetup && <SetupModal initialProf={prof} onSave={(d)=>{ const finalD = {...prof, ...d, isSetupComplete: true}; setProf(finalD); setDoc(docRef, finalD); safeStorage.setItem(localKey, JSON.stringify(finalD)); setShowSetup(false);}} onCancel={()=> prof.initialWeight && setShowSetup(false)} />}
                    
                    <header className="flex justify-between items-start mb-8 pt-4">
                        <div>
                            <p className="text-zinc-400 font-black text-xs tracking-[0.3em] uppercase mb-2">TARGET RACE DAY</p>
                            <h1 className="text-5xl font-black text-white tracking-tighter uppercase italic">PRO <span className="suunto-accent">80</span></h1>
                            <p className="text-sm font-bold text-zinc-400 mt-3 tracking-widest uppercase">Runner: <span className="text-white">{profileName}</span></p>
                        </div>
                        <button onClick={onLogout} className="suunto-card p-4 w-16 h-16 flex flex-col items-center justify-center active:scale-95 transition-transform hover:bg-zinc-800">
                            <svg className="w-6 h-6 text-zinc-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                            <span className="text-[10px] font-black uppercase text-zinc-400">EXIT</span>
                        </button>
                    </header>

                    {/* Progress Bar วันแข่ง */}
                    <div className="mb-8">
                        <div className="flex justify-between text-xs font-black text-zinc-400 uppercase tracking-widest mb-2">
                            <span>Plan Started</span>
                            <span className={daysLeft <= 0 ? 'text-red-500' : 'text-zinc-400'}>{daysLeft > 0 ? `${daysLeft} Days Left` : 'RACE DAY!'}</span>
                        </div>
                        <div className="w-full h-3 bg-[#18181b] rounded-full overflow-hidden border border-zinc-800">
                            <div className="h-full suunto-bg-accent transition-all duration-1000" style={{width: `${progressPct}%`}}></div>
                        </div>
                    </div>

                    <div className="suunto-card p-8 mb-8 relative overflow-hidden">
                        <div className="relative z-10">
                            <button onClick={()=>setShowSetup(true)} className="flex items-center gap-2 mb-4 group">
                                <span className="text-zinc-400 font-black text-sm uppercase tracking-widest group-hover:text-white transition-colors">TARGET WEIGHT</span>
                                <svg className="w-5 h-5 text-zinc-500 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                            <div className="flex items-baseline gap-3 mb-8">
                                <span className="text-7xl font-black text-white italic tracking-tighter">{prof.weight}</span>
                                <span className="text-zinc-400 font-bold text-2xl uppercase tracking-widest">KG</span>
                            </div>
                            <div className="flex gap-3 w-[150px]">
                                <button onClick={()=>updateWeight(0.1)} className="flex-1 h-14 bg-[#1e1e1e] rounded-xl text-zinc-300 font-black text-2xl active:scale-95 border border-zinc-700 hover:bg-zinc-800">+</button>
                                <button onClick={()=>updateWeight(-0.1)} className="flex-1 h-14 suunto-bg-accent rounded-xl text-black font-black text-3xl active:scale-95 pb-1">-</button>
                            </div>
                        </div>
                        <div className="absolute top-6 right-6 z-20">
                            <span className="bg-[#18181b] text-zinc-200 border border-zinc-700 px-4 py-2 rounded-lg text-xs font-black uppercase tracking-widest">{cfg.name}</span>
                        </div>
                        <div className="absolute bottom-[-20px] right-2 z-0 opacity-80 scale-125 origin-bottom-right">
                            <EliteAvatar activity={cfg.id} />
                        </div>
                    </div>

                    <nav className="flex gap-3 mb-8">
                        {[ {id:'tracker', label:'TRACK'}, {id:'plan', label:'PLAN'}, {id:'ranking', label:'RANK'}, {id:'stats', label:'DATA'} ].map(t => (
                            <button key={t.id} onClick={()=>setActiveTab(t.id)} 
                                className={`flex-1 py-5 rounded-xl font-black text-xs md:text-sm tracking-widest uppercase transition-all border-2 ${activeTab===t.id ? 'suunto-bg-accent border-[#bef264]' : 'bg-[#121212] border-zinc-800 text-zinc-400 hover:bg-[#1e1e1e]'}`}>
                                {t.label}
                            </button>
                        ))}
                    </nav>

                    <main className="animate-in fade-in duration-300">
                        {activeTab === 'tracker' && <TabTracker score={score} daily={daily} updateDaily={updateDaily} cfg={cfg} inDist={inDist} setInDist={setInDist} inPace={inPace} setInPace={setInPace} inHr={inHr} setInHr={setInHr} inAct={inAct} setInAct={setInAct} saveRun={saveRun} targetWater={targetWater} />}
                        {activeTab === 'plan' && <TabPlan cfg={cfg} prof={prof} weekIdx={weekIdx} />}
                        {activeTab === 'ranking' && <TabRanking leaderboardData={leaderboardData} />}
                        {activeTab === 'stats' && <TabStats prof={prof} vo2Value={vo2Value} tDist={tDist} pTime={pTime} pSource={pSource} fastest5kSecs={f5k} fastest10kSecs={f10k} longestRun={longestRun} achievements={achievements} />}
                    </main>
                </div>
            );
        };

        const MainApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(() => safeStorage.getItem('p80_user_v16_suunto'));

            useEffect(() => {
                signInAnonymously(auth).catch(e => console.error(e));
                const unsub = onAuthStateChanged(auth, u => { setUser(u); setLoading(false); });
                return unsub;
            }, []);

            if (loading) return <div className="min-h-screen bg-black flex items-center justify-center"><p className="suunto-accent font-black tracking-widest uppercase animate-pulse text-lg">SYNCING SATELLITE...</p></div>;
            if (!user || !currentUser) return <LoginScreen onLogin={n=>{setCurrentUser(n); safeStorage.setItem('p80_user_v16_suunto', n);}} />;
            return <Dashboard profileName={currentUser} onLogout={()=>{setCurrentUser(null); safeStorage.removeItem('p80_user_v16_suunto'); window.location.reload();}} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><MainApp /></ErrorBoundary>);
    </script>
</body>
</html>
