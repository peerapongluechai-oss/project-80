<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 80: Ultimate Garmin Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#09090b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #09090b; color: #e4e4e7; overflow-x: hidden; }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .garmin-card { background: linear-gradient(145deg, #1c1c1e, #0a0a0a); border: 1px solid #2c2c2e; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
        .gauge-arc { stroke-dasharray: 126; stroke-dashoffset: 126; transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Font Scaling for readability */
        .text-readable { font-size: 1.1rem; line-height: 1.6; }
        .text-header { font-size: 1.3rem; font-weight: 900; letter-spacing: 0.05em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // --- 1. FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
            authDomain: "myfamilyproject-ecff4.firebaseapp.com",
            projectId: "myfamilyproject-ecff4",
            storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
            messagingSenderId: "714527535272",
            appId: "1:714527535272:web:fefa9679e822d31e52529d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'project80_garmin_ultimate';

        // --- 2. UTILS & STORAGE HELPERS ---
        const safeStorage = {
            getItem: (key) => { try { return window.localStorage.getItem(key); } catch (e) { return null; } },
            setItem: (key, value) => { try { window.localStorage.setItem(key, value); } catch (e) {} },
            removeItem: (key) => { try { window.localStorage.removeItem(key); } catch (e) {} }
        };

        const parsePace = (p) => {
            if(!p) return Infinity;
            const pt = p.split(':');
            return pt.length === 2 ? parseInt(pt[0])*60 + parseInt(pt[1]) : Infinity;
        };

        const formatPace = (secs) => {
            if (secs === Infinity || isNaN(secs)) return '--:--';
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        };

        const generateSmartSchedule = (availObj, longDay) => {
            let newSched = { 0:'rest', 1:'rest', 2:'rest', 3:'rest', 4:'rest', 5:'rest', 6:'rest' };
            let trainingDays = [];
            Object.keys(availObj).forEach(k => { if (availObj[k]) trainingDays.push(Number(k)); });
            if (trainingDays.length === 0) return newSched;

            if (trainingDays.includes(Number(longDay))) { newSched[longDay] = 'long'; } 
            else { newSched[trainingDays[0]] = 'long'; longDay = trainingDays[0]; }

            if (trainingDays.length > 1) {
                let speedDay = -1, maxDist = -1;
                trainingDays.forEach(day => {
                    if (day !== Number(longDay)) {
                        let dist = Math.abs(day - Number(longDay));
                        if (dist > 3) dist = 7 - dist; 
                        if (dist > maxDist) { maxDist = dist; speedDay = day; }
                    }
                });
                if (speedDay !== -1) newSched[speedDay] = 'speed';
            }
            trainingDays.forEach(day => { if (newSched[day] === 'rest') newSched[day] = 'easy'; });
            return newSched;
        };

        const calcPredictor = (baseSecs, baseDist, targetDist) => {
            const s = (baseSecs) * Math.pow(targetDist/baseDist, 1.06);
            const hrs = Math.floor(s/3600), mins = Math.floor((s%3600)/60), secs = Math.floor(s%60);
            return { s, str: `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}` };
        };

        const getHrZone = (min, max, age, rhr) => {
            const maxHr = 220 - (age||35);
            const hrr = maxHr - (rhr||60);
            return `${Math.round(hrr*min)+Number(rhr||60)}-${Math.round(hrr*max)+Number(rhr||60)} bpm`;
        };

        const generateFeedback = (dist, pace, hr, targetPaceStr) => {
            if(!pace || pace === '0:00' || !targetPaceStr || targetPaceStr === '-') return "บันทึกข้อมูลสำเร็จ! รักษาวินัยการซ้อมได้ดีเยี่ยมครับ 🏃‍♂️";
            const pSecs = parsePace(pace);
            const tSecsArr = targetPaceStr.split(' - ').map(parsePace);
            if(tSecsArr.length >= 1 && tSecsArr[0] !== Infinity) {
                const minT = Math.min(...tSecsArr);
                const maxT = Math.max(...tSecsArr);
                if(pSecs < minT - 15) return "วิ่งเร็วกว่าเป้าหมายที่ตั้งไว้! ⚡ พรุ่งนี้อย่าลืมยืดเหยียดเยอะๆ เพื่อป้องกันอาการล้าสะสมนะครับ";
                if(pSecs > maxT + 15) return "เพซวันนี้สบายๆ ช้ากว่าเป้านิดหน่อย แต่ช่วยสร้าง Base Endurance ความอึดได้ดีครับ 🐢";
                return "เพอร์เฟกต์! 🎯 ลูกพี่คุมเพซได้ตรงตามแผนเป๊ะๆ ร่างกายกำลังพัฒนาไปถูกทางครับ";
            }
            return "เยี่ยมมากครับ! เก็บสะสมไมล์ไปเรื่อยๆ ความฟิตจะตามมาเอง 🏆";
        };

        const calcCondition = (hr, pace) => {
            if(!hr || !pace) return "+0 (ปกติ)";
            const pSecs = parsePace(pace);
            const hrNum = Number(hr);
            if(hrNum < 140 && pSecs < 420) return "+3 (ฟิตมาก!)";
            if(hrNum < 150 && pSecs < 450) return "+1 (ร่างกายตอบสนองดี)";
            if(hrNum > 165 && pSecs > 480) return "-2 (มีอาการล้า / พักผ่อนน้อย)";
            return "+0 (ปกติ ทรงตัว)";
        };

        const getDayConfig = (todayObj, weekIdx, isRace, prof) => {
            const dayIndex = todayObj.getDay(); 
            const currentTargetDist = prof.targetDist || 42.195;
            const currentSchedule = prof.schedule || {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'};
            const dayType = currentSchedule[dayIndex] || 'rest';

            const vcrSpeed = (prof.vcr || 4500) / 1800; 
            const getPaceStr = (pct) => {
                const spd = vcrSpeed * (pct/100);
                if(spd<=0) return "0:00";
                const s = 1000/spd;
                return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
            };
            const pz = { ez: getPaceStr(80), lr: getPaceStr(85), tm: getPaceStr(95), in: getPaceStr(105) };

            let baseLong = 5;
            if(currentTargetDist == 42.195) baseLong = [10,12,14,10, 16,18,20,15, 22,24,26,18, 28,30,21,32, 25,35,25,30, 21,15,10, 42.195][weekIdx] || 10;
            else if(currentTargetDist == 21.1) baseLong = [5,6,7,5, 8,10,12,8, 14,16,18,10, 15,18,12,20, 15,21.1,12,15, 10,8,5, 21.1][weekIdx] || 5;
            else if(currentTargetDist == 10) baseLong = [3,4,5,3, 5,6,7,4, 6,8,9,5, 8,10,6,12, 8,10,6,8, 5,4,3, 10][weekIdx] || 3;
            else baseLong = [2,3,4,2, 3,4,5,3, 4,5,6,3, 4,6,4,7, 5,6,4,5, 3,3,2, 5][weekIdx] || 2; 

            // Basic Info
            let cfg = { id:'rest', name:'Rest Day', desc:'พักฟื้นร่างกาย ยืดเหยียด', pace:'-', hr:'-', meals:{ b: 'ข้าวโอ๊ต+กล้วยหอม / แซนวิชไข่ต้ม', l: 'ข้าว 1 ทัพพี + เนื้อสัตว์ลีน + ผัก', s: 'ถั่วแระญี่ปุ่น / โยเกิร์ต', d: 'สลัดปลา / สุกี้น้ำ (ลดแป้ง)' }, ex:['💤 พักการวิ่ง (Full Rest)','Core Plank 3 เซต','กลิ้ง Foam Roller'] };

            cfg.detailedWorkout = { warmup: [], main: '', cooldown: [] };
            cfg.aiAdvice = '';

            if(isRace) {
                cfg = { id:'long', name:`RACE DAY!`, desc:'ถึงเวลาโชว์ผลการซ้อม!', pace:'Target Pace', hr:getHrZone(0.7,0.88, prof.age, prof.rhr), meals:{b:'ขนมปังแยม+กาแฟ',l:'ฉลองหลังเข้าเส้นชัย!',s:'เกลือแร่',d:'ปาร์ตี้หมูกระทะ'}, ex:['🏃‍♂️ ลุยให้เต็มที่ ดื่มน้ำทุกจุด','แช่น้ำเย็น Recovery','ยืดเหยียดเบาๆ'] };
                cfg.detailedWorkout = { warmup: ['วอร์มอัพเบาๆ 10 นาที', 'เดินเร็ว 3 นาที'], main: `วิ่ง ${currentTargetDist}K อย่างมั่นใจ ตามแผน`, cooldown: ['เดินรับเหรียญ 10 นาที', 'แช่น้ำเย็น'] };
                cfg.aiAdvice = 'วันแข่งจริง ระวังอย่าวิ่งตามคนอื่นจนเพซพังในช่วงแรก ออกตัวช้าๆ ครับ';
            } else if(dayType === 'long') {
                cfg = { id:'long', name:'Long Run', desc:`วิ่งยาว ${baseLong} กม. เน้นความอึด`, pace:`${pz.lr} - ${pz.ez}`, hr:getHrZone(0.65,0.75, prof.age, prof.rhr), meals:{...cfg.meals, b:'โหลดคาร์บ ขนมปัง 2-3 แผ่น'}, ex:[`🏃‍♂️ วิ่งระยะ ${baseLong} กม.`,'ฝึกจิบน้ำ/กินเจลระหว่างวิ่ง','ยืดเหยียดชุดใหญ่'] };
                cfg.detailedWorkout = { warmup: ['เดินเร็ว 5 นาที', 'Drills 5 นาที'], main: `วิ่ง ${baseLong} กม. คุมโซน Z2-Z3`, cooldown: ['เดินคลายกรด 10 นาที', 'Stretching 20 วิ/ท่า'] };
                cfg.aiAdvice = 'วันวิ่งยาวสร้าง Base Endurance ไม่ต้องสนเพซ เน้นเวลาที่อยู่บนเท้าให้ครบครับ';
            } else if(dayType === 'speed') {
                cfg = { id:'speed', name:'Speed / Tempo', desc:'ฝึกความเร็วรอบขา 30-45 นาที', pace:`${pz.in} - ${pz.tm}`, hr:getHrZone(0.8,0.88, prof.age, prof.rhr), meals: cfg.meals, ex:['⚡ วิ่งคอร์ทความเร็ว','ทำ Dynamic Stretch ก่อนวิ่ง','Russian Twist 3 เซต'] };
                cfg.detailedWorkout = { warmup: ['จ๊อกกิ้ง 10-15 นาที', 'Drills ชุดใหญ่'], main: `Tempo/Interval 3-5 เซต เพซ ${cfg.pace}`, cooldown: ['จ๊อกกิ้ง 10 นาที', 'ยืดเหยียดหน้าขา'] };
                cfg.aiAdvice = 'Speed Work เพิ่ม VCR และขยับเพดาน Lactate Threshold ให้วิ่งทนขึ้น';
            } else if(dayType === 'easy') {
                cfg = { id:'easy', name:'Easy Run ชิลๆ', desc:'วิ่งสบายๆ 45-60 นาที (Base)', pace:pz.ez, hr:getHrZone(0.6,0.7, prof.age, prof.rhr), meals: cfg.meals, ex:['🏃‍♂️ วิ่ง Easy คุมหัวใจ','ทำ Drills ก่อนวิ่ง','Squats 3 เซต'] };
                cfg.detailedWorkout = { warmup: ['หมุนข้อต่อ 3 นาที', 'เดินเร็ว 3 นาที'], main: `วิ่งคุมโซน 2-3 (${cfg.pace}) พูดคุยได้ไม่หอบ`, cooldown: ['เดินช้าลงเรื่อยๆ', 'ยืดเหยียดช่วงล่าง'] };
                cfg.aiAdvice = 'Easy Run สร้างเส้นเลือดฝอยในกล้ามเนื้อ เป็นรากฐานสำคัญของการวิ่งระยะไกล';
            } else { 
                cfg.detailedWorkout = { warmup: ['ยืดเหยียดเบาๆ บนเตียง'], main: 'พักฟื้นร่างกายอย่างเต็มที่', cooldown: ['อาบน้ำอุ่น', 'Foam Roller'] };
                cfg.aiAdvice = 'การพักผ่อน (Rest) คือช่วงเวลาซ่อมแซมกล้ามเนื้อ ฝืนซ้อมทุกวันจะ Overtraining';
            }

            // Detailed Meals & Hydration
            cfg.detailedMeals = {
                b: { menu: cfg.meals.b, detail: 'คาร์บเชิงซ้อน เติมพลังงาน' },
                l: { menu: cfg.meals.l, detail: 'เน้นโปรตีนและคาร์บ' },
                s: cfg.meals.s ? { menu: cfg.meals.s, detail: 'ลดความหิวจัด ป้องกันกินมื้อเย็นเกิน' } : null,
                d: { menu: cfg.meals.d, detail: 'มื้อเบาๆ ผักและโปรตีนลีน' }
            };
            cfg.hydrationSchedule = [
                { time: "หลังตื่นนอน", amount: "1-2 แก้ว", desc: "กระตุ้นระบบขับถ่าย" },
                { time: "ระหว่างวัน", amount: "4-5 แก้ว", desc: "จิบทุกๆ 1-2 ชั่วโมง" },
                { time: "ก่อน/หลังซ้อม", amount: "1-2 แก้ว", desc: "ดื่มก่อนซ้อม 30 นาที และชดเชยหลังซ้อม" }
            ];

            return cfg;
        };

        const getTargetWater = (lifestyle) => {
            if (lifestyle === 'heavy') return 12;
            if (lifestyle === 'active') return 10;
            return 8;
        };

        // --- 3. COMPONENTS ---

        // 🛡️ Error Boundary Component
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-red-950 flex flex-col items-center justify-center p-8 text-center text-white">
                            <h1 className="text-4xl font-black mb-4">🚨 APP CRASHED!</h1>
                            <p className="text-zinc-300 mb-8">{this.state.error?.toString()}</p>
                            <button onClick={() => window.location.reload()} className="bg-white text-black font-black px-10 py-4 rounded-2xl active:scale-95 transition-all">REFRESH NOW</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // 🏃‍♂️ Animated Original Avatar
        const OriginalAvatar = ({ activity = 'stretch' }) => {
            const isRunning = activity !== 'stretch' && activity !== 'rest';
            return (
                <div className={`w-[120px] h-[160px] relative flex items-end justify-center pb-4 ${isRunning ? '' : 'animate-breathe'}`}>
                    <svg viewBox="0 0 100 150" className="w-full h-full drop-shadow-2xl">
                        <style>{`
                            @keyframes run-leg-l { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(-20deg); } }
                            @keyframes run-leg-r { 0%, 100% { transform: translateY(-10px) rotate(-20deg); } 50% { transform: translateY(0px) rotate(0deg); } }
                            @keyframes run-arm-l { 0%, 100% { transform: rotate(-20deg); } 50% { transform: rotate(40deg); } }
                            @keyframes run-arm-r { 0%, 100% { transform: rotate(40deg); } 50% { transform: rotate(-20deg); } }
                            @keyframes head-bob { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(2px); } }
                            .leg-l { transform-origin: 45px 60px; animation: ${isRunning ? 'run-leg-l 0.6s infinite' : 'none'}; }
                            .leg-r { transform-origin: 55px 60px; animation: ${isRunning ? 'run-leg-r 0.6s infinite' : 'none'}; }
                            .arm-l { transform-origin: 35px 45px; animation: ${isRunning ? 'run-arm-l 0.6s infinite' : 'none'}; }
                            .arm-r { transform-origin: 65px 45px; animation: ${isRunning ? 'run-arm-r 0.6s infinite' : 'none'}; }
                            .head { transform-origin: 50px 30px; animation: ${isRunning ? 'head-bob 0.6s infinite' : 'none'}; }
                        `}</style>
                        <g transform="translate(0, 10)">
                            <path className="leg-l" d="M 42 70 L 38 105 L 48 105 L 48 70 Z" fill="#fcd5ce" />
                            <rect className="leg-l" x="37" y="100" width="12" height="6" fill="#a3e635" rx="1" />
                            <path className="leg-r" d="M 58 70 L 62 105 L 52 105 L 52 70 Z" fill="#fcd5ce" />
                            <rect className="leg-r" x="51" y="100" width="12" height="6" fill="#a3e635" rx="1" />
                            <path d="M 30 35 L 70 35 L 65 75 L 35 75 Z" fill="#f97316" />
                            <rect x="40" y="45" width="20" height="12" fill="white" rx="1" />
                            <text x="50" y="55" fontSize="9" fontWeight="900" textAnchor="middle" fill="black">80</text>
                            <path className="arm-l" d="M 35 40 Q 20 60 25 80" fill="none" stroke="#fcd5ce" strokeWidth="6" strokeLinecap="round" />
                            <path className="arm-r" d="M 65 40 Q 80 60 75 80" fill="none" stroke="#fcd5ce" strokeWidth="6" strokeLinecap="round" />
                            <g className="head">
                                <circle cx="50" cy="25" r="15" fill="#fcd5ce" />
                                <rect x="35" y="18" width="30" height="10" rx="3" fill="#f97316" />
                                <rect x="35" y="18" width="30" height="3" rx="1" fill="#ea580c" />
                                <path d="M 40 40 Q 50 45 60 40" fill="none" stroke="#1e293b" strokeWidth="2" strokeLinecap="round" />
                                <circle cx="43" cy="25" r="1.5" fill="#1e293b" /><circle cx="57" cy="25" r="1.5" fill="#1e293b" />
                            </g>
                        </g>
                    </svg>
                </div>
            );
        };

        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 50 }).map((_, i) => (
                    <div key={i} className="absolute top-[-10%]" style={{ left: `${Math.random() * 100}%`, width: `${Math.random() * 10 + 5}px`, height: `${Math.random() * 10 + 5}px`, backgroundColor: ['#ea580c', '#f97316', '#bef264', '#fde047', '#ef4444'][Math.floor(Math.random() * 5)], borderRadius: Math.random() > 0.5 ? '50%' : '4px', animation: `confetti-fall ${Math.random() * 2 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`, animationDelay: `${Math.random() * 0.3}s` }} />
                ))}
            </div>
        );

        // 🔐 Login Screen Component
        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            return (
                <div className="min-h-screen bg-[#0d0d0d] flex items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute top-[-20%] left-[-20%] w-[500px] h-[500px] bg-orange-600/10 rounded-full blur-[120px]"></div>
                    <div className="absolute bottom-[-20%] right-[-20%] w-[500px] h-[500px] bg-lime-500/10 rounded-full blur-[120px]"></div>
                    <div className="w-full max-w-sm garmin-card p-10 rounded-[32px] text-center z-10 shadow-2xl">
                        <h2 className="text-lime-400 font-black tracking-[0.3em] text-xs uppercase mb-3">ROAD TO BANGSAEN42</h2>
                        <h1 className="text-6xl font-black italic text-white tracking-tighter mb-8">PRO <span className="text-orange-500">80</span></h1>
                        <div className="space-y-4">
                            <input type="text" value={name} onChange={e=>setName(e.target.value.toUpperCase())} placeholder="ENTER RUNNER ID" className="w-full bg-black border-2 border-zinc-800 rounded-2xl p-5 text-center font-black text-white focus:border-orange-500 outline-none transition-all placeholder:text-zinc-700 tracking-widest text-lg" />
                            <button onClick={()=> name.trim() && onLogin(name.trim())} className="w-full garmin-btn-primary py-5 rounded-2xl uppercase tracking-widest transition-all text-lg shadow-lg shadow-orange-500/20 active:scale-95">Start Engine</button>
                        </div>
                    </div>
                </div>

        // --- 4. TABS COMPONENTS ---
        const TabTracker = ({ score, daily, updateDaily, cfg, inDist, setInDist, inPace, setInPace, inHr, setInHr, saveRun, targetWater }) => {
            return (
                <div className="space-y-4">
                    <section className={`p-6 rounded-[24px] border flex items-center justify-between transition-colors ${score===100 ? 'bg-orange-500 border-orange-400 text-black shadow-[0_0_30px_rgba(249,115,22,0.4)]' : 'bg-[#1a1a1a] border-zinc-800'}`}>
                        <div><h2 className="text-xl font-black italic uppercase">MISSION SCORE</h2><p className={`text-[10px] font-bold uppercase ${score===100 ? 'text-black/70' : 'text-zinc-500'}`}>Daily Objective</p></div>
                        <div className={`text-5xl font-black italic ${score===100 ? 'text-black' : 'text-orange-500'}`}>{score}%</div>
                    </section>
                    
                    <section className="bg-[#1a1a1a] p-5 rounded-[24px] border border-zinc-800">

                        <div className="grid grid-cols-2 gap-3">
                            {[ {k:'b',l:'Breakfast'}, {k:'l',l:'Lunch'}, {k:'s',l:'Snack'}, {k:'d',l:'Dinner'} ].map(m => (
                                <button key={m.k} onClick={()=>updateDaily(m.k, !daily[m.k])} className={`p-4 rounded-xl text-base font-bold uppercase transition-all ${daily[m.k] ? 'bg-orange-500 text-black shadow-[0_0_15px_rgba(249,115,22,0.2)]' : 'bg-black text-zinc-500 border border-zinc-800 hover:bg-zinc-900'}`}>
                                    {m.l}
                                </button>
                            ))}
                        </div>
                    </section>

                    <section className="bg-[#1a1a1a] p-5 rounded-[24px] border border-zinc-800 flex items-center justify-between">
                        <div><h3 className="font-black text-xs uppercase text-blue-400 flex items-center gap-2">💧 Water (น้ำดื่ม)</h3><p className="text-[10px] text-zinc-500 font-bold uppercase mt-1">Target: {targetWater} แก้ว</p></div>
                        <div className="flex items-center gap-4">
                            <button onClick={()=>updateDaily('w', Math.max(0, daily.w-1))} className="w-12 h-12 bg-black border border-zinc-700 rounded-xl font-black text-xl text-white hover:bg-zinc-800">-</button>
                            <span className="text-3xl font-black italic text-white">{daily.w}</span>
                            <button onClick={()=>updateDaily('w', daily.w+1)} className="w-12 h-12 bg-blue-500 text-black rounded-xl font-black text-xl hover:bg-blue-400">+</button>
                        </div>
                    </section>

                    <section className="bg-[#1a1a1a] p-5 rounded-[24px] border border-zinc-800">
                        <h3 className="font-black text-xs uppercase text-lime-400 mb-2 flex items-center gap-2">🏃‍♂️ Workout: {cfg.name}</h3>
                        <p className="text-sm text-zinc-400 mb-4">{cfg.desc}</p>
                        <div className="space-y-2 mb-5">
                            {cfg.ex.map((ex, i) => (
                                <div key={i} onClick={()=>{let nx=[...(daily.ex||[false,false,false])]; nx[i]=!nx[i]; updateDaily('ex', nx);}} className={`p-4 rounded-xl border text-sm font-bold cursor-pointer flex items-center gap-4 transition-colors ${daily.ex?.[i] ? 'bg-lime-500/20 border-lime-500 text-lime-400' : 'bg-black border-zinc-800 hover:bg-zinc-900'}`}>
                                    <div className={`w-5 h-5 rounded-full border flex items-center justify-center text-xs ${daily.ex?.[i] ? 'bg-lime-500 border-lime-500 text-black' : 'border-zinc-600'}`}>{daily.ex?.[i] ? '✓' : ''}</div>{ex}
                                </div>
                            ))}
                        </div>
                        
                        {cfg.id !== 'rest' && !daily.rLog && (
                            <div className="bg-black p-5 rounded-2xl border border-zinc-800 space-y-4 mt-6">
                                <p className="text-xs font-black text-zinc-500 uppercase tracking-widest">Run Logger</p>
                                <div className="grid grid-cols-3 gap-2">
                                    <input type="number" placeholder="KM" value={inDist} onChange={e=>setInDist(e.target.value)} className="bg-zinc-900 p-4 rounded-xl text-center font-black text-lg border border-zinc-800 focus:border-orange-500 outline-none text-white" />
                                    <input type="text" placeholder="Pace" value={inPace} onChange={e=>setInPace(e.target.value)} className="bg-zinc-900 p-4 rounded-xl text-center font-black text-lg border border-zinc-800 focus:border-orange-500 outline-none text-white" />
                                    <input type="number" placeholder="HR" value={inHr} onChange={e=>setInHr(e.target.value)} className="bg-zinc-900 p-4 rounded-xl text-center font-black text-lg border border-zinc-800 focus:border-orange-500 outline-none text-white" />
                                </div>
                                <button onClick={saveRun} disabled={!inDist || !inPace} className="w-full py-4 garmin-btn-primary rounded-xl uppercase text-sm tracking-widest disabled:opacity-50 mt-2">Analyze & Save Run</button>
                            </div>
                        )}
                        
                        {daily.rLog && (
                            <div className="bg-black p-5 rounded-2xl border border-lime-500/30 mt-6">
                                <div className="flex justify-between items-start mb-2">
                                    <div><p className="text-lime-400 font-black text-sm uppercase">✅ Run Saved!</p><p className="text-xs text-zinc-400 mt-1">Dist: {daily.rDist} km | Pace: {daily.rPace} | HR: {daily.rHr}</p></div>
                                    <button onClick={()=>updateDaily('rLog', false)} className="text-[10px] text-zinc-500 underline hover:text-white">Edit</button>
                                </div>
                                <div className="pt-4 border-t border-zinc-800 mt-4">
                                    <h4 className="text-xs font-black text-orange-400 uppercase tracking-widest mb-2">🤖 AI Coach Feedback</h4>
                                    <p className="text-readable text-zinc-300 mb-4">{daily.aiFeedback}</p>
                                    <span className="text-xs font-black text-cyan-400 uppercase bg-cyan-400/10 border border-cyan-400/30 px-3 py-2 rounded-lg">{daily.perfCondition}</span>
                                </div>
                                {daily.vcrUpgraded && (
                                    <div className="mt-4 bg-fuchsia-500/10 border border-fuchsia-500/50 p-4 rounded-xl text-center animate-pulse">
                                        <p className="text-sm font-black text-fuchsia-400 uppercase tracking-widest">🎉 VCR Level Up!</p>
                                        <p className="text-xs text-fuchsia-300 mt-1">สถิติดีขึ้น! AI อัปเกรด VCR ให้เป็น {daily.newVcrVal} ม. แล้ว</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </section>
                </div>
            );
        };

        const TabPlan = ({ cfg }) => (
            <div className="space-y-6 pb-10">
                <section className="garmin-card rounded-[32px] p-6 border-l-4 border-l-orange-500">
                    <h2 className="text-header text-white uppercase tracking-widest mb-4">💬 Coach's Advice</h2>
                    <p className="text-readable font-medium text-zinc-300 italic">"{cfg.advice}"</p>
                </section>
                <section className="garmin-card rounded-[32px] p-6">
                    <h2 className="text-header text-lime-400 uppercase tracking-widest mb-6">🏃‍♂️ Training Details</h2>
                    <div className="space-y-6">
                        <div className="bg-black p-5 rounded-2xl border border-zinc-900">
                            <p className="text-xs font-black text-zinc-500 uppercase mb-2">Primary Goal</p>
                            <p className="text-2xl font-black text-white uppercase">{cfg.name}</p>
                            <div className="flex gap-3 mt-4">
                                <span className="bg-zinc-800 px-3 py-2 rounded-lg text-cyan-400 font-black text-sm">PACE: {cfg.pace}</span>
                                <span className="bg-zinc-800 px-3 py-2 rounded-lg text-red-400 font-black text-sm">HR: {cfg.hr}</span>
                            </div>
                        </div>
                        <div className="space-y-4 px-2">
                            <div><p className="text-sm font-black text-orange-400 uppercase mb-2">🔥 Warm-Up</p><ul className="list-disc list-inside text-readable font-medium text-zinc-300 space-y-1">{cfg.detailedWorkout.warmup.map((i,idx)=><li key={idx}>{i}</li>)}</ul></div>
                            <div><p className="text-sm font-black text-lime-400 uppercase mb-2">👟 Main Set</p><p className="text-readable font-black text-white bg-zinc-900 p-4 rounded-xl border border-zinc-800">{cfg.detailedWorkout.main}</p></div>
                            <div><p className="text-sm font-black text-blue-400 uppercase mb-2">❄️ Cool-Down</p><ul className="list-disc list-inside text-readable font-medium text-zinc-300 space-y-1">{cfg.detailedWorkout.cooldown.map((i,idx)=><li key={idx}>{i}</li>)}</ul></div>
                        </div>
                    </div>
                </section>
                <section className="garmin-card rounded-[32px] p-6">
                    <h2 className="text-header text-yellow-400 uppercase tracking-widest mb-6">🥑 Nutrition Guide</h2>
                    <div className="grid gap-4">
                        {[ {id:'Breakfast', k:'b', c:'text-yellow-400'}, {id:'Lunch', k:'l', c:'text-orange-400'}, {id:'Snack', k:'s', c:'text-fuchsia-400'}, {id:'Dinner', k:'d', c:'text-blue-400'} ].map(m => {
                            const d = cfg.detailedMeals[m.k]; if(!d) return null;
                            return (
                                <div key={m.k} className="bg-black p-5 rounded-2xl border border-zinc-900">
                                    <p className={`text-xs font-black uppercase ${m.c} mb-2`}>{m.id}</p>
                                    <p className="text-readable font-black text-white">{d.menu}</p>
                                    <p className="text-sm font-medium text-zinc-500 mt-2">{d.detail}</p>
                                </div>
                            )
                        })}
                    </div>
                </section>
            </div>
        );

        const TabRanking = ({ leaderboardData }) => (
            <section className="space-y-6 pb-10">
                <div className="text-center mb-6 pt-4">
                    <h2 className="text-4xl font-black text-white italic uppercase tracking-tighter drop-shadow-[0_0_15px_rgba(249,115,22,0.4)]">THE ELITE<br/>LEADERBOARD</h2>
                    <p className="text-sm font-bold text-orange-400 uppercase tracking-widest mt-2">ระยะวิ่งสะสม 7 วันย้อนหลัง</p>
                </div>
                <div className="space-y-4">
                    {leaderboardData.length === 0 ? <div className="text-center p-8 bg-zinc-900 rounded-2xl border border-zinc-800 text-zinc-500 font-bold">กำลังโหลดข้อมูลชมรม... ⏳</div> : 
                        leaderboardData.map((runner, idx) => {
                            let badge = '', bgStyle = 'bg-zinc-900 border-zinc-800', textStyle = 'text-white';
                            if (idx === 0) { badge = '👑'; bgStyle = 'bg-gradient-to-r from-orange-900/40 to-yellow-900/40 border-yellow-500/50 shadow-[0_0_20px_rgba(234,179,8,0.2)]'; textStyle = 'text-yellow-400'; }
                            else if (idx === 1) { badge = '🥈'; bgStyle = 'bg-zinc-900 border-zinc-400/50'; textStyle = 'text-zinc-300'; }
                            else if (idx === 2) { badge = '🥉'; bgStyle = 'bg-zinc-900 border-orange-800/50'; textStyle = 'text-orange-300'; }
                            return (
                                <div key={idx} className={`p-5 rounded-[20px] border flex items-center justify-between transition-all ${bgStyle}`}>
                                    <div className="flex items-center gap-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-xl bg-zinc-950 border-2 ${idx === 0 ? 'border-yellow-400' : 'border-zinc-800'}`}>{idx === 0 ? '1' : idx + 1}</div>
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <h3 className={`font-black text-lg uppercase tracking-wider ${textStyle}`}>{runner.name}</h3>
                                                <span className="text-xl">{badge}</span>
                                            </div>
                                            <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">Total All-Time: {runner.tKm.toFixed(1)} KM</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className={`text-3xl font-black italic ${idx === 0 ? 'text-white' : 'text-zinc-300'}`}>{runner.wKm.toFixed(1)}</p>
                                        <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">KM (7 Days)</p>
                                    </div>
                                </div>
                            )
                        })
                    }
                </div>
            </section>
        );

        const TabStats = ({ prof, vo2Value, fastest5kSecs, fastest10kSecs, longestRun, pTime, pSource }) => {
            let vo2Color = "#ef4444", vo2Label = "POOR";
            if (vo2Value >= 35) { vo2Color = "#f97316"; vo2Label = "FAIR"; }
            if (vo2Value >= 40) { vo2Color = "#a3e635"; vo2Label = "GOOD"; }
            if (vo2Value >= 45) { vo2Color = "#60a5fa"; vo2Label = "EXCELLENT"; }
            if (vo2Value >= 50) { vo2Color = "#e879f9"; vo2Label = "SUPERIOR"; }
            const offset = 126 - (Math.min(100, ((vo2Value - 20) / 40) * 100) / 100) * 126;

            return (
                <div className="space-y-6 pb-12">
                    <section className="garmin-card rounded-[32px] p-8 text-center shadow-xl">
                        <h2 className="font-black text-base text-zinc-400 uppercase tracking-widest mb-6">PEAK VO2 MAX</h2>
                        <div className="flex justify-center mb-6">
                            <div className="relative w-56 h-28 overflow-hidden">
                                <svg className="w-full h-full" viewBox="0 0 100 50">
                                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#27272a" strokeWidth="10" strokeLinecap="round" />
                                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={vo2Color} strokeWidth="10" strokeLinecap="round" className="gauge-arc" style={{strokeDashoffset: offset}} />
                                </svg>
                                <div className="absolute bottom-0 left-0 right-0 flex flex-col items-center">
                                    <span className="text-6xl font-black italic tracking-tighter" style={{color: vo2Color}}>{vo2Value}</span>
                                    <span className="text-xs font-black uppercase mt-1" style={{color: vo2Color}}>{vo2Label}</span>
                                </div>
                            </div>
                        </div>
                        <p className="text-xs text-zinc-500 font-bold uppercase tracking-wider">Calculated from latest PBs & VCR</p>
                    </section>
                    
                    <section className="garmin-card rounded-[32px] p-6">
                        <h2 className="text-header text-white uppercase tracking-widest mb-6 text-center">🏆 Personal Records</h2>
                        <div className="grid grid-cols-3 gap-3">
                            <div className="bg-black p-5 rounded-2xl border border-zinc-800 text-center">
                                <p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">Fastest 5K</p>
                                <p className="text-xl font-black text-white italic">{formatPace(fastest5kSecs)}</p>
                            </div>
                            <div className="bg-black p-5 rounded-2xl border border-zinc-800 text-center">
                                <p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">Fastest 10K</p>
                                <p className="text-xl font-black text-white italic">{formatPace(fastest10kSecs)}</p>
                            </div>
                            <div className="bg-black p-5 rounded-2xl border border-zinc-800 text-center">
                                <p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">Longest</p>
                                <p className="text-xl font-black text-white italic">{longestRun.toFixed(1)}<span className="text-xs ml-1">K</span></p>
                            </div>
                        </div>
                    </section>
                    
                    <section className="garmin-card rounded-[32px] p-8 text-center border-l-4 border-l-lime-500">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-3">AI Race Predictor</h2>
                        <p className="text-xs text-lime-400 font-bold uppercase mb-2 tracking-widest">Est. {prof.targetDist}K Time</p>
                        <p className="text-5xl font-black italic text-white tracking-tighter mb-4">{pTime}</p>
                        <div className="bg-black/50 py-2 px-4 rounded-full inline-block">
                            <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest">Source: {pSource}</p>
                        </div>
                    </section>
                </div>
            );
        };

        const SetupModal = ({ initialProf, onSave, onCancel }) => {
            const [w, setW] = useState(initialProf.weight);
            const [tw, setTw] = useState(initialProf.targetWeight);
            const [h, setH] = useState(initialProf.height);
            const [vcr, setVcr] = useState(initialProf.vcr);
            const [td, setTd] = useState(initialProf.targetDist || 42.195);
            const [avail, setAvail] = useState(initialProf.schedule ? {0: initialProf.schedule[0]!=='rest', 1: initialProf.schedule[1]!=='rest', 2: initialProf.schedule[2]!=='rest', 3: initialProf.schedule[3]!=='rest', 4: initialProf.schedule[4]!=='rest', 5: initialProf.schedule[5]!=='rest', 6: initialProf.schedule[6]!=='rest'} : {0:true, 1:false, 2:true, 3:true, 4:false, 5:true, 6:false});
            const [ld, setLd] = useState(initialProf.schedule ? Number(Object.keys(initialProf.schedule).find(key => initialProf.schedule[key] === 'long') || 0) : 0);
            const dayLabels = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];

            return (
                <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-50 overflow-y-auto">
                    <div className="w-full max-w-sm garmin-card p-8 rounded-[40px] shadow-2xl space-y-8 my-8 relative">
                        <div className="flex justify-between items-center border-b border-zinc-800 pb-4">
                            <h2 className="text-3xl font-black italic text-white uppercase tracking-tighter">Athlete Profile</h2>
                            {initialProf.initialWeight && <button onClick={onCancel} className="text-zinc-500 font-bold text-xs uppercase hover:text-white transition-colors">Close</button>}
                        </div>
                        <div className="space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-xs font-black text-zinc-500 uppercase mb-2 block">Weight (KG)</label><input type="number" value={w} onChange={e=>setW(Number(e.target.value))} className="w-full bg-black p-5 rounded-2xl border border-zinc-800 text-center font-black text-xl text-white outline-none focus:border-orange-500"/></div>
                                <div><label className="text-xs font-black text-zinc-500 uppercase mb-2 block">Target (KG)</label><input type="number" value={tw} onChange={e=>setTw(Number(e.target.value))} className="w-full bg-black p-5 rounded-2xl border border-zinc-800 text-center font-black text-xl text-white outline-none focus:border-lime-500"/></div>
                            </div>
                            <div>
                                <label className="text-xs font-black text-zinc-500 uppercase mb-2 block">Target Distance</label>
                                <div className="grid grid-cols-4 gap-2">
                                    {[5, 10, 21.1, 42.195].map(d => (<button key={d} onClick={()=>setTd(d)} className={`py-4 rounded-xl text-sm font-black transition-all ${td===d ? 'bg-orange-500 text-black' : 'bg-black text-zinc-600 border border-zinc-800'}`}>{d === 42.195 ? '42K' : d === 21.1 ? '21K' : d+'K'}</button>))}
                                </div>
                            </div>
                            <div className="bg-black p-5 rounded-2xl border border-cyan-500/30">
                                <label className="text-xs font-black text-cyan-500 uppercase mb-2 block text-center">30-Min VCR Test (Meters)</label>
                                <div className="flex items-baseline justify-center gap-2 mb-2">
                                    <input type="number" value={vcr} onChange={e=>setVcr(Number(e.target.value))} className="w-32 bg-transparent text-center font-black text-4xl text-cyan-400 outline-none border-b-2 border-zinc-800 focus:border-cyan-400 transition-colors"/>
                                    <span className="text-cyan-500 font-bold text-sm">Meters</span>
                                </div>
                                <div className="bg-zinc-900 p-3 rounded-lg border border-zinc-800 mt-4 text-[10px] text-zinc-400 space-y-1">
                                    <div className="flex justify-between"><span>🔴 Beginner (Pace > 7:30)</span><span>&lt; 4000m</span></div>
                                    <div className="flex justify-between"><span>🟡 Intermediate</span><span>4000-5000m</span></div>
                                    <div className="flex justify-between"><span>🟢 Advanced (Pace &lt; 6:00)</span><span>&gt; 5000m</span></div>
                                </div>
                            </div>
                            <div>
                                <label className="text-xs font-black text-orange-500 uppercase mb-2 block">Training Days</label>
                                <div className="flex justify-between gap-1">
                                    {['อา','จ','อ','พ','พฤ','ศ','ส'].map((d,i) => (<button key={i} onClick={()=>setAvail({...avail, [i]: !avail[i]})} className={`w-full py-4 rounded-lg text-xs font-black transition-all ${avail[i] ? 'bg-orange-500 text-black' : 'bg-black text-zinc-700 border border-zinc-900'}`}>{d}</button>))}
                                </div>
                            </div>
                            <div>
                                <label className="text-xs font-black text-orange-500 uppercase mb-2 block">Long Run Day</label>
                                <select value={ld} onChange={e => setLd(Number(e.target.value))} className="w-full bg-black p-4 rounded-xl text-orange-400 font-bold border border-zinc-800 outline-none text-base cursor-pointer">
                                    {Object.keys(avail).filter(k=>avail[k]).map(k => (<option key={k} value={k}>Every {dayLabels[k]}</option>))}
                                    {Object.values(avail).filter(v=>v).length === 0 && (<option value={0}>Please select training days first</option>)}
                                </select>
                            </div>
                            <button onClick={()=>onSave({weight:w, targetWeight:tw, height:h, vcr:vcr, targetDist:td, schedule: generateSmartSchedule(avail, ld)})} className="w-full garmin-btn-primary py-6 rounded-2xl uppercase tracking-widest text-lg active:scale-95 transition-all shadow-lg shadow-orange-500/30">Save & Create Plan</button>
                        </div>
                    </div>
                </div>
            );
        };

        // 🏠 Dashboard
        const Dashboard = ({ profileName, onLogout }) => {
            const [activeTab, setActiveTab] = useState('tracker');
            const [showSetup, setShowSetup] = useState(false);
            const [showConfetti, setShowConfetti] = useState(false);
            const safeName = profileName.trim().toLowerCase();
            const localKey = `p80_v14_stable_${safeName}`;
            
            const [prof, setProf] = useState(() => JSON.parse(safeStorage.getItem(localKey)) || {
                initialWeight: 90.0, weight: 90.0, targetWeight: 80.0, height: 180, gender: 'male',
                age: 35, rhr: 60, vcr: 4500, targetDist: 42.195, injury: 'none', lifestyle: 'active',
                schedule: {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'}, records: {}
            });

            const todayStr = new Date().toDateString();
            const [daily, setDaily] = useState(prof.records[todayStr] || { w:0, b:false, l:false, s:false, d:false, ex:[false,false,false,false], rLog:false, rDist:'', rPace:'', rHr:'', aiFeedback: '', perfCondition: '', vcrUpgraded: false, newVcrVal: 0 });
            const [leaderboardData, setLeaderboardData] = useState([]);
            
            const [inDist, setInDist] = useState(daily.rDist || '');
            const [inPace, setInPace] = useState(daily.rPace || '');
            const [inHr, setInHr] = useState(daily.rHr || '');

            useEffect(() => {
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeName), snap => {
                    if(snap.exists()) { setProf(prev => ({...prev, ...snap.data()})); if(!snap.data().initialWeight) setShowSetup(true); }
                    else setShowSetup(true);
                });
                const boardRef = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                const unsubBoard = onSnapshot(boardRef, snap => {
                    let arr = [];
                    const last7 = Array.from({length:7}, (_,i) => { let d = new Date(); d.setDate(d.getDate()-6+i); return d.toDateString(); });
                    snap.forEach(docSnap => {
                        const data = docSnap.data(); const userName = docSnap.id;
                        let wKm = 0, tKm = 0;
                        if(data.records) {
                            last7.forEach(dt => { if(data.records[dt]?.rLog) wKm += Number(data.records[dt].rDist)||0; });
                            Object.values(data.records).forEach(r => { if(r.rLog) tKm += Number(r.rDist)||0; });
                        }
                        arr.push({ name: userName.toUpperCase(), wKm, tKm });
                    });
                    arr.sort((a, b) => b.wKm - a.wKm);
                    setLeaderboardData(arr);
                }, err => console.log("Leaderboard offline mode"));

                return () => { unsub(); unsubBoard(); };
            }, []);

            const updateDaily = (key, val) => {
                const nd = {...daily, [key]:val}; setDaily(nd);
                const nRecords = {...prof.records, [todayStr]: nd};
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeName), { records: nRecords }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify({...prof, records: nRecords}));
            };

            const saveRun = () => {
                const rSecs = parsePace(inPace); const dNum = parseFloat(inDist);
                let currentVcr = prof.vcr || 4500; let upgraded = false;
                if (rSecs !== Infinity && dNum >= 3) {
                    const equiv = (1800 / rSecs) * 1000;
                    if (equiv > currentVcr + 100) { currentVcr = Math.round(equiv); upgraded = true; }
                }
                const cfgToday = getDayConfig(new Date(), 0, false, prof);
                const ai = generateFeedback(dNum, inPace, inHr, cfgToday.pace);
                const perf = calcCondition(inHr, inPace);
                const nd = {...daily, rLog: true, rDist: inDist, rPace: inPace, rHr: inHr, aiFeedback: ai, perfCondition: perf, vcrUpgraded: upgraded, newVcrVal: currentVcr};
                setDaily(nd);
                const nProf = {...prof, vcr: currentVcr, records: {...prof.records, [todayStr]: nd}};
                setProf(nProf);
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeName), { vcr: currentVcr, records: nProf.records }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify(nProf));
            };

            const updateWeight = (amt) => {
                const w = Number((prof.weight + amt).toFixed(1));
                setProf(p => ({...p, weight: w}));
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeName), { weight: w }, {merge:true});
            };

            const raceDate = new Date(2026, 10, 15); const planStart = new Date(2026, 5, 1);
            const totalDays = Math.ceil((raceDate - planStart)/(1000*3600*24));
            let diff = Math.ceil((new Date() - planStart)/(1000*3600*24));
            const weekIdx = Math.max(0, Math.min(23, Math.ceil(diff/7)-1));
            const cfg = getDayConfig(new Date(), weekIdx, false, prof);

            let f5k = Infinity, f10k = Infinity, longest = 0;
            Object.values(prof.records).forEach(r => { if(r.rLog) { const d = parseFloat(r.rDist), s = parsePace(r.rPace); if(d>=5 && s<f5k) f5k = s; if(d>=10 && s<f10k) f10k = s; if(d>longest) longest = d; } });
            
            let bestMin = (prof.vcr || 4500) / 30;
            if (f5k !== Infinity) bestMin = Math.max(bestMin, 5000 / (f5k / 60));
            if (f10k !== Infinity) bestMin = Math.max(bestMin, 10000 / (f10k / 60));
            let vo2 = parseFloat(((bestMin * 0.2) + 3.5).toFixed(1));

            let pTime = "NEED DATA", pSource = "Run 5K to unlock";
            if(f10k !== Infinity) { pTime = calcPredictor(f10k*10, 10, prof.targetDist).str; pSource = "Fastest 10K"; }
            else if(f5k !== Infinity) { pTime = calcPredictor(f5k*5, 5, prof.targetDist).str; pSource = "Fastest 5K"; }

            return (
                <div className="min-h-screen bg-[#0d0d0d] p-6 pb-28 relative overflow-x-hidden">
                    {showConfetti && <Confetti />}
                    {showSetup && <SetupModal initialProf={prof} onSave={(d)=>{setProf(p=>({...p, ...d})); setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeName), d, {merge:true}); setShowSetup(false);}} onCancel={()=>setShowSetup(false)} />}
                    
                    <header className="flex justify-between items-start mb-8">
                        <div>
                            <p className="text-lime-400 font-black text-[10px] tracking-[0.3em] uppercase mb-1">ROAD TO BANGSAEN42</p>
                            <h1 className="text-5xl font-black italic text-white tracking-tighter uppercase">PRO <span className="text-orange-500">80</span></h1>
                            <p className="text-sm font-bold text-zinc-500 mt-2 uppercase tracking-widest">RUNNER: <span className="text-white">{profileName}</span></p>
                        </div>
                        <button onClick={onLogout} className="garmin-card p-4 rounded-2xl flex flex-col items-center justify-center w-16 h-16 active:scale-90 transition-transform">
                            <svg className="w-5 h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                            <span className="text-[8px] font-bold text-zinc-600 mt-1 uppercase">EXIT</span>
                        </button>
                    </header>

                    <div className="garmin-card rounded-[32px] p-6 mb-8 relative overflow-hidden shadow-2xl border-t-2 border-t-orange-500/30">
                        <div className="relative z-10">
                            <button onClick={()=>setShowSetup(true)} className="flex items-center gap-2 mb-2 group">
                                <span className="text-zinc-500 font-black text-xs uppercase tracking-[0.2em] group-hover:text-white transition-colors">TARGET WEIGHT</span>
                                <svg className="w-4 h-4 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                            <div className="flex items-baseline gap-2 mb-6">
                                <span className="text-7xl font-black italic text-white tracking-tighter">{prof.weight}</span>
                                <span className="text-lime-400 font-bold text-xl uppercase tracking-widest">KG</span>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={()=>updateWeight(0.1)} className="w-14 h-14 bg-zinc-800 rounded-2xl text-white font-black text-2xl flex items-center justify-center active:scale-90 hover:bg-zinc-700 transition-all">+</button>
                                <button onClick={()=>updateWeight(-0.1)} className="w-14 h-14 bg-orange-500 rounded-2xl text-black font-black text-3xl flex items-center justify-center active:scale-90 shadow-lg shadow-orange-500/20 transition-all">-</button>
                            </div>
                        </div>
                        <div className="absolute bottom-[-10px] right-2 z-0 scale-110">
                            <OriginalAvatar activity={cfg.id} />
                        </div>
                    </div>

                    <nav className="flex gap-2 mb-8 h-20">
                        {['tracker','plan','ranking','stats'].map(t => (
                            <button key={t} onClick={()=>setActiveTab(t)} className={`flex-1 flex flex-col items-center justify-center rounded-[24px] font-black text-[11px] tracking-widest uppercase transition-all border-2 ${activeTab===t ? 'bg-orange-500 border-orange-400 text-black shadow-lg shadow-orange-500/20' : 'bg-zinc-900 border-zinc-800 text-zinc-600 hover:bg-zinc-800'}`}>{t==='tracker'?'PIT STOP':t==='plan'?'PLAYBOOK':t}</button>
                        ))}
                    </nav>

                    <main>
                        {activeTab==='tracker' && <TabTracker score={0} daily={daily} updateDaily={updateDaily} cfg={cfg} inDist={inDist} setInDist={setInDist} inPace={inPace} setInPace={setInPace} inHr={inHr} setInHr={setInHr} saveRun={saveRun} targetWater={10} />}
                        {activeTab==='plan' && <TabPlan cfg={cfg} />}
                        {activeTab==='ranking' && <TabRanking leaderboardData={leaderboardData} />}
                        {activeTab==='stats' && <TabStats prof={prof} vo2Value={vo2} tDist={0} pTime={pTime} pSource={pSource} fastest5kSecs={f5k} fastest10kSecs={f10k} longestRun={longest} />}
                    </main>
                </div>
            );
        };

        const MainApp = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('p80_user_v14'));

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, u => { setUser(u); setAuthLoading(false); });
            }, []);

            const handleLogin = name => { setCurrentUser(name); localStorage.setItem('p80_user_v14', name); };
            const handleLogout = () => { setCurrentUser(null); localStorage.removeItem('p80_user_v14'); window.location.reload(); };

            if (authLoading) return <div className="min-h-screen bg-black flex items-center justify-center"><p className="text-orange-500 font-black tracking-widest text-sm animate-pulse">CONNECTING SATELLITE...</p></div>;
            if (!user || !currentUser) return <LoginScreen onLogin={handleLogin} />;
            return <Dashboard profileName={currentUser} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><MainApp /></ErrorBoundary>);
    </script>
</body>
</html>
