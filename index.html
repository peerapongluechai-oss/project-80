<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 80: Road To Bangsaen42</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#09090b">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #09090b; }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes breathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.02) translateY(-1px); } }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; transform-origin: bottom; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .racing-stripes { background-image: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.03) 10px, rgba(255, 255, 255, 0.03) 20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) return JSON.parse(__firebase_config);
            return {
                apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
                authDomain: "myfamilyproject-ecff4.firebaseapp.com",
                projectId: "myfamilyproject-ecff4",
                storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
                messagingSenderId: "714527535272",
                appId: "1:714527535272:web:fefa9679e822d31e52529d"
            };
        };

        const app = initializeApp(getFirebaseConfig());
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'project80_dynamic_app';

        // 🧠 AI ประมวลผลตารางซ้อม
        const generateSmartSchedule = (availObj, longDay) => {
            let newSched = { 0:'rest', 1:'rest', 2:'rest', 3:'rest', 4:'rest', 5:'rest', 6:'rest' };
            let trainingDays = [];
            Object.keys(availObj).forEach(k => { if (availObj[k]) trainingDays.push(Number(k)); });
            if (trainingDays.length === 0) return newSched;

            if (trainingDays.includes(Number(longDay))) { newSched[longDay] = 'long'; } 
            else { newSched[trainingDays[0]] = 'long'; longDay = trainingDays[0]; }

            if (trainingDays.length > 1) {
                let speedDay = -1, maxDist = -1;
                trainingDays.forEach(day => {
                    if (day !== Number(longDay)) {
                        let dist = Math.abs(day - Number(longDay));
                        if (dist > 3) dist = 7 - dist; 
                        if (dist > maxDist) { maxDist = dist; speedDay = day; }
                    }
                });
                if (speedDay !== -1) newSched[speedDay] = 'speed';
            }
            trainingDays.forEach(day => { if (newSched[day] === 'rest') newSched[day] = 'easy'; });
            return newSched;
        };

        // แปลง Pace เป็นวินาที
        const parsePace = (pace) => {
            if (!pace) return Infinity;
            const parts = pace.split(':');
            return parts.length === 2 ? parseInt(parts[0]) * 60 + parseInt(parts[1]) : Infinity;
        };
        const formatPace = (secs) => {
            if (secs === Infinity) return '--:--';
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        };

        // 🧠 AI Coach: คำนวณ Feedback หลังวิ่ง
        const generateFeedback = (dist, pace, hr, targetPaceStr) => {
            if(!pace || pace === '0:00' || !targetPaceStr) return "บันทึกข้อมูลสำเร็จ! รักษาวินัยการซ้อมได้ดีเยี่ยมครับ 🏃‍♂️";
            const pSecs = parsePace(pace);
            const tSecsArr = targetPaceStr.split(' - ').map(parsePace);
            if(tSecsArr.length >= 1 && tSecsArr[0] !== Infinity) {
                const minT = Math.min(...tSecsArr);
                const maxT = Math.max(...tSecsArr);
                if(pSecs < minT - 15) return "วิ่งเร็วกว่าเป้าหมายที่ตั้งไว้! ⚡ พรุ่งนี้อย่าลืมยืดเหยียดเยอะๆ เพื่อป้องกันอาการล้าสะสมนะครับ";
                if(pSecs > maxT + 15) return "เพซวันนี้สบายๆ ช้ากว่าเป้านิดหน่อย แต่ช่วยสร้าง Base Endurance ความอึดได้ดีครับ 🐢";
                return "เพอร์เฟกต์! 🎯 ลูกพี่คุมเพซได้ตรงตามแผนเป๊ะๆ ร่างกายกำลังพัฒนาไปถูกทางครับ";
            }
            return "เยี่ยมมากครับ! เก็บสะสมไมล์ไปเรื่อยๆ ความฟิตจะตามมาเอง 🏆";
        };

        // 🧠 AI Coach: คำนวณสภาพความฟิต (Performance Condition)
        const calcCondition = (hr, pace) => {
            if(!hr || !pace) return "+0 (ปกติ)";
            const pSecs = parsePace(pace);
            const hrNum = Number(hr);
            if(hrNum < 140 && pSecs < 420) return "+3 (ฟิตมาก!)"; // HR < 140, Pace < 7:00
            if(hrNum < 150 && pSecs < 450) return "+1 (ร่างกายตอบสนองดี)";
            if(hrNum > 165 && pSecs > 480) return "-2 (มีอาการล้า / พักผ่อนน้อย)";
            return "+0 (ปกติ ทรงตัว)";
        };

        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 50 }).map((_, i) => (
                    <div key={i} className="absolute top-[-10%]" style={{ left: `${Math.random() * 100}%`, width: `${Math.random() * 10 + 5}px`, height: `${Math.random() * 10 + 5}px`, backgroundColor: ['#ea580c', '#f97316', '#bef264', '#fde047', '#ef4444'][Math.floor(Math.random() * 5)], borderRadius: Math.random() > 0.5 ? '50%' : '4px', animation: `confetti-fall ${Math.random() * 2 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`, animationDelay: `${Math.random() * 0.3}s` }} />
                ))}
            </div>
        );

        const CoolRunnerAvatar = ({ weight, targetWeight, initialWeight, currentConfig }) => {
            const weightDiff = initialWeight - targetWeight;
            const progress = weightDiff > 0 ? Math.max(0, Math.min(1, (initialWeight - weight) / weightDiff)) : 0;
            const bodyWidth = 36 - (12 * progress);
            const act = currentConfig?.id === 'rest' ? 'stretch' : 'cardio';

            let statusText = '';
            if (progress >= 1) statusText = 'ELITE RUNNER 🏅';
            else if (currentConfig?.id === 'long') statusText = 'Long Run ลุย! 🔥';
            else if (currentConfig?.id === 'speed') statusText = 'อัดเพซให้ยับ! ⚡';
            else if (currentConfig?.id === 'easy') statusText = 'Easy Run ชิลๆ 👟';
            else statusText = 'พักผ่อน ยืดเหยียด 🧘‍♂️';

            return (
                <div className="relative w-36 h-36 flex items-center justify-center mx-2 group">
                    <div className="absolute -top-3 whitespace-nowrap bg-orange-500 text-black px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest shadow-[0_0_10px_rgba(249,115,22,0.5)] z-20 animate-bounce">{statusText}</div>
                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-xl transition-transform duration-300">
                        <style>{`
                            @keyframes float-run { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-3px); } }
                            @keyframes run-leg-l { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-8px) rotate(-15deg); } }
                            @keyframes run-leg-r { 0%, 100% { transform: translateY(-8px) rotate(-15deg); } 50% { transform: translateY(0px) rotate(0deg); } }
                            @keyframes run-arm-l { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(30deg); } }
                            @keyframes run-arm-r { 0%, 100% { transform: rotate(30deg); } 50% { transform: rotate(0deg); } }
                            @keyframes sway { 0%, 100% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } }
                            .anim-float-run { animation: float-run 0.6s ease-in-out infinite; }
                            .anim-run-leg-l { animation: run-leg-l 0.6s infinite; transform-origin: 45px 60px; }
                            .anim-run-leg-r { animation: run-leg-r 0.6s infinite; transform-origin: 55px 60px; }
                            .anim-run-arm-l { animation: run-arm-l 0.6s infinite; transform-origin: 38px 52px; }
                            .anim-run-arm-r { animation: run-arm-r 0.6s infinite; transform-origin: 62px 52px; }
                            .anim-sway { animation: sway 4s ease-in-out infinite; transform-origin: 50px 85px; }
                        `}</style>
                        <g className={act === 'stretch' ? 'anim-sway' : 'anim-float-run'}>
                            <path d="M 32 25 Q 50 5 68 25 L 68 35 Q 50 20 32 35 Z" fill="#1e293b" />
                            <g className={act === 'cardio' ? 'anim-run-leg-l' : ''}><rect x="42" y="60" width="6" height="28" rx="3" fill="#fcd5ce" /><path d="M 41 85 L 48.5 85 L 48.5 94 Q 45 96 41 94 Z" fill="#bef264" /><rect x="42" y="80" width="6" height="5" fill="#3f6212" /></g>
                            <g className={act === 'cardio' ? 'anim-run-leg-r' : ''}><rect x="52" y="60" width="6" height="28" rx="3" fill="#fcd5ce" /><path d="M 51.5 85 L 59 85 L 59 94 Q 55 96 51.5 94 Z" fill="#bef264" /><rect x="52" y="80" width="6" height="5" fill="#3f6212" /></g>
                            <path d={`M ${50 - bodyWidth/2 - 2} 60 L ${50 + bodyWidth/2 + 2} 60 L ${50 + bodyWidth/2 + 3} 72 L 51 70 L 49 70 L ${50 - bodyWidth/2 - 3} 72 Z`} fill="#111827" />
                            <g className={act === 'cardio' ? 'anim-run-arm-l' : ''}>{act === 'stretch' ? <line x1="38" y1="52" x2="25" y2="20" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" /> : <path d={`M ${50 - bodyWidth/2 + 2} 52 Q 35 65 38 75`} fill="none" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" />}</g>
                            <rect x={50 - bodyWidth/2} y="50" width={bodyWidth} height="15" rx="3" fill="#f97316" className="transition-all duration-700 ease-out" />
                            <g transform={`translate(${50 - 8}, 52)`}><rect x="0" y="0" width="16" height="9" fill="#ffffff" rx="1.5" /><rect x="1" y="1" width="14" height="2" fill="#ef4444" rx="0.5" /><text x="8" y="7.5" fontSize="4.5" fontWeight="900" fill="#000" textAnchor="middle" fontFamily="sans-serif">80</text></g>
                            <g className={act === 'cardio' ? 'anim-run-arm-r' : ''}>{act === 'stretch' ? <line x1="62" y1="52" x2="75" y2="20" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" /> : <path d={`M ${50 + bodyWidth/2 - 2} 52 Q 65 65 62 75`} fill="none" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" />}</g>
                            <rect x="46" y="44" width="8" height="6" fill="#fcd5ce" /><circle cx="50" cy="32" r="14.5" fill="#fcd5ce" /><path d="M 35 25 Q 50 10 65 25 Q 50 18 35 25" fill="#1e293b" /><path d="M 40 20 L 45 8 L 50 16 L 56 10 L 60 20 Z" fill="#1e293b" /><path d="M 35 30 Q 50 27 65 30 L 63 35 Q 50 40 37 35 Z" fill="#0f172a" /><path d="M 38 31 L 62 31 L 60 34 L 40 34 Z" fill="#f97316" opacity="0.8"/>
                            {act === 'cardio' ? <g><path d="M 42 29 Q 44 28 46 29" fill="none" stroke="#1e293b" strokeWidth="1.5" strokeLinecap="round" /><path d="M 54 29 Q 56 28 58 29" fill="none" stroke="#1e293b" strokeWidth="1.5" strokeLinecap="round" /><circle cx="50" cy="40" r="2" fill="#0f172a" /></g> : <g><circle cx="44" cy="29" r="2.5" fill="#1e293b" /><circle cx="56" cy="29" r="2.5" fill="#1e293b" /><circle cx="44.5" cy="28.5" r="1" fill="#ffffff" /><circle cx="56.5" cy="28.5" r="1" fill="#ffffff" /><path d="M 47 40 Q 50 42 53 40" fill="none" stroke="#0f172a" strokeWidth="1.2" strokeLinecap="round" /></g>}
                        </g>
                    </svg>
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            return (
                <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-zinc-200 relative overflow-hidden">
                    <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-orange-600 rounded-full blur-[100px] opacity-20"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-lime-500 rounded-full blur-[100px] opacity-10"></div>
                    <div className="w-full max-w-sm z-10">
                        <div className="text-center mb-10">
                            <h2 className="text-lime-400 font-black tracking-[0.3em] text-sm uppercase mb-2 animate-pulse">Training Camp</h2>
                            <h1 className="text-6xl font-black text-white italic tracking-tighter uppercase leading-none drop-shadow-[0_0_15px_rgba(249,115,22,0.4)]">PROJECT <span className="text-orange-500">80</span></h1>
                            <p className="text-orange-300 text-xs font-bold tracking-widest mt-2 uppercase">Race Day: 15 Nov 2026</p>
                            <div className="h-1 w-20 bg-gradient-to-r from-orange-500 to-lime-400 mx-auto mt-4 rounded-full"></div>
                        </div>
                        <div className="bg-zinc-900/80 backdrop-blur-md p-8 rounded-[24px] border border-zinc-800 shadow-2xl shadow-black">
                            <form onSubmit={(e) => { e.preventDefault(); if (name.trim()) onLogin(name.trim()); }} className="flex flex-col gap-5">
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-zinc-500">🏃‍♂️</div>
                                    <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Runner ID" className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl pl-12 pr-4 py-4 text-base font-bold text-white focus:outline-none focus:border-orange-500 transition-colors uppercase" />
                                </div>
                                <button type="submit" className="w-full bg-orange-500 hover:bg-orange-400 text-black font-black text-base py-4 rounded-xl shadow-[0_0_20px_rgba(249,115,22,0.3)] active:scale-95 transition-all uppercase">Start Engine</button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const Dashboard = ({ user, profileName, onLogout }) => {
            const normalizedProfileName = profileName.trim().toLowerCase();
            const displayProfileName = profileName.trim().charAt(0).toUpperCase() + profileName.trim().slice(1).toLowerCase();
            
            // 🔥 V9: The Ultimate Coach (เคลียร์แคชให้ฟีเจอร์ VO2 Max ทำงาน)
            const localCacheKey = `p80_data_v9_${normalizedProfileName}`;
            const cachedDataStr = window.localStorage.getItem(localCacheKey);
            const cachedData = cachedDataStr ? JSON.parse(cachedDataStr) : null;

            const [loadingData, setLoadingData] = useState(!cachedData);
            const [activeTab, setActiveTab] = useState('tracker'); 
            const [showConfetti, setShowConfetti] = useState(false);
            const dateString = new Date().toDateString(); 

            const [initialWeight, setInitialWeight] = useState(cachedData?.initialWeight || 90.0);
            const [targetWeight, setTargetWeight] = useState(cachedData?.targetWeight || 80.0);
            const [weight, setWeight] = useState(cachedData?.weight || 90.0);
            const [targetDist, setTargetDist] = useState(cachedData?.targetDist || 42.195);
            const [schedule, setSchedule] = useState(cachedData?.schedule || {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'easy', 5:'easy', 6:'rest'});
            const [vcr, setVcr] = useState(cachedData?.vcr || 4500); 

            const [showSetup, setShowSetup] = useState(!cachedData); 
            const [setupInitWeight, setSetupInitWeight] = useState(initialWeight);
            const [setupTargetWeight, setSetupTargetWeight] = useState(targetWeight);
            const [setupDist, setSetupDist] = useState(targetDist);
            const [setupAvail, setSetupAvail] = useState({0: schedule[0]!=='rest', 1: schedule[1]!=='rest', 2: schedule[2]!=='rest', 3: schedule[3]!=='rest', 4: schedule[4]!=='rest', 5: schedule[5]!=='rest', 6: schedule[6]!=='rest'});
            const [setupLongDay, setSetupLongDay] = useState(Number(Object.keys(schedule).find(key => schedule[key] === 'long') || 0));
            const [setupVcr, setSetupVcr] = useState(vcr);

            const [allRecords, setAllRecords] = useState(cachedData?.records || {});
            const [leaderboardData, setLeaderboardData] = useState([]); 
            
            const defaultDailyData = { water: 0, breakfastDone: false, lunchDone: false, snackDone: false, dinnerDone: false, exerciseChecks: [false, false, false, false], runLogged: false, runDistance: '', runPace: '', runHR: '', aiFeedback: '', perfCondition: '' };
            const [dailyData, setDailyData] = useState(cachedData?.records?.[dateString] || defaultDailyData);
            
            const [distanceInput, setDistanceInput] = useState(dailyData.runDistance || '');
            const [paceInput, setPaceInput] = useState(dailyData.runPace || '');
            const [hrInput, setHrInput] = useState(dailyData.runHR || '');

            useEffect(() => { setDistanceInput(dailyData.runDistance || ''); setPaceInput(dailyData.runPace || ''); setHrInput(dailyData.runHR || ''); }, [dailyData]);

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles_v9', normalizedProfileName);

            useEffect(() => {
                if (!user) return;
                const timeoutId = setTimeout(() => setLoadingData(false), 2000);
                const unsubscribeUser = onSnapshot(docRef, (docSnap) => {
                    clearTimeout(timeoutId); 
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (!data.initialWeight || !data.targetDist || !data.vcr) {
                            setShowSetup(true);
                        } else { 
                            setInitialWeight(data.initialWeight); setTargetWeight(data.targetWeight); setWeight(data.weight || data.initialWeight); 
                            setTargetDist(data.targetDist); setSchedule(data.schedule); setVcr(data.vcr); setAllRecords(data.records || {});
                            setDailyData(data.records?.[dateString] || defaultDailyData);
                            setShowSetup(false);
                        }
                        window.localStorage.setItem(localCacheKey, JSON.stringify(data));
                    } else {
                        setShowSetup(true);
                    }
                    setLoadingData(false);
                }, () => setLoadingData(false));

                const profilesRef = collection(db, 'artifacts', appId, 'public', 'data', 'profiles_v9');
                const unsubscribeLeaderboard = onSnapshot(profilesRef, (snapshot) => {
                    const usersArray = [];
                    const last7 = Array.from({length: 7}, (_, i) => { const d = new Date(); d.setDate(d.getDate() - 6 + i); return d.toDateString(); });
                    snapshot.forEach((docSnap) => {
                        const data = docSnap.data(); const userName = docSnap.id; 
                        let wKm = 0, tKm = 0;
                        if (data.records) {
                            last7.forEach(d => { if (data.records[d]?.runLogged) wKm += parseFloat(data.records[d].runDistance||0); });
                            Object.values(data.records).forEach(r => { if (r.runLogged) tKm += parseFloat(r.runDistance||0); });
                        }
                        usersArray.push({ name: userName.charAt(0).toUpperCase() + userName.slice(1), weeklyKM: wKm, totalKM: tKm });
                    });
                    usersArray.sort((a, b) => b.weeklyKM - a.weeklyKM);
                    setLeaderboardData(usersArray);
                });
                return () => { clearTimeout(timeoutId); unsubscribeUser(); unsubscribeLeaderboard(); };
            }, [user.uid, normalizedProfileName, dateString]);

            const saveProfileSetup = () => {
                const smartSchedule = generateSmartSchedule(setupAvail, setupLongDay);
                const dataToSave = { initialWeight: setupInitWeight, targetWeight: setupTargetWeight, weight: setupInitWeight, targetDist: setupDist, schedule: smartSchedule, vcr: setupVcr, records: allRecords };
                setInitialWeight(setupInitWeight); setTargetWeight(setupTargetWeight); setWeight(setupInitWeight);
                setTargetDist(setupDist); setSchedule(smartSchedule); setVcr(setupVcr);
                window.localStorage.setItem(localCacheKey, JSON.stringify(dataToSave));
                setDoc(docRef, dataToSave, { merge: true }); 
                setShowSetup(false);
            };

            const updateDaily = (key, value) => {
                const newData = { ...dailyData, [key]: value }; setDailyData(newData); 
                const newRecords = { ...allRecords, [dateString]: newData }; setAllRecords(newRecords);
                window.localStorage.setItem(localCacheKey, JSON.stringify({ initialWeight, targetWeight, weight, targetDist, schedule, vcr, records: newRecords }));
                setDoc(docRef, { records: { [dateString]: newData } }, { merge: true });
            };

            const saveRunLog = () => {
                const runPaceSecs = parsePace(paceInput);
                const distNum = parseFloat(distanceInput);
                let currentVcr = vcr;
                let vcrUpgraded = false;

                if (runPaceSecs !== Infinity && distNum >= 3) {
                    const equivalentVcr = (1800 / runPaceSecs) * 1000;
                    if (equivalentVcr > vcr + 100) {
                        currentVcr = Math.round(equivalentVcr);
                        vcrUpgraded = true;
                    }
                }

                const aiMsg = generateFeedback(distNum, paceInput, hrInput, currentConfig.pace);
                const condMsg = calcCondition(hrInput, paceInput);

                const newData = { ...dailyData, runLogged: true, runDistance: distanceInput, runPace: paceInput, runHR: hrInput, aiFeedback: aiMsg, perfCondition: condMsg, vcrUpgraded: vcrUpgraded, newVcrVal: currentVcr };
                setDailyData(newData);
                const newRecords = { ...allRecords, [dateString]: newData };
                setAllRecords(newRecords);
                
                if (vcrUpgraded) {
                    setVcr(currentVcr);

                }
            };

            const updateWeightToCloud = (newWeight) => { setWeight(newWeight); window.localStorage.setItem(localCacheKey, JSON.stringify({ initialWeight, targetWeight, weight: newWeight, targetDist, schedule, vcr, records: allRecords })); setDoc(docRef, { weight: newWeight }, { merge: true }); };

            const todayObj = new Date();
            const planStartDate = new Date(2026, 5, 1); planStartDate.setHours(0,0,0,0);
            const raceDate = new Date(2026, 10, 15); raceDate.setHours(0,0,0,0);
            const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
            
            const totalDuration = raceDate.getTime() - planStartDate.getTime();
            const totalDays = Math.floor(totalDuration / (1000 * 60 * 60 * 24)) + 1; 
            const diffDays = Math.max(0, Math.min(Math.floor((todayMidnight.getTime() - planStartDate.getTime()) / (1000 * 60 * 60 * 24)) + 1, totalDays));
            const overallProgress = diffDays > 0 ? Math.min(Math.round((diffDays / totalDays) * 100), 100) : 0;
            const currentWeekIndex = diffDays > 0 ? Math.min(23, Math.ceil(diffDays / 7) - 1) : 0;
            const isRaceDay = diffDays === totalDays;

            const getTrainingConfig = (dayIndex, weekIndex, isRace, currentVcr) => {
                const dayType = schedule[dayIndex] || 'rest';
                const longRunDistances = [ 10, 12, 14, 10, 16, 18, 20, 15, 22, 24, 26, 18, 28, 30, 21, 32, 25, 35, 25, 30, 21, 15, 10, 42.195 ];

                if(targetDist == 21.1) sundayDistance = [5,6,7,5,8,10,12,8,14,16,18,10,15,18,12,20,15,21.1,12,15,10,8,5,21.1][weekIndex] || 5;
                else if(targetDist == 10) sundayDistance = [3,4,5,3,5,6,7,4,6,8,9,5,8,10,6,12,8,10,6,8,5,4,3,10][weekIndex] || 3;
                else if(targetDist == 5) sundayDistance = [2,3,4,2,3,4,5,3,4,5,6,3,4,6,4,7,5,6,4,5,3,3,2,5][weekIndex] || 2;

                const vSpeed = currentVcr / 1800; // m/s
                const pEasy = formatPace(1000 / (vSpeed * 0.80));

                const pTempo = formatPace(1000 / (vSpeed * 0.95));

                const genericMeals = { breakfast: 'แซนวิชขนมปังโฮลวีตไข่ต้ม 2 ฟอง + กาแฟดำ', lunch: 'ข้าวกล้อง 1.5 ทัพพี + อกไก่ย่าง/ไก่อบ + ผักต้ม', snack: 'ถั่วแระญี่ปุ่น หรือ กล้วยหอม 1 ลูก', dinner: 'สเต็กปลาแซลมอน/ปลาดอลลี่ ย่าง + สลัดผักชามใหญ่' };

                    },
                    rest: {
                        id: 'rest', icon: '💤', color: 'blue-500', bg: 'blue-500/10', title: 'Rest & Recovery', desc: 'วันพักผ่อน ฟื้นฟูกล้ามเนื้อหลังผ่านการซ้อม', pace: 'พักวิ่ง', hr: 'REST', waterModifier: 0,
                        meals: { breakfast: 'ไข่ต้ม 3 ฟอง + นมโปรตีนสูง (ลดคาร์บ)', lunch: 'เกาเหลาไก่ฉีก หรือ สลัดปลาแซลมอน', snack: 'ถั่วแระญี่ปุ่น หรือ กรีกโยเกิร์ต', dinner: 'สเต็กเนื้อ/ไก่ + ผักย่าง (ลดแป้งมื้อเย็น)' },
                        exercises: [ { title: '💤 พักการวิ่ง 1 วัน (Full Rest)', focus: 'กล้ามเนื้อขา', detail: 'งดวิ่งเด็ดขาด เพื่อให้ร่างกายได้ซ่อมแซม' }, { title: 'Core Plank', focus: 'แกนกลางลำตัว (Core)', detail: 'ทำ 3 เซต เซตละ 40 วินาที ช่วยให้ฟอร์มไม่ตกตอนเหนื่อย' }, { title: 'Legs Up the Wall', focus: 'การไหลเวียนเลือด', detail: 'นอนเอาขาพาดกำแพง 10 นาที ลดอาการเมื่อยล้าที่น่อง' }, { title: 'Foam Rolling (กลิ้งโฟม)', focus: 'น่องและหน้าขา', detail: 'กลิ้งจุดละ 1-2 นาที คลายกรดแลคติกที่สะสม' } ]
                    },
                    easy: {
                        id: 'easy', icon: '👟', color: 'lime-400', bg: 'lime-400/10', title: 'Easy Run (Base Run)', desc: 'วิ่งสบายๆ สร้างฐานความฟิต (Aerobic Base)', pace: pEasy, hr: 'ZONE 2 (125-140 bpm)', waterModifier: 1, meals: genericMeals,
                        exercises: [ { title: `🏃‍♂️ วิ่ง Easy Run ${weekIndex < 8 ? '5' : '8'} กม.`, focus: 'ระบบหายใจ', detail: 'คุมหัวใจให้อยู่แค่โซน 2 (วิ่งไปคุยไปได้สบายๆ)' }, { title: 'A-Skip & High Knees', focus: 'ฟอร์มการวิ่ง', detail: 'ทำ Drills กระตุ้นกล้ามเนื้อก่อนวิ่ง 5 นาที' }, { title: 'Bodyweight Squats', focus: 'กล้ามเนื้อหน้าขา', detail: 'ทำหลังวิ่งจบ 3 เซต เซตละ 15 ครั้ง' }, { title: 'Calf Raises', focus: 'น่องและข้อเท้า', detail: 'ยืนเขย่งปลายเท้า 3 เซต เซตละ 20 ครั้ง ป้องกันตะคริว' } ]
                    },
                    speed: {

                        meals: { breakfast: 'ขนมปังโฮลวีตทาเนยถั่ว + กล้วยหอม + กาแฟดำ', lunch: 'ข้าวกล้อง 1.5 ทัพพี + กะเพราไก่ (ไม่มัน) + ไข่ดาว', snack: 'ผลไม้สด หรือ Energy Gel (ก่อนซ้อม 30 นาที)', dinner: 'ข้าว 1 ทัพพี + ปลาเผา/ปลาย่าง + ผักต้ม (เติมไกลโคเจน)' },
                        exercises: [ { title: '⚡ วิ่ง Tempo / Interval', focus: 'ความเร็ว (Pace)', detail: 'วอร์มอัพ 2k -> วิ่งเพซ 6:20-6:40 (ระยะตามคอร์ท) -> คูลดาวน์ 2k' }, { title: 'Dynamic Stretching', focus: 'ยืดเหยียดแบบเคลื่อนไหว', detail: 'เตะขาไปมา หมุนข้อต่อ ก่อนลงคอร์ทวิ่งเร็ว' }, { title: 'Forward Lunges', focus: 'ต้นขาด้านหน้าและก้น', detail: 'ก้าวสลับซ้ายขวา 3 เซต เซตละ 10 ครั้ง/ข้าง' }, { title: 'Russian Twist', focus: 'หน้าท้องด้านข้าง', detail: 'นั่งบิดเอว 3 เซต เซตละ 20 ครั้ง' } ]
                    }
                };
                return templates[dayType] || templates['rest'];
            };

            const currentConfig = getTrainingConfig(todayObj.getDay(), currentWeekIndex, isRaceDay, vcr);
            const baseWaterGlasses = Math.ceil((weight * 33) / 250);
            const targetWater = Math.max(8, baseWaterGlasses + currentConfig.waterModifier);

            const [mealsOpen, setMealsOpen] = useState(true);
            const [waterOpen, setWaterOpen] = useState(true);
            const [exOpen, setExOpen] = useState(true);
            const [loggerOpen, setLoggerOpen] = useState(true); 

            let dailyScore = 0;
            if (dailyData.breakfastDone) dailyScore += 10; if (dailyData.lunchDone) dailyScore += 10; if (dailyData.snackDone) dailyScore += 10; if (dailyData.dinnerDone) dailyScore += 10;
            if (dailyData.water >= targetWater) dailyScore += 20;
            const completedExercises = dailyData.exerciseChecks.filter(Boolean).length;
            dailyScore += (completedExercises / currentConfig.exercises.length) * 40; 
            dailyScore = Math.min(Math.round(dailyScore), 100);

            useEffect(() => { if (dailyScore === 100) { setShowConfetti(true); setTimeout(() => setShowConfetti(false), 5000); } else setShowConfetti(false); }, [dailyScore]);

            if (loadingData) return <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center text-orange-500"><div className="w-12 h-12 border-4 border-zinc-800 border-t-orange-500 rounded-full animate-spin mb-4"></div></div>;

            if (showSetup) {
                return (
                    <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 z-50 overflow-y-auto">
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[24px] shadow-2xl w-full max-w-sm my-10 relative">
                            <h2 className="text-3xl font-black text-white italic uppercase mb-1">Runner Profile</h2>
                            <p className="text-sm font-bold text-zinc-500 mb-8">ตั้งเป้าหมายและจัดตารางส่วนตัว 🎯</p>
                            
                            <div className="space-y-6">
                                <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                                    <label className="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-3 block">Target Distance (เลือกระยะเป้าหมาย)</label>
                                    <div className="grid grid-cols-4 gap-2">
                                        {[ {d:5, l:'5K'}, {d:10, l:'10K'}, {d:21.1, l:'21K'}, {d:42.195, l:'42K'} ].map(dist => (
                                            <button key={dist.d} onClick={() => setSetupDist(dist.d)} className={`py-3 rounded-lg text-xs font-black transition-colors ${setupDist === dist.d ? 'bg-cyan-500 text-black shadow-[0_0_10px_rgba(6,182,212,0.5)]' : 'bg-zinc-900 text-zinc-500 hover:bg-zinc-800'}`}>{dist.l}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                                    <label className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3 flex justify-between"><span>Training Days (เลือกวันซ้อม)</span><span className="text-white">{Object.values(setupAvail).filter(Boolean).length} วัน</span></label>
                                    <div className="flex justify-between gap-1">
                                        {['อา','จ','อ','พ','พฤ','ศ','ส'].map((day, idx) => (
                                            <button key={idx} onClick={() => setSetupAvail({...setupAvail, [idx]: !setupAvail[idx]})} className={`w-full py-3 rounded-lg text-[10px] font-black transition-colors ${setupAvail[idx] ? 'bg-blue-500 text-black shadow-[0_0_10px_rgba(59,130,246,0.5)]' : 'bg-zinc-900 text-zinc-600 hover:bg-zinc-800'}`}>{day}</button>
                                        ))}
                                    </div>
                                    <label className="text-[10px] font-black text-red-500 uppercase tracking-widest mt-4 mb-2 block">Long Run Day (เลือกวันวิ่งยาว)</label>
                                    <select value={setupLongDay} onChange={e => setSetupLongDay(Number(e.target.value))} className="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-lg text-white font-bold text-sm outline-none focus:border-red-500 transition-colors cursor-pointer">
                                        {Object.keys(setupAvail).filter(k=>setupAvail[k]).map(k => (<option key={k} value={k}>ทำ Long Run ทุกวัน {['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'][k]}</option>))}
                                        {Object.values(setupAvail).filter(v=>v).length === 0 && (<option value={0}>กรุณาเลือกวันซ้อมก่อน</option>)}
                                    </select>
                                </div>

                                <div className="bg-zinc-950 p-4 rounded-xl border border-fuchsia-500/50 shadow-[0_0_15px_rgba(217,70,239,0.1)]">
                                    <label className="text-[10px] font-black text-fuchsia-400 uppercase tracking-widest mb-2 block text-center">VCR Test (ระยะที่วิ่งได้ใน 30 นาที)</label>
                                    <div className="bg-zinc-900 p-3 rounded-lg mb-3 border border-zinc-800">
                                        <p className="text-[9px] text-zinc-400 font-bold uppercase mb-2 border-b border-zinc-800 pb-1">ตารางอ้างอิงความฟิต (Reference)</p>
                                        <ul className="text-[10px] text-zinc-300 space-y-1.5 font-medium">
                                            <li className="flex justify-between"><span>🔴 ระดับเริ่มต้น (Pace > 7:30)</span><span>&lt; 4,000 ม.</span></li>
                                            <li className="flex justify-between"><span>🟡 ระดับกลาง (Pace 6:00 - 7:30)</span><span>4,000 - 5,000 ม.</span></li>
                                            <li className="flex justify-between"><span>🟢 ระดับสูง (Pace &lt; 6:00)</span><span>&gt; 5,000 ม.</span></li>
                                        </ul>
                                    </div>
                                    <div className="flex items-baseline justify-center gap-1">
                                        <input type="number" step="100" value={setupVcr} onChange={e=>setSetupVcr(Number(e.target.value))} className="w-24 bg-transparent text-center text-white font-black text-3xl italic outline-none border-b-2 border-fuchsia-500 transition-colors"/>
                                        <span className="text-fuchsia-400 font-bold text-xs uppercase">เมตร</span>
                                    </div>

                                    <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800">

                                        <input type="number" step="0.1" value={setupInitWeight} onChange={e=>setSetupInitWeight(Number(e.target.value))} className="w-full bg-transparent text-center text-white font-black text-2xl italic outline-none border-b-2 border-zinc-800 focus:border-orange-500 transition-colors"/>

                                    </div>
                                </div>

                                <button onClick={saveProfileSetup} className="w-full bg-gradient-to-r from-orange-500 to-orange-400 hover:from-orange-400 hover:to-orange-300 text-black font-black uppercase tracking-widest py-4 rounded-xl mt-6 active:scale-95 transition-all shadow-[0_0_20px_rgba(249,115,22,0.4)]">Save & Create Plan</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // คำนวณสถิติภาพรวม
            let totalDistanceAllTime = 0, totalSecondsAllTime = 0, longestRun = 0, fastest5kSecs = Infinity, fastest10kSecs = Infinity;
            const sortedDates = Object.keys(allRecords).sort((a, b) => new Date(a) - new Date(b));
            sortedDates.forEach(date => {
                const rec = allRecords[date];
                if (rec.runLogged && rec.runDistance && rec.runPace) {
                    const dist = parseFloat(rec.runDistance); const pSecs = parsePace(rec.runPace);
                    if (pSecs !== Infinity) { totalDistanceAllTime += dist; totalSecondsAllTime += (pSecs * dist); if (dist > longestRun) longestRun = dist; if (dist >= 5 && pSecs < fastest5kSecs) fastest5kSecs = pSecs; if (dist >= 10 && pSecs < fastest10kSecs) fastest10kSecs = pSecs; }
                }
            });

            // 🔥 คำนวณ Peak VO2 Max เพื่อแสดงในแท็บ Stats
            let bestSpeedMin = vcr / 30; // ความเร็วจาก VCR (เมตร/นาที)
            if (fastest5kSecs !== Infinity) bestSpeedMin = Math.max(bestSpeedMin, 5000 / (fastest5kSecs / 60));
            if (fastest10kSecs !== Infinity) bestSpeedMin = Math.max(bestSpeedMin, 10000 / (fastest10kSecs / 60));
            const estimatedVO2Max = ((bestSpeedMin * 0.2) + 3.5).toFixed(1); // สูตรประเมินแบบวิ่ง

            let vo2Label = "POOR", vo2Color = "text-red-500", vo2Bg = "bg-red-500/10 border-red-500/30", vo2Emoji = "🔴";

            if (estimatedVO2Max >= 40) { vo2Label = "GOOD"; vo2Color = "text-lime-400"; vo2Bg = "bg-lime-400/10 border-lime-400/30"; vo2Emoji = "🟢"; }
            if (estimatedVO2Max >= 45) { vo2Label = "EXCELLENT"; vo2Color = "text-blue-400"; vo2Bg = "bg-blue-400/10 border-blue-400/30"; vo2Emoji = "🔵"; }
            if (estimatedVO2Max >= 50) { vo2Label = "SUPERIOR"; vo2Color = "text-fuchsia-400"; vo2Bg = "bg-fuchsia-400/10 border-fuchsia-400/30"; vo2Emoji = "🟣"; }

            return (

                                <section className="bg-zinc-900 rounded-[24px] p-6 border border-zinc-800">
                                    <h2 className="font-black text-xl text-white mb-2 uppercase tracking-widest italic">Virtual Map</h2>
                                    <p className="text-xs font-bold uppercase tracking-wider text-zinc-500 mb-6">สะสมระยะทางสู่เป้าหมาย</p>
                                    <div className="relative w-full h-8 bg-zinc-950 rounded-full border border-zinc-800 overflow-visible mb-3">
                                        <div className="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-600 to-cyan-400 rounded-full shadow-[0_0_15px_rgba(34,211,238,0.4)] transition-all duration-1000" style={{width: `${Math.min((totalDistanceAllTime / 600) * 100, 100)}%`}}></div>
                                        <div className="absolute top-1/2 -translate-y-1/2 text-2xl drop-shadow-md transition-all duration-1000 z-10" style={{left: `calc(${Math.min((totalDistanceAllTime / 600) * 100, 100)}% - 16px)`}}>🏃‍♂️</div>
                                    </div>
                                </section>

                                <section className="bg-zinc-900 rounded-[24px] p-6 border border-zinc-800">
                                    <h2 className="font-black text-xl text-white mb-6 uppercase tracking-widest italic">Personal Bests</h2>
                                    <div className="grid grid-cols-3 gap-3">
                                        <div className="bg-zinc-950 p-4 rounded-[16px] border border-zinc-800 text-center flex flex-col items-center"><span className="text-2xl mb-2">🏅</span><span className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Fastest 5K</span><span className="text-white font-black text-lg italic">{formatPace(fastest5kSecs)}</span></div>
                                        <div className="bg-zinc-950 p-4 rounded-[16px] border border-zinc-800 text-center flex flex-col items-center"><span className="text-2xl mb-2">🏆</span><span className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Fastest 10K</span><span className="text-white font-black text-lg italic">{formatPace(fastest10kSecs)}</span></div>
                                        <div className="bg-zinc-950 p-4 rounded-[16px] border border-zinc-800 text-center flex flex-col items-center"><span className="text-2xl mb-2">🔥</span><span className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Longest Run</span><span className="text-white font-black text-lg italic">{longestRun.toFixed(1)}<span className="text-[10px] ml-1">KM</span></span></div>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const MainContainer = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(() => window.localStorage.getItem('p80_current_profile_v9'));

            useEffect(() => {
                const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) {} };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setAuthLoading(false); });
                return () => unsubscribe();
            }, []);

            if (authLoading) return <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center"><div className="w-12 h-12 border-4 border-zinc-800 border-t-orange-500 rounded-full animate-spin mb-4"></div></div>;
            if (!user || !currentUser) return <LoginScreen onLogin={(name) => { const safeName = name.trim().toLowerCase(); setCurrentUser(safeName); window.localStorage.setItem('p80_current_profile_v9', safeName); }} />;

            return <Dashboard user={user} profileName={currentUser} onLogout={() => { setCurrentUser(null); window.localStorage.removeItem('p80_current_profile_v9'); }} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainContainer />);
    </script>
</body>
</html>
