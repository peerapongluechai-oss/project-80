<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 80: Road To Bangsaen42</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; }
        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        @keyframes breathe {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.02) translateY(-1px); }
        }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; transform-origin: bottom; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // ---------------------------------------------------------
        // 🔥 ตั้งค่า Firebase Database (กุญแจของลูกพี่ myfamilyproject)
        // ---------------------------------------------------------
        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                return JSON.parse(__firebase_config);
            }
            return {
                apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
                authDomain: "myfamilyproject-ecff4.firebaseapp.com",
                projectId: "myfamilyproject-ecff4",
                storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
                messagingSenderId: "714527535272",
                appId: "1:714527535272:web:fefa9679e822d31e52529d",
                measurementId: "G-ED3NCQF2CD"
            };
        };

        const app = initializeApp(getFirebaseConfig());
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'project80_github_app';

        // --- Component ย่อย (Avatars & Confetti) ---
        const Confetti = () => {
            return (
                <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 50 }).map((_, i) => {
                    const colors = ['#ef4444', '#f97316', '#eab308', '#3b82f6', '#10b981'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    const isCircle = Math.random() > 0.5;
                    return (
                    <div key={i} className="absolute top-[-10%]"
                        style={{
                        left: `${Math.random() * 100}%`,
                        width: `${Math.random() * 10 + 5}px`, height: `${Math.random() * 10 + 5}px`,
                        backgroundColor: randomColor, borderRadius: isCircle ? '50%' : '4px',
                        animation: `confetti-fall ${Math.random() * 2 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`,
                        animationDelay: `${Math.random() * 0.3}s`,
                        }}
                    />
                    );
                })}
                </div>
            );
        };

        const MaleAvatar = ({ weight, targetWeight, initialWeight }) => {
            const progress = Math.max(0, Math.min(1, (initialWeight - weight) / (initialWeight - targetWeight)));
            const bellyRx = 32 - (18 * progress);
            const chestRx = 24 + (8 * progress);

            return (
                <div className="relative w-28 h-28 flex items-center justify-center mx-2 group">
                    <div className="absolute -top-4 whitespace-nowrap bg-red-900/90 px-3 py-1 rounded-full text-[10px] font-black text-orange-400 shadow-md border border-red-700 z-10 transition-all duration-500">
                        {progress >= 1 ? 'พร้อมลุย Bangsaen42! 🏅' : progress > 0.5 ? 'หุ่นนักวิ่งเริ่มมาแล้ว! 🏃‍♂️' : 'ซ้อมให้ยับเลยลูกพี่! ⚡'}
                    </div>
                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg transition-transform duration-300">
                        <g className="animate-breathe">
                            <line x1="42" y1="65" x2="42" y2="90" stroke="#f97316" strokeWidth="6" strokeLinecap="round" />
                            <line x1="58" y1="65" x2="58" y2="90" stroke="#f97316" strokeWidth="6" strokeLinecap="round" />
                            <path d="M 38 88 L 45 88 L 45 92 L 37 92 Z" fill="#e2e8f0" rx="2" />
                            <path d="M 55 88 L 62 88 L 62 92 L 55 92 Z" fill="#e2e8f0" rx="2" />
                            <path d="M 35 40 L 25 55" stroke="#fcd5ce" strokeWidth={6 + (2 * progress)} strokeLinecap="round" className="transition-all duration-700 ease-out" />
                            <path d="M 65 40 L 75 55" stroke="#fcd5ce" strokeWidth={6 + (2 * progress)} strokeLinecap="round" className="transition-all duration-700 ease-out" />
                            <ellipse cx="50" cy="58" rx={bellyRx} ry="22" fill="#1e293b" className="transition-all duration-700 ease-out" />
                            <path d={`M ${50 - chestRx} 40 Q 50 35 ${50 + chestRx} 40 L ${50 + bellyRx} 58 L ${50 - bellyRx} 58 Z`} fill="#334155" className="transition-all duration-700 ease-out" />
                            <path d="M 45 38 L 50 48 L 55 38" fill="none" stroke="#f97316" strokeWidth="2" strokeLinecap="round" />
                            <circle cx="50" cy="22" r="13" fill="#fcd5ce" />
                            <path d="M 37 20 Q 50 5 63 20 Q 50 15 37 20" fill="#0f172a" />
                            <path d="M 37 20 C 37 10, 63 10, 63 20" fill="#0f172a" />
                            <circle cx="45" cy="23" r="1.5" fill="#0f172a" />
                            <circle cx="55" cy="23" r="1.5" fill="#0f172a" />
                            <path d="M 46 29 Q 50 31 54 29" fill="none" stroke="#475569" strokeWidth="1.5" strokeLinecap="round" />
                            {progress >= 0.6 && (
                                <g fill="none" stroke="#f97316" strokeWidth="1" opacity={progress * 0.8}>
                                    <rect x="44" y="48" width="5" height="4" rx="1" />
                                    <rect x="51" y="48" width="5" height="4" rx="1" />
                                    <rect x="44" y="53" width="5" height="4" rx="1" />
                                    <rect x="51" y="53" width="5" height="4" rx="1" />
                                    <rect x="44" y="58" width="5" height="4" rx="1" />
                                    <rect x="51" y="58" width="5" height="4" rx="1" />
                                </g>
                            )}
                        </g>
                    </svg>
                </div>
            );
        };

        // --- หน้า Login ---
        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (name.trim()) onLogin(name.trim());
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-red-900 to-orange-900 flex items-center justify-center p-6 text-slate-200">
                    <div className="bg-slate-800 p-8 rounded-[32px] border border-slate-700 shadow-2xl w-full max-w-sm text-center">
                        <div className="text-6xl mb-4 animate-bounce">☁️</div>
                        <h1 className="text-2xl font-black text-orange-400 mb-2">เข้าสู่ระบบ Cloud</h1>
                        <p className="text-xs text-slate-400 mb-6 font-medium">พิมพ์ชื่อของคุณ ระบบจะซิงค์ข้อมูลกับฐานข้อมูล MyFamilyProject อัตโนมัติ ป้องกันข้อมูลสูญหาย</p>
                        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                            <input
                                type="text"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                placeholder="ตัวอย่าง: Peerapong"
                                className="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl px-4 py-3 text-sm font-bold text-slate-200 focus:outline-none focus:border-orange-500 transition-colors"
                            />
                            <button type="submit" className="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-black text-sm py-3.5 rounded-2xl shadow-lg shadow-orange-900/50 active:scale-95 transition-transform">
                                โหลดข้อมูล 🚀
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- หน้า Dashboard หลัก ที่ผูกกับ Firestore ---
        const Dashboard = ({ user, profileName, onLogout }) => {
            const [loadingData, setLoadingData] = useState(true);
            const [activeTab, setActiveTab] = useState('tracker'); 
            const [showConfetti, setShowConfetti] = useState(false);
            
            // ข้อมูลหลักจาก Cloud
            const [weight, setWeight] = useState(94.0);
            const [allRecords, setAllRecords] = useState({}); // ประวัติย้อนหลัง
            
            // ข้อมูลรายวันจาก Cloud
            const defaultDailyData = {
                trainingType: 'easy',
                water: 0,
                breakfastDone: false,
                lunchDone: false,
                snackDone: false,
                dinnerDone: false,
                exerciseChecks: [false, false, false, false],
                fastingSuccess: false
            };
            const [dailyData, setDailyData] = useState(defaultDailyData);

            const dateString = new Date().toDateString(); 
            
            // ระบุ Path ของเอกสารบน Cloud (6 segments)
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profiles', profileName);

            // ดึงข้อมูล Real-time จาก Cloud
            useEffect(() => {
                if (!user) return;

                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.weight) setWeight(data.weight);
                        if (data.records) setAllRecords(data.records);
                        
                        if (data.records && data.records[dateString]) {
                            setDailyData(data.records[dateString]);
                        } else {
                            setDailyData(defaultDailyData);
                        }
                    } else {
                        setDoc(docRef, { weight: 94.0, records: {} }, { merge: true });
                    }
                    setLoadingData(false);
                }, (error) => {
                    console.error("Cloud connection error", error);
                    setLoadingData(false);
                });

                return () => unsubscribe();
            }, [user.uid, profileName, dateString]);

            // ฟังก์ชันอัปเดตข้อมูลขึ้น Cloud อัตโนมัติ
            const updateDaily = (key, value) => {
                const newData = { ...dailyData, [key]: value };
                setDailyData(newData); 
                setDoc(docRef, { records: { [dateString]: newData } }, { merge: true });
            };

            const updateWeightToCloud = (newWeight) => {
                setWeight(newWeight);
                setDoc(docRef, { weight: newWeight }, { merge: true });
            };

            // เป้าหมายพื้นฐาน
            const targetWeight = 80.0;
            const initialWeight = 94.0;
            const todayOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const todayStr = new Date().toLocaleDateString('th-TH', todayOptions);

            const planStartDate = new Date(2026, 5, 1); // 1 มิ.ย. 2026
            const diffTime = new Date().getTime() - planStartDate.getTime();
            const diffDays = Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1); 
            const totalDays = 90; 
            const overallProgress = Math.min(Math.round((diffDays / totalDays) * 100), 100);

            // --- ระบบตารางซ้อมอัจฉริยะ ---
            const getTrainingConfig = (type) => {
                switch(type) {
                case 'rest':
                    return {
                        id: 'rest', icon: '💤', color: 'blue', title: 'วันพักฟื้น (Rest & Recovery)',
                        desc: 'เน้นโปรตีนซ่อมแซมกล้ามเนื้อ ลดคาร์บเพราะไม่ได้ใช้พลังงานหนัก',
                        water: 10,
                        meals: { breakfast: 'ไข่ต้ม 3 ฟอง + นมโปรตีนสูง', lunch: 'เกาเหลาไก่ฉีก', snack: 'ถั่วแระญี่ปุ่น', dinner: 'สเต็กเนื้อ/ไก่ + ผักย่าง' },
                        exercises: [
                            { title: 'Foam Rolling (นวดกล้ามเนื้อ)', focus: 'น่องและหน้าขา', detail: 'กลิ้งจุดละ 1-2 นาที คลายกรดแลคติก' },
                            { title: 'Cat-Cow Stretch', focus: 'กระดูกสันหลัง', detail: 'แอ่นและโก่งหลังช้าๆ 15 ครั้ง คลายปวดหลัง' },
                            { title: 'Child\'s Pose', focus: 'หลังล่างและไหล่', detail: 'หมอบกราบเหยียดแขนสุด ค้างไว้ 40 วินาที' },
                            { title: 'Pigeon Pose', focus: 'สะโพก/สลักเพชร', detail: 'พับขาด้านหน้า ค้างไว้ข้างละ 30 วินาที' }
                        ]
                    };
                case 'speed':
                    return {
                        id: 'speed', icon: '⚡', color: 'orange', title: 'ซ้อมความเร็ว (Speed / Interval)',
                        desc: 'เน้นคาร์บย่อยง่ายก่อนซ้อม เพื่อให้มีแรงระเบิดพลังงาน',
                        water: 12,
                        meals: { breakfast: 'ขนมปังโฮลวีตทาเนยถั่ว', lunch: 'ข้าวกล้อง 1.5 ทัพพี + กะเพราไก่', snack: 'Energy Gel', dinner: 'ข้าว 1 ทัพพี + ปลาเผา' },
                        exercises: [
                            { title: 'Push-up (วิดพื้น)', focus: 'อก ไหล่ แขน', detail: 'ทำ 3 เซต เซตละ 10-15 ครั้ง (คุกเข่าได้)' },
                            { title: 'Forward Lunges', focus: 'ต้นขาด้านหน้า', detail: 'ก้าวสลับซ้ายขวา 3 เซต เซตละ 10 ครั้ง/ข้าง' },
                            { title: 'Bird-Dog', focus: 'แกนกลางและหลัง', detail: 'ยืดแขนสลับขา 3 เซต เซตละ 15 ครั้ง/ข้าง' },
                            { title: 'Mountain Climber', focus: 'หน้าท้อง/คาร์ดิโอ', detail: 'แทงเข่าสลับเร็วๆ 3 เซต เซตละ 30 วินาที' }
                        ]
                    };
                case 'long':
                    return {
                        id: 'long', icon: '🔥', color: 'red', title: 'วิ่งยาว (Long Run)',
                        desc: 'โหลดคาร์บล่วงหน้า ดื่มน้ำให้เยอะ และให้รางวัลตัวเองหลังซ้อม!',
                        water: 15,
                        meals: { breakfast: 'โหลดคาร์บ: ข้าวโอ๊ต/ขนมปังแยม', lunch: 'ก๋วยเตี๋ยว 1-2 ชาม', snack: 'แตงโม/เกลือแร่', dinner: 'หมูกระทะ/ชาบู' },
                        exercises: [
                            { title: 'Quad Stretch', focus: 'หน้าขา', detail: 'ยืนพับขาไปด้านหลัง ค้างไว้ข้างละ 30 วินาที' },
                            { title: 'Hamstring Stretch', focus: 'หลังขา', detail: 'ก้มแตะสลับปลายเท้า ค้างไว้ข้างละ 30 วินาที' },
                            { title: 'นวดคลายฝ่าเท้า', focus: 'ฝ่าเท้า (Plantar)', detail: 'ใช้ลูกเทนนิสเหยียบคลึงเบาๆ ข้างละ 2 นาที' },
                            { title: 'Legs Up the Wall', focus: 'ลดบวม/คลายเส้น', detail: 'นอนหงายยกขาพาดกำแพง 10-15 นาที' }
                        ]
                    };
                case 'easy':
                default:
                    return {
                        id: 'easy', icon: '🏃‍♂️', color: 'emerald', title: 'วิ่งจ๊อกกิ้ง (Easy Run)',
                        desc: 'กินอาหารตามปกติ คุมแคลอรีเพื่อลดไขมัน',
                        water: 12,
                        meals: { breakfast: 'แซนวิชโฮลวีตไข่ต้ม', lunch: 'ข้าวกล้อง 1.5 ทัพพี + อกไก่ย่าง', snack: 'กล้วยหอม 1 ลูก', dinner: 'สเต็กปลาแซลมอน' },
                        exercises: [
                            { title: 'Plank (แพลงก์)', focus: 'แกนกลางลำตัว', detail: 'เกร็งหน้าท้อง 3 เซต เซตละ 40 วินาที' },
                            { title: 'Bodyweight Squat', focus: 'ต้นขาและก้น', detail: 'ลงช้าๆ ขึ้นเร็ว 3 เซต เซตละ 15 ครั้ง' },
                            { title: 'Glute Bridge', focus: 'สะโพก/หลังล่าง', detail: 'นอนหงายยกสะโพกเกร็งก้น 3 เซต เซตละ 15 ครั้ง' },
                            { title: 'Calf Raises', focus: 'น่องและข้อเท้า', detail: 'ยืนเขย่งปลายเท้า 3 เซต เซตละ 20 ครั้ง' }
                        ]
                    };
                }
            };

            const currentConfig = getTrainingConfig(dailyData.trainingType);
            const targetWater = currentConfig.water; // โหลดตัวเลขน้ำตามโหมดซ้อม

            // --- ฟีเจอร์ใหม่: ระบบพับเก็บอัตโนมัติ (Auto-Collapse) ---
            const [mealsOpen, setMealsOpen] = useState(true);
            const [waterOpen, setWaterOpen] = useState(true);
            const [exOpen, setExOpen] = useState(true);

            useEffect(() => {
                const allDone = dailyData.breakfastDone && dailyData.lunchDone && dailyData.snackDone && dailyData.dinnerDone;
                setMealsOpen(!allDone);
            }, [dailyData.breakfastDone, dailyData.lunchDone, dailyData.snackDone, dailyData.dinnerDone]);

            useEffect(() => {
                setWaterOpen(dailyData.water < currentConfig.water);
            }, [dailyData.water, currentConfig.water]);

            useEffect(() => {
                const completedEx = dailyData.exerciseChecks.filter(Boolean).length;
                setExOpen(completedEx < currentConfig.exercises.length);
            }, [dailyData.exerciseChecks, currentConfig.exercises.length]);

            // --- ฟีเจอร์ใหม่: คำนวณคะแนนย้อนหลัง ---
            const computeScoreForRecord = (rec) => {
                if (!rec) return 0;
                const config = getTrainingConfig(rec.trainingType || 'easy');
                let s = 0;
                if (rec.breakfastDone) s += 10;
                if (rec.lunchDone) s += 10;
                if (rec.snackDone) s += 10;
                if (rec.dinnerDone) s += 10;
                if (rec.water >= config.water) s += 20;
                const exCount = (rec.exerciseChecks || []).filter(Boolean).length;
                s += (exCount / config.exercises.length) * 20;
                if (rec.fastingSuccess) s += 20;
                return Math.min(Math.round(s), 100);
            };

            const last7Days = Array.from({length: 7}, (_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - 6 + i);
                return d.toDateString();
            });

            // คำนวณคะแนนรวมวันนี้
            let dailyScore = 0;
            if (dailyData.breakfastDone) dailyScore += 10;
            if (dailyData.lunchDone) dailyScore += 10;
            if (dailyData.snackDone) dailyScore += 10;
            if (dailyData.dinnerDone) dailyScore += 10;
            if (dailyData.water >= currentConfig.water) dailyScore += 20;
            
            const completedExercises = dailyData.exerciseChecks.filter(Boolean).length;
            dailyScore += (completedExercises / currentConfig.exercises.length) * 20;
            if (dailyData.fastingSuccess) dailyScore += 20;
            dailyScore = Math.min(Math.round(dailyScore), 100);

            useEffect(() => {
                if (dailyScore === 100) {
                    setShowConfetti(true);
                    const timer = setTimeout(() => setShowConfetti(false), 5000);
                    return () => clearTimeout(timer);
                } else setShowConfetti(false);
            }, [dailyScore]);

            const getMotivationalMessage = () => {
                if (dailyScore === 100) return "โคตรสุด! ภารกิจซ้อมวันนี้เคลียร์ 100% ⚡";
                if (dailyScore >= 70) return "อีกนิดเดียวลูกพี่ อัดให้เต็มร้อย! 💪";
                if (dailyScore >= 40) return "เครื่องกำลังร้อน ลุยต่ออย่าแผ่ว! 🏃‍♂️";
                return "พร้อมผูกเชือกรองเท้าออกไปซ้อมรึยัง? 🔥";
            };

            const rewardsList = [
                "เบอร์เกอร์เนื้อ/หมู (ชิ้นเด็ดเติมคาร์บ) 1 ชิ้น", "เบียร์เย็นๆ 1 กระป๋อง (ฮีลใจหลังซ้อม Long Run)", "ไก่ทอด Air-fryer (ไร้น้ำมัน) ฟินๆ 3 ชิ้น",
                "สเต็กเนื้อสันใน (Tenderloin) ย่างหอมๆ เติมโปรตีน", "ซูชิแซลมอนเซ็ตใหญ่ (ดีต่อกล้ามเนื้อ)",
                "ขนมปังซาวร์โด (Sourdough) ปิ้งทาเนยถั่ว", "หมูกระทะ/ชาบู (เน้นเนื้อไม่ติดมัน ทานฉลองกับทีม)"
            ];
            const todayReward = rewardsList[diffDays % rewardsList.length];

            const waterSchedule = [
                { time: '06:00 - 08:00', desc: 'หลังตื่นนอน (กระตุ้นระบบเผาผลาญ)', amount: 2, ml: 500 },

                                    </div>

                                        <span className="text-slate-400 text-xs">{mealsOpen ? '🔽 พับเก็บ' : '▶️ เปิดดู'}</span>

                                    <div className="grid gap-3 mt-4 animation-fade-in">

                                    <div className="relative z-10">

                                                    {waterSchedule.map((item, idx) => (
                                                        <div key={idx} className="flex items-center justify-between bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">

                                                                <span className="text-[10px] font-black text-blue-400 w-max bg-blue-900/30 px-2 py-0.5 rounded-md">{item.time}</span>

                                        )}

                                                        <p className={`text-[11px] mt-1.5 font-medium leading-snug ${isDone ? 'text-slate-600' : 'text-slate-400'}`}>

                                                </div>
                                                <div className={`w-7 h-7 shrink-0 rounded-full border-2 flex items-center justify-center transition-colors ${isDone ? 'border-cyan-500 bg-cyan-500' : 'border-slate-600 bg-slate-900'}`}>

                                            {dailyData.fastingSuccess && <span className="text-white text-[10px] font-bold">✓</span>}
                                        </div>
                                    </div>
                                    <div>
                                        <h3 className={`font-extrabold text-sm ${dailyData.fastingSuccess ? 'text-blue-400' : 'text-slate-200'}`}>งดมื้อดึก (IF)</h3>

                                </section>
                            </>
                        ) : activeTab === 'plan' ? (
                            <div className="space-y-6 pb-10 animation-fade-in">
                                <section className="bg-slate-800 rounded-[24px] p-6 shadow-lg border border-slate-700">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="font-extrabold text-lg text-white flex items-center gap-2">🍽️ ตารางเสบียงนักวิ่ง</h2>
                                    </div>
                                    <div className="space-y-4">
                                        {[
                                            { meal: 'มื้อเช้า', desc: currentConfig.meals.breakfast },
                                            { meal: 'มื้อเที่ยง', desc: currentConfig.meals.lunch },
                                            { meal: 'มื้อว่าง', desc: currentConfig.meals.snack },
                                            { meal: 'มื้อเย็น', desc: currentConfig.meals.dinner }
                                        ].map((item, idx) => (
                                            <div key={idx} className="bg-slate-900/50 p-4 rounded-[16px] border border-slate-700">
                                                <h3 className="font-extrabold text-orange-400 text-sm mb-1">{item.meal}</h3>
                                                <p className="text-sm font-medium text-slate-300 leading-snug">{item.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-5 p-4 bg-orange-900/20 rounded-[16px] text-xs font-medium text-orange-300 flex items-start gap-3 border border-orange-800/50 leading-relaxed">
                                        <span className="text-lg">💡</span>
                                        <p>วันไหนซ้อม Long Run (วิ่งยาว) แนะนำให้โหลดคาร์โบไฮเดรตล่วงหน้า 1-2 วันนะครับ จะได้มีแรงฮึดจนจบ!</p>
                                    </div>
                                </section>

                                <section className="bg-slate-800 rounded-[24px] p-6 shadow-lg border border-slate-700 mb-10">
                                    <div className="mb-5">
                                        <h2 className="font-black text-lg text-white flex items-center gap-2 tracking-wide uppercase">🏃‍♂️ แผนการฝึกซ้อมเสริม</h2>
                                        <p className="text-[11px] font-bold text-orange-500 mt-1 uppercase tracking-widest">{currentConfig.title}</p>
                                    </div>
                                    <div className="space-y-3">
                                        {currentConfig.exercises.map((ex, idx) => (
                                            <div key={idx} className="flex items-start gap-3 bg-slate-900 p-4 rounded-[16px] border border-slate-700">
                                                <div className="w-8 h-8 shrink-0 rounded-full bg-orange-900/50 flex items-center justify-center text-sm font-black text-orange-400 border border-orange-700/50 mt-0.5">
                                                    {idx + 1}
                                                </div>
                                                <div>
                                                    <span className="text-sm font-bold text-slate-200 leading-relaxed block">{ex.title}</span>
                                                    <span className="text-[11px] text-slate-400 block mt-1"><strong className="text-orange-400">โฟกัส:</strong> {ex.focus} — {ex.detail}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-5 p-4 bg-blue-900/20 rounded-[16px] text-xs font-bold text-blue-300 flex items-start gap-3 border border-blue-800/30 leading-relaxed">
                                        <span className="text-lg animate-pulse">📍</span>
                                        <p>อย่าลืมกดปุ่ม <strong>"ดูตารางซ้อมมาราธอนทีม"</strong> ด้านบนสุด เพื่อเช็กระยะวิ่งหลักที่ต้องเก็บในแต่ละวันจากโค้ชของคุณนะครับ!</p>
                                    </div>
                                </section>
                            </div>
                        ) : activeTab === 'stats' ? (
                            <div className="space-y-6 pb-10 animation-fade-in">
                                <section className="bg-slate-800 rounded-[24px] p-6 shadow-lg border border-slate-700">
                                    <h2 className="font-black text-lg text-white mb-2 flex items-center gap-2">📊 สถิติพลังงาน 7 วันย้อนหลัง</h2>
                                    <p className="text-xs text-slate-400 mb-6">แถบกราฟแสดงคะแนนความสำเร็จของแต่ละวัน</p>
                                    
                                    <div className="flex items-end justify-between h-48 gap-2 mt-4 pt-4 border-t border-slate-700">
                                        {last7Days.map((dateStr, i) => {
                                            const rec = allRecords[dateStr];
                                            const score = computeScoreForRecord(rec);
                                            const dayObj = new Date(dateStr);
                                            const dayName = dayObj.toLocaleDateString('th-TH', {weekday: 'short'});
                                            const isToday = dateStr === dateString;
                                            
                                            // ถ้าเป็นวันนี้ ให้ใช้ dailyScore ที่คำนวณสดๆ แทน
                                            const finalScore = isToday ? dailyScore : score;
                                            
                                            return (
                                                <div key={dateStr} className="flex flex-col items-center flex-1 gap-2 h-full">
                                                    <span className="text-[10px] font-bold text-orange-400">{finalScore}%</span>
                                                    <div className="w-full bg-slate-900 rounded-t-xl relative flex items-end justify-center h-full border border-slate-700 overflow-hidden">
                                                        <div className={`w-full rounded-t-xl transition-all duration-1000 ${finalScore === 100 ? 'bg-gradient-to-t from-red-600 to-orange-400' : 'bg-gradient-to-t from-slate-600 to-slate-500'}`} style={{height: `${finalScore}%`}}></div>
                                                    </div>
                                                    <span className={`text-[10px] ${isToday ? 'font-black text-white' : 'text-slate-400'}`}>{isToday ? 'วันนี้' : dayName}</span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </section>

                                <section className="bg-slate-800 rounded-[24px] p-6 shadow-lg border border-slate-700">
                                    <h2 className="font-black text-sm text-slate-300 uppercase tracking-wide mb-4">🏆 สรุปภาพรวม</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-900 p-4 rounded-[16px] border border-slate-700 text-center">
                                            <p className="text-[10px] text-slate-400 font-bold mb-1">น้ำหนักปัจจุบัน</p>
                                            <p className="text-2xl font-black text-white">{weight.toFixed(1)} <span className="text-xs font-normal text-slate-500">กก.</span></p>
                                        </div>
                                        <div className="bg-slate-900 p-4 rounded-[16px] border border-slate-700 text-center">
                                            <p className="text-[10px] text-slate-400 font-bold mb-1">เป้าหมายลดอีก</p>
                                            <p className="text-2xl font-black text-orange-400">{Math.max(0, weight - targetWeight).toFixed(1)} <span className="text-xs font-normal text-slate-500">กก.</span></p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        ) : null}
                    </main>
                </div>
            );
        };

        // --- Container หลักและเชื่อมต่อระบบ Auth ---
        const MainContainer = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(() => window.localStorage.getItem('p80_current_profile'));

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth error", error);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = (name) => {
                setCurrentUser(name);
                window.localStorage.setItem('p80_current_profile', name);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                window.localStorage.removeItem('p80_current_profile');
            };

            if (authLoading) return <div className="text-white text-center mt-20 text-lg">กำลังเชื่อมต่อฐานข้อมูล Cloud... ☁️</div>;
            if (!user || !currentUser) return <LoginScreen onLogin={handleLogin} />;

            return <Dashboard user={user} profileName={currentUser} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainContainer />);
    </script>
</body>
</html>
