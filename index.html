    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #09090b; }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes breathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.02) translateY(-1px); } }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; transform-origin: bottom; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .gauge-arc { stroke-dasharray: 126; stroke-dashoffset: 126; transition: stroke-dashoffset 1.5s ease-out; }
        
        /* Original Avatar Animations */
        @keyframes sway { 0%, 100% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-3px); } }
        .anim-sway { animation: sway 4s ease-in-out infinite; }
        .anim-float { animation: float 2s ease-in-out infinite; }

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // --- 1. CONFIG & FIREBASE ---
        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) return JSON.parse(__firebase_config);
            return {
                apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
                authDomain: "myfamilyproject-ecff4.firebaseapp.com",
                projectId: "myfamilyproject-ecff4",
                storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
                messagingSenderId: "714527535272",
                appId: "1:714527535272:web:fefa9679e822d31e52529d"
            };
        };

        const app = initializeApp(getFirebaseConfig());
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'project80_v9_app';

        // --- 2. HELPER FUNCTIONS & LOGIC ---
        const safeStorage = {
            getItem: (key) => { try { return window.localStorage.getItem(key); } catch(e) { return null; } },
            setItem: (key, val) => { try { window.localStorage.setItem(key, val); } catch(e) {} },
            removeItem: (key) => { try { window.localStorage.removeItem(key); } catch(e) {} }
        };

        const parsePace = (p) => {
            if(!p) return Infinity;
            const pt = p.split(':');
            return pt.length === 2 ? parseInt(pt[0])*60 + parseInt(pt[1]) : Infinity;
        };

        const formatPace = (secs) => {
            if (secs === Infinity) return '--:--';
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        };

        const generateSmartSchedule = (availObj, longDay) => {
            let newSched = { 0:'rest', 1:'rest', 2:'rest', 3:'rest', 4:'rest', 5:'rest', 6:'rest' };
            let trainingDays = [];
            Object.keys(availObj).forEach(k => { if (availObj[k]) trainingDays.push(Number(k)); });
            if (trainingDays.length === 0) return newSched;

            if (trainingDays.includes(Number(longDay))) { newSched[longDay] = 'long'; } 
            else { newSched[trainingDays[0]] = 'long'; longDay = trainingDays[0]; }

            if (trainingDays.length > 1) {
                let speedDay = -1, maxDist = -1;
                trainingDays.forEach(day => {
                    if (day !== Number(longDay)) {
                        let dist = Math.abs(day - Number(longDay));
                        if (dist > 3) dist = 7 - dist; 
                        if (dist > maxDist) { maxDist = dist; speedDay = day; }
                    }
                });
                if (speedDay !== -1) newSched[speedDay] = 'speed';
            }
            trainingDays.forEach(day => { if (newSched[day] === 'rest') newSched[day] = 'easy'; });
            return newSched;
        };

        const calcPredictor = (baseSecs, baseDist, targetDist) => {
            const s = (baseSecs) * Math.pow(targetDist/baseDist, 1.06);
            const hrs = Math.floor(s/3600), mins = Math.floor((s%3600)/60), secs = Math.floor(s%60);
            return { s, str: `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}` };
        };

        const getHrZone = (min, max, age, rhr) => {
            const maxHr = 220 - (age||35);
            const hrr = maxHr - (rhr||60);
            return `${Math.round(hrr*min)+Number(rhr||60)}-${Math.round(hrr*max)+Number(rhr||60)} bpm`;
        };

        const generateFeedback = (dist, pace, hr, targetPaceStr) => {
            if(!pace || pace === '0:00' || !targetPaceStr || targetPaceStr === '-') return "บันทึกข้อมูลสำเร็จ! รักษาวินัยการซ้อมได้ดีเยี่ยมครับ 🏃‍♂️";
            const pSecs = parsePace(pace);
            const tSecsArr = targetPaceStr.split(' - ').map(parsePace);
            if(tSecsArr.length >= 1 && tSecsArr[0] !== Infinity) {
                const minT = Math.min(...tSecsArr);
                const maxT = Math.max(...tSecsArr);
                if(pSecs < minT - 15) return "วิ่งเร็วกว่าเป้าหมายที่ตั้งไว้! ⚡ พรุ่งนี้อย่าลืมยืดเหยียดเยอะๆ เพื่อป้องกันอาการล้าสะสมนะครับ";
                if(pSecs > maxT + 15) return "เพซวันนี้สบายๆ ช้ากว่าเป้านิดหน่อย แต่ช่วยสร้าง Base Endurance ความอึดได้ดีครับ 🐢";
                return "เพอร์เฟกต์! 🎯 ลูกพี่คุมเพซได้ตรงตามแผนเป๊ะๆ ร่างกายกำลังพัฒนาไปถูกทางครับ";
            }
            return "เยี่ยมมากครับ! เก็บสะสมไมล์ไปเรื่อยๆ ความฟิตจะตามมาเอง 🏆";
        };

        const calcCondition = (hr, pace) => {
            if(!hr || !pace) return "+0 (ปกติ)";
            const pSecs = parsePace(pace);
            const hrNum = Number(hr);
            if(hrNum < 140 && pSecs < 420) return "+3 (ฟิตมาก!)";
            if(hrNum < 150 && pSecs < 450) return "+1 (ร่างกายตอบสนองดี)";
            if(hrNum > 165 && pSecs > 480) return "-2 (มีอาการล้า / พักผ่อนน้อย)";
            return "+0 (ปกติ ทรงตัว)";
        };

        const getDayConfig = (todayObj, weekIdx, isRace, prof) => {
            const dayIndex = todayObj.getDay(); 
            const currentTargetDist = prof.targetDist || 42.195;
            const currentSchedule = prof.schedule || {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'};
            const dayType = currentSchedule[dayIndex] || 'rest';

            const vcrSpeed = (prof.vcr || 4500) / 1800; 
            const getPaceStr = (pct) => {
                const spd = vcrSpeed * (pct/100);
                if(spd<=0) return "0:00";
                const s = 1000/spd;
                return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
            };
            const pz = { ez: getPaceStr(80), lr: getPaceStr(85), tm: getPaceStr(95), in: getPaceStr(105) };

            let baseLong = 5;
            if(currentTargetDist == 42.195) baseLong = [10,12,14,10, 16,18,20,15, 22,24,26,18, 28,30,21,32, 25,35,25,30, 21,15,10, 42.195][weekIdx] || 10;
            else if(currentTargetDist == 21.1) baseLong = [5,6,7,5, 8,10,12,8, 14,16,18,10, 15,18,12,20, 15,21.1,12,15, 10,8,5, 21.1][weekIdx] || 5;
            else if(currentTargetDist == 10) baseLong = [3,4,5,3, 5,6,7,4, 6,8,9,5, 8,10,6,12, 8,10,6,8, 5,4,3, 10][weekIdx] || 3;
            else baseLong = [2,3,4,2, 3,4,5,3, 4,5,6,3, 4,6,4,7, 5,6,4,5, 3,3,2, 5][weekIdx] || 2; 

            // Basic Info
            let cfg = { id:'rest', name:'Rest Day', desc:'พักฟื้นร่างกาย ยืดเหยียด', pace:'-', hr:'-', meals:{ b: 'ข้าวโอ๊ต+กล้วยหอม / แซนวิชไข่ต้ม', l: 'ข้าว 1 ทัพพี + เนื้อสัตว์ลีน + ผัก', s: 'ถั่วแระญี่ปุ่น / โยเกิร์ต', d: 'สลัดปลา / สุกี้น้ำ (ลดแป้ง)' }, ex:['💤 พักการวิ่ง (Full Rest)','Core Plank 3 เซต','กลิ้ง Foam Roller'] };

            cfg.detailedWorkout = { warmup: [], main: '', cooldown: [] };
            cfg.aiAdvice = '';

            if(isRace) {
                cfg = { id:'long', name:`RACE DAY!`, desc:'ถึงเวลาโชว์ผลการซ้อม!', pace:'Target Pace', hr:getHrZone(0.7,0.88, prof.age, prof.rhr), meals:{b:'ขนมปังแยม+กาแฟ',l:'ฉลองหลังเข้าเส้นชัย!',s:'เกลือแร่',d:'ปาร์ตี้หมูกระทะ'}, ex:['🏃‍♂️ ลุยให้เต็มที่ ดื่มน้ำทุกจุด','แช่น้ำเย็น Recovery','ยืดเหยียดเบาๆ'] };
                cfg.detailedWorkout = { warmup: ['วอร์มอัพเบาๆ 10 นาที', 'เดินเร็ว 3 นาที'], main: `วิ่ง ${currentTargetDist}K อย่างมั่นใจ ตามแผน`, cooldown: ['เดินรับเหรียญ 10 นาที', 'แช่น้ำเย็น'] };
                cfg.aiAdvice = 'วันแข่งจริง ระวังอย่าวิ่งตามคนอื่นจนเพซพังในช่วงแรก ออกตัวช้าๆ ครับ';
            } else if(dayType === 'long') {
                cfg = { id:'long', name:'Long Run', desc:`วิ่งยาว ${baseLong} กม. เน้นความอึด`, pace:`${pz.lr} - ${pz.ez}`, hr:getHrZone(0.65,0.75, prof.age, prof.rhr), meals:{...cfg.meals, b:'โหลดคาร์บ ขนมปัง 2-3 แผ่น'}, ex:[`🏃‍♂️ วิ่งระยะ ${baseLong} กม.`,'ฝึกจิบน้ำ/กินเจลระหว่างวิ่ง','ยืดเหยียดชุดใหญ่'] };
                cfg.detailedWorkout = { warmup: ['เดินเร็ว 5 นาที', 'Drills 5 นาที'], main: `วิ่ง ${baseLong} กม. คุมโซน Z2-Z3`, cooldown: ['เดินคลายกรด 10 นาที', 'Stretching 20 วิ/ท่า'] };
                cfg.aiAdvice = 'วันวิ่งยาวสร้าง Base Endurance ไม่ต้องสนเพซ เน้นเวลาที่อยู่บนเท้าให้ครบครับ';
            } else if(dayType === 'speed') {
                cfg = { id:'speed', name:'Speed / Tempo', desc:'ฝึกความเร็วรอบขา 30-45 นาที', pace:`${pz.in} - ${pz.tm}`, hr:getHrZone(0.8,0.88, prof.age, prof.rhr), meals: cfg.meals, ex:['⚡ วิ่งคอร์ทความเร็ว','ทำ Dynamic Stretch ก่อนวิ่ง','Russian Twist 3 เซต'] };
                cfg.detailedWorkout = { warmup: ['จ๊อกกิ้ง 10-15 นาที', 'Drills ชุดใหญ่'], main: `Tempo/Interval 3-5 เซต เพซ ${cfg.pace}`, cooldown: ['จ๊อกกิ้ง 10 นาที', 'ยืดเหยียดหน้าขา'] };
                cfg.aiAdvice = 'Speed Work เพิ่ม VCR และขยับเพดาน Lactate Threshold ให้วิ่งทนขึ้น';
            } else if(dayType === 'easy') {
                cfg = { id:'easy', name:'Easy Run ชิลๆ', desc:'วิ่งสบายๆ 45-60 นาที (Base)', pace:pz.ez, hr:getHrZone(0.6,0.7, prof.age, prof.rhr), meals: cfg.meals, ex:['🏃‍♂️ วิ่ง Easy คุมหัวใจ','ทำ Drills ก่อนวิ่ง','Squats 3 เซต'] };
                cfg.detailedWorkout = { warmup: ['หมุนข้อต่อ 3 นาที', 'เดินเร็ว 3 นาที'], main: `วิ่งคุมโซน 2-3 (${cfg.pace}) พูดคุยได้ไม่หอบ`, cooldown: ['เดินช้าลงเรื่อยๆ', 'ยืดเหยียดช่วงล่าง'] };
                cfg.aiAdvice = 'Easy Run สร้างเส้นเลือดฝอยในกล้ามเนื้อ เป็นรากฐานสำคัญของการวิ่งระยะไกล';
            } else { 
                cfg.detailedWorkout = { warmup: ['ยืดเหยียดเบาๆ บนเตียง'], main: 'พักฟื้นร่างกายอย่างเต็มที่', cooldown: ['อาบน้ำอุ่น', 'Foam Roller'] };
                cfg.aiAdvice = 'การพักผ่อน (Rest) คือช่วงเวลาซ่อมแซมกล้ามเนื้อ ฝืนซ้อมทุกวันจะ Overtraining';
            }

            // Detailed Meals & Hydration
            cfg.detailedMeals = {
                b: { menu: cfg.meals.b, detail: 'คาร์บเชิงซ้อน เติมพลังงาน' },
                l: { menu: cfg.meals.l, detail: 'เน้นโปรตีนและคาร์บ' },
                s: cfg.meals.s ? { menu: cfg.meals.s, detail: 'ลดความหิวจัด ป้องกันกินมื้อเย็นเกิน' } : null,
                d: { menu: cfg.meals.d, detail: 'มื้อเบาๆ ผักและโปรตีนลีน' }
            };
            cfg.hydrationSchedule = [
                { time: "หลังตื่นนอน", amount: "1-2 แก้ว", desc: "กระตุ้นระบบขับถ่าย" },
                { time: "ระหว่างวัน", amount: "4-5 แก้ว", desc: "จิบทุกๆ 1-2 ชั่วโมง" },
                { time: "ก่อน/หลังซ้อม", amount: "1-2 แก้ว", desc: "ดื่มก่อนซ้อม 30 นาที และชดเชยหลังซ้อม" }
            ];

            return cfg;
        };

        const getTargetWater = (lifestyle) => {
            if (lifestyle === 'heavy') return 12;
            if (lifestyle === 'active') return 10;
            return 8;
        };

        // --- 3. UI COMPONENTS ---
        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 50 }).map((_, i) => (
                    <div key={i} className="absolute top-[-10%]" style={{ left: `${Math.random() * 100}%`, width: `${Math.random() * 10 + 5}px`, height: `${Math.random() * 10 + 5}px`, backgroundColor: ['#ea580c', '#f97316', '#bef264', '#fde047', '#ef4444'][Math.floor(Math.random() * 5)], borderRadius: Math.random() > 0.5 ? '50%' : '4px', animation: `confetti-fall ${Math.random() * 2 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`, animationDelay: `${Math.random() * 0.3}s` }} />
                ))}
            </div>
        );

        // SVG Avatar ออริจินัล (Original Screenshot Version)
        const OriginalAvatar = () => (
            <div className="w-[120px] h-[160px] relative anim-float flex items-end justify-center pb-4">
                <svg viewBox="0 0 100 150" className="w-full h-full drop-shadow-2xl">
                    <g transform="translate(50, 75)">
                        {/* Legs & Socks */}
                        <g className="anim-sway" transform="translate(0, -20)">
                            {/* Left Leg */}
                            <path d="M -12,40 L -15,70 L -5,70 L -2,40 Z" fill="#fcd5ce" />
                            <path d="M -15,55 L -16,75 L -4,75 L -5,55 Z" fill="#a3e635" /> {/* Green Sock */}
                            
                            {/* Right Leg */}
                            <path d="M 12,40 L 15,70 L 5,70 L 2,40 Z" fill="#fcd5ce" />
                            <path d="M 15,55 L 16,75 L 4,75 L 5,55 Z" fill="#a3e635" /> {/* Green Sock */}
                        </g>

                        {/* Arms (behind) */}
                        <path d="M -22,-10 Q -35,15 -25,45 Q -22,48 -20,45 Q -25,20 -15,-5 Z" fill="#fcd5ce" />
                        <path d="M 22,-10 Q 35,15 25,45 Q 22,48 20,45 Q 25,20 15,-5 Z" fill="#fcd5ce" />

                        {/* Body (Orange Shirt) */}
                        <path d="M -25,-15 L 25,-15 L 20,40 L -20,40 Z" fill="#f97316" />
                        {/* Number 80 Block */}
                        <rect x="-12" y="5" width="24" height="14" fill="#ffffff" rx="2" />
                        <text x="0" y="15" fontSize="10" fontWeight="900" fill="#000" textAnchor="middle">80</text>
                        {/* Shirt Sleeves */}
                        <path d="M -25,-15 L -35,5 L -25,10 Z" fill="#ea580c" />
                        <path d="M 25,-15 L 35,5 L 25,10 Z" fill="#ea580c" />

                        {/* Head & Face */}
                        {/* Pointy Hair (Dark Blue/Black) */}
                        <path d="M -20,-15 L -25,-55 L 0,-40 L 25,-55 L 20,-15 Z" fill="#0f172a" />
                        {/* Face */}
                        <circle cx="0" cy="-25" r="18" fill="#fcd5ce" />
                        
                        {/* Glasses (Orange Visor) */}
                        <rect x="-18" y="-35" width="36" height="12" rx="4" fill="#f97316" />
                        <rect x="-18" y="-35" width="36" height="4" rx="2" fill="#ea580c" />
                        
                        {/* Mouth */}
                        <circle cx="0" cy="-15" r="2.5" fill="#0f172a" />
                    </g>
                </svg>
            </div>
        );

        // --- SUB-TABS COMPONENTS ---
        const TabTracker = ({ score, daily, updateDaily, cfg, inDist, setInDist, inPace, setInPace, inHr, setInHr, saveRun, targetWater }) => (
            <div className="space-y-4">
                <section className="bg-[#1a1a1a] p-5 rounded-[20px] flex items-center justify-between border border-zinc-800">
                    <div><h2 className="text-xl font-black italic uppercase">MISSION SCORE</h2><p className="text-[10px] font-bold uppercase text-zinc-500">Daily Objective</p></div>
                    <div className="text-4xl font-black italic text-orange-500">{score}</div>
                </section>
                
                <section className="bg-[#1a1a1a] p-5 rounded-[20px] border border-zinc-800">
                    <h3 className="font-black text-xs uppercase text-orange-400 mb-4 flex items-center gap-2"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 15.546c-.523 0-1.046.151-1.5.454a2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.701 2.701 0 00-1.5-.454M9 6v2m3-2v2m3-2v2M9 3h.01M12 3h.01M15 3h.01M21 21v-7a2 2 0 00-2-2H5a2 2 0 00-2 2v7h18zm-3-9v-2a2 2 0 00-2-2H8a2 2 0 00-2 2v2h12z"></path></svg> Meals (มื้ออาหาร)</h3>
                    <div className="grid grid-cols-2 gap-3">
                        {[ {k:'b',l:'Breakfast'}, {k:'l',l:'Lunch'}, {k:'s',l:'Snack'}, {k:'d',l:'Dinner'} ].map(m => (
                            <button key={m.k} onClick={()=>updateDaily(m.k, !daily[m.k])} className={`p-4 rounded-xl text-xs font-bold uppercase transition-all ${daily[m.k] ? 'bg-orange-500 text-black shadow-[0_0_15px_rgba(249,115,22,0.2)]' : 'bg-zinc-900 text-zinc-500 border border-zinc-800'}`}>{m.l}</button>
                        ))}
                    </div>
                </section>

                <section className="bg-[#1a1a1a] p-5 rounded-[20px] border border-zinc-800 flex items-center justify-between">
                    <div><h3 className="font-black text-xs uppercase text-blue-400 flex items-center gap-2"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg> Water</h3><p className="text-[10px] text-zinc-500 font-bold uppercase mt-1">Target: {targetWater} แก้ว</p></div>
                    <div className="flex items-center gap-4">
                        <button onClick={()=>updateDaily('w', Math.max(0, daily.w-1))} className="w-10 h-10 bg-zinc-900 border border-zinc-700 rounded-xl font-black text-lg text-white">-</button>

            const [setupAvail, setSetupAvail] = useState(initialProf.schedule ? {0: initialProf.schedule[0]!=='rest', 1: initialProf.schedule[1]!=='rest', 2: initialProf.schedule[2]!=='rest', 3: initialProf.schedule[3]!=='rest', 4: initialProf.schedule[4]!=='rest', 5: initialProf.schedule[5]!=='rest', 6: initialProf.schedule[6]!=='rest'} : {0:true, 1:false, 2:true, 3:true, 4:false, 5:true, 6:false});
            const [setupLongDay, setSetupLongDay] = useState(initialProf.schedule ? Number(Object.keys(initialProf.schedule).find(key => initialProf.schedule[key] === 'long') || 0) : 0);
            
            const handleSave = () => {

                onSave({ weight: setupWeight, targetWeight: setupTarget, height: setupHeight, gender: setupGender, age: setupAge, rhr: setupRhr, vcr: setupVcr, targetDist: setupDist, schedule: smartSchedule, injury: setupInjury, lifestyle: setupLifestyle });

            const dayLabels = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];

            return (

                        <div className="space-y-6">

                                    <input type="number" value={setupWeight} onChange={e=>setSetupWeight(Number(e.target.value))} className="w-full bg-black p-3 rounded-xl text-white font-bold border border-zinc-800 text-sm" placeholder="Current KG" />
                                    <input type="number" value={setupTarget} onChange={e=>setSetupTarget(Number(e.target.value))} className="w-full bg-black p-3 rounded-xl text-white font-bold border border-zinc-800 text-sm" placeholder="Target KG" />

                                    <div className="flex gap-1">

                                        <button onClick={()=>setSetupGender('female')} className={`flex-1 rounded-xl text-xs font-bold transition-colors ${setupGender==='female' ? 'bg-orange-500 text-black' : 'bg-black border border-zinc-800 text-zinc-500'}`}>Female</button>
                                    </div>

                                    <div><label className="text-[10px] font-black text-zinc-500 uppercase">Resting HR</label><input type="number" value={setupRhr} onChange={e=>setSetupRhr(Number(e.target.value))} className="w-full bg-black p-3 rounded-xl mt-1 text-white font-bold border border-zinc-800 text-sm" /></div>
                                </div>

        // --- 4. MAIN DASHBOARD ---
        const Dashboard = ({ user, profileName, onLogout }) => {
            const displayProfileName = profileName.trim().toUpperCase();
            const safeProfileName = profileName.trim().toLowerCase();
            const localKey = `p80_v9_${safeProfileName}`; 
            
            const cached = JSON.parse(safeStorage.getItem(localKey) || 'null');
            const [loading, setLoading] = useState(!cached);
            const [activeTab, setActiveTab] = useState('tracker');
            const [dbError, setDbError] = useState(null);
            const [showConfetti, setShowConfetti] = useState(false);
            const [showSetup, setShowSetup] = useState(false);
            const [leaderboardData, setLeaderboardData] = useState([]); 

            const [prof, setProf] = useState(cached || {
                initialWeight: 90.0, weight: 90.0, targetWeight: 80.0, 
                height: 183, gender: 'male', age: 44, rhr: 60, vcr: 4500, targetDist: 42.195,
                injury: 'none', lifestyle: 'sedentary', schedule: {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'}, records: {}
            });

            const todayStr = new Date().toDateString();
            const defDaily = { w:0, b:false, l:false, s:false, d:false, ex:[false,false,false,false], rLog:false, rDist:'', rPace:'', rHr:'', aiFeedback: '', perfCondition: '', vcrUpgraded: false, newVcrVal: 0 };
            const [daily, setDaily] = useState(prof.records[todayStr] || defDaily);

            const [inDist, setInDist] = useState(daily.rDist);
            const [inPace, setInPace] = useState(daily.rPace);
            const [inHr, setInHr] = useState(daily.rHr);

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeProfileName);

            useEffect(() => {
                if(!user) return;
                const unsub = onSnapshot(docRef, snap => {
                    setDbError(null);
                    if(snap.exists()) {
                        const d = snap.data();
                        const safeD = { ...prof, ...d, records: d.records || {} };
                        setProf(safeD);
                        if (!d.initialWeight || !d.vcr) setShowSetup(true);
                        
                        if(safeD.records && safeD.records[todayStr]) {
                            setDaily(safeD.records[todayStr]); setInDist(safeD.records[todayStr].rDist || ''); setInPace(safeD.records[todayStr].rPace || ''); setInHr(safeD.records[todayStr].rHr || '');
                        } else { setDaily(defDaily); }
                        safeStorage.setItem(localKey, JSON.stringify(safeD));
                    } else { setShowSetup(true); }
                    setLoading(false);
                }, err => { setDbError("Offline Mode"); setLoading(false); });

                const boardRef = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                const unsubBoard = onSnapshot(boardRef, snap => {
                    let arr = [];
                    const last7 = Array.from({length:7}, (_,i) => { let d = new Date(); d.setDate(d.getDate()-6+i); return d.toDateString(); });
                    snap.forEach(docSnap => {
                        const data = docSnap.data(); const userName = docSnap.id;
                        let wKm = 0, tKm = 0;
                        if(data.records) {
                            last7.forEach(dt => { if(data.records[dt]?.rLog) wKm += Number(data.records[dt].rDist)||0; });
                            Object.values(data.records).forEach(r => { if(r.rLog) tKm += Number(r.rDist)||0; });
                        }
                        arr.push({ name: userName.toUpperCase(), wKm, tKm });
                    });
                    arr.sort((a, b) => b.wKm - a.wKm);
                    setLeaderboardData(arr);
                }, err => console.log("Leaderboard offline mode"));

                return () => { unsub(); unsubBoard(); };
            }, [user]);

            const handleSaveSetup = (newConfig) => {
                const data = { ...prof, ...newConfig };
                if(!prof.initialWeight) data.initialWeight = newConfig.weight; 
                setProf(data); safeStorage.setItem(localKey, JSON.stringify(data)); setDoc(docRef, data, {merge:true});
                setShowSetup(false);
            };
            const updateDaily = (key, val) => {
                const nd = {...daily, [key]:val}; setDaily(nd); const nProf = {...prof, records: {...prof.records, [todayStr]: nd}}; setProf(nProf);
                safeStorage.setItem(localKey, JSON.stringify(nProf)); setDoc(docRef, { records: { [todayStr]: nd } }, {merge:true});
            };
            const updateWeight = (amt) => {
                const w = Number((prof.weight + amt).toFixed(1)); if(w<30 || w>200) return;
                const nProf = {...prof, weight: w}; setProf(nProf); safeStorage.setItem(localKey, JSON.stringify(nProf)); setDoc(docRef, { weight: w }, {merge:true});
            };

            // Calculate Progress & Data
            const todayObj = new Date();
            const raceDate = new Date(2026, 10, 15);
            const planStart = new Date(2026, 5, 1);
            const totalDays = Math.ceil((raceDate - planStart)/(1000*3600*24));
            let diffDays = Math.ceil((todayObj - planStart)/(1000*3600*24));
            if(diffDays < 0) diffDays = 0; if(diffDays > totalDays) diffDays = totalDays;
            const weekIdx = diffDays > 0 ? Math.min(23, Math.ceil(diffDays/7)-1) : 0;
            const isRace = diffDays === totalDays;
            const marathonPercent = Math.round((diffDays / totalDays) * 100);

            // Phase String Logic
            let phaseStr = "BASE PHASE (สร้างฐานความฟิต)";
            if (weekIdx >= 8 && weekIdx < 16) phaseStr = "BUILD PHASE (เพิ่มความเข้มข้น)";
            else if (weekIdx >= 16 && weekIdx < 21) phaseStr = "PEAK PHASE (รีดศักยภาพสูงสุด)";
            else if (weekIdx >= 21) phaseStr = "TAPER PHASE (พักฟื้นก่อนแข่ง)";

            let tDist = 0, tSecs = 0, f5k = Infinity, f10k = Infinity, longestRun = 0;
            Object.values(prof.records).forEach(r => {
                if(r.rLog && r.rDist && r.rPace) {
                    const d = Number(r.rDist), s = parsePace(r.rPace);
                    if(!isNaN(d) && isFinite(s)) {
                        tDist += d; tSecs += (s*d);
                        if(d>=5 && s<f5k) f5k = s; if(d>=10 && s<f10k) f10k = s;
                        if(d > longestRun) longestRun = d; 
                    }
                }
            });

            const cfg = getDayConfig(todayObj, weekIdx, isRace, prof);

            const saveRun = () => {
                const runPaceSecs = parsePace(inPace); const distNum = parseFloat(inDist);
                let currentVcr = prof.vcr || 4500; let vcrUpgraded = false;
                if (runPaceSecs !== Infinity && distNum >= 3) {
                    const equivalentVcr = (1800 / runPaceSecs) * 1000;
                    if (equivalentVcr > currentVcr + 100) { currentVcr = Math.round(equivalentVcr); vcrUpgraded = true; }
                }
                const aiMsg = generateFeedback(distNum, inPace, inHr, cfg.pace);
                const condMsg = calcCondition(inHr, inPace);
                const nd = {...daily, rLog: true, rDist: inDist, rPace: inPace, rHr: inHr, aiFeedback: aiMsg, perfCondition: condMsg, vcrUpgraded, newVcrVal: currentVcr}; 
                setDaily(nd); const nProf = {...prof, vcr: currentVcr, records: {...prof.records, [todayStr]: nd}}; setProf(nProf);
                safeStorage.setItem(localKey, JSON.stringify(nProf)); setDoc(docRef, { vcr: currentVcr, records: { [todayStr]: nd } }, {merge:true});
            };

            let pTime = "NEED MORE DATA", pSource = `วิ่งสะสมระยะให้ครบ 5K`;
            const targetD = prof.targetDist || 42.195;
            if(isFinite(f10k)) { const res = calcPredictor(f10k*10, 10, targetD); pTime = res.str; pSource = "Fastest 10K"; } 
            else if(isFinite(f5k)) { const res = calcPredictor(f5k*5, 5, targetD); pTime = res.str; pSource = "Fastest 5K"; } 
            else if(tDist >= 5) { const res = calcPredictor((tSecs/tDist)*tDist, tDist, targetD); pTime = res.str; pSource = "Average Pace"; }

            let bestSpeedMin = (prof.vcr || 4500) / 30; 
            if (f5k !== Infinity) bestSpeedMin = Math.max(bestSpeedMin, 5000 / (f5k / 60));
            if (f10k !== Infinity) bestSpeedMin = Math.max(bestSpeedMin, 10000 / (f10k / 60));
            let vo2Value = ((bestSpeedMin * 0.2) + 3.5).toFixed(1); if (isNaN(vo2Value) || vo2Value <= 0) vo2Value = 0;

            const targetWater = getTargetWater(prof.lifestyle);
            let score = 0;
            if(daily.b) score+=10; if(daily.l) score+=10; if(daily.s) score+=10; if(daily.d) score+=10;
            if(daily.w >= targetWater) score+=20; else score += (daily.w / targetWater) * 20;
            score += ((daily.ex||[]).filter(Boolean).length / cfg.ex.length) * 40;
            score = Math.min(Math.round(score), 100);

            useEffect(() => { if (score === 100) { setShowConfetti(true); const timer = setTimeout(() => setShowConfetti(false), 5000); return () => clearTimeout(timer); } }, [score]);

            if (loading) return <div className="min-h-screen bg-[#09090b] flex items-center justify-center text-orange-500 font-bold tracking-widest">LOADING...</div>;

            // Navigation Tabs Config
            const navTabs = [
                { id: 'tracker', label: 'PIT STOP', icon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /> },
                { id: 'plan', label: 'PLAYBOOK', icon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /> },
                { id: 'ranking', label: 'RANKING', icon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /> },
                { id: 'stats', label: 'STATS', icon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /> }
            ];

            return (
                <div className="min-h-screen bg-[#0d0d0d] text-white p-5 pb-24 relative overflow-x-hidden font-['Prompt']">
                    {showConfetti && <Confetti />}
                    {showSetup && <SetupModal initialProf={prof} onSave={handleSaveSetup} onCancel={() => setShowSetup(false)} />}
                    
                    {/* Header: Exactly like the screenshot */}
                    <header className="flex justify-between items-start mb-6 pt-2">
                        <div>
                            <h2 className="text-lime-400 font-black text-[10px] tracking-widest uppercase mb-0.5">ROAD TO BANGSAEN42</h2>
                            <h1 className="text-4xl font-black italic uppercase tracking-tight">PROJECT <span className="text-orange-500">80</span></h1>
                            <p className="text-xs font-bold text-zinc-500 mt-2 tracking-wide">RUNNER: <span className="text-white">{displayProfileName}</span></p>
                        </div>
                        <button onClick={onLogout} className="bg-[#1a1a1a] p-3 rounded-[16px] border border-zinc-800 flex flex-col items-center justify-center gap-1.5 w-16 h-16 shrink-0 active:scale-95 transition-transform">
                            <svg className="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                            <span className="text-[8px] font-bold text-zinc-500 uppercase tracking-widest">LOG OUT</span>
                        </button>
                    </header>

                    {/* Progress Info */}
                    <div className="mb-6">
                        <div className="inline-block border border-orange-500/50 bg-orange-500/10 px-4 py-1.5 rounded-full mb-3">
                            <span className="text-orange-400 font-bold text-[11px] tracking-widest">DAY {diffDays} / {totalDays}</span>
                        </div>
                        <p className="text-lime-400 font-black text-xs uppercase tracking-wider">WEEK {weekIdx+1}/24 : {phaseStr}</p>
                    </div>

                    {/* Target Weight & Avatar Card */}
                    <div className="bg-[#1a1a1a] rounded-[24px] p-5 relative overflow-hidden mb-5 border border-zinc-800/50 min-h-[180px]">
                        <div className="flex justify-between items-start relative z-10">
                            <div>
                                <button onClick={() => setShowSetup(true)} className="flex items-center gap-1.5 mb-2 group">
                                    <span className="text-zinc-400 font-black text-[11px] tracking-widest uppercase group-hover:text-white transition-colors">TARGET WEIGHT</span>
                                    <svg className="w-3.5 h-3.5 text-zinc-500 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                </button>
                                <div className="flex items-end gap-2 border-b-2 border-zinc-700 pb-1 mb-5 w-[110px]">
                                    <span className="text-[52px] font-black italic text-white leading-none tracking-tighter">{prof.weight}</span>
                                    <span className="text-lime-400 font-bold text-sm mb-2">KG</span>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={()=>updateWeight(0.1)} className="w-[50px] h-[50px] bg-[#2a2a2a] rounded-xl text-white font-black text-2xl flex items-center justify-center active:scale-95 transition-transform">+</button>
                                    <button onClick={()=>updateWeight(-0.1)} className="w-[50px] h-[50px] bg-orange-500 rounded-xl text-black font-black text-3xl flex items-center justify-center active:scale-95 transition-transform leading-none pb-1">-</button>
                                </div>
                            </div>
                        </div>
                        {/* Config Label Top Right */}
                        <div className="absolute top-4 right-4 z-20">
                            <div className="bg-orange-500 px-3 py-1.5 rounded-full flex items-center gap-1 shadow-[0_0_15px_rgba(249,115,22,0.4)]">
                                <span className="text-black font-black text-[10px] uppercase tracking-wider">{cfg.name}</span>
                            </div>
                        </div>
                        {/* Original Avatar Placed Bottom Right */}
                        <div className="absolute bottom-[-15px] right-2 z-0">
                            <OriginalAvatar />
                        </div>
                    </div>

                    {/* Marathon Countdown Card */}
                    <div className="bg-[#1a1a1a] rounded-[24px] p-5 mb-6 border border-zinc-800/50">
                        <div className="flex justify-between items-center mb-4">
                            <span className="text-white font-black text-[11px] tracking-widest uppercase">Marathon Countdown</span>
                            <span className="text-lime-400 font-black text-xl">{marathonPercent}%</span>
                        </div>
                        <div className="h-[10px] w-full bg-black rounded-full border border-zinc-800 relative overflow-hidden">
                            <div className="absolute top-0 left-0 h-full bg-gradient-to-r from-orange-500 to-lime-400 transition-all duration-1000 ease-out" style={{width: `${marathonPercent}%`}}>
                                <div className="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow-[0_0_10px_rgba(163,230,53,0.8)] opacity-50"></div>
                            </div>
                        </div>
                    </div>

                    {/* Bottom Nav Tabs (Square-ish style as screenshot) */}
                    <nav className="flex gap-2 mb-6">
                        {navTabs.map(tab => (
                            <button key={tab.id} onClick={()=>setActiveTab(tab.id)}
                                    className={`flex-1 aspect-[4/3] flex flex-col items-center justify-center rounded-2xl gap-2 transition-all ${activeTab === tab.id ? 'bg-orange-500 text-black shadow-[0_0_15px_rgba(249,115,22,0.3)]' : 'bg-[#1a1a1a] text-zinc-500 border border-zinc-800/50'}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">{tab.icon}</svg>
                                <span className="text-[9px] font-black tracking-widest uppercase">{tab.label}</span>
                            </button>
                        ))}
                    </nav>

                    {/* Main Content Area */}
                    <main className="space-y-6">
                        {activeTab === 'tracker' && <TabTracker score={score} daily={daily} updateDaily={updateDaily} cfg={cfg} inDist={inDist} setInDist={setInDist} inPace={inPace} setInPace={setInPace} inHr={inHr} setInHr={setInHr} saveRun={saveRun} targetWater={targetWater} />}
                        {activeTab === 'plan' && <TabPlan cfg={cfg} />}
                        {activeTab === 'ranking' && <TabRanking leaderboardData={leaderboardData} />}
                        {activeTab === 'stats' && <TabStats prof={prof} vo2Value={vo2Value} tDist={tDist} pTime={pTime} pSource={pSource} fastest5kSecs={f5k} fastest10kSecs={f10k} longestRun={longestRun} />}
                    </main>
                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) return ( <div className="min-h-screen bg-[#050505] flex flex-col items-center justify-center p-6 text-center"><h2 className="text-red-500 font-black text-2xl mb-2">🚨 เกิดข้อผิดพลาด</h2><p className="text-zinc-400 text-sm mb-6">{this.state.error?.toString()}</p><button onClick={() => window.location.reload()} className="bg-orange-500 text-black font-black py-3 px-6 rounded-xl">โหลดหน้าเว็บใหม่</button></div> );
                return this.props.children;
            }
        }

        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            const handleSubmit = (e) => { e.preventDefault(); if (name.trim()) onLogin(name.trim()); };
            return (
                <div className="min-h-screen bg-[#0d0d0d] flex flex-col items-center justify-center p-6 relative overflow-hidden font-['Prompt']">
                    <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-orange-600 rounded-full blur-[100px] opacity-20"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-lime-500 rounded-full blur-[100px] opacity-10"></div>
                    
                    <div className="w-full max-w-sm bg-[#1a1a1a]/80 backdrop-blur-md p-8 rounded-[24px] border border-zinc-800 shadow-2xl z-10">
                        <div className="text-center mb-8">
                            <h2 className="text-lime-400 font-black tracking-widest text-[10px] mb-2 uppercase">ROAD TO BANGSAEN42</h2>
                            <h1 className="text-5xl font-black text-white italic uppercase tracking-tighter">PROJECT <span className="text-orange-500">80</span></h1>
                            <p className="text-zinc-400 text-[10px] font-bold tracking-widest mt-3 uppercase">Enter Runner ID</p>
                        </div>
                        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="เช่น: PEERAPONG" className="w-full bg-black border border-zinc-800 rounded-xl p-4 text-center font-bold text-white focus:border-orange-500 outline-none uppercase tracking-widest" />
                            <button type="submit" className="w-full bg-orange-500 active:bg-orange-400 text-black font-black py-4 rounded-xl uppercase tracking-widest transition-colors mt-2">Start Engine</button>
                        </form>
                    </div>
                </div>
            );
        };

        const MainApp = () => {
            const [user, setUser] = useState(null); const [authLoading, setAuthLoading] = useState(true); const [currentUser, setCurrentUser] = useState(() => safeStorage.getItem('p80_current_user_v9'));
            useEffect(() => {
                const initAuth = async () => { try { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth); } catch (error) { console.error("Auth error", error); } }; initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setAuthLoading(false); }); return () => unsubscribe();
            }, []);
            const handleLogin = (name) => { setCurrentUser(name); safeStorage.setItem('p80_current_user_v9', name); };
            const handleLogout = () => { setCurrentUser(null); safeStorage.removeItem('p80_current_user_v9'); };

            if (authLoading) return <div className="min-h-screen bg-[#0d0d0d] flex flex-col items-center justify-center"><p className="text-orange-500 font-black tracking-widest text-sm uppercase">CONNECTING...</p></div>;
            if (!user || !currentUser) return <LoginScreen onLogin={handleLogin} />;
            return <Dashboard user={user} profileName={currentUser} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><MainApp /></ErrorBoundary>);
    </script>
</body>
</html>
