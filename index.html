<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 80: Ultimate Coaching App</title>
    <meta name="theme-color" content="#09090b">
    
    <script>
        // ระบบกันแครช: ถ้าเบราว์เซอร์มีปัญหา จะโชว์แจ้งเตือนแทนจอดำ
        window.onerror = function(msg, url, lineNo) {
            document.body.innerHTML = '<div style="background:#450a0a; color:#fca5a5; padding:20px; font-family:sans-serif; height:100vh;"><h2>🚨 System Error</h2><p>' + msg + '<br/>Line: ' + lineNo + '</p><button onclick="window.location.reload()" style="padding:10px 20px; background:#ef4444; color:#000; font-weight:bold; border-radius:8px; border:none; margin-top:20px;">Refresh</button></div>';
            return false;
        };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #09090b; color: #e4e4e7; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // Offline Storage Bypass (กัน Firebase บล็อกหน้า Preview)
        const safeStorage = {
            getItem: (key) => { try { return window.localStorage.getItem(key); } catch(e) { return null; } },
            setItem: (key, val) => { try { window.localStorage.setItem(key, val); } catch(e) {} },
            removeItem: (key) => { try { window.localStorage.removeItem(key); } catch(e) {} }
        };

        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) return JSON.parse(__firebase_config);
            return {
                apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
                authDomain: "myfamilyproject-ecff4.firebaseapp.com",
                projectId: "myfamilyproject-ecff4",
                storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
                messagingSenderId: "714527535272",
                appId: "1:714527535272:web:fefa9679e822d31e52529d"
            };
        };

        const app = initializeApp(getFirebaseConfig());
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'project80_stable_app';

        // --- COMPONENTS ---

        // 🛡️ Error Boundary
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-red-950 flex flex-col items-center justify-center p-6 text-center">
                            <h2 className="text-red-500 font-black text-2xl mb-2">🚨 เกิดข้อผิดพลาด</h2>
                            <p className="text-zinc-400 text-sm mb-6">{this.state.error?.toString()}</p>
                            <button onClick={() => window.location.reload()} className="bg-red-500 text-white font-bold py-3 px-6 rounded-xl">โหลดหน้าเว็บใหม่</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            const handleSubmit = (e) => { e.preventDefault(); if (name.trim()) onLogin(name.trim()); };
            
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6">
                    <div className="w-full max-w-sm bg-zinc-900 p-8 rounded-[24px] border border-zinc-800 shadow-2xl">
                        <div className="text-center mb-8">
                            <h2 className="text-lime-400 font-black tracking-widest text-sm mb-2 uppercase">Ultimate Coaching</h2>
                            <h1 className="text-5xl font-black text-white italic uppercase">PRO <span className="text-orange-500">80</span></h1>
                        </div>
                        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="ใส่ชื่อนักวิ่ง..." className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-4 text-center font-bold focus:border-orange-500 outline-none uppercase" />
                            <button type="submit" className="w-full bg-orange-500 text-black font-black py-4 rounded-xl uppercase tracking-widest">Start Engine</button>
                        </form>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, profileName, onLogout }) => {
            const displayProfileName = profileName.trim().toUpperCase();
            const safeProfileName = profileName.trim().toLowerCase();
            const localKey = `p80_${safeProfileName}`;
            
            const cached = JSON.parse(safeStorage.getItem(localKey) || 'null');
            
            const [loading, setLoading] = useState(!cached);
            const [activeTab, setActiveTab] = useState('tracker');
            const [dbError, setDbError] = useState(null);
            
            // Profile States
            const [weight, setWeight] = useState(cached?.weight || 90);
            const [targetWeight, setTargetWeight] = useState(cached?.targetWeight || 80);
            const [targetDist, setTargetDist] = useState(cached?.targetDist || 42.195);
            const [records, setRecords] = useState(cached?.records || {});
            
            const todayStr = new Date().toDateString();
            const defDaily = { w:0, b:false, l:false, s:false, d:false, ex:[false,false,false], rLog:false, rDist:'', rPace:'' };
            const [daily, setDaily] = useState(records[todayStr] || defDaily);
            
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeProfileName);

            // Fetch Data
            useEffect(() => {
                if(!user) return;
                const unsub = onSnapshot(docRef, snap => {
                    setDbError(null);
                    if(snap.exists()) {
                        const d = snap.data();
                        setWeight(d.weight || 90);
                        setTargetWeight(d.targetWeight || 80);
                        setTargetDist(d.targetDist || 42.195);
                        setRecords(d.records || {});
                        if(d.records && d.records[todayStr]) setDaily(d.records[todayStr]);
                        safeStorage.setItem(localKey, JSON.stringify(d));
                    }
                    setLoading(false);
                }, err => { 
                    setDbError("Offline Mode"); 
                    setLoading(false); 
                });
                return () => unsub();
            }, [user]);

            // Save Data
            const updateDaily = (key, val) => {
                const nd = {...daily, [key]:val};
                setDaily(nd);
                const nRecs = {...records, [todayStr]: nd};
                setRecords(nRecs);
                
                const dataToSave = { weight, targetWeight, targetDist, records: nRecs };
                safeStorage.setItem(localKey, JSON.stringify(dataToSave));
                setDoc(docRef, { records: { [todayStr]: nd } }, {merge:true});
            };

            // Helpers & Variables (จำลองค่าชั่วคราวเพราะเวอร์ชัน Lite เราไม่ได้ใช้ Setup Page เต็มรูปแบบเพื่อกันบั๊ก)
            const goalMode = 'performance'; // จำลอง
            const lifestyle = 'sedentary'; // จำลอง
            const dayIndex = new Date().getDay(); // 0 = Sunday
            const isRace = false;

            // 💧 1. DYNAMIC HYDRATION SCHEDULE
            const targetWater = 8; // แก้ว
            const waterSchedule = [
                { time: '06:00 - 09:00', desc: 'หลังตื่นนอน (กระตุ้นระบบเผาผลาญ)', amount: Math.max(1, Math.floor(targetWater * 0.2)) },
                { time: '09:00 - 12:00', desc: 'สายถึงเที่ยง (จิบเรื่อยๆ ลดความหิว)', amount: Math.max(1, Math.ceil(targetWater * 0.3)) },
                { time: '13:00 - 16:00', desc: 'ช่วงบ่าย (เติมความสดชื่นกันง่วง)', amount: Math.max(1, Math.ceil(targetWater * 0.2)) },
                { time: '17:00 - 20:00', desc: (lifestyle === 'heavy' || dayIndex === 0) ? 'ช่วงเย็น (ชดเชยเหงื่อ + จิบเกลือแร่ 1 จิบ)' : 'ช่วงเย็น (หลังเลิกงาน/ซ้อมวิ่ง)', amount: Math.max(1, Math.ceil(targetWater * 0.2)) },
                { time: '20:00 - 22:00', desc: 'ก่อนนอน 1 ชม. (ป้องกันตะคริว)', amount: Math.max(1, targetWater - (Math.floor(targetWater*0.2) + Math.ceil(targetWater*0.3) + Math.ceil(targetWater*0.2) + Math.ceil(targetWater*0.2))) }
            ];

            // 🥗 2. DETAILED MEAL PLAN
            const getDayConfig = () => {
                let baseLong = 5;
                // เมนูอาหารปรับตาม Goal Mode พร้อมระบุเวลา
                const baseMeals = goalMode === 'performance' 
                    ? { 
                        breakfast: '⏰ 07:00 | ข้าวโอ๊ต+กล้วยหอม / ขนมปังปิ้งทาเนยถั่ว (เน้นคาร์บเป็นพลังงานซ้อม)', 
                        lunch: '⏰ 12:00 | พาสต้าไก่ / ข้าวราดแกงทั่วไป (กินให้อิ่ม มีแรงวิ่ง ไม่ต้องกลัวอ้วน)', 
                        snack: '⏰ 15:30 | Energy Bar / กล้วย 1 ลูก (เติมไกลโคเจนก่อนซ้อม)', 
                        dinner: '⏰ 19:00 | ข้าวสวย 1.5 ทัพพี + สเต็กเนื้อ/ไก่ย่าง (เน้นโปรตีนซ่อมแซมกล้ามเนื้อ)' 
                      }
                    : { 
                        breakfast: '⏰ 07:30 | แซนวิชโฮลวีตทูน่า / ไข่ต้ม 2 ฟอง + กาแฟดำ (คุมแคลอรี่เริ่มต้นวัน)', 
                        lunch: '⏰ 12:00 | ข้าวกล้อง 1 ทัพพี + อกไก่ย่าง/ปลาอบ + ผักต้ม (ลดคาร์บขัดสี)', 
                        snack: '⏰ 15:00 | ถั่วแระญี่ปุ่น / โยเกิร์ตไขมันต่ำ (แก้อยากของหวาน)', 
                        dinner: '⏰ 18:30 | สลัดผักชามใหญ่ + ไก่ฉีก / สุกี้น้ำไก่ (เน้นวิตามิน งดแป้งมื้อดึก)' 
                      };

                if(isRace) return { id:'long', name:'RACE DAY', desc:'ลุยให้เต็มที่!', pace:'Target', meals:{...baseMeals, breakfast: '⏰ 04:00 | ขนมปังแยม 2 แผ่น + กาแฟดำ (กินก่อนแข่ง 2 ชม.)', dinner: '⏰ 18:00 | ปาร์ตี้หมูกระทะฉลองชัยชนะ! 🍻'} };
                
                if(dayIndex === 0 || dayIndex === 6) return { 
                    id:'long', name:'Long Run', desc:`วิ่งยาว ${baseLong} กม. เน้นความอึด`, pace:'Zone 2-3', 
                    meals:{...baseMeals, breakfast: '⏰ 06:00 | โหลดคาร์บ: ขนมปัง 2-3 แผ่น + น้ำหวาน (เตรียมตัววิ่งยาว)'} 
                };
                
                if(dayIndex === 3) return { id:'speed', name:'Speed / Tempo', desc:'ฝึกความเร็วรอบขา 30 นาที', pace:'Zone 4', meals: baseMeals };
                if(dayIndex === 1 || dayIndex === 4) return { id:'rest', name:'Rest Day', desc:'พักฟื้นร่างกาย ยืดเหยียด', pace:'-', meals: baseMeals };
                return { id:'easy', name:'Easy Run', desc:'วิ่งสบายๆ 45 นาที', pace:'Zone 2', meals: baseMeals };
            };
            const cfg = getDayConfig();

            let score = 0;
            if(daily.b) score+=10; if(daily.l) score+=10; if(daily.s) score+=10; if(daily.d) score+=10;
            if(daily.w >= targetWater) score+=20;
            if(daily.rLog) score+=40;
            score = Math.min(score, 100);

            let predictedTime = "เก็บสถิติวิ่งเพิ่มเพื่อวิเคราะห์";
            if (targetDist == 42.195) predictedTime = "04:55:00 (Sub 5 Expected!)";

            if (loading) return <div className="min-h-screen bg-zinc-950 flex items-center justify-center text-orange-500 font-bold tracking-widest">LOADING...</div>;

            return (
                <div className="min-h-screen bg-zinc-950 text-white pb-24">
                    {/* Header */}
                    <header className="p-6 bg-zinc-900 border-b border-zinc-800">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-3xl font-black italic uppercase">PRO <span className="text-orange-500">80</span></h1>
                                <p className="text-xs font-bold text-zinc-400 mt-1">RUNNER: <span className="text-white">{displayProfileName}</span></p>
                                {dbError && <p className="text-[10px] text-red-400 mt-1">{dbError}</p>}
                            </div>
                            <button onClick={onLogout} className="bg-zinc-800 px-3 py-2 rounded-lg text-[10px] font-bold uppercase text-zinc-400">Logout</button>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="flex gap-2 p-5 pb-0">
                        {['tracker', 'plan', 'stats'].map(t => (
                            <button key={t} onClick={()=>setActiveTab(t)} className={`flex-1 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-colors ${activeTab===t ? 'bg-orange-500 text-black' : 'bg-zinc-900 text-zinc-500 border border-zinc-800'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    {/* Main Content Area */}
                    <main className="px-5 mt-6 space-y-6">
                        
                        {/* TAB: TRACKER */}
                        {activeTab === 'tracker' && (
                            <React.Fragment>
                                <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800 flex items-center justify-between">
                                    <div>
                                        <h2 className="text-2xl font-black italic uppercase text-white">SCORE</h2>
                                        <p className="text-xs text-zinc-400 font-bold uppercase">Daily Mission</p>
                                    </div>
                                    <div className="text-5xl font-black italic text-orange-500">{score}</div>
                                </section>

                                <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                                    <h3 className="font-black text-sm uppercase text-orange-400 mb-4">1. Fuel (Meals)</h3>
                                    <div className="grid grid-cols-1 gap-3">
                                        {[ {k:'b',l:'Breakfast', d: cfg.meals.breakfast}, {k:'l',l:'Lunch', d: cfg.meals.lunch}, {k:'s',l:'Snack', d: cfg.meals.snack}, {k:'d',l:'Dinner', d: cfg.meals.dinner} ].map(m => (
                                            <div key={m.k} onClick={()=>updateDaily(m.k, !daily[m.k])} className={`p-4 rounded-xl cursor-pointer transition-all border-l-4 ${daily[m.k] ? 'bg-zinc-950 border-zinc-800 opacity-60' : 'bg-zinc-800/50 border-orange-500 shadow-md'}`}>
                                                <div className="flex items-start gap-4">
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 mt-0.5 ${daily[m.k] ? 'border-lime-400 bg-lime-400 text-black' : 'border-zinc-500 text-transparent'}`}>
                                                        <span className="text-[10px] font-black">✓</span>
                                                    </div>
                                                    <div>
                                                        <h3 className={`font-black text-xs uppercase tracking-widest ${daily[m.k] ? 'text-zinc-600 line-through' : 'text-white'}`}>{m.l}</h3>
                                                        <p className={`text-xs mt-1.5 leading-relaxed font-medium ${daily[m.k] ? 'text-zinc-700' : 'text-zinc-300'}`}>{m.d}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                                    <div className="flex items-center justify-between mb-6">
                                        <div>
                                            <h3 className="font-black text-sm uppercase text-blue-400">2. Water</h3>
                                            <p className="text-xs text-zinc-500">Target: {targetWater} แก้ว</p>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <button onClick={()=>updateDaily('w', Math.max(0, daily.w-1))} className="w-12 h-12 bg-zinc-950 border border-zinc-800 rounded-full font-black text-xl">-</button>
                                            <span className="text-2xl font-black italic">{daily.w}</span>
                                            <button onClick={()=>updateDaily('w', daily.w+1)} className="w-12 h-12 bg-blue-500 text-black rounded-full font-black text-xl">+</button>
                                        </div>
                                    </div>

                                    {/* ตารางแสดงการดื่มน้ำอัจฉริยะ */}
                                    <div className="pt-5 border-t border-zinc-800/50 space-y-3">
                                        {waterSchedule.map((item, idx) => (
                                            <div key={idx} className="flex items-center justify-between bg-zinc-950 p-4 rounded-xl border border-zinc-800/50">
                                                <div className="flex flex-col gap-1.5">
                                                    <span className="text-[10px] font-black text-black bg-blue-500 px-2 py-0.5 rounded w-max uppercase">{item.time}</span>
                                                    <span className="text-xs font-bold text-zinc-400 uppercase">{item.desc}</span>
                                                </div>
                                                <div className="text-base font-black text-blue-400 italic shrink-0">{item.amount}x</div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                            </React.Fragment>
                        )}

                        {/* TAB: PLAN */}
                        {activeTab === 'plan' && (
                            <React.Fragment>
                                <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                                    <h2 className="font-black text-xl italic uppercase mb-4 text-white">Today's Playbook</h2>
                                    <div className="space-y-4">
                                        <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                                            <p className="text-[10px] text-zinc-500 font-bold uppercase">WORKOUT</p>
                                            <p className="text-lg font-black text-lime-400">{cfg.name}</p>
                                            <p className="text-sm text-zinc-400 mt-1">{cfg.desc}</p>
                                            <span className="inline-block mt-2 text-[10px] bg-zinc-800 px-2 py-1 rounded text-white font-bold">PACE: {cfg.pace}</span>
                                        </div>
                                        <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                                            <p className="text-[10px] text-zinc-500 font-bold uppercase mb-4">DETAILED NUTRITION</p>
                                            <ul className="text-sm text-zinc-300 space-y-4">
                                                <li className="border-b border-zinc-800 pb-2"><span className="text-orange-400 font-black block mb-1">BREAKFAST</span> {cfg.meals.breakfast}</li>
                                                <li className="border-b border-zinc-800 pb-2"><span className="text-orange-400 font-black block mb-1">LUNCH</span> {cfg.meals.lunch}</li>
                                                <li className="border-b border-zinc-800 pb-2"><span className="text-orange-400 font-black block mb-1">SNACK</span> {cfg.meals.snack}</li>
                                                <li><span className="text-orange-400 font-black block mb-1">DINNER</span> {cfg.meals.dinner}</li>
                                            </ul>
                                        </div>
                                    </div>
                                </section>
                            </React.Fragment>
                        )}

                        {/* TAB: STATS */}
                        {activeTab === 'stats' && (
                            <React.Fragment>
                                <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                                    <h2 className="font-black text-xl italic uppercase mb-4 text-white">Body Stats</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800 text-center">
                                            <p className="text-[10px] text-zinc-500 font-bold uppercase">Current</p>
                                            <p className="text-3xl font-black italic mt-1">{weight} <span className="text-sm text-zinc-500 not-italic">KG</span></p>
                                        </div>
                                        <div className="bg-zinc-950 p-4 rounded-xl border border-orange-500/30 text-center shadow-[0_0_15px_rgba(249,115,22,0.1)]">
                                            <p className="text-[10px] text-orange-500 font-bold uppercase">Goal</p>
                                            <p className="text-3xl font-black text-orange-400 italic mt-1">{targetWeight} <span className="text-sm text-zinc-500 not-italic">KG</span></p>
                                        </div>
                                    </div>
                                </section>
                            </React.Fragment>
                        )}
                        
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <Dashboard user={{uid:'local'}} profileName={safeStorage.getItem('p80_current_user')||'Runner'} onLogout={()=>{}} />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
