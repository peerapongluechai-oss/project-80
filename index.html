<html lang="th">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Prompt:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', 'Inter', sans-serif; background-color: #0a0a0a; color: #e4e4e7; overflow-x: hidden; }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02) translateY(-1px); } }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; transform-origin: bottom; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Suunto Design System */
        .suunto-card { background-color: #121212; border: 1px solid #27272a; border-radius: 16px; }
        .suunto-accent { color: #bef264; } /* Volt Green */
        .suunto-bg-accent { background-color: #bef264; color: #000; }
        .suunto-border-accent { border-color: #bef264; }
        .gauge-arc { stroke-dasharray: 126; stroke-dashoffset: 126; transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;
        
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
            authDomain: "myfamilyproject-ecff4.firebaseapp.com",
            projectId: "myfamilyproject-ecff4",
            storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
            messagingSenderId: "714527535272",
            appId: "1:714527535272:web:fefa9679e822d31e52529d"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'project80_github_app'; 

        // --- 2. UTILS & HELPERS ---
        const safeStorage = {
            getItem: (key) => { try { return window.localStorage.getItem(key); } catch(e) { return null; } },
            setItem: (key, val) => { try { window.localStorage.setItem(key, val); } catch(e) {} },
            removeItem: (key) => { try { window.localStorage.removeItem(key); } catch(e) {} },
            clearAll: () => { try { window.localStorage.clear(); } catch(e) {} }
        };

        const parsePace = (p) => { if(!p) return Infinity; const pt = p.split(':'); return pt.length === 2 ? parseInt(pt[0])*60 + parseInt(pt[1]) : Infinity; };
        const formatPace = (secs) => { if (secs === Infinity || isNaN(secs)) return '--:--'; const m = Math.floor(secs / 60); const s = Math.floor(secs % 60); return `${m}:${s.toString().padStart(2, '0')}`; };

        const generateSmartSchedule = (availObj, longDay) => {
            let newSched = { 0:'rest', 1:'rest', 2:'rest', 3:'rest', 4:'rest', 5:'rest', 6:'rest' };
            let trainingDays = [];
            Object.keys(availObj).forEach(k => { if (availObj[k]) trainingDays.push(Number(k)); });
            if (trainingDays.length === 0) return newSched;

            if (trainingDays.includes(Number(longDay))) { newSched[longDay] = 'long'; } 
            else { newSched[trainingDays[0]] = 'long'; longDay = trainingDays[0]; }

            if (trainingDays.length > 1) {
                let speedDay = -1, maxDist = -1;
                trainingDays.forEach(day => {
                    if (day !== Number(longDay)) {
                        let dist = Math.abs(day - Number(longDay));
                        if (dist > 3) dist = 7 - dist; 
                        if (dist > maxDist) { maxDist = dist; speedDay = day; }
                    }
                });
                if (speedDay !== -1) newSched[speedDay] = 'speed';
            }
            trainingDays.forEach(day => { if (newSched[day] === 'rest') newSched[day] = 'easy'; });
            return newSched;
        };

        const calcPredictor = (baseSecs, baseDist, targetDist) => {
            const s = (baseSecs) * Math.pow(targetDist/baseDist, 1.06);
            const hrs = Math.floor(s/3600), mins = Math.floor((s%3600)/60), secs = Math.floor(s%60);
            return { s, str: `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}` };
        };

        const getHrZone = (min, max, age, rhr) => {
            const maxHr = 220 - (age||35);
            const hrr = maxHr - (rhr||60);
            return `${Math.round(hrr*min)+Number(rhr||60)}-${Math.round(hrr*max)+Number(rhr||60)} bpm`;
        };

        const generateFeedback = (dist, pace, hr, targetPaceStr, actType = 'Run') => {
            if(!pace || pace === '0:00') return "บันทึกสถิติสำเร็จ! วินัยคือหัวใจสำคัญครับ 🏃‍♂️";
            
            // ถ้าเป็นกีฬาประเภทอื่น (ไม่ใช่การวิ่งถนน) AI จะให้คำแนะนำแบบเฉพาะเจาะจง
            if (actType === 'Trail') return "⛰️ ลุยเทรลมาใช่ไหมครับ! เพซเทรลจะช้ากว่าถนนปกติเพราะความชัน AI จะไม่นำเพซนี้ไปฉุด VCR ของคุณลง ถือว่าได้ฝึกความแข็งแรงกล้ามเนื้อและระบบหายใจแบบเต็มๆ ครับ!";
            if (actType === 'Swim') return "🏊‍♂️ ว่ายน้ำเป็นการ Cross-Training (เซฟข้อต่อ) ที่ยอดเยี่ยมตามหลักสูตรครูดินครับ! AI บันทึกสะสมไมล์ให้โดยไม่กระทบสถิติเพซวิ่งครับ";
            if (actType === 'Bike') return "🚴‍♂️ ปั่นจักรยานช่วยสลับการใช้กล้ามเนื้อและสร้าง Aerobic Base ได้ดีมาก AI บันทึกผลให้เรียบร้อยครับ!";
            if (actType === 'Other') return "🏋️‍♂️ ยอดเยี่ยมครับ! การเสริมสร้างความแข็งแรง (Strength) จะช่วยให้การวิ่งมาราธอนของคุณทนทานขึ้นครับ";

            if(!targetPaceStr || targetPaceStr === '-') return "บันทึกสถิติสำเร็จ! วินัยคือหัวใจสำคัญครับ 🏃‍♂️";
            const pSecs = parsePace(pace);
            const tSecsArr = targetPaceStr.split(' - ').map(parsePace);
            if(tSecsArr.length >= 1 && tSecsArr[0] !== Infinity) {
                const minT = Math.min(...tSecsArr);
                const maxT = Math.max(...tSecsArr);
                if(pSecs < minT - 15) return "วิ่งเร็วกว่าเป้าหมาย! ⚡ ครูดินบอกเสมอว่าซ้อมเร็วกว่ากำหนดระวังจะกรอบ ยืดเหยียดให้เยอะๆ ครับ";
                if(pSecs > maxT + 15) return "เพซช้ากว่าเป้านิดหน่อย แต่ร่างกายได้สร้างความทนทาน (Endurance) ถือว่าเยี่ยมครับ 🐢";
                return "เพอร์เฟกต์! 🎯 คุมเพซและหัวใจได้ตรงแผนเป๊ะ ร่างกายกำลังพัฒนาไปถูกทางตามหลักสูตรครับ";
            }
            return "ยอดเยี่ยมมากครับ! เก็บสะสมไมล์ไปเรื่อยๆ ความฟิตจะตามมาเอง 🏆";
        };

        const calcCondition = (hr, pace) => {
            if(!hr || !pace) return "+0 (ปกติ)";
            const pSecs = parsePace(pace);
            const hrNum = Number(hr);
            if(hrNum < 140 && pSecs < 420) return "+3 (ฟิตมาก!)";
            if(hrNum < 150 && pSecs < 450) return "+1 (ร่างกายตอบสนองดี)";
            if(hrNum > 165 && pSecs > 480) return "-2 (มีอาการล้า / พักผ่อนน้อย)";
            return "+0 (ปกติ ทรงตัว)";
        };

        // --- ระบบ AI ผสานหลักสูตรครูดิน ---
        const getDayConfig = (todayObj, weekIdx, isRace, prof) => {
            const dayIndex = todayObj.getDay(); 
            const currentTargetDist = prof.targetDist || 42.195;
            const currentSchedule = prof.schedule || {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'};
            const dayType = currentSchedule[dayIndex] || 'rest';

            const vcrSpeed = (prof.vcr || 4500) / 1800; 
            const getPaceStr = (pct) => {
                const spd = vcrSpeed * (pct/100);
                if(spd<=0) return "0:00";
                const s = 1000/spd;
                return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
            };
            
            // Pace Zones (อิงตามหลักสูตร)
            const pz = { ez: getPaceStr(75), lr: getPaceStr(80), tm: getPaceStr(90), in: getPaceStr(105) };

            // คำนวณระยะ Long Run
            let baseLong = 5;
            if(currentTargetDist == 42.195) baseLong = [10,12,14,10, 16,18,20,15, 22,24,26,18, 28,30,21,32, 25,35,25,30, 21,15,10, 42.195][weekIdx] || 10;
            else if(currentTargetDist == 21.1) baseLong = [5,6,7,5, 8,10,12,8, 14,16,18,10, 15,18,12,20, 15,21.1,12,15, 10,8,5, 21.1][weekIdx] || 5;
            else if(currentTargetDist == 10) baseLong = [3,4,5,3, 5,6,7,4, 6,8,9,5, 8,10,6,12, 8,10,6,8, 5,4,3, 10][weekIdx] || 3;
            else baseLong = [2,3,4,2, 3,4,5,3, 4,5,6,3, 4,6,4,7, 5,6,4,5, 3,3,2, 5][weekIdx] || 2; 

            // --- ฐานข้อมูลท่าซ้อมครูดิน (หมุนเวียนตามสัปดาห์) ---
            const kruDinSpeed = [
                `วิ่ง 400m x 10 เที่ยว (ความเร็ว 70-80%) สลับ เดิน 100m / Jog 100m`,
                `วิ่ง 1K x 6 เที่ยว (เร็วกว่า Pace 10K ประมาณ 10 วิ) สลับ เดิน 100m / Jog 100m`,
                `วิ่ง 800m x 6 เที่ยว (ความเร็ว 80%) สลับ เดิน 100m / Jog 100m`,
                `วิ่ง 200m สลับ Jog 100m x 15 เที่ยว (ความเร็ว 70%)`
            ];
            const kruDinEasy = [
                `วิ่งบนหญ้า หรือ ว่ายน้ำตีขาในน้ำเบาๆ 40-50 นาที (เซฟข้อต่อ)`,
                `วิ่ง Easy สบายๆ หรือ เต้นแอโรบิค 50 นาที (หรือทำท่า Drills ต่อเนื่อง)`,
                `วิ่งสบายๆ หายใจหอบเหนื่อยเบาๆ 50 นาที เน้นกายบริหาร`,
                `วิ่งขึ้นที่สูง (เนิน/สะพาน) 40 นาที สลับเดินเมื่อเหนื่อย`
            ];

            // --- เมนูอาหาร Street Food 7-11 & ร้านตามสั่ง ---
            let dynamicMeals = { b: 'ไข่ลวก 2 ฟอง + นมโปรตีนสูง / โจ๊กหมูใส่ไข่', l: 'เกาเหลาเลือดหมูข้าวเปล่า / ข้าวมันไก่ต้ม(ไม่หนัง)', s: 'ถั่วแระญี่ปุ่น 7-11 / กล้วยหอม', d: 'สุกี้น้ำไก่ / สลัดผักอกไก่ฉีก 7-11' };
            if (dayType === 'long' || dayType === 'speed' || isRace) {
                dynamicMeals = { b: 'หมูปิ้ง(มันน้อย)+ข้าวเหนียว / ซาลาเปาหมูสับ 7-11', l: 'ข้าวราดกะเพราไก่+ไข่ดาว / ผัดไท', s: 'ขนมปังโฮลวีต / เครื่องดื่มเกลือแร่', d: 'ข้าวสวย + ต้มยำปลา / ยำวุ้นเส้น' };
            }

            let cfg = { id:'rest', name:'Rest Day', desc:'พักฟื้นร่างกายตามหลักสูตร', pace:'-', hr:'-', meals: dynamicMeals, ex:['💤 พักการวิ่ง 100% (Full Rest)','Core Plank 3 เซต','กลิ้ง Foam Roller นวดกล้ามเนื้อ'], advice: 'ครูดินเน้นย้ำเสมอว่า วันพักคือส่วนสำคัญที่สุดของการซ้อม ให้ร่างกายได้ซ่อมแซมตัวเองครับ' };
            cfg.detailedWorkout = { warmup: [], main: 'พักฟื้นร่างกายอย่างเต็มที่', cooldown: [] };

            if(isRace) {
                cfg = { id:'long', name:`RACE DAY!`, desc:'ถึงเวลาโชว์ผลการซ้อม!', pace:'Target Pace', hr:getHrZone(0.7,0.88, prof.age, prof.rhr), meals:dynamicMeals, ex:['🏃‍♂️ ลุยให้เต็มที่ ดื่มน้ำทุกจุด','แช่น้ำเย็น Recovery','ยืดเหยียดเบาๆ'], advice: 'ออกตัวช้าๆ อย่าวิ่งตามคนอื่น คุมเพซตัวเองให้ดีเหมือนตอนซ้อมยาวครับ' };
                cfg.detailedWorkout = { warmup: ['วอร์มอัพเบาๆ 10 นาที'], main: `วิ่ง ${currentTargetDist}K อย่างมั่นใจ เติมพลังงานตามแผน`, cooldown: ['เดินรับเหรียญ 10 นาที'] };
            } else if(dayType === 'long') {
                cfg = { id:'long', name:'Long Run (วัดใจ)', desc:`วิ่งยาว ${baseLong} กม. เน้นความอึดทนทาน`, pace:`${pz.lr} - ${pz.ez}`, hr:getHrZone(0.65,0.75, prof.age, prof.rhr), meals:dynamicMeals, ex:[`🏃‍♂️ วิ่งระยะ ${baseLong} กม.`,'จิบน้ำทุก 2 กม.','ยืดเหยียดชุดใหญ่หลังวิ่ง'], advice: 'วิ่งยาวสไตล์ครูดิน: โซน 2-3 เหนื่อยหอบพอทนได้ ไม่ต้องสนความเร็ว เน้นเวลาบนเท้าให้ครบครับ' };
                cfg.detailedWorkout = { warmup: ['เดินเร็ว 5 นาที', 'กายบริหาร ยืดเหยียดแบบขยับ (Dynamic)'], main: `วิ่ง ${baseLong} กม. ความเร็ว 60-70% (โซน 2-3) สลับเดินได้เมื่อหัวใจพุ่ง`, cooldown: ['เดินคลายกรด 10 นาที', 'ยืดเหยียดค้างท่า (Static)'] };
            } else if(dayType === 'speed') {
                const speedMain = kruDinSpeed[weekIdx % kruDinSpeed.length];
                cfg = { id:'speed', name:'Speed Work / คอร์ท', desc:'ฝึกลงคอร์ทสร้างความเร็วและความทนทานของกล้ามเนื้อ', pace:`${pz.in} - ${pz.tm}`, hr:getHrZone(0.8,0.88, prof.age, prof.rhr), meals: dynamicMeals, ex:[`⚡ ${speedMain.split(' (')[0]}`,'วอร์มอัพให้ถึงก่อนวิ่งเร็ว','Russian Twist 3 เซต'], advice: 'วันลงคอร์ทช่วยขยับเพดานความฟิต (VCR) ให้สูงขึ้น วิ่งเสร็จต้องคูลดาวน์ให้ดีครับ' };
                cfg.detailedWorkout = { warmup: ['จ๊อกกิ้งเบาๆ 15 นาที', 'ทำ Drills ยกเข่าเตะก้น'], main: `${speedMain} (Pace เป้าหมาย: ${cfg.pace})`, cooldown: ['จ๊อกกิ้งเบาๆ คลายกล้ามเนื้อ 15 นาที'] };
            } else if(dayType === 'easy') {
                const easyMain = kruDinEasy[weekIdx % kruDinEasy.length];
                cfg = { id:'easy', name:'Active Recovery / วิ่งสบาย', desc:'ฟื้นฟูร่างกาย สร้างฐานความฟิต (Aerobic Base)', pace:pz.ez, hr:getHrZone(0.6,0.7, prof.age, prof.rhr), meals: dynamicMeals, ex:[`🏃‍♂️ ${easyMain.split(' (')[0]}`, 'ทำ Drills พื้นฐาน', 'Squats 3 เซต (หรือ Bodyweight)'], advice: 'วันวิ่งสบายคือการนวดกล้ามเนื้อด้วยการวิ่ง ท่าวิ่งต้องผ่อนคลายที่สุด ไม่ก้มหน้าครับ' };
                cfg.detailedWorkout = { warmup: ['หมุนข้อต่อ 3 นาที'], main: `${easyMain} (คุมเพซสบายๆ ${cfg.pace})`, cooldown: ['เดินช้าลงเรื่อยๆ'] };
            }

            // ระบบเซฟข้อต่อ (Injury Adaptation)
            if (prof.injury === 'knee') {
                cfg.ex = cfg.ex.map(e => e.includes('Squats') ? 'Glute Bridges 3 เซต (เซฟเข่า)' : e);
                if (!cfg.ex.some(e => e.includes('ITB')) && dayType !== 'rest') cfg.ex.push('ยืดกล้ามเนื้อ ITB (เซฟเข่าด้านนอก)');
            } else if (prof.injury === 'plantar') {
                if (dayType !== 'rest') cfg.ex.push('เหยียบลูกเทนนิสคลายฝ่าเท้า 5 นาที');
            } else if (prof.injury === 'shin') {
                if (dayType !== 'rest') cfg.ex.push('Tibialis Raise 3 เซต (เซฟหน้าแข้ง)');
            }

            if (prof.lifestyle === 'heavy') cfg.meals.s = 'กล้วยหอม 1 ลูก + เกลือแร่ (ชดเชยเหงื่อจากการทำงาน)';

            cfg.detailedMeals = {
                b: { menu: cfg.meals.b, detail: 'คาร์บเชิงซ้อน/โปรตีน เติมพลังงาน' },
                l: { menu: cfg.meals.l, detail: 'อาหารสตรีทฟู้ด หาง่าย' },
                s: cfg.meals.s ? { menu: cfg.meals.s, detail: 'ลดความหิว ป้องกันกินมื้อเย็นเกิน' } : null,
                d: { menu: cfg.meals.d, detail: 'มื้อเบาๆ ผักและโปรตีนลีน' }
            };

            return cfg;
        };

        const getTargetWater = (lifestyle) => {
            if (lifestyle === 'heavy') return 12;
            if (lifestyle === 'active') return 10;
            return 8;
        };

        // --- 3. COMPONENTS ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-black text-white flex flex-col items-center justify-center p-6 text-center">
                            <h1 className="text-4xl font-black mb-4 text-red-500 uppercase tracking-widest">System Halted</h1>
                            <p className="text-zinc-400 mb-8 text-sm font-mono">{this.state.error?.toString()}</p>
                            <button onClick={() => window.location.reload()} className="suunto-bg-accent text-black font-black px-8 py-4 rounded-lg uppercase tracking-widest text-base">Reboot System</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 50 }).map((_, i) => (

        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            return (
                <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center p-6">
                    <div className="w-full max-w-sm suunto-card p-10 text-center">

        // ⚙️ Compact Setup Modal 
        const SetupModal = ({ initialProf, onSave, onCancel }) => {
            const [w, setW] = useState(initialProf.weight?.toString() || '');
            const [tw, setTw] = useState(initialProf.targetWeight?.toString() || '');

            const [avail, setAvail] = useState(initialProf.schedule ? {0: initialProf.schedule[0]!=='rest', 1: initialProf.schedule[1]!=='rest', 2: initialProf.schedule[2]!=='rest', 3: initialProf.schedule[3]!=='rest', 4: initialProf.schedule[4]!=='rest', 5: initialProf.schedule[5]!=='rest', 6: initialProf.schedule[6]!=='rest'} : {0:true, 1:false, 2:true, 3:true, 4:false, 5:true, 6:false});

            const handleSave = () => {

                onSave({ weight:finalW, targetWeight:finalTw, height:finalH, gender, age:finalAge, rhr:finalRhr, vcr:finalVcr, targetDist:td, injury, lifestyle, raceDate: raceDateStr, schedule: generateSmartSchedule(avail, ld) });
            };

            const dayLabels = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

            return (
                <div className="fixed inset-0 bg-black/95 flex flex-col items-center justify-center p-4 z-50 overflow-hidden">
                    <div className="w-full max-w-md suunto-card p-6 flex flex-col max-h-[90vh] shadow-2xl">
                        <div className="flex justify-between items-center border-b border-zinc-800 pb-4 mb-4 shrink-0">
                            <h2 className="text-2xl font-black text-white uppercase tracking-widest italic">Setup Profile</h2>
