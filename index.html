<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 80: Road To Bangsaen42</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#09090b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #09090b; }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes breathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.02) translateY(-1px); } }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; transform-origin: bottom; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .gauge-arc { stroke-dasharray: 126; stroke-dashoffset: 126; transition: stroke-dashoffset 1.5s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // --- 1. CONFIG & FIREBASE ---
        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) return JSON.parse(__firebase_config);
            return {
                apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
                authDomain: "myfamilyproject-ecff4.firebaseapp.com",
                projectId: "myfamilyproject-ecff4",
                storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
                messagingSenderId: "714527535272",
                appId: "1:714527535272:web:fefa9679e822d31e52529d"
            };
        };

        const app = initializeApp(getFirebaseConfig());
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'project80_stable_app';

        // --- 2. HELPER FUNCTIONS & LOGIC (สมองกลแยกออกมา) ---
        const safeStorage = {
            getItem: (key) => { try { return window.localStorage.getItem(key); } catch(e) { return null; } },
            setItem: (key, val) => { try { window.localStorage.setItem(key, val); } catch(e) {} },
            removeItem: (key) => { try { window.localStorage.removeItem(key); } catch(e) {} }
        };

        const parsePace = (p) => {
            if(!p) return Infinity;
            const pt = p.split(':');
            return pt.length === 2 ? parseInt(pt[0])*60 + parseInt(pt[1]) : Infinity;
        };

        const generateSmartSchedule = (availObj, longDay) => {
            let newSched = { 0:'rest', 1:'rest', 2:'rest', 3:'rest', 4:'rest', 5:'rest', 6:'rest' };
            let trainingDays = [];
            Object.keys(availObj).forEach(k => { if (availObj[k]) trainingDays.push(Number(k)); });
            if (trainingDays.length === 0) return newSched;

            if (trainingDays.includes(Number(longDay))) { newSched[longDay] = 'long'; } 
            else { newSched[trainingDays[0]] = 'long'; longDay = trainingDays[0]; }

            if (trainingDays.length > 1) {
                let speedDay = -1, maxDist = -1;
                trainingDays.forEach(day => {
                    if (day !== Number(longDay)) {
                        let dist = Math.abs(day - Number(longDay));
                        if (dist > 3) dist = 7 - dist; 
                        if (dist > maxDist) { maxDist = dist; speedDay = day; }
                    }
                });
                if (speedDay !== -1) newSched[speedDay] = 'speed';
            }
            trainingDays.forEach(day => { if (newSched[day] === 'rest') newSched[day] = 'easy'; });
            return newSched;
        };

        const calcPredictor = (baseSecs, baseDist, targetDist) => {
            const s = (baseSecs) * Math.pow(targetDist/baseDist, 1.06);
            const hrs = Math.floor(s/3600), mins = Math.floor((s%3600)/60), secs = Math.floor(s%60);
            return { s, str: `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}` };
        };

        const calcVO2Max = (age, rhr, vcr) => {
            const safeAge = isNaN(age) || age <= 0 ? 35 : Number(age);
            const safeRHR = isNaN(rhr) || rhr < 30 ? 60 : Number(rhr);
            const maxHR = 220 - safeAge;
            const vo2 = 15.3 * (maxHR / safeRHR);
            const safeVcr = isNaN(vcr) || vcr <= 0 ? 4500 : Number(vcr);
            const vcrSpeed = safeVcr / 1800;
            const vcrVo2 = (0.2 * (vcrSpeed * 60)) + 3.5;
            const result = (vo2 + vcrVo2) / 2;
            return isNaN(result) ? 0 : parseFloat(result.toFixed(1));
        };

        const getHrZone = (min, max, age, rhr) => {
            const maxHr = 220 - (age||35);
            const hrr = maxHr - (rhr||60);
            return `${Math.round(hrr*min)+Number(rhr||60)}-${Math.round(hrr*max)+Number(rhr||60)} bpm`;
        };

        const getDayConfig = (todayObj, weekIdx, isRace, prof) => {
            const dayIndex = todayObj.getDay(); 
            const currentTargetDist = prof.targetDist || 42.195;
            const currentSchedule = prof.schedule || {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'};
            const dayType = currentSchedule[dayIndex] || 'rest';

            const vcrSpeed = (prof.vcr || 4500) / 1800; 
            const getPaceStr = (pct) => {
                const spd = vcrSpeed * (pct/100);
                if(spd<=0) return "0:00";
                const s = 1000/spd;
                return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
            };
            const pz = { ez: getPaceStr(80), lr: getPaceStr(85), tm: getPaceStr(97), in: getPaceStr(105) };

            let baseLong = 5;
            if(currentTargetDist == 42.195) baseLong = [10,12,14,10, 16,18,20,15, 22,24,26,18, 28,30,21,32, 25,35,25,30, 21,15,10, 42.195][weekIdx] || 10;
            else if(currentTargetDist == 21.1) baseLong = [5,6,7,5, 8,10,12,8, 14,16,18,10, 15,18,12,20, 15,21.1,12,15, 10,8,5, 21.1][weekIdx] || 5;
            else if(currentTargetDist == 10) baseLong = [3,4,5,3, 5,6,7,4, 6,8,9,5, 8,10,6,12, 8,10,6,8, 5,4,3, 10][weekIdx] || 3;
            else baseLong = [2,3,4,2, 3,4,5,3, 4,5,6,3, 4,6,4,7, 5,6,4,5, 3,3,2, 5][weekIdx] || 2; 

            const meals = { b: 'ข้าวโอ๊ต+กล้วยหอม / แซนวิชไข่ต้ม', l: 'ข้าว 1 ทัพพี + เนื้อสัตว์ลีน + ผัก', d: 'สลัดปลา / สุกี้น้ำ (ลดแป้ง)' };

            if(isRace) return { id:'long', name:`RACE DAY ${currentTargetDist}K!`, desc:'ถึงเวลาโชว์ผลการซ้อม!', pace:'Target Pace', hr:getHrZone(0.7,0.88, prof.age, prof.rhr), meals:{b:'ขนมปังแยม+กาแฟ',l:'ฉลองหลังเข้าเส้นชัย!',d:'ปาร์ตี้หมูกระทะ'}, ex:['🏃‍♂️ ลุยให้เต็มที่ ดื่มน้ำทุกจุด','แช่น้ำเย็น Recovery','ยืดเหยียดเบาๆ'] };
            if(dayType === 'long') return { id:'long', name:'Long Run', desc:`วิ่งยาว ${baseLong} กม. เน้นความอึด`, pace:`${pz.lr} - ${pz.ez}`, hr:getHrZone(0.65,0.75, prof.age, prof.rhr), meals:{...meals, b:'โหลดคาร์บ ขนมปัง 2-3 แผ่น'}, ex:[`🏃‍♂️ วิ่งระยะ ${baseLong} กม.`,'ฝึกจิบน้ำ/กินเจลระหว่างวิ่ง','ยืดเหยียดชุดใหญ่'] };
            if(dayType === 'speed') return { id:'speed', name:'Speed / Tempo', desc:'ฝึกความเร็วรอบขา 30-45 นาที', pace:`${pz.in} - ${pz.tm}`, hr:getHrZone(0.8,0.88, prof.age, prof.rhr), meals, ex:['⚡ วิ่งคอร์ทความเร็ว','ทำ Dynamic Stretch ก่อนวิ่ง','Russian Twist 3 เซต'] };
            if(dayType === 'rest') return { id:'rest', name:'Rest Day', desc:'พักฟื้นร่างกาย ยืดเหยียด', pace:'-', hr:'-', meals, ex:['💤 พักการวิ่ง (Full Rest)','Core Plank 3 เซต','กลิ้ง Foam Roller'] };
            return { id:'easy', name:'Easy Run', desc:'วิ่งสบายๆ 45-60 นาที (Base)', pace:pz.ez, hr:getHrZone(0.6,0.7, prof.age, prof.rhr), meals, ex:['🏃‍♂️ วิ่ง Easy คุมหัวใจ','ทำ Drills ก่อนวิ่ง','Squats 3 เซต'] };
        };

        // --- 3. UI COMPONENTS (แยกชิ้นส่วน) ---
        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 50 }).map((_, i) => (
                    <div key={i} className="absolute top-[-10%]"
                        style={{
                            left: `${Math.random() * 100}%`,
                            width: `${Math.random() * 10 + 5}px`, height: `${Math.random() * 10 + 5}px`,
                            backgroundColor: ['#ea580c', '#f97316', '#bef264', '#fde047', '#ef4444'][Math.floor(Math.random() * 5)], 
                            borderRadius: Math.random() > 0.5 ? '50%' : '4px',
                            animation: `confetti-fall ${Math.random() * 2 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`,
                            animationDelay: `${Math.random() * 0.3}s`
                        }}
                    />
                ))}
            </div>
        );

        const CoolRunnerAvatar = ({ weight, targetWeight, initialWeight, currentConfig }) => {
            const progress = (initialWeight - targetWeight) > 0 ? Math.max(0, Math.min(1, (initialWeight - weight) / (initialWeight - targetWeight))) : 0;
            const bodyWidth = 36 - (12 * progress);
            const act = currentConfig?.id === 'rest' ? 'stretch' : 'cardio';
            return (
                <div className="relative w-36 h-36 flex items-center justify-center mx-2 group">
                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-xl transition-transform duration-300">
                        <style>{`.anim-float-run { animation: float-run 0.6s ease-in-out infinite; } .anim-run-leg-l { animation: run-leg-l 0.6s infinite; } .anim-run-leg-r { animation: run-leg-r 0.6s infinite; } .anim-run-arm-l { animation: run-arm-l 0.6s infinite; } .anim-run-arm-r { animation: run-arm-r 0.6s infinite; } .anim-sway { animation: sway 4s ease-in-out infinite; } @keyframes float-run { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-3px); } } @keyframes run-leg-l { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-8px) rotate(-15deg); } } @keyframes run-leg-r { 0%, 100% { transform: translateY(-8px) rotate(-15deg); } 50% { transform: translateY(0px) rotate(0deg); } } @keyframes run-arm-l { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(30deg); } } @keyframes run-arm-r { 0%, 100% { transform: rotate(30deg); } 50% { transform: rotate(0deg); } } @keyframes sway { 0%, 100% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } }`}</style>
                        <g className={act === 'stretch' ? 'anim-sway' : 'anim-float-run'} style={{transformOrigin: '50px 85px'}}>
                            <path d="M 32 25 Q 50 5 68 25 L 68 35 Q 50 20 32 35 Z" fill="#1e293b" />
                            <g className={act === 'cardio' ? 'anim-run-leg-l' : ''} style={{transformOrigin: '45px 60px'}}>
                                <rect x="42" y="60" width="6" height="28" rx="3" fill="#fcd5ce" /><path d="M 41 85 L 48.5 85 L 48.5 94 Q 45 96 41 94 Z" fill="#bef264" /><rect x="42" y="80" width="6" height="5" fill="#3f6212" />
                            </g>
                            <g className={act === 'cardio' ? 'anim-run-leg-r' : ''} style={{transformOrigin: '55px 60px'}}>
                                <rect x="52" y="60" width="6" height="28" rx="3" fill="#fcd5ce" /><path d="M 51.5 85 L 59 85 L 59 94 Q 55 96 51.5 94 Z" fill="#bef264" /><rect x="52" y="80" width="6" height="5" fill="#3f6212" />
                            </g>
                            <path d={`M ${50 - bodyWidth/2 - 2} 60 L ${50 + bodyWidth/2 + 2} 60 L ${50 + bodyWidth/2 + 3} 72 L 51 70 L 49 70 L ${50 - bodyWidth/2 - 3} 72 Z`} fill="#111827" />
                            <g className={act === 'cardio' ? 'anim-run-arm-l' : ''} style={{transformOrigin: '38px 52px'}}>
                                {act === 'stretch' ? <line x1="38" y1="52" x2="25" y2="20" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" /> : <path d={`M ${50 - bodyWidth/2 + 2} 52 Q 35 65 38 75`} fill="none" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" />}
                            </g>
                            <rect x={50 - bodyWidth/2} y="50" width={bodyWidth} height="15" rx="3" fill="#f97316" className="transition-all duration-700 ease-out" />
                            <g transform={`translate(42, 52)`}><rect x="0" y="0" width="16" height="9" fill="#ffffff" rx="1.5" /><text x="8" y="7.5" fontSize="4.5" fontWeight="900" fill="#000" textAnchor="middle">80</text></g>
                            <g className={act === 'cardio' ? 'anim-run-arm-r' : ''} style={{transformOrigin: '62px 52px'}}>
                                {act === 'stretch' ? <line x1="62" y1="52" x2="75" y2="20" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" /> : <path d={`M ${50 + bodyWidth/2 - 2} 52 Q 65 65 62 75`} fill="none" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" />}
                            </g>
                            <rect x="46" y="44" width="8" height="6" fill="#fcd5ce" /><circle cx="50" cy="32" r="14.5" fill="#fcd5ce" />
                            <path d="M 35 25 Q 50 10 65 25 Q 50 18 35 25" fill="#1e293b" /><path d="M 40 20 L 45 8 L 50 16 L 56 10 L 60 20 Z" fill="#1e293b" />
                            {act === 'cardio' ? <g><path d="M 42 29 Q 44 28 46 29" fill="none" stroke="#1e293b" strokeWidth="1.5" strokeLinecap="round" /><path d="M 54 29 Q 56 28 58 29" fill="none" stroke="#1e293b" strokeWidth="1.5" strokeLinecap="round" /></g> : <g><circle cx="44" cy="29" r="2.5" fill="#1e293b" /><circle cx="56" cy="29" r="2.5" fill="#1e293b" /></g>}
                        </g>
                    </svg>
                </div>
            );
        };

        // --- SUB-TABS COMPONENTS ---
        const TabTracker = ({ score, daily, updateDaily, cfg, inDist, setInDist, inPace, setInPace, inHr, setInHr, saveRun }) => (
            <React.Fragment>
                <section className={`p-6 rounded-[24px] border-2 flex items-center justify-between transition-colors ${score===100 ? 'bg-orange-500 border-orange-400 text-black shadow-[0_0_30px_rgba(249,115,22,0.4)]' : 'bg-zinc-900 border-zinc-800'}`}>
                    <div><h2 className="text-2xl font-black italic uppercase">SCORE</h2><p className="text-xs font-bold uppercase opacity-80">Daily Mission</p></div>
                    <div className="text-5xl font-black italic">{score}</div>
                </section>
                <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                    <h3 className="font-black text-sm uppercase text-orange-400 mb-4">1. Fuel (Meals)</h3>
                    <div className="grid grid-cols-2 gap-3">
                        {[ {k:'b',l:'Breakfast'}, {k:'l',l:'Lunch'}, {k:'s',l:'Snack'}, {k:'d',l:'Dinner'} ].map(m => (
                            <button key={m.k} onClick={()=>updateDaily(m.k, !daily[m.k])} className={`p-4 rounded-xl text-xs font-bold uppercase transition-all ${daily[m.k] ? 'bg-lime-500/20 text-lime-400 border border-lime-500/50' : 'bg-zinc-950 text-zinc-400 border border-zinc-800'}`}>{m.l}</button>
                        ))}
                    </div>
                </section>
                <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800 flex items-center justify-between">
                    <div><h3 className="font-black text-sm uppercase text-blue-400">2. Water</h3><p className="text-xs text-zinc-500">Target: 8 แก้ว</p></div>
                    <div className="flex items-center gap-4">
                        <button onClick={()=>updateDaily('w', Math.max(0, daily.w-1))} className="w-12 h-12 bg-zinc-950 border border-zinc-800 rounded-full font-black text-xl">-</button>
                        <span className="text-2xl font-black italic">{daily.w}</span>
                        <button onClick={()=>updateDaily('w', daily.w+1)} className="w-12 h-12 bg-blue-500 text-black rounded-full font-black text-xl">+</button>
                    </div>
                </section>
                <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                    <h3 className="font-black text-sm uppercase text-lime-400 mb-2">3. Workout: {cfg.name}</h3>
                    <p className="text-xs text-zinc-400 mb-4">{cfg.desc}</p>
                    <div className="space-y-2 mb-6">
                        {cfg.ex.map((ex, i) => (
                            <div key={i} onClick={()=>{let nx=[...(daily.ex||[false,false,false])]; nx[i]=!nx[i]; updateDaily('ex', nx);}} className={`p-3 rounded-lg border text-sm font-bold cursor-pointer flex items-center gap-3 ${daily.ex?.[i] ? 'bg-lime-500/20 border-lime-500 text-lime-400' : 'bg-zinc-950 border-zinc-800'}`}>
                                <div className={`w-5 h-5 rounded-full border flex items-center justify-center ${daily.ex?.[i] ? 'bg-lime-500 border-lime-500 text-black' : 'border-zinc-600'}`}>{daily.ex?.[i] ? '✓' : ''}</div>{ex}
                            </div>
                        ))}
                    </div>
                    {cfg.id !== 'rest' && !daily.rLog && (
                        <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800 space-y-3">
                            <p className="text-xs font-bold text-red-400 uppercase">Run Logger</p>
                            <div className="grid grid-cols-3 gap-2">
                                <input type="number" placeholder="KM" value={inDist} onChange={e=>setInDist(e.target.value)} className="bg-black p-3 rounded text-center font-bold text-sm border border-zinc-800 focus:border-orange-500 outline-none" />
                                <input type="text" placeholder="Pace" value={inPace} onChange={e=>setInPace(e.target.value)} className="bg-black p-3 rounded text-center font-bold text-sm border border-zinc-800 focus:border-orange-500 outline-none" />
                                <input type="number" placeholder="HR" value={inHr} onChange={e=>setInHr(e.target.value)} className="bg-black p-3 rounded text-center font-bold text-sm border border-zinc-800 focus:border-orange-500 outline-none" />
                            </div>
                            <button onClick={saveRun} disabled={!inDist || !inPace} className="w-full py-3 bg-orange-500 text-black rounded-lg font-black uppercase tracking-widest disabled:opacity-50">Save Run</button>
                        </div>
                    )}
                    {daily.rLog && (
                        <div className="p-4 bg-lime-500/10 border border-lime-500/30 rounded-xl flex justify-between items-start">
                            <div><p className="text-lime-400 font-bold text-sm uppercase">✅ Run Saved!</p><p className="text-xs text-zinc-300 mt-1">Dist: {daily.rDist} km | Pace: {daily.rPace} | HR: {daily.rHr}</p></div>
                            <button onClick={()=>updateDaily('rLog', false)} className="text-[10px] text-zinc-500 underline">Edit</button>
                        </div>
                    )}
                </section>
            </React.Fragment>
        );

        const TabPlan = ({ cfg }) => (
            <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                <h2 className="font-black text-xl italic uppercase mb-4 text-white">Today's Playbook</h2>
                <div className="space-y-4">
                    <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                        <p className="text-[10px] text-zinc-500 font-bold uppercase">WORKOUT</p>
                        <p className="text-lg font-black text-lime-400">{cfg.name}</p>
                        <p className="text-sm text-zinc-400 mt-1">{cfg.desc}</p>
                        <div className="flex gap-2 mt-3"><span className="bg-zinc-800 px-2 py-1 rounded text-cyan-400 font-bold text-[10px]">PACE: {cfg.pace}</span><span className="bg-zinc-800 px-2 py-1 rounded text-red-400 font-bold text-[10px]">HR: {cfg.hr}</span></div>
                    </div>
                    <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                        <p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">NUTRITION</p>
                        <ul className="text-sm text-zinc-300 space-y-2"><li><span className="text-orange-400 font-bold">เช้า:</span> {cfg.meals.b}</li><li><span className="text-orange-400 font-bold">เที่ยง:</span> {cfg.meals.l}</li><li><span className="text-orange-400 font-bold">เย็น:</span> {cfg.meals.d}</li></ul>
                    </div>
                </div>
            </section>
        );

        const TabRanking = ({ leaderboardData }) => (
            <section className="space-y-6 pb-10">
                <div className="text-center mb-6 pt-4"><h2 className="text-4xl font-black text-white italic uppercase tracking-tighter drop-shadow-[0_0_15px_rgba(249,115,22,0.4)]">THE ELITE<br/>LEADERBOARD</h2><p className="text-xs font-bold text-orange-400 uppercase tracking-widest mt-2">ระยะวิ่งสะสม 7 วันย้อนหลัง</p></div>
                <div className="space-y-4">
                    {leaderboardData.length === 0 ? <div className="text-center p-8 bg-zinc-900 rounded-2xl border border-zinc-800 text-zinc-500 font-bold">ไม่มีข้อมูลสถิติ หรือกำลังโหลดข้อมูลชมรม... ⏳</div> : 
                        leaderboardData.map((runner, idx) => {
                            let badge = '', bgStyle = 'bg-zinc-900 border-zinc-800', textStyle = 'text-white';
                            if (idx === 0) { badge = '👑'; bgStyle = 'bg-gradient-to-r from-orange-900/40 to-yellow-900/40 border-yellow-500/50 shadow-[0_0_20px_rgba(234,179,8,0.2)]'; textStyle = 'text-yellow-400'; }
                            else if (idx === 1) { badge = '🥈'; bgStyle = 'bg-zinc-900 border-zinc-400/50'; textStyle = 'text-zinc-300'; }
                            else if (idx === 2) { badge = '🥉'; bgStyle = 'bg-zinc-900 border-orange-800/50'; textStyle = 'text-orange-300'; }
                            return (
                                <div key={idx} className={`p-5 rounded-[20px] border flex items-center justify-between transition-all ${bgStyle}`}>
                                    <div className="flex items-center gap-4"><div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-xl bg-zinc-950 border-2 ${idx === 0 ? 'border-yellow-400' : 'border-zinc-800'}`}>{idx === 0 ? '1' : idx + 1}</div><div><div className="flex items-center gap-2"><h3 className={`font-black text-lg uppercase tracking-wider ${textStyle}`}>{runner.name}</h3><span className="text-xl">{badge}</span></div><p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">Total All-Time: {runner.tKm.toFixed(1)} KM</p></div></div>
                                    <div className="text-right"><p className={`text-3xl font-black italic ${idx === 0 ? 'text-white' : 'text-zinc-300'}`}>{runner.wKm.toFixed(1)}</p><p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">KM (7 Days)</p></div>
                                </div>
                            )
                        })
                    }
                </div>
            </section>
        );

        const TabStats = ({ prof, vo2Value, tDist, pTime, pSource, isSubTarget, setShowSetup }) => {
            let vo2Color = "text-red-500", vo2Label = "POOR", gaugeColor = "#ef4444";
            if (vo2Value >= 35) { vo2Color = "text-orange-500"; vo2Label = "FAIR"; gaugeColor = "#f97316"; }
            if (vo2Value >= 40) { vo2Color = "text-lime-400"; vo2Label = "GOOD"; gaugeColor = "#a3e635"; }
            if (vo2Value >= 45) { vo2Color = "text-blue-400"; vo2Label = "EXCELLENT"; gaugeColor = "#60a5fa"; }
            if (vo2Value >= 50) { vo2Color = "text-fuchsia-400"; vo2Label = "SUPERIOR"; gaugeColor = "#e879f9"; }
            const vo2ProgressGauge = Math.max(0, Math.min(100, ((vo2Value - 20) / (60 - 20)) * 100)) || 0;
            const safeGaugeOffset = isNaN(126 - (vo2ProgressGauge / 100) * 126) ? 126 : 126 - (vo2ProgressGauge / 100) * 126;

            return (
                <React.Fragment>
                    <section className="bg-zinc-900 rounded-[24px] p-6 border border-zinc-800">
                        <div className="flex items-center justify-between mb-2"><h2 className="font-black text-xl text-white uppercase tracking-widest italic">VO2 MAX</h2><span className={`text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-md border ${vo2Color} border-current bg-zinc-950`}>{vo2Label}</span></div>
                        <p className="text-xs font-bold uppercase tracking-wider text-zinc-500 mb-6">สมรรถภาพทางกายเทียบกับอายุ</p>
                        <div className="flex justify-center my-6">
                            <div className="relative w-48 h-24 overflow-hidden">
                                <svg className="w-full h-full" viewBox="0 0 100 50">
                                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#27272a" strokeWidth="8" strokeLinecap="round" />
                                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={gaugeColor} strokeWidth="8" strokeLinecap="round" className="gauge-arc" style={{strokeDashoffset: safeGaugeOffset}} />
                                    <circle cx="10" cy="50" r="1.5" fill="#18181b" /><circle cx="21" cy="22" r="1.5" fill="#18181b" /><circle cx="50" cy="10" r="1.5" fill="#18181b" /><circle cx="79" cy="22" r="1.5" fill="#18181b" /><circle cx="90" cy="50" r="1.5" fill="#18181b" />
                                </svg>
                                <div className="absolute bottom-0 left-0 right-0 flex flex-col items-center"><span className={`text-4xl font-black italic tracking-tighter ${vo2Color}`}>{vo2Value}</span></div>
                            </div>
                        </div>
                        <div className="text-center mt-2 p-3 bg-zinc-950 rounded-xl border border-zinc-800"><p className="text-[10px] text-zinc-500 font-bold leading-relaxed">คำนวณจากสูตร Heart Rate Ratio (RHR: {prof.rhr||'-'} bpm) <br/>ปรับค่าตามประสิทธิภาพการวิ่ง VCR ({((prof.vcr||4500)/1800).toFixed(2)} m/s)</p></div>
                    </section>
                    <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                        <h2 className="font-black text-xl italic uppercase mb-2 text-white">AI Predictor</h2><p className="text-xs text-zinc-500 font-bold uppercase mb-4">คำนวณจากสถิติ Riegel ({prof.targetDist||42.195}K)</p>
                        <div className={`p-5 rounded-xl text-center border ${isSubTarget ? 'bg-lime-400/10 border-lime-400/30' : 'bg-zinc-950 border-zinc-800'}`}>
                            <p className={`text-[10px] font-bold uppercase mb-1 ${isSubTarget ? 'text-lime-400' : 'text-zinc-500'}`}>Estimated Time</p>
                            <p className={`text-4xl font-black italic ${isSubTarget ? 'text-white' : 'text-zinc-300'}`}>{pTime}</p><p className="text-[10px] text-zinc-500 font-bold mt-2 uppercase">{pSource}</p>
                        </div>
                    </section>
                    <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                        <h2 className="font-black text-xl italic uppercase mb-2 text-white">Shoe Mileage</h2><div className="flex justify-between items-end mb-2"><p className="text-xs text-zinc-500 font-bold uppercase">ระยะใช้งานรองเท้า</p><p className="text-sm font-black text-orange-500 italic">{tDist.toFixed(1)} / 500 KM</p></div>
                        <div className="w-full bg-zinc-950 h-3 rounded-full overflow-hidden border border-zinc-800"><div className={`h-full rounded-full transition-all duration-1000 ${Math.min((tDist / 500) * 100, 100) >= 80 ? 'bg-red-500' : 'bg-gradient-to-r from-orange-600 to-orange-400'}`} style={{ width: `${Math.min((tDist / 500) * 100, 100)}%` }}></div></div>
                    </section>
                    <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                        <h2 className="font-black text-xl italic uppercase mb-4 text-white">Body Stats</h2>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800 text-center"><p className="text-[10px] text-zinc-500 font-bold uppercase">Current</p><p className="text-3xl font-black italic mt-1">{prof.weight} <span className="text-sm text-zinc-500 not-italic">KG</span></p></div>
                            <div className="bg-zinc-950 p-4 rounded-xl border border-orange-500/30 text-center shadow-[0_0_15px_rgba(249,115,22,0.1)]"><p className="text-[10px] text-orange-500 font-bold uppercase">Goal</p><p className="text-3xl font-black text-orange-400 italic mt-1">{prof.targetWeight} <span className="text-sm text-zinc-500 not-italic">KG</span></p></div>
                        </div>
                    </section>
                    <button onClick={()=>setShowSetup(true)} className="w-full p-4 border border-zinc-700 rounded-xl text-xs font-bold text-zinc-400 uppercase mt-4 hover:bg-zinc-800 transition-colors">Edit Profile Settings</button>
                </React.Fragment>
            );
        };

        const SetupModal = ({ initialProf, onSave }) => {
            const [setupWeight, setSetupWeight] = useState(initialProf.weight);
            const [setupTarget, setSetupTarget] = useState(initialProf.targetWeight);
            const [setupAge, setSetupAge] = useState(initialProf.age);
            const [setupRhr, setSetupRhr] = useState(initialProf.rhr);
            const [setupVcr, setSetupVcr] = useState(initialProf.vcr);
            const [setupDist, setSetupDist] = useState(initialProf.targetDist || 42.195);
            const [setupAvail, setSetupAvail] = useState(initialProf.schedule ? {0: initialProf.schedule[0]!=='rest', 1: initialProf.schedule[1]!=='rest', 2: initialProf.schedule[2]!=='rest', 3: initialProf.schedule[3]!=='rest', 4: initialProf.schedule[4]!=='rest', 5: initialProf.schedule[5]!=='rest', 6: initialProf.schedule[6]!=='rest'} : {0:true, 1:false, 2:true, 3:true, 4:false, 5:true, 6:false});
            const [setupLongDay, setSetupLongDay] = useState(initialProf.schedule ? Number(Object.keys(initialProf.schedule).find(key => initialProf.schedule[key] === 'long') || 0) : 0);
            
            const handleSave = () => {
                const smartSchedule = generateSmartSchedule(setupAvail, setupLongDay);
                onSave({ weight: setupWeight, targetWeight: setupTarget, age: setupAge, rhr: setupRhr, vcr: setupVcr, targetDist: setupDist, schedule: smartSchedule });
            };

            const dayLabels = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];

            return (
                <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 z-50 overflow-y-auto">
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[24px] shadow-2xl w-full max-w-sm my-10">
                        <h2 className="text-3xl font-black text-white italic uppercase tracking-tighter mb-1">Race & Profile</h2>
                        <p className="text-sm font-bold text-zinc-500 tracking-wide mb-6">ตั้งเป้าหมายและจัดตารางซ้อม 🎯</p>
                        <div className="space-y-6">
                            <div>
                                <label className="text-[10px] font-black text-lime-400 uppercase mb-2 block">1. Target Distance (ระยะลงแข่ง)</label>
                                <div className="grid grid-cols-4 gap-2">
                                    {[ {d:5, l:'5K'}, {d:10, l:'10K'}, {d:21.1, l:'21K'}, {d:42.195, l:'42K'} ].map(dist => (
                                        <button key={dist.d} onClick={() => setSetupDist(dist.d)} className={`py-2 rounded-lg text-xs font-black transition-colors ${setupDist === dist.d ? 'bg-lime-500 text-black' : 'bg-zinc-800 text-zinc-500 hover:bg-zinc-700'}`}>{dist.l}</button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-orange-500 uppercase mb-2 flex justify-between">
                                    <span>2. Training Days (เลือกวันซ้อม)</span><span>{Object.values(setupAvail).filter(v=>v).length} วัน/สัปดาห์</span>
                                </label>
                                <div className="flex justify-between gap-1">
                                    {['อา','จ','อ','พ','พฤ','ศ','ส'].map((day, idx) => (
                                        <button key={idx} onClick={() => setSetupAvail({...setupAvail, [idx]: !setupAvail[idx]})} className={`w-full py-3 rounded-lg text-[10px] font-black flex items-center justify-center transition-colors ${setupAvail[idx] ? 'bg-orange-500/20 text-orange-500 border border-orange-500/50' : 'bg-zinc-950 text-zinc-600 border border-zinc-800'}`}>{day}</button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-cyan-400 uppercase mb-2 block">3. Long Run Day (วันวิ่งยาว)</label>
                                <select value={setupLongDay} onChange={e => setSetupLongDay(Number(e.target.value))} className="w-full bg-black p-3 rounded-xl text-cyan-400 font-bold border border-zinc-800 outline-none focus:border-cyan-400">
                                    {Object.keys(setupAvail).filter(k=>setupAvail[k]).map(k => (<option key={k} value={k}>ทุกวัน {dayLabels[k]}</option>))}
                                    {Object.values(setupAvail).filter(v=>v).length === 0 && (<option value={0}>กรุณาเลือกวันซ้อมก่อน</option>)}
                                </select>
                            </div>
                            <div className="border-t border-zinc-800 pt-5 mt-2">
                                <label className="text-[10px] font-black text-zinc-400 uppercase">น้ำหนักปัจจุบัน & เป้าหมาย (KG)</label>
                                <div className="grid grid-cols-2 gap-2 mt-1">
                                    <input type="number" value={setupWeight} onChange={e=>setSetupWeight(Number(e.target.value))} className="w-full bg-black p-3 rounded-xl text-white font-bold border border-zinc-800" placeholder="ปัจจุบัน" />
                                    <input type="number" value={setupTarget} onChange={e=>setSetupTarget(Number(e.target.value))} className="w-full bg-black p-3 rounded-xl text-white font-bold border border-zinc-800" placeholder="เป้าหมาย" />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div><label className="text-[10px] font-black text-zinc-400 uppercase">อายุ (ปี)</label><input type="number" value={setupAge} onChange={e=>setSetupAge(Number(e.target.value))} className="w-full bg-black p-3 rounded-xl mt-1 text-white font-bold border border-zinc-800" /></div>
                                <div><label className="text-[10px] font-black text-zinc-400 uppercase">Resting HR</label><input type="number" value={setupRhr} onChange={e=>setSetupRhr(Number(e.target.value))} className="w-full bg-black p-3 rounded-xl mt-1 text-white font-bold border border-zinc-800" /></div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-zinc-400 uppercase">30-Min VCR Test (เมตร)</label>
                                <input type="number" value={setupVcr} onChange={e=>setSetupVcr(Number(e.target.value))} className="w-full bg-black p-3 rounded-xl mt-1 text-white font-bold border border-zinc-800" />
                            </div>
                            <button onClick={handleSave} className="w-full bg-white text-black font-black uppercase tracking-widest py-4 rounded-xl mt-2 active:scale-95 transition-all">Save & Calculate Plan</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 4. MAIN DASHBOARD ---
        const Dashboard = ({ user, profileName, onLogout }) => {
            const displayProfileName = profileName.trim().toUpperCase();
            const safeProfileName = profileName.trim().toLowerCase();
            const localKey = `p80_${safeProfileName}`;
            
            const cached = JSON.parse(safeStorage.getItem(localKey) || 'null');
            
            const [loading, setLoading] = useState(!cached);
            const [activeTab, setActiveTab] = useState('tracker');
            const [dbError, setDbError] = useState(null);
            const [showConfetti, setShowConfetti] = useState(false);
            const [showSetup, setShowSetup] = useState(false);
            const [leaderboardData, setLeaderboardData] = useState([]); 

            const [prof, setProf] = useState(cached || {
                initialWeight: 90.0, weight: 90.0, targetWeight: 80.0, 
                age: 35, rhr: 60, vcr: 4500, targetDist: 42.195,
                schedule: {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'},
                records: {}
            });

            const todayStr = new Date().toDateString();
            const defDaily = { w:0, b:false, l:false, s:false, d:false, ex:[false,false,false,false], rLog:false, rDist:'', rPace:'', rHr:'' };
            const [daily, setDaily] = useState(prof.records[todayStr] || defDaily);

            const [inDist, setInDist] = useState(daily.rDist);
            const [inPace, setInPace] = useState(daily.rPace);
            const [inHr, setInHr] = useState(daily.rHr);

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeProfileName);

            useEffect(() => {
                if(!user) return;
                const unsub = onSnapshot(docRef, snap => {
                    setDbError(null);
                    if(snap.exists()) {
                        const d = snap.data();
                        const safeD = {
                            initialWeight: d.initialWeight || 90.0, weight: d.weight || 90.0, targetWeight: d.targetWeight || 80.0,
                            age: d.age || 35, rhr: d.rhr || 60, vcr: d.vcr || 4500, targetDist: d.targetDist || 42.195,
                            schedule: d.schedule || {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'},
                            records: d.records || {}
                        };
                        setProf(safeD);
                        if (!d.initialWeight || !d.vcr) setShowSetup(true);
                        
                        if(safeD.records && safeD.records[todayStr]) {
                            setDaily(safeD.records[todayStr]); setInDist(safeD.records[todayStr].rDist || ''); setInPace(safeD.records[todayStr].rPace || ''); setInHr(safeD.records[todayStr].rHr || '');
                        } else { setDaily(defDaily); }
                        safeStorage.setItem(localKey, JSON.stringify(safeD));
                    } else { setShowSetup(true); }
                    setLoading(false);
                }, err => { setDbError("Offline Mode"); setLoading(false); });

                const boardRef = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                const unsubBoard = onSnapshot(boardRef, snap => {
                    let arr = [];
                    const last7 = Array.from({length:7}, (_,i) => { let d = new Date(); d.setDate(d.getDate()-6+i); return d.toDateString(); });
                    snap.forEach(docSnap => {
                        const data = docSnap.data(); const userName = docSnap.id;
                        let wKm = 0, tKm = 0;
                        if(data.records) {
                            last7.forEach(dt => { if(data.records[dt]?.rLog) wKm += Number(data.records[dt].rDist)||0; });
                            Object.values(data.records).forEach(r => { if(r.rLog) tKm += Number(r.rDist)||0; });
                        }
                        arr.push({ name: userName.toUpperCase(), wKm, tKm });
                    });
                    arr.sort((a, b) => b.wKm - a.wKm);
                    setLeaderboardData(arr);
                }, err => console.log("Leaderboard offline mode"));

                return () => { unsub(); unsubBoard(); };
            }, [user]);

            const handleSaveSetup = (newConfig) => {
                const data = { ...prof, ...newConfig };
                if(!prof.initialWeight) data.initialWeight = newConfig.weight; 
                setProf(data);
                safeStorage.setItem(localKey, JSON.stringify(data));
                setDoc(docRef, data, {merge:true});
                setShowSetup(false);
            };

            const updateDaily = (key, val) => {
                const nd = {...daily, [key]:val}; setDaily(nd);
                const nProf = {...prof, records: {...prof.records, [todayStr]: nd}}; setProf(nProf);
                safeStorage.setItem(localKey, JSON.stringify(nProf)); setDoc(docRef, { records: { [todayStr]: nd } }, {merge:true});
            };

            const saveRun = () => {
                const nd = {...daily, rLog: true, rDist: inDist, rPace: inPace, rHr: inHr}; setDaily(nd);
                const nProf = {...prof, records: {...prof.records, [todayStr]: nd}}; setProf(nProf);
                safeStorage.setItem(localKey, JSON.stringify(nProf)); setDoc(docRef, { records: { [todayStr]: nd } }, {merge:true});
            };

            const updateWeight = (w) => {
                if(w<30 || w>200) return;
                const nProf = {...prof, weight: w}; setProf(nProf);
                safeStorage.setItem(localKey, JSON.stringify(nProf)); setDoc(docRef, { weight: w }, {merge:true});
            };

            // Calculate Progress & Data
            const todayObj = new Date();
            const raceDate = new Date(2026, 10, 15);
            const planStart = new Date(2026, 5, 1);
            const totalDays = Math.ceil((raceDate - planStart)/(1000*3600*24));
            let diffDays = Math.ceil((todayObj - planStart)/(1000*3600*24));
            if(diffDays < 0) diffDays = 0; if(diffDays > totalDays) diffDays = totalDays;
            const weekIdx = diffDays > 0 ? Math.min(23, Math.ceil(diffDays/7)-1) : 0;
            const isRace = diffDays === totalDays;

            let tDist = 0, tSecs = 0, f5k = Infinity, f10k = Infinity;
            Object.values(prof.records).forEach(r => {
                if(r.rLog && r.rDist && r.rPace) {
                    const d = Number(r.rDist), s = parsePace(r.rPace);
                    if(!isNaN(d) && isFinite(s)) {
                        tDist += d; tSecs += (s*d);
                        if(d>=5 && s<f5k) f5k = s; if(d>=10 && s<f10k) f10k = s;
                    }
                }
            });

            // AI Predictor
            let pTime = "NEED MORE DATA", pSource = `วิ่งสะสมระยะให้ครบ 5K`, isSubTarget = false;
            const targetD = prof.targetDist || 42.195;
            if(isFinite(f10k)) { const res = calcPredictor(f10k*10, 10, targetD); pTime = res.str; pSource = "คำนวณจากสถิติ Fastest 10K ล่าสุด"; } 
            else if(isFinite(f5k)) { const res = calcPredictor(f5k*5, 5, targetD); pTime = res.str; pSource = "คำนวณจากสถิติ Fastest 5K ล่าสุด"; } 
            else if(tDist >= 5) { const res = calcPredictor((tSecs/tDist)*tDist, tDist, targetD); pTime = res.str; pSource = "คำนวณจากเพซเฉลี่ยรวม (เผื่อความล้า 5%)"; }

            const vo2Value = calcVO2Max(prof.age, prof.rhr, prof.vcr);
            const cfg = getDayConfig(todayObj, weekIdx, isRace, prof);

            let score = 0;
            if(daily.b) score+=10; if(daily.l) score+=10; if(daily.s) score+=10; if(daily.d) score+=10;
            if(daily.w >= 8) score+=20;
            score += ((daily.ex||[]).filter(Boolean).length / cfg.ex.length) * 40;
            score = Math.min(Math.round(score), 100);

            useEffect(() => { if (score === 100) { setShowConfetti(true); const timer = setTimeout(() => setShowConfetti(false), 5000); return () => clearTimeout(timer); } }, [score]);

            if (loading) return <div className="min-h-screen bg-zinc-950 flex items-center justify-center text-orange-500 font-bold tracking-widest">LOADING...</div>;
            if (showSetup) return <SetupModal initialProf={prof} onSave={handleSaveSetup} />;

            return (
                <div className="min-h-screen bg-zinc-950 text-white pb-24 relative">
                    {showConfetti && <Confetti />}
                    <header className="p-6 bg-zinc-900 border-b border-zinc-800">
                        <div className="flex justify-between items-start">
                            <div><h1 className="text-4xl font-black italic uppercase">PRO <span className="text-orange-500">80</span></h1><p className="text-xs font-bold text-zinc-400 mt-1">RUNNER: <span className="text-white">{displayProfileName}</span></p>{dbError && <p className="text-[10px] text-red-400 mt-1">{dbError}</p>}</div>
                            <button onClick={onLogout} className="bg-zinc-800 px-3 py-2 rounded-lg text-[10px] font-bold uppercase text-zinc-400">Logout</button>
                        </div>
                        <div className="mt-4 flex items-center justify-between"><span className="bg-orange-500/20 text-orange-500 px-3 py-1 rounded font-black text-xs uppercase border border-orange-500/50">WEEK {weekIdx+1}/24</span><span className="bg-lime-500/20 text-lime-400 px-3 py-1 rounded font-black text-xs uppercase border border-lime-500/50">TARGET: {targetD}K</span></div>
                    </header>

                    <div className="px-5 -mt-4 relative z-20">
                        <div className="bg-zinc-800 p-5 rounded-[20px] border border-zinc-700 shadow-xl flex items-center justify-between">
                            <div><p className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Current Weight</p><div className="flex items-baseline gap-1 mt-1"><span className="text-4xl font-black italic">{prof.weight}</span><span className="text-sm font-bold text-zinc-500">KG</span></div><div className="flex gap-2 mt-2"><button onClick={()=>updateWeight(Number((prof.weight+0.1).toFixed(1)))} className="w-8 h-8 bg-zinc-700 rounded text-zinc-300 font-black">+</button><button onClick={()=>updateWeight(Number((prof.weight-0.1).toFixed(1)))} className="w-8 h-8 bg-orange-500 rounded text-black font-black">-</button></div></div>
                            <div className="shrink-0"><CoolRunnerAvatar weight={prof.weight} targetWeight={prof.targetWeight} initialWeight={prof.initialWeight} currentConfig={cfg} /></div>
                        </div>
                    </div>

                    <nav className="flex gap-2 p-5 pb-0">
                        {['tracker', 'plan', 'ranking', 'stats'].map(t => (
                            <button key={t} onClick={()=>setActiveTab(t)} className={`flex-1 py-3 rounded-xl text-[10px] sm:text-xs font-black uppercase tracking-widest transition-colors ${activeTab===t ? 'bg-orange-500 text-black shadow-[0_0_15px_rgba(249,115,22,0.3)]' : 'bg-zinc-900 text-zinc-500 border border-zinc-800'}`}>{t}</button>
                        ))}
                    </nav>

                    <main className="px-5 mt-6 space-y-6">
                        {activeTab === 'tracker' && <TabTracker score={score} daily={daily} updateDaily={updateDaily} cfg={cfg} inDist={inDist} setInDist={setInDist} inPace={inPace} setInPace={setInPace} inHr={inHr} setInHr={setInHr} saveRun={saveRun} />}
                        {activeTab === 'plan' && <TabPlan cfg={cfg} />}
                        {activeTab === 'ranking' && <TabRanking leaderboardData={leaderboardData} />}
                        {activeTab === 'stats' && <TabStats prof={prof} vo2Value={vo2Value} tDist={tDist} pTime={pTime} pSource={pSource} isSubTarget={isSubTarget} setShowSetup={setShowSetup} />}
                    </main>
                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("App crashed:", error, errorInfo); }
            render() {
                if (this.state.hasError) return ( <div className="min-h-screen bg-red-950 flex flex-col items-center justify-center p-6 text-center"><h2 className="text-red-500 font-black text-2xl mb-2">🚨 เกิดข้อผิดพลาด</h2><p className="text-zinc-400 text-sm mb-6">{this.state.error?.toString()}</p><button onClick={() => window.location.reload()} className="bg-red-500 text-white font-bold py-3 px-6 rounded-xl">โหลดหน้าเว็บใหม่</button></div> );
                return this.props.children;
            }
        }

        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            const handleSubmit = (e) => { e.preventDefault(); if (name.trim()) onLogin(name.trim()); };
            return (
                <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-orange-600 rounded-full blur-[100px] opacity-20"></div><div className="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-lime-500 rounded-full blur-[100px] opacity-10"></div>
                    <div className="w-full max-w-sm bg-zinc-900/80 backdrop-blur-md p-8 rounded-[24px] border border-zinc-800 shadow-2xl z-10"><div className="text-center mb-8"><h2 className="text-lime-400 font-black tracking-widest text-sm mb-2 uppercase">Training Camp</h2><h1 className="text-5xl font-black text-white italic uppercase">PRO <span className="text-orange-500">80</span></h1><p className="text-orange-300 text-xs font-bold tracking-widest mt-2 uppercase">Your Personal Marathon Plan</p></div><form onSubmit={handleSubmit} className="flex flex-col gap-4"><input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="ใส่ชื่อนักวิ่ง (Runner ID)" className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-4 text-center font-bold text-white focus:border-orange-500 outline-none uppercase" /><button type="submit" className="w-full bg-orange-500 hover:bg-orange-400 text-black font-black py-4 rounded-xl uppercase tracking-widest transition-colors">Start Engine</button></form></div>
                </div>
            );
        };

        const MainApp = () => {
            const [user, setUser] = useState(null); const [authLoading, setAuthLoading] = useState(true); const [currentUser, setCurrentUser] = useState(() => safeStorage.getItem('p80_current_user'));
            useEffect(() => {
                const initAuth = async () => { try { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth); } catch (error) { console.error("Auth error", error); } }; initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setAuthLoading(false); }); return () => unsubscribe();
            }, []);
            const handleLogin = (name) => { setCurrentUser(name); safeStorage.setItem('p80_current_user', name); };
            const handleLogout = () => { setCurrentUser(null); safeStorage.removeItem('p80_current_user'); };

            if (authLoading) return <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center"><p className="text-orange-500 font-black tracking-widest text-sm uppercase">CONNECTING...</p></div>;
            if (!user || !currentUser) return <LoginScreen onLogin={handleLogin} />;
            return <Dashboard user={user} profileName={currentUser} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><MainApp /></ErrorBoundary>);
    </script>
</body>
</html>
