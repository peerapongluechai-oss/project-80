<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 80: Road To Bangsaen42</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#09090b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #09090b; }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes breathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.02) translateY(-1px); } }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; transform-origin: bottom; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .racing-stripes { background-image: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.03) 10px, rgba(255, 255, 255, 0.03) 20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) return JSON.parse(__firebase_config);
            return {
                apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
                authDomain: "myfamilyproject-ecff4.firebaseapp.com",
                projectId: "myfamilyproject-ecff4",
                storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
                messagingSenderId: "714527535272",
                appId: "1:714527535272:web:fefa9679e822d31e52529d"
            };
        };

        const app = initializeApp(getFirebaseConfig());
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'project80_github_app';

        // --- Logic: AI สร้างตารางซ้อมอัตโนมัติ ---
        const generateSmartSchedule = (availObj, longDay) => {
            let newSched = { 0:'rest', 1:'rest', 2:'rest', 3:'rest', 4:'rest', 5:'rest', 6:'rest' };
            let trainingDays = [];
            Object.keys(availObj).forEach(k => { if (availObj[k]) trainingDays.push(Number(k)); });
            if (trainingDays.length === 0) return newSched;

            if (trainingDays.includes(Number(longDay))) { newSched[longDay] = 'long'; } 
            else { newSched[trainingDays[0]] = 'long'; longDay = trainingDays[0]; }

            if (trainingDays.length > 1) {
                let speedDay = -1, maxDist = -1;
                trainingDays.forEach(day => {
                    if (day !== Number(longDay)) {
                        let dist = Math.abs(day - Number(longDay));
                        if (dist > 3) dist = 7 - dist; 
                        if (dist > maxDist) { maxDist = dist; speedDay = day; }
                    }
                });
                if (speedDay !== -1) newSched[speedDay] = 'speed';
            }
            trainingDays.forEach(day => { if (newSched[day] === 'rest') newSched[day] = 'easy'; });
            return newSched;
        };

        const Confetti = () => {
            return (
                <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 50 }).map((_, i) => {
                    const colors = ['#ea580c', '#f97316', '#bef264', '#fde047', '#ef4444'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    return (
                    <div key={i} className="absolute top-[-10%]"
                        style={{
                        left: `${Math.random() * 100}%`, width: `${Math.random() * 10 + 5}px`, height: `${Math.random() * 10 + 5}px`,
                        backgroundColor: randomColor, borderRadius: Math.random() > 0.5 ? '50%' : '4px',
                        animation: `confetti-fall ${Math.random() * 2 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`,
                        animationDelay: `${Math.random() * 0.3}s`,
                        }}
                    />
                    );
                })}
                </div>
            );
        };

        const CoolRunnerAvatar = ({ weight, targetWeight, initialWeight, currentConfig }) => {
            const weightDiff = initialWeight - targetWeight;
            const progress = weightDiff > 0 ? Math.max(0, Math.min(1, (initialWeight - weight) / weightDiff)) : 0;
            const bodyWidth = 36 - (12 * progress);
            const act = currentConfig?.id === 'rest' ? 'stretch' : 'cardio';

            let statusText = '';
            if (progress >= 1) statusText = 'ELITE RUNNER 🏅';
            else if (currentConfig?.id === 'long') statusText = 'Long Run ลุย! 🔥';
            else if (currentConfig?.id === 'speed') statusText = 'อัดเพซให้ยับ! ⚡';
            else if (currentConfig?.id === 'easy') statusText = 'Easy Run ชิลๆ 👟';
            else statusText = 'พักผ่อน ยืดเหยียด 🧘‍♂️';

            return (
                <div className="relative w-36 h-36 flex items-center justify-center mx-2 group">
                    <div className="absolute -top-3 whitespace-nowrap bg-orange-500 text-black px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest shadow-[0_0_10px_rgba(249,115,22,0.5)] z-20 animate-bounce">{statusText}</div>
                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-xl transition-transform duration-300">
                        <style>{`
                            @keyframes float-run { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-3px); } }
                            @keyframes run-leg-l { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-8px) rotate(-15deg); } }
                            @keyframes run-leg-r { 0%, 100% { transform: translateY(-8px) rotate(-15deg); } 50% { transform: translateY(0px) rotate(0deg); } }
                            @keyframes run-arm-l { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(30deg); } }
                            @keyframes run-arm-r { 0%, 100% { transform: rotate(30deg); } 50% { transform: rotate(0deg); } }
                            @keyframes sway { 0%, 100% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } }
                            .anim-float-run { animation: float-run 0.6s ease-in-out infinite; }
                            .anim-run-leg-l { animation: run-leg-l 0.6s infinite; transform-origin: 45px 60px; }
                            .anim-run-leg-r { animation: run-leg-r 0.6s infinite; transform-origin: 55px 60px; }
                            .anim-run-arm-l { animation: run-arm-l 0.6s infinite; transform-origin: 38px 52px; }
                            .anim-run-arm-r { animation: run-arm-r 0.6s infinite; transform-origin: 62px 52px; }
                            .anim-sway { animation: sway 4s ease-in-out infinite; transform-origin: 50px 85px; }
                        `}</style>
                        <g className={act === 'stretch' ? 'anim-sway' : 'anim-float-run'}>
                            <path d="M 32 25 Q 50 5 68 25 L 68 35 Q 50 20 32 35 Z" fill="#1e293b" />
                            <g className={act === 'cardio' ? 'anim-run-leg-l' : ''}><rect x="42" y="60" width="6" height="28" rx="3" fill="#fcd5ce" /><path d="M 41 85 L 48.5 85 L 48.5 94 Q 45 96 41 94 Z" fill="#bef264" /><rect x="42" y="80" width="6" height="5" fill="#3f6212" /></g>
                            <g className={act === 'cardio' ? 'anim-run-leg-r' : ''}><rect x="52" y="60" width="6" height="28" rx="3" fill="#fcd5ce" /><path d="M 51.5 85 L 59 85 L 59 94 Q 55 96 51.5 94 Z" fill="#bef264" /><rect x="52" y="80" width="6" height="5" fill="#3f6212" /></g>
                            <path d={`M ${50 - bodyWidth/2 - 2} 60 L ${50 + bodyWidth/2 + 2} 60 L ${50 + bodyWidth/2 + 3} 72 L 51 70 L 49 70 L ${50 - bodyWidth/2 - 3} 72 Z`} fill="#111827" />
                            <g className={act === 'cardio' ? 'anim-run-arm-l' : ''}>{act === 'stretch' ? <line x1="38" y1="52" x2="25" y2="20" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" /> : <path d={`M ${50 - bodyWidth/2 + 2} 52 Q 35 65 38 75`} fill="none" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" />}</g>
                            <rect x={50 - bodyWidth/2} y="50" width={bodyWidth} height="15" rx="3" fill="#f97316" className="transition-all duration-700 ease-out" />
                            <g transform={`translate(${50 - 8}, 52)`}><rect x="0" y="0" width="16" height="9" fill="#ffffff" rx="1.5" /><rect x="1" y="1" width="14" height="2" fill="#ef4444" rx="0.5" /><text x="8" y="7.5" fontSize="4.5" fontWeight="900" fill="#000" textAnchor="middle" fontFamily="sans-serif">80</text></g>
                            <g className={act === 'cardio' ? 'anim-run-arm-r' : ''}>{act === 'stretch' ? <line x1="62" y1="52" x2="75" y2="20" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" /> : <path d={`M ${50 + bodyWidth/2 - 2} 52 Q 65 65 62 75`} fill="none" stroke="#fcd5ce" strokeWidth="5.5" strokeLinecap="round" />}</g>
                            <rect x="46" y="44" width="8" height="6" fill="#fcd5ce" /><circle cx="50" cy="32" r="14.5" fill="#fcd5ce" /><path d="M 35 25 Q 50 10 65 25 Q 50 18 35 25" fill="#1e293b" /><path d="M 40 20 L 45 8 L 50 16 L 56 10 L 60 20 Z" fill="#1e293b" /><path d="M 35 30 Q 50 27 65 30 L 63 35 Q 50 40 37 35 Z" fill="#0f172a" /><path d="M 38 31 L 62 31 L 60 34 L 40 34 Z" fill="#f97316" opacity="0.8"/>
                            {act === 'cardio' ? <g><path d="M 42 29 Q 44 28 46 29" fill="none" stroke="#1e293b" strokeWidth="1.5" strokeLinecap="round" /><path d="M 54 29 Q 56 28 58 29" fill="none" stroke="#1e293b" strokeWidth="1.5" strokeLinecap="round" /><circle cx="50" cy="40" r="2" fill="#0f172a" /></g> : <g><circle cx="44" cy="29" r="2.5" fill="#1e293b" /><circle cx="56" cy="29" r="2.5" fill="#1e293b" /><circle cx="44.5" cy="28.5" r="1" fill="#ffffff" /><circle cx="56.5" cy="28.5" r="1" fill="#ffffff" /><path d="M 47 40 Q 50 42 53 40" fill="none" stroke="#0f172a" strokeWidth="1.2" strokeLinecap="round" /></g>}
                        </g>
                    </svg>
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            const handleSubmit = (e) => { e.preventDefault(); if (name.trim()) onLogin(name.trim()); };
            return (
                <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-zinc-200 relative overflow-hidden">
                    <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-orange-600 rounded-full blur-[100px] opacity-20"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-lime-500 rounded-full blur-[100px] opacity-10"></div>
                    <div className="w-full max-w-sm z-10">
                        <div className="text-center mb-10">
                            <h2 className="text-lime-400 font-black tracking-[0.3em] text-sm uppercase mb-2 animate-pulse">Training Camp</h2>
                            <h1 className="text-6xl font-black text-white italic tracking-tighter uppercase leading-none drop-shadow-[0_0_15px_rgba(249,115,22,0.4)]">PROJECT <span className="text-orange-500">80</span></h1>
                            <p className="text-orange-300 text-xs font-bold tracking-widest mt-2 uppercase">Your Personal Plan</p>
                        </div>
                        <div className="bg-zinc-900/80 backdrop-blur-md p-8 rounded-[24px] border border-zinc-800 shadow-2xl">
                            <form onSubmit={handleSubmit} className="flex flex-col gap-5">
                                <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Runner ID (Ex: Peerapong)" className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl px-4 py-4 text-center font-bold text-white focus:outline-none focus:border-orange-500 transition-colors uppercase" />
                                <button type="submit" className="w-full bg-orange-500 hover:bg-orange-400 text-black font-black text-base py-4 rounded-xl shadow-[0_0_20px_rgba(249,115,22,0.3)] active:scale-95 transition-all uppercase">Start Engine</button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const Dashboard = ({ user, profileName, onLogout }) => {
            const normalizedProfileName = profileName.trim().toLowerCase();
            const localCacheKey = `p80_data_${normalizedProfileName}`;
            const cachedData = JSON.parse(window.localStorage.getItem(localCacheKey) || 'null');

            const [loadingData, setLoadingData] = useState(!cachedData);
            const [activeTab, setActiveTab] = useState('tracker'); 
            const [showConfetti, setShowConfetti] = useState(false);
            const dateString = new Date().toDateString(); 

            // --- State: ข้อมูลส่วนตัวพื้นฐาน ---
            const [initialWeight, setInitialWeight] = useState(cachedData?.initialWeight || 90.0);
            const [targetWeight, setTargetWeight] = useState(cachedData?.targetWeight || 80.0);
            const [weight, setWeight] = useState(cachedData?.weight || 90.0);
            const [allRecords, setAllRecords] = useState(cachedData?.records || {});
            
            // --- State: สำหรับ Dynamic Plan ---
            const [targetDist, setTargetDist] = useState(cachedData?.targetDist || 42.195);
            const [schedule, setSchedule] = useState(cachedData?.schedule || {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'easy', 5:'easy', 6:'rest'});
            const [showSetup, setShowSetup] = useState(false);

            // ตัวแปรชั่วคราวสำหรับหน้า Setup
            const [setupInitWeight, setSetupInitWeight] = useState(initialWeight);
            const [setupTargetWeight, setSetupTargetWeight] = useState(targetWeight);
            const [setupDist, setSetupDist] = useState(targetDist);
            const [setupAvail, setSetupAvail] = useState({0: schedule[0]!=='rest', 1: schedule[1]!=='rest', 2: schedule[2]!=='rest', 3: schedule[3]!=='rest', 4: schedule[4]!=='rest', 5: schedule[5]!=='rest', 6: schedule[6]!=='rest'});
            const [setupLongDay, setSetupLongDay] = useState(Number(Object.keys(schedule).find(key => schedule[key] === 'long') || 0));

            const defaultDailyData = { water: 0, breakfastDone: false, lunchDone: false, snackDone: false, dinnerDone: false, exerciseChecks: [false, false, false, false], runLogged: false, runDistance: '', runPace: '', runHR: '' };
            const [dailyData, setDailyData] = useState(cachedData?.records?.[dateString] || defaultDailyData);
            const [distanceInput, setDistanceInput] = useState(dailyData.runDistance || '');
            const [paceInput, setPaceInput] = useState(dailyData.runPace || '');
            const [hrInput, setHrInput] = useState(dailyData.runHR || '');

            useEffect(() => { setDistanceInput(dailyData.runDistance||''); setPaceInput(dailyData.runPace||''); setHrInput(dailyData.runHR||''); }, [dailyData]);

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', normalizedProfileName);

            useEffect(() => {
                if (!user) return;
                const unsubscribeUser = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (!data.initialWeight) setShowSetup(true);
                        else { 
                            setInitialWeight(data.initialWeight); setTargetWeight(data.targetWeight); setWeight(data.weight || data.initialWeight); 
                            setTargetDist(data.targetDist || 42.195);
                            setSchedule(data.schedule || {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'easy', 5:'easy', 6:'rest'});
                            setAllRecords(data.records || {});
                            setDailyData(data.records?.[dateString] || defaultDailyData);
                        }
                        window.localStorage.setItem(localCacheKey, JSON.stringify(data));
                    } else setShowSetup(true);
                    setLoadingData(false);
                }, () => setLoadingData(false));
                return () => unsubscribeUser();
            }, [user.uid]);

            const saveProfileSetup = () => {
                const smartSchedule = generateSmartSchedule(setupAvail, setupLongDay);
                const dataToSave = { 
                    initialWeight: setupInitWeight, targetWeight: setupTargetWeight, weight: setupInitWeight, 
                    targetDist: setupDist, schedule: smartSchedule, records: allRecords 
                };
                setInitialWeight(setupInitWeight); setTargetWeight(setupTargetWeight); setWeight(setupInitWeight);
                setTargetDist(setupDist); setSchedule(smartSchedule);
                window.localStorage.setItem(localCacheKey, JSON.stringify(dataToSave));
                setDoc(docRef, dataToSave, { merge: true }); 
                setShowSetup(false);
            };

            const updateDaily = (key, value) => {
                const newData = { ...dailyData, [key]: value }; setDailyData(newData); 
                const newRecords = { ...allRecords, [dateString]: newData }; setAllRecords(newRecords);
                window.localStorage.setItem(localCacheKey, JSON.stringify({ initialWeight, targetWeight, weight, targetDist, schedule, records: newRecords }));
                setDoc(docRef, { records: { [dateString]: newData } }, { merge: true });
            };

            const saveRunLog = () => { updateDaily('runLogged', true); updateDaily('runDistance', distanceInput); updateDaily('runPace', paceInput); updateDaily('runHR', hrInput); };
            const updateWeightToCloud = (newWeight) => { setWeight(newWeight); window.localStorage.setItem(localCacheKey, JSON.stringify({ initialWeight, targetWeight, weight: newWeight, targetDist, schedule, records: allRecords })); setDoc(docRef, { weight: newWeight }, { merge: true }); };

            const todayObj = new Date();
            const planStartDate = new Date(2026, 5, 1); planStartDate.setHours(0,0,0,0);
            const raceDate = new Date(2026, 10, 15); raceDate.setHours(0,0,0,0);
            const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
            
            const totalDuration = raceDate.getTime() - planStartDate.getTime();
            const totalDays = Math.floor(totalDuration / (1000 * 60 * 60 * 24)) + 1; 
            const diffTime = todayMidnight.getTime() - planStartDate.getTime();
            const diffDays = Math.max(0, Math.min(Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1, totalDays));
            const overallProgress = diffDays > 0 ? Math.round((diffDays / totalDays) * 100) : 0;
            const currentWeekIndex = diffDays > 0 ? Math.min(23, Math.ceil(diffDays / 7) - 1) : 0;
            const isRaceDay = diffDays === totalDays && todayObj.getDay() === 0;

            // --- หัวใจของระบบ: การจ่ายตารางที่ยังคง Detail เดิมไว้ทั้งหมด ---
            const getTrainingConfig = (dayIndex, weekIndex, isRace) => {
                const dayType = schedule[dayIndex] || 'rest'; // เช็คว่าวันนี้เป็น long, speed, easy, หรือ rest
                
                // คำนวณระยะ Long Run ตามเป้าหมายที่เลือก
                let baseLong = 10;
                if(targetDist == 42.195) baseLong = [10,12,14,10,16,18,20,15,22,24,26,18,28,30,21,32,25,35,25,30,21,15,10,42.195][weekIndex] || 10;
                else if(targetDist == 21.1) baseLong = [5,6,7,5,8,10,12,8,14,16,18,10,15,18,12,20,15,21.1,12,15,10,8,5,21.1][weekIndex] || 5;
                else if(targetDist == 10) baseLong = [3,4,5,3,5,6,7,4,6,8,9,5,8,10,6,12,8,10,6,8,5,4,3,10][weekIndex] || 3;
                else baseLong = [2,3,4,2,3,4,5,3,4,5,6,3,4,6,4,7,5,6,4,5,3,3,2,5][weekIndex] || 2;

                const genericMeals = { breakfast: 'แซนวิชขนมปังโฮลวีตไข่ต้ม 2 ฟอง + กาแฟดำ', lunch: 'ข้าวกล้อง 1.5 ทัพพี + อกไก่ย่าง/ไก่อบ + ผักต้ม', snack: 'ถั่วแระญี่ปุ่น หรือ กล้วยหอม 1 ลูก', dinner: 'สเต็กปลาแซลมอน/ปลาดอลลี่ ย่าง + สลัดผักชามใหญ่' };

                if (isRace) return { id: 'long', icon: '🏆', color: 'yellow-400', title: `RACE DAY! ${targetDist}KM`, desc: 'ถึงเวลาโชว์ผลการซ้อมตลอดระยะเวลาที่ผ่านมา!', pace: 'Target Pace', hr: 'ZONE 3-4 (145-165 bpm)', meals: { breakfast: 'ขนมปังแยม 2 แผ่น + กาแฟดำ (ทานก่อนแข่ง 2 ชม.)', lunch: 'อาหารหลังเข้าเส้นชัย (กินให้เต็มที่!)', snack: 'เบียร์เย็นๆ 1 กระป๋องฉลองชัยชนะ 🍻', dinner: 'ชาบู/หมูกระทะ ปาร์ตี้ฉลองเหรียญ!' }, exercises: [ { title: `🏃‍♂️ RACE: ${targetDist} KM`, focus: 'หัวใจนักสู้', detail: 'คุมเพซช่วงแรกให้ดี อย่าวิ่งตามคนอื่น ดื่มน้ำทุกจุด!' }, { title: 'รับเหรียญ & ถ่ายรูป', focus: 'ความภูมิใจ', detail: 'คุณคือ Elite Runner แล้ว!' }, { title: 'ยืดเหยียดหลังแข่ง', focus: 'ป้องกันบาดเจ็บ', detail: 'ยืดเหยียดช้าๆ อย่าฝืนนวดแรง' }, { title: 'แช่น้ำเย็น (Ice bath)', focus: 'Recovery', detail: 'แช่เท้า 15 นาที ลดการอักเสบระดับเซลล์' } ] };
                if (dayType === 'long') return { id: 'long', icon: '🔥', color: 'red-500', title: `Long Run ${baseLong} KM`, desc: 'ฝึกความทนทานของกล้ามเนื้อและหัวใจ คุมเพซให้คงที่', pace: '7:45 - 8:15', hr: 'ZONE 2-3 (130-150 bpm)', meals: { ...genericMeals, breakfast: 'โหลดคาร์บ: ข้าวโอ๊ต/ขนมปังแยม + กาแฟดำ', dinner: 'หมูกระทะ/ชาบู (เน้นเนื้อโปรตีน รางวัลหลังวิ่งยาว!)' }, exercises: [ { title: `🏃‍♂️ วิ่ง Long Run ระยะ ${baseLong} กม.`, focus: 'ความทนทาน', detail: 'รักษาระดับหัวใจไม่ให้เกินโซน 3 ห้ามวิ่งเร็วกว่ากำหนด' }, { title: 'ทาครีมกันเสียดสี/เตรียมเจล', focus: 'การเตรียมตัว', detail: 'ฝึกกินเจลทุกๆ 45 นาทีให้ร่างกายชินระบบย่อย' }, { title: 'Quad & Hamstring Stretch', focus: 'กล้ามเนื้อขา', detail: 'ยืดเหยียดชุดใหญ่หลังวิ่งจบ ป้องกันอาการบาดเจ็บ' }, { title: 'แช่น้ำเย็น (Ice bath)', focus: 'การฟื้นฟู (Recovery)', detail: 'แช่เท้าและน่อง 10-15 นาที ลดการอักเสบ' } ] };
                if (dayType === 'speed') return { id: 'speed', icon: '⚡', color: 'orange-500', title: 'Speed Work / Tempo', desc: 'ซ้อมความเร็วรอบขา ฝึกให้หัวใจทนต่อความเหนื่อย (Lactate Threshold)', pace: '6:20 - 6:40', hr: 'ZONE 4 (155-170 bpm)', meals: { breakfast: 'ขนมปังโฮลวีตทาเนยถั่ว + กล้วยหอม + กาแฟดำ', lunch: 'ข้าวกล้อง 1.5 ทัพพี + กะเพราไก่ (ไม่มัน) + ไข่ดาว', snack: 'ผลไม้สด หรือ Energy Gel (ก่อนซ้อม 30 นาที)', dinner: 'ข้าว 1 ทัพพี + ปลาเผา/ปลาย่าง + ผักต้ม (เติมไกลโคเจน)' }, exercises: [ { title: '⚡ วิ่ง Tempo / Interval', focus: 'ความเร็ว (Pace)', detail: 'วอร์มอัพ 2k -> วิ่งเพซ 6:20-6:40 (ระยะตามคอร์ท) -> คูลดาวน์ 2k' }, { title: 'Dynamic Stretching', focus: 'ยืดเหยียดแบบเคลื่อนไหว', detail: 'เตะขาไปมา หมุนข้อต่อ ก่อนลงคอร์ทวิ่งเร็ว' }, { title: 'Forward Lunges', focus: 'ต้นขาด้านหน้าและก้น', detail: 'ก้าวสลับซ้ายขวา 3 เซต เซตละ 10 ครั้ง/ข้าง' }, { title: 'Russian Twist', focus: 'หน้าท้องด้านข้าง', detail: 'นั่งบิดเอว 3 เซต เซตละ 20 ครั้ง' } ] };
                if (dayType === 'easy') {
                    let ezDist = targetDist == 42.195 ? (weekIndex < 8 ? '5' : '8') : (targetDist == 21.1 ? '5' : '3');
                    return { id: 'easy', icon: '👟', color: 'lime-400', title: 'Easy Run (Base Run)', desc: 'วิ่งสบายๆ สร้างฐานความฟิต (Aerobic Base)', pace: '7:00 - 7:20', hr: 'ZONE 2 (125-140 bpm)', meals: genericMeals, exercises: [ { title: `🏃‍♂️ วิ่ง Easy Run ${ezDist} กม.`, focus: 'ระบบหายใจ', detail: 'คุมหัวใจให้อยู่แค่โซน 2 (วิ่งไปคุยไปได้สบายๆ)' }, { title: 'A-Skip & High Knees', focus: 'ฟอร์มการวิ่ง', detail: 'ทำ Drills กระตุ้นกล้ามเนื้อก่อนวิ่ง 5 นาที' }, { title: 'Bodyweight Squats', focus: 'กล้ามเนื้อหน้าขา', detail: 'ทำหลังวิ่งจบ 3 เซต เซตละ 15 ครั้ง' }, { title: 'Calf Raises', focus: 'น่องและข้อเท้า', detail: 'ยืนเขย่งปลายเท้า 3 เซต เซตละ 20 ครั้ง ป้องกันตะคริว' } ] };
                }
                return { id: 'rest', icon: '💤', color: 'blue-500', title: 'Rest & Recovery', desc: 'วันพักผ่อน ฟื้นฟูกล้ามเนื้อหลังผ่านการซ้อมหนัก', pace: 'พักวิ่ง', hr: 'REST', meals: { breakfast: 'ไข่ต้ม 3 ฟอง + นมโปรตีนสูง (ลดคาร์บ)', lunch: 'เกาเหลาไก่ฉีก หรือ สลัดปลาแซลมอน', snack: 'ถั่วแระญี่ปุ่น หรือ กรีกโยเกิร์ต', dinner: 'สเต็กเนื้อ/ไก่ + ผักย่าง (ลดแป้งมื้อเย็น)' }, exercises: [ { title: '💤 พักการวิ่ง 1 วัน (Full Rest)', focus: 'กล้ามเนื้อขา', detail: 'งดวิ่งเด็ดขาด เพื่อให้ร่างกายได้ซ่อมแซม' }, { title: 'Core Plank', focus: 'แกนกลางลำตัว (Core)', detail: 'ทำ 3 เซต เซตละ 40 วินาที ช่วยให้ฟอร์มไม่ตกตอนเหนื่อย' }, { title: 'Legs Up the Wall', focus: 'การไหลเวียนเลือด', detail: 'นอนเอาขาพาดกำแพง 10 นาที ลดอาการเมื่อยล้าที่น่อง' }, { title: 'Foam Rolling (กลิ้งโฟม)', focus: 'น่องและหน้าขา', detail: 'กลิ้งจุดละ 1-2 นาที คลายกรดแลคติกที่สะสม' } ] };
            };

            const currentConfig = getTrainingConfig(todayObj.getDay(), currentWeekIndex, isRaceDay);
            
            let dailyScore = 0;
            if (dailyData.breakfastDone) dailyScore += 10; if (dailyData.lunchDone) dailyScore += 10; if (dailyData.snackDone) dailyScore += 10; if (dailyData.dinnerDone) dailyScore += 10;
            if (dailyData.water >= 8) dailyScore += 20; else dailyScore += (dailyData.water / 8) * 20;
            const completedExercises = dailyData.exerciseChecks.filter(Boolean).length;
            dailyScore += (completedExercises / currentConfig.exercises.length) * 40; 
            dailyScore = Math.min(Math.round(dailyScore), 100);

            useEffect(() => { if (dailyScore === 100) { setShowConfetti(true); setTimeout(() => setShowConfetti(false), 5000); } }, [dailyScore]);

            if (loadingData) return <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center text-orange-500"><p className="font-black tracking-widest uppercase">LOADING...</p></div>;

            // --- หน้าจอตั้งค่า (Setup Modal) พร้อมตัวเลือกระยะ/วัน ---
            if (showSetup) {
                return (
                    <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-zinc-200 z-50">
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[24px] shadow-2xl w-full max-w-sm my-10">
                            <h2 className="text-3xl font-black text-white italic uppercase mb-1">Runner Profile</h2>
                            <p className="text-sm font-bold text-zinc-500 mb-8">ตั้งเป้าหมายและจัดตารางส่วนตัว 🎯</p>
                            
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-2 block">Target Distance (ระยะเป้าหมาย)</label>
                                    <div className="grid grid-cols-4 gap-2 mb-4">
                                        {[ {d:5, l:'5K'}, {d:10, l:'10K'}, {d:21.1, l:'21K'}, {d:42.195, l:'42K'} ].map(dist => (
                                            <button key={dist.d} onClick={() => setSetupDist(dist.d)} className={`py-3 rounded-lg text-xs font-black transition-colors ${setupDist === dist.d ? 'bg-cyan-500 text-black shadow-[0_0_10px_rgba(6,182,212,0.5)]' : 'bg-zinc-950 text-zinc-500 border border-zinc-800'}`}>{dist.l}</button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2 flex justify-between"><span>Training Days (เลือกวันซ้อม)</span><span>{Object.values(setupAvail).filter(Boolean).length} วัน/สัปดาห์</span></label>
                                    <div className="flex justify-between gap-1 mb-4">
                                        {['อา','จ','อ','พ','พฤ','ศ','ส'].map((day, idx) => (
                                            <button key={idx} onClick={() => setSetupAvail({...setupAvail, [idx]: !setupAvail[idx]})} className={`w-full py-3 rounded-lg text-[10px] font-black flex items-center justify-center transition-colors ${setupAvail[idx] ? 'bg-blue-500 text-black' : 'bg-zinc-950 text-zinc-600 border border-zinc-800'}`}>{day}</button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-red-500 uppercase tracking-widest mb-2 block">Long Run Day (วันวิ่งยาว)</label>
                                    <select value={setupLongDay} onChange={e => setSetupLongDay(Number(e.target.value))} className="w-full bg-zinc-950 border-b-2 border-zinc-800 p-4 text-white font-bold text-sm outline-none focus:border-red-500">
                                        {Object.keys(setupAvail).filter(k=>setupAvail[k]).map(k => (<option key={k} value={k}>ทุกวัน {['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'][k]}</option>))}
                                        {Object.values(setupAvail).filter(v=>v).length === 0 && (<option value={0}>กรุณาเลือกวันซ้อมก่อน</option>)}
                                    </select>
                                </div>
                                <div className="border-t border-zinc-800 pt-6 mt-4">
                                    <label className="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-2 block">Starting Weight (น้ำหนักปัจจุบัน) KG</label>
                                    <input type="number" step="0.1" value={setupInitWeight} onChange={e=>setSetupInitWeight(Number(e.target.value))} className="w-full bg-zinc-950 border-b-2 border-zinc-800 p-4 text-center text-white font-black text-4xl italic outline-none focus:border-orange-500 transition-colors"/>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-lime-400 uppercase tracking-widest mb-2 block">Target Goal (เป้าหมายน้ำหนัก) KG</label>
                                    <input type="number" step="0.1" value={setupTargetWeight} onChange={e=>setSetupTargetWeight(Number(e.target.value))} className="w-full bg-zinc-950 border-b-2 border-zinc-800 p-4 text-center text-white font-black text-4xl italic outline-none focus:border-lime-400 transition-colors"/>
                                </div>
                                <button onClick={saveProfileSetup} className="w-full bg-orange-500 hover:bg-orange-400 text-black font-black uppercase tracking-widest py-4 rounded-xl mt-4 active:scale-95 transition-all shadow-[0_0_15px_rgba(249,115,22,0.3)]">Save & Create Plan</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-zinc-200 pb-24 font-sans">
                    {showConfetti && <Confetti />}
                    <header className="relative bg-zinc-950 pt-12 pb-16 px-6 border-b border-zinc-800">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-4xl font-black uppercase text-white italic">Project <span className="text-orange-500">80</span></h1>
                                <h2 className="text-sm font-bold text-zinc-400 mt-2 uppercase">Runner: <span className="text-white">{profileName}</span></h2>
                            </div>
                            <button onClick={onLogout} className="bg-zinc-900 border border-zinc-800 p-3 rounded-xl hover:bg-zinc-800 text-[10px] font-black uppercase text-zinc-500">Log Out</button>
                        </div>
                        <div className="mt-4"><span className="text-xs font-black tracking-widest uppercase text-lime-400">WEEK {currentWeekIndex + 1}/24 (TARGET: {targetDist}K)</span></div>
                    </header>

                    <div className="px-5 -mt-8 relative z-20 space-y-5">
                        <div className="bg-zinc-900/90 rounded-[24px] p-6 shadow-2xl border border-zinc-800 flex items-center justify-between">
                            <div className="flex flex-col">
                                <div className="flex items-center gap-2 mb-2">
                                    <span className="text-xs font-black uppercase text-zinc-400">Target Weight</span>
                                    <button onClick={() => setShowSetup(true)} className="text-zinc-500 hover:text-orange-500 text-xs">✏️ Edit Plan</button>
                                </div>
                                <div className="flex items-baseline gap-1"><input type="number" value={weight} onChange={(e) => updateWeightToCloud(parseFloat(e.target.value)||0)} className="w-24 bg-transparent text-4xl font-black text-white italic border-b-4 border-zinc-800" /><span className="text-lime-400 font-bold">KG</span></div>
                            </div>
                            <CoolRunnerAvatar weight={weight} targetWeight={targetWeight} initialWeight={initialWeight} currentConfig={currentConfig} />
                        </div>
                    </div>

                    <div className="flex justify-between gap-2 mt-6 px-5">
                        <button onClick={() => setActiveTab('tracker')} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase ${activeTab === 'tracker' ? 'bg-orange-500 text-black' : 'bg-zinc-900 text-zinc-400 border border-zinc-800'}`}>Pit Stop</button>
                        <button onClick={() => setActiveTab('plan')} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase ${activeTab === 'plan' ? 'bg-orange-500 text-black' : 'bg-zinc-900 text-zinc-400 border border-zinc-800'}`}>Playbook</button>
                    </div>

                    <main className="px-5 mt-6 space-y-6">
                        {activeTab === 'tracker' && (
                            <React.Fragment>
                                <section className={`rounded-[24px] p-6 border-2 flex justify-between items-center ${dailyScore === 100 ? 'bg-orange-500 border-orange-400 text-black' : 'bg-zinc-900 border-zinc-800'}`}>
                                    <div><h2 className="font-black text-2xl uppercase">Energy</h2></div>
                                    <div className="text-4xl font-black">{dailyScore}%</div>
                                </section>

                                <section className="bg-zinc-900 p-6 rounded-[24px] border border-zinc-800">
                                    <h2 className="font-black text-white text-sm uppercase mb-4">1. Workout: {currentConfig.title}</h2>
                                    <div className="grid gap-4">
                                        {currentConfig.exercises.map((ex, idx) => {
                                            const isDone = dailyData.exerciseChecks[idx] || false;
                                            return (
                                            <div key={idx} onClick={() => { const newChecks = [...dailyData.exerciseChecks]; newChecks[idx] = !isDone; updateDaily('exerciseChecks', newChecks); }} className={`p-4 rounded-xl border-l-4 cursor-pointer ${isDone ? 'bg-zinc-950 border-zinc-800 opacity-60' : 'bg-zinc-800/50 border-lime-400'}`}>
                                                <h3 className="font-black text-sm uppercase text-white">{ex.title}</h3>
                                                <p className="text-xs mt-1 text-zinc-400">{ex.detail}</p>
                                            </div>
                                        )})}
                                    </div>
                                    {!dailyData.runLogged && currentConfig.id !== 'rest' && (
                                        <div className="mt-4 pt-4 border-t border-zinc-800">
                                            <h3 className="text-xs text-red-500 font-bold mb-2 uppercase">Run Logger</h3>
                                            <div className="grid grid-cols-2 gap-2 mb-2">
                                                <input type="number" placeholder="KM" value={distanceInput} onChange={e=>setDistanceInput(e.target.value)} className="bg-black p-3 rounded-lg text-white text-center font-bold text-sm border border-zinc-800" />
                                                <input type="text" placeholder="Pace" value={paceInput} onChange={e=>setPaceInput(e.target.value)} className="bg-black p-3 rounded-lg text-white text-center font-bold text-sm border border-zinc-800" />
                                            </div>
                                            <button onClick={saveRunLog} className="w-full bg-orange-500 text-black py-3 rounded-lg font-black uppercase text-sm">Save Run Data</button>
                                        </div>
                                    )}
                                </section>
                            </React.Fragment>
                        )}
                        {activeTab === 'plan' && (
                            <section className="bg-zinc-900 rounded-[24px] p-6 border border-zinc-800">
                                <h2 className="font-black text-xl text-white mb-6 uppercase italic">Nutrition Playbook</h2>
                                <div className="space-y-4">
                                    <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800"><h3 className="text-orange-500 font-bold text-xs uppercase mb-1">B-FAST</h3><p className="text-sm text-zinc-300">{currentConfig.meals.breakfast}</p></div>
                                    <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800"><h3 className="text-orange-500 font-bold text-xs uppercase mb-1">LUNCH</h3><p className="text-sm text-zinc-300">{currentConfig.meals.lunch}</p></div>
                                    {currentConfig.meals.snack && <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800"><h3 className="text-orange-500 font-bold text-xs uppercase mb-1">SNACK</h3><p className="text-sm text-zinc-300">{currentConfig.meals.snack}</p></div>}
                                    <div className="bg-zinc-950 p-4 rounded-xl border border-zinc-800"><h3 className="text-orange-500 font-bold text-xs uppercase mb-1">DINNER</h3><p className="text-sm text-zinc-300">{currentConfig.meals.dinner}</p></div>
                                </div>
                            </section>
                        )}
                    </main>
                </div>
            );
        };

        const MainContainer = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(() => window.localStorage.getItem('p80_current_profile'));

            useEffect(() => {
                const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) {} };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setAuthLoading(false); });
                return () => unsubscribe();
            }, []);

            if (authLoading) return <div className="min-h-screen bg-zinc-950"></div>;
            if (!user || !currentUser) return <LoginScreen onLogin={(name) => { setCurrentUser(name); window.localStorage.setItem('p80_current_profile', name); }} />;
            return <Dashboard user={user} profileName={currentUser} onLogout={() => { setCurrentUser(null); window.localStorage.removeItem('p80_current_profile'); }} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainContainer />);
    </script>
</body>
</html>
