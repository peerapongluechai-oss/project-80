<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 80: Suunto Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Prompt:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Suunto Style: Technical, bold, and minimal */
        body { font-family: 'Prompt', 'Inter', sans-serif; background-color: #000000; color: #e4e4e7; overflow-x: hidden; }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Suunto Specific Classes */
        .suunto-card { background-color: #121212; border: 1px solid #27272a; border-radius: 8px; }
        .suunto-card-highlight { background-color: #18181b; border: 1px solid #3f3f46; border-radius: 8px; }
        .suunto-accent { color: #bef264; } /* Volt Green */
        .suunto-bg-accent { background-color: #bef264; color: #000; }
        .suunto-border-accent { border-color: #bef264; }
        
        .gauge-arc { stroke-dasharray: 126; stroke-dashoffset: 126; transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
            authDomain: "myfamilyproject-ecff4.firebaseapp.com",
            projectId: "myfamilyproject-ecff4",
            storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
            messagingSenderId: "714527535272",
            appId: "1:714527535272:web:fefa9679e822d31e52529d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'project80_suunto_ultimate';

        const safeStorage = {
            getItem: (key) => { try { return window.localStorage.getItem(key); } catch (e) { return null; } },
            setItem: (key, value) => { try { window.localStorage.setItem(key, value); } catch (e) {} },
            removeItem: (key) => { try { window.localStorage.removeItem(key); } catch (e) {} },
            clearAll: () => { try { window.localStorage.clear(); } catch(e) {} }
        };

        const parsePace = (p) => {
            if(!p) return Infinity;
            const pt = p.split(':');
            return pt.length === 2 ? parseInt(pt[0])*60 + parseInt(pt[1]) : Infinity;
        };

        const formatPace = (secs) => {
            if (secs === Infinity || isNaN(secs)) return '--:--';
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        };

        const generateSmartSchedule = (availObj, longDay) => {
            let newSched = { 0:'rest', 1:'rest', 2:'rest', 3:'rest', 4:'rest', 5:'rest', 6:'rest' };
            let trainingDays = [];
            Object.keys(availObj).forEach(k => { if (availObj[k]) trainingDays.push(Number(k)); });
            if (trainingDays.length === 0) return newSched;

            if (trainingDays.includes(Number(longDay))) { newSched[longDay] = 'long'; } 
            else { newSched[trainingDays[0]] = 'long'; longDay = trainingDays[0]; }

            if (trainingDays.length > 1) {
                let speedDay = -1, maxDist = -1;
                trainingDays.forEach(day => {
                    if (day !== Number(longDay)) {
                        let dist = Math.abs(day - Number(longDay));
                        if (dist > 3) dist = 7 - dist; 
                        if (dist > maxDist) { maxDist = dist; speedDay = day; }
                    }
                });
                if (speedDay !== -1) newSched[speedDay] = 'speed';
            }
            trainingDays.forEach(day => { if (newSched[day] === 'rest') newSched[day] = 'easy'; });
            return newSched;
        };

        const calcPredictor = (baseSecs, baseDist, targetDist) => {
            const s = (baseSecs) * Math.pow(targetDist/baseDist, 1.06);
            const hrs = Math.floor(s/3600), mins = Math.floor((s%3600)/60), secs = Math.floor(s%60);
            return { s, str: `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}` };
        };

        const getHrZone = (min, max, age, rhr) => {
            const maxHr = 220 - (age||35);
            const hrr = maxHr - (rhr||60);
            return `${Math.round(hrr*min)+Number(rhr||60)}-${Math.round(hrr*max)+Number(rhr||60)} bpm`;
        };

        const generateFeedback = (dist, pace, hr, targetPaceStr) => {
            if(!pace || pace === '0:00' || !targetPaceStr || targetPaceStr === '-') return "บันทึกข้อมูลสำเร็จ! รักษาวินัยการซ้อมได้ดีเยี่ยมครับ 🏃‍♂️";
            const pSecs = parsePace(pace);
            const tSecsArr = targetPaceStr.split(' - ').map(parsePace);
            if(tSecsArr.length >= 1 && tSecsArr[0] !== Infinity) {
                const minT = Math.min(...tSecsArr);
                const maxT = Math.max(...tSecsArr);
                if(pSecs < minT - 15) return "วิ่งเร็วกว่าเป้าหมายที่ตั้งไว้! ⚡ พรุ่งนี้อย่าลืมยืดเหยียดเยอะๆ เพื่อป้องกันอาการล้าสะสมนะครับ";
                if(pSecs > maxT + 15) return "เพซวันนี้สบายๆ ช้ากว่าเป้านิดหน่อย แต่ช่วยสร้าง Base Endurance ความอึดได้ดีครับ 🐢";
                return "เพอร์เฟกต์! 🎯 ลูกพี่คุมเพซได้ตรงตามแผนเป๊ะๆ ร่างกายกำลังพัฒนาไปถูกทางครับ";
            }
            return "เยี่ยมมากครับ! เก็บสะสมไมล์ไปเรื่อยๆ ความฟิตจะตามมาเอง 🏆";
        };

        const calcCondition = (hr, pace) => {
            if(!hr || !pace) return "+0 (ปกติ)";
            const pSecs = parsePace(pace);
            const hrNum = Number(hr);
            if(hrNum < 140 && pSecs < 420) return "+3 (ฟิตมาก!)";
            if(hrNum < 150 && pSecs < 450) return "+1 (ร่างกายตอบสนองดี)";
            if(hrNum > 165 && pSecs > 480) return "-2 (มีอาการล้า / พักผ่อนน้อย)";
            return "+0 (ปกติ ทรงตัว)";
        };

        const getDayConfig = (todayObj, weekIdx, isRace, prof) => {
            const dayIndex = todayObj.getDay(); 
            const currentSchedule = prof.schedule || {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'};
            const dayType = currentSchedule[dayIndex] || 'rest';

            const vcrSpeed = (prof.vcr || 4500) / 1800; 
            const getPaceStr = (pct) => {
                const spd = vcrSpeed * (pct/100);
                if(spd<=0) return "0:00";
                const s = 1000/spd;
                return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
            };
            const pz = { ez: getPaceStr(80), lr: getPaceStr(85), tm: getPaceStr(95), in: getPaceStr(105) };

            let baseLong = 5;
            if(prof.targetDist == 42.195) baseLong = [10,12,14,10, 16,18,20,15, 22,24,26,18, 28,30,21,32, 25,35,25,30, 21,15,10, 42.195][weekIdx] || 10;
            else if(prof.targetDist == 21.1) baseLong = [5,6,7,5, 8,10,12,8, 14,16,18,10, 15,18,12,20, 15,21.1,12,15, 10,8,5, 21.1][weekIdx] || 5;
            else if(prof.targetDist == 10) baseLong = [3,4,5,3, 5,6,7,4, 6,8,9,5, 8,10,6,12, 8,10,6,8, 5,4,3, 10][weekIdx] || 3;
            else baseLong = [2,3,4,2, 3,4,5,3, 4,5,6,3, 4,6,4,7, 5,6,4,5, 3,3,2, 5][weekIdx] || 2; 

            let cfg = { id:'rest', name:'พักผ่อน (Rest)', desc:'พักฟื้นร่างกาย ยืดเหยียด', pace:'-', hr:'-', meals:{ b: 'ข้าวโอ๊ต+กล้วยหอม / แซนวิชไข่ต้ม', l: 'ข้าว 1 ทัพพี + เนื้อสัตว์ลีน + ผัก', s: 'ถั่วแระญี่ปุ่น / โยเกิร์ต', d: 'สลัดปลา / สุกี้น้ำ (ลดแป้ง)' }, ex:['💤 พักการวิ่ง (Full Rest)','Core Plank 3 เซต','กลิ้ง Foam Roller'] };
            cfg.detailedWorkout = { warmup: [], main: '', cooldown: [] };
            cfg.aiAdvice = '';

            if(isRace) {
                cfg = { id:'long', name:`RACE DAY!`, desc:'ถึงเวลาโชว์ผลการซ้อม!', pace:'Target Pace', hr:getHrZone(0.7,0.88, prof.age, prof.rhr), meals:{b:'ขนมปังแยม+กาแฟ',l:'ฉลองหลังเข้าเส้นชัย!',s:'เกลือแร่',d:'ปาร์ตี้หมูกระทะ'}, ex:['🏃‍♂️ ลุยให้เต็มที่ ดื่มน้ำทุกจุด','แช่น้ำเย็น Recovery','ยืดเหยียดเบาๆ'] };
                cfg.detailedWorkout = { warmup: ['วอร์มอัพเบาๆ 10 นาที', 'เดินเร็ว 3 นาที'], main: `วิ่ง ${prof.targetDist}K อย่างมั่นใจ ตามแผน`, cooldown: ['เดินรับเหรียญ 10 นาที', 'แช่น้ำเย็น'] };
                cfg.aiAdvice = 'วันแข่งจริง ระวังอย่าวิ่งตามคนอื่นจนเพซพังในช่วงแรก ออกตัวช้าๆ ครับ';
            } else if(dayType === 'long') {
                cfg = { id:'long', name:'วิ่งยาว (Long Run)', desc:`วิ่งยาว ${baseLong} กม. เน้นความอึด`, pace:`${pz.lr} - ${pz.ez}`, hr:getHrZone(0.65,0.75, prof.age, prof.rhr), meals:{...cfg.meals, b:'โหลดคาร์บ ขนมปัง 2-3 แผ่น'}, ex:[`🏃‍♂️ วิ่งระยะ ${baseLong} กม.`,'ฝึกจิบน้ำ/กินเจลระหว่างวิ่ง','ยืดเหยียดชุดใหญ่'] };
                cfg.detailedWorkout = { warmup: ['เดินเร็ว 5 นาที', 'Drills 5 นาที'], main: `วิ่ง ${baseLong} กม. คุมโซน Z2-Z3`, cooldown: ['เดินคลายกรด 10 นาที', 'Stretching 20 วิ/ท่า'] };
                cfg.aiAdvice = 'วันวิ่งยาวสร้าง Base Endurance ไม่ต้องสนเพซ เน้นเวลาที่อยู่บนเท้าให้ครบครับ';
            } else if(dayType === 'speed') {
                cfg = { id:'speed', name:'ความเร็ว (Speed Work)', desc:'ฝึกการใช้พลังงานและรอบขา', pace:`${pz.in} - ${pz.tm}`, hr:getHrZone(0.8,0.88, prof.age, prof.rhr), meals: cfg.meals, ex:['⚡ วิ่งคอร์ทความเร็ว','ทำ Dynamic Stretch ก่อนวิ่ง','Russian Twist 3 เซต'] };
                cfg.detailedWorkout = { warmup: ['จ๊อกกิ้ง 10-15 นาที', 'Drills ชุดใหญ่'], main: `Tempo/Interval 3-5 เซต เพซ ${cfg.pace}`, cooldown: ['จ๊อกกิ้ง 10 นาที', 'ยืดเหยียดหน้าขา'] };
                cfg.aiAdvice = 'Speed Work เพิ่ม VCR และขยับเพดาน Lactate Threshold ให้วิ่งทนขึ้น';
            } else if(dayType === 'easy') {
                cfg = { id:'easy', name:'วิ่งสบาย (Easy Run)', desc:'สร้างฐาน Aerobic Base', pace:pz.ez, hr:getHrZone(0.6,0.7, prof.age, prof.rhr), meals: cfg.meals, ex:['🏃‍♂️ วิ่ง Easy คุมหัวใจ','ทำ Drills ก่อนวิ่ง','Squats 3 เซต'] };
                cfg.detailedWorkout = { warmup: ['หมุนข้อต่อ 3 นาที', 'เดินเร็ว 3 นาที'], main: `วิ่งคุมโซน 2-3 (${cfg.pace}) พูดคุยได้ไม่หอบ`, cooldown: ['เดินช้าลงเรื่อยๆ', 'ยืดเหยียดช่วงล่าง'] };
                cfg.aiAdvice = 'Easy Run สร้างเส้นเลือดฝอยในกล้ามเนื้อ เป็นรากฐานสำคัญของการวิ่งระยะไกล';
            } else { 
                cfg.detailedWorkout = { warmup: ['ยืดเหยียดเบาๆ บนเตียง'], main: 'พักฟื้นร่างกายอย่างเต็มที่', cooldown: ['อาบน้ำอุ่น', 'Foam Roller'] };
                cfg.aiAdvice = 'การพักผ่อน (Rest) คือช่วงเวลาซ่อมแซมกล้ามเนื้อ ฝืนซ้อมทุกวันจะ Overtraining';
            }

            if (prof.injury === 'knee') {
                cfg.ex = cfg.ex.map(e => e.includes('Squats') ? 'Glute Bridges 3 เซต (เซฟเข่า)' : e);
                if (!cfg.ex.some(e => e.includes('ITB')) && dayType !== 'rest') cfg.ex.push('ยืดกล้ามเนื้อ ITB (ป้องกันเจ็บเข่าด้านนอก)');
            } else if (prof.injury === 'plantar') {
                if (dayType !== 'rest') cfg.ex.push('เหยียบลูกเทนนิสคลายฝ่าเท้า 5 นาที');
            } else if (prof.injury === 'shin') {
                if (dayType !== 'rest') cfg.ex.push('Tibialis Raise 3 เซต (กันเจ็บหน้าแข้ง)');
            }

            if (prof.lifestyle === 'heavy') {
                cfg.meals.s = 'กล้วยหอม 1 ลูก + เกลือแร่ (ชดเชยเหงื่อจากการทำงาน)';
            }

            cfg.detailedMeals = {
                b: { menu: cfg.meals.b, detail: 'คาร์บเชิงซ้อน เติมพลังงาน' },
                l: { menu: cfg.meals.l, detail: 'เน้นโปรตีนและคาร์บ' },
                s: cfg.meals.s ? { menu: cfg.meals.s, detail: 'ลดความหิวจัด ป้องกันกินมื้อเย็นเกิน' } : null,
                d: { menu: cfg.meals.d, detail: 'มื้อเบาๆ ผักและโปรตีนลีน' }
            };

            return cfg;
        };

        const getTargetWater = (lifestyle) => {
            if (lifestyle === 'heavy') return 12;
            if (lifestyle === 'active') return 10;
            return 8;
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-black text-white flex flex-col items-center justify-center p-6 text-center">
                            <h1 className="text-3xl font-black mb-4 text-red-500">SYSTEM HALTED</h1>
                            <p className="text-zinc-300 mb-6 font-mono text-sm">{this.state.error?.toString()}</p>
                            <button onClick={() => window.location.reload()} className="suunto-bg-accent text-black font-black px-8 py-3 rounded-lg uppercase text-lg">Reboot System</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const EliteAvatar = ({ activity = 'stretch' }) => {
            const isRunning = activity !== 'stretch' && activity !== 'rest';
            return (
                <div className={`w-[130px] h-[170px] relative flex items-end justify-center pb-2 ${isRunning ? '' : 'animate-breathe'}`}>
                    <svg viewBox="0 0 100 150" className="w-full h-full drop-shadow-2xl overflow-visible">
                        <style>{`
                            @keyframes run-l { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-12px) rotate(-25deg); } }
                            @keyframes run-r { 0%, 100% { transform: translateY(-12px) rotate(-25deg); } 50% { transform: translateY(0px) rotate(0deg); } }
                            @keyframes arm-l { 0%, 100% { transform: rotate(-25deg); } 50% { transform: rotate(35deg); } }
                            @keyframes arm-r { 0%, 100% { transform: rotate(35deg); } 50% { transform: rotate(-25deg); } }
                            @keyframes head-bob { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(4px); } }
                        `}</style>
                        <g transform="translate(0, 15)">
                            {/* Back Arm */}
                            <g style={{transformOrigin: '50px 35px', animation: isRunning ? 'arm-l 0.6s infinite ease-in-out' : 'none'}}>
                                <path d="M 45 35 Q 25 55 30 75" fill="none" stroke="#d4d4d8" strokeWidth="8" strokeLinecap="round" />
                                <circle cx="30" cy="75" r="4" fill="#d4d4d8" />
                            </g>
                            {/* Back Leg */}
                            <g style={{transformOrigin: '50px 65px', animation: isRunning ? 'run-l 0.6s infinite ease-in-out' : 'none'}}>
                                <path d="M 46 65 Q 35 90 40 115" fill="none" stroke="#a1a1aa" strokeWidth="9" strokeLinecap="round" />
                                <path d="M 34 115 Q 40 108 48 115 L 48 122 L 34 122 Z" fill="#bef264" />
                                <path d="M 34 122 L 48 122 L 48 125 L 34 125 Z" fill="#000" />
                            </g>
                            {/* Front Leg */}
                            <g style={{transformOrigin: '50px 65px', animation: isRunning ? 'run-r 0.6s infinite ease-in-out' : 'none'}}>
                                <path d="M 54 65 Q 65 90 60 115" fill="none" stroke="#f4f4f5" strokeWidth="9" strokeLinecap="round" />
                                <path d="M 54 115 Q 60 108 68 115 L 68 122 L 54 122 Z" fill="#bef264" />
                                <path d="M 54 122 L 68 122 L 68 125 L 54 125 Z" fill="#000" />
                            </g>
                            {/* Athletic Torso (Matte Black) */}
                            <path d="M 40 32 Q 50 25 60 32 L 56 68 L 44 68 Z" fill="#18181b" />
                            <path d="M 45 32 L 55 32 L 50 48 Z" fill="#bef264" />
                            <text x="50" y="60" fontSize="12" fontWeight="900" textAnchor="middle" fill="#52525b">80</text>
                            {/* Front Arm */}
                            <g style={{transformOrigin: '50px 35px', animation: isRunning ? 'arm-r 0.6s infinite ease-in-out' : 'none'}}>
                                <path d="M 55 35 Q 75 55 70 75" fill="none" stroke="#ffffff" strokeWidth="8" strokeLinecap="round" />
                                <circle cx="70" cy="75" r="4" fill="#ffffff" />
                                <rect x="65" y="66" width="10" height="5" fill="#000" rx="1" transform="rotate(-30 70 68)" />
                                <circle cx="70" cy="68.5" r="1.5" fill="#bef264" transform="rotate(-30 70 68)" />
                            </g>
                            {/* Head & Accessories */}
                            <g style={{transformOrigin: '50px 20px', animation: isRunning ? 'head-bob 0.6s infinite ease-in-out' : 'none'}}>
                                <circle cx="50" cy="18" r="13" fill="#f4f4f5" />
                                <path d="M 37 18 Q 50 2 63 18 Z" fill="#18181b" />
                                <path d="M 60 15 L 74 15" stroke="#18181b" strokeWidth="3" strokeLinecap="round" />
                                <path d="M 41 17 L 63 17" stroke="#bef264" strokeWidth="4" strokeLinecap="round" />
                                <path d="M 48 17 L 56 17" stroke="#bef264" strokeWidth="6" strokeLinecap="round" />
                                <circle cx="50" cy="10" r="1.5" fill="#bef264" />
                            </g>
                        </g>
                    </svg>
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            return (
                <div className="min-h-screen bg-black flex items-center justify-center p-6">
                    <div className="w-full max-w-sm suunto-card p-10 text-center shadow-2xl shadow-[#bef264]/5">
                        <h2 className="text-zinc-300 font-black tracking-[0.3em] text-xs uppercase mb-2">PERFORMANCE METRICS</h2>
                        <h1 className="text-6xl font-black text-white tracking-tighter mb-8 uppercase">PRO <span className="suunto-accent">80</span></h1>
                        <input type="text" value={name} onChange={e=>setName(e.target.value.toUpperCase())} placeholder="RUNNER ID" className="w-full bg-[#1e1e1e] border border-zinc-800 rounded-lg p-5 text-center font-bold text-white focus:border-[#bef264] outline-none mb-6 tracking-widest uppercase text-xl" />
                        <button onClick={()=>name.trim() && onLogin(name.trim())} className="w-full suunto-bg-accent py-5 rounded-lg uppercase tracking-widest font-black text-lg active:scale-95 transition-all">SYNC DEVICE</button>
                    </div>
                </div>
            );
        };

        const SetupModal = ({ initialProf, onSave, onCancel }) => {
            const [w, setW] = useState(initialProf.weight || 90);
            const [tw, setTw] = useState(initialProf.targetWeight || 80);
            const [h, setH] = useState(initialProf.height || 175);
            const [gender, setGender] = useState(initialProf.gender || 'male');
            const [age, setAge] = useState(initialProf.age || 35);
            const [rhr, setRhr] = useState(initialProf.rhr || 60);
            const [vcr, setVcr] = useState(initialProf.vcr || 4500);
            const [td, setTd] = useState(initialProf.targetDist || 42.195);
            const [injury, setInjury] = useState(initialProf.injury || 'none');
            const [lifestyle, setLifestyle] = useState(initialProf.lifestyle || 'active');
            
            const [avail, setAvail] = useState(initialProf.schedule ? {0: initialProf.schedule[0]!=='rest', 1: initialProf.schedule[1]!=='rest', 2: initialProf.schedule[2]!=='rest', 3: initialProf.schedule[3]!=='rest', 4: initialProf.schedule[4]!=='rest', 5: initialProf.schedule[5]!=='rest', 6: initialProf.schedule[6]!=='rest'} : {0:true, 1:false, 2:true, 3:true, 4:false, 5:true, 6:false});
            const [ld, setLd] = useState(initialProf.schedule ? Number(Object.keys(initialProf.schedule).find(key => initialProf.schedule[key] === 'long') || 0) : 0);

            const handleSave = () => {
                onSave({ weight:w, targetWeight:tw, height:h, gender, age, rhr, vcr, targetDist:td, injury, lifestyle, schedule: generateSmartSchedule(avail, ld) });
            };

            const handleResetProfile = () => {
                if(window.confirm("คุณต้องการลบข้อมูลทั้งหมดแล้วเริ่มใหม่ใช่หรือไม่?")) {
                    safeStorage.clearAll();
                    window.location.reload();
                }
            }

            const dayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            return (
                <div className="fixed inset-0 bg-black/95 flex flex-col items-center justify-start p-5 z-50 overflow-y-auto">
                    <div className="w-full max-w-sm suunto-card p-8 my-6">
                        <div className="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                            <h2 className="text-2xl font-black text-white uppercase tracking-widest">Settings</h2>
                            {initialProf.initialWeight && <button onClick={onCancel} className="text-zinc-300 font-bold text-sm uppercase hover:text-white transition-colors">CLOSE</button>}
                        </div>

                        <div className="space-y-6">
                            {/* Body Metrics */}
                            <div>
                                <h3 className="text-sm font-black text-zinc-300 uppercase tracking-widest mb-3">Body Metrics</h3>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div className="bg-[#1e1e1e] p-4 rounded-lg border border-zinc-800"><label className="text-xs text-zinc-300 font-bold uppercase block mb-1">Weight (KG)</label><input type="number" value={w} onChange={e=>setW(Number(e.target.value))} className="w-full bg-transparent text-white font-black text-2xl outline-none focus:text-[#bef264]" /></div>
                                    <div className="bg-[#1e1e1e] p-4 rounded-lg border border-zinc-800"><label className="text-xs text-zinc-300 font-bold uppercase block mb-1">Target (KG)</label><input type="number" value={tw} onChange={e=>setTw(Number(e.target.value))} className="w-full bg-transparent text-white font-black text-2xl outline-none focus:text-[#bef264]" /></div>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div className="bg-[#1e1e1e] p-4 rounded-lg border border-zinc-800"><label className="text-xs text-zinc-300 font-bold uppercase block mb-1">Height (CM)</label><input type="number" value={h} onChange={e=>setH(Number(e.target.value))} className="w-full bg-transparent text-white font-bold text-lg outline-none focus:text-[#bef264]" /></div>
                                    <div className="flex gap-1 bg-[#1e1e1e] p-2 rounded-lg border border-zinc-800">
                                        <button onClick={()=>setGender('male')} className={`flex-1 rounded text-sm font-bold transition-colors ${gender==='male' ? 'suunto-bg-accent' : 'bg-transparent text-zinc-300'}`}>M</button>
                                        <button onClick={()=>setGender('female')} className={`flex-1 rounded text-sm font-bold transition-colors ${gender==='female' ? 'suunto-bg-accent' : 'bg-transparent text-zinc-300'}`}>F</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-[#1e1e1e] p-4 rounded-lg border border-zinc-800"><label className="text-xs text-zinc-300 font-bold uppercase block mb-1">Age</label><input type="number" value={age} onChange={e=>setAge(Number(e.target.value))} className="w-full bg-transparent text-white font-bold text-lg outline-none focus:text-[#bef264]" /></div>
                                    <div className="bg-[#1e1e1e] p-4 rounded-lg border border-zinc-800"><label className="text-xs text-zinc-300 font-bold uppercase block mb-1">Resting HR</label><input type="number" value={rhr} onChange={e=>setRhr(Number(e.target.value))} className="w-full bg-transparent text-white font-bold text-lg outline-none text-[#f97316] focus:text-[#bef264]" /></div>
                                </div>
                            </div>

                            {/* Plan Setup */}
                            <div className="border-t border-zinc-800 pt-6">
                                <h3 className="text-sm font-black text-zinc-300 uppercase tracking-widest mb-3">Plan Setup</h3>
                                <div className="bg-[#1e1e1e] p-4 rounded-lg border border-zinc-800 mb-4">
                                    <label className="text-xs text-zinc-300 font-bold uppercase block mb-2">Race Distance</label>
                                    <div className="flex gap-2">
                                        {[5,10,21.1,42.195].map(d => (<button key={d} onClick={()=>setTd(d)} className={`flex-1 py-3 rounded text-sm font-bold transition-colors ${td===d ? 'suunto-bg-accent' : 'bg-[#121212] text-zinc-300 border border-zinc-800'}`}>{d===42.195?'42K':d+'K'}</button>))}
                                    </div>
                                </div>

                                <div className="bg-[#1e1e1e] p-5 rounded-lg border border-cyan-900/50 shadow-[0_0_15px_rgba(6,182,212,0.05)] mb-4">
                                    <label className="text-sm font-black text-cyan-400 uppercase mb-3 block">VCR Test Reference</label>
                                    <div className="bg-[#121212] p-4 rounded mb-4 border border-zinc-800">
                                        <ul className="text-xs text-zinc-200 font-bold space-y-2">
                                            <li className="flex justify-between"><span>🔴 Beginner (> 7:30)</span><span>&lt; 4000m</span></li>
                                            <li className="flex justify-between"><span>🟡 Intermediate (6:00 - 7:30)</span><span>4000 - 5000m</span></li>
                                            <li className="flex justify-between"><span>🟢 Advanced (&lt; 6:00)</span><span>&gt; 5000m</span></li>
                                        </ul>
                                    </div>
                                    <div className="flex items-baseline gap-2">
                                        <input type="number" value={vcr} onChange={e=>setVcr(Number(e.target.value))} className="flex-1 bg-transparent border-b-2 border-cyan-900 text-cyan-400 font-black text-3xl outline-none focus:border-cyan-400 text-center" />
                                        <span className="text-cyan-600 font-bold text-sm uppercase">Meters</span>
                                    </div>
                                </div>
                            </div>

                            {/* Schedule & Lifestyle */}
                            <div className="border-t border-zinc-800 pt-6">
                                <h3 className="text-sm font-black text-zinc-300 uppercase tracking-widest mb-3">Schedule & Routine</h3>
                                <div className="mb-4">
                                    <label className="text-xs text-zinc-300 font-bold uppercase block mb-2 flex justify-between"><span>Training Days</span><span className="text-white">{Object.values(avail).filter(v=>v).length} Days/Wk</span></label>
                                    <div className="flex gap-1">
                                        {['S','M','T','W','T','F','S'].map((d,i) => (<button key={i} onClick={()=>setAvail({...avail, [i]:!avail[i]})} className={`flex-1 py-3 rounded text-sm font-bold transition-colors ${avail[i] ? 'bg-zinc-700 text-white' : 'bg-[#1e1e1e] text-zinc-400 border border-zinc-800'}`}>{d}</button>))}
                                    </div>
                                </div>
                                <div className="mb-4">
                                    <label className="text-xs text-zinc-300 font-bold uppercase block mb-2">Long Run Day</label>
                                    <select value={ld} onChange={e=>setLd(Number(e.target.value))} className="w-full bg-[#1e1e1e] text-white p-4 rounded-lg border border-zinc-800 outline-none text-sm">
                                        {Object.keys(avail).filter(k=>avail[k]).map(k => (<option key={k} value={k}>Every {dayLabels[k]}</option>))}
                                        {Object.values(avail).filter(v=>v).length === 0 && (<option value={0}>Select days first</option>)}
                                    </select>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <select value={injury} onChange={e=>setInjury(e.target.value)} className="w-full bg-[#1e1e1e] text-zinc-300 p-4 rounded-lg border border-zinc-800 outline-none text-xs"><option value="none">No Injury</option><option value="knee">Knee/ITB</option><option value="plantar">Plantar</option><option value="shin">Shin Splints</option></select>
                                    <select value={lifestyle} onChange={e=>setLifestyle(e.target.value)} className="w-full bg-[#1e1e1e] text-zinc-300 p-4 rounded-lg border border-zinc-800 outline-none text-xs"><option value="sedentary">Office/Sedentary</option><option value="active">Active/Walk</option><option value="heavy">Heavy Work</option></select>
                                </div>
                            </div>

                            <button onClick={handleSave} className="w-full suunto-bg-accent py-5 rounded-lg uppercase tracking-widest text-lg font-black active:scale-95 transition-all mt-6 shadow-[0_0_15px_rgba(190,242,100,0.2)]">SYNC SETTINGS</button>
                            
                            <div className="pt-6 mt-6 border-t border-zinc-900 text-center">
                                <button onClick={handleResetProfile} className="text-xs text-red-500 font-bold uppercase tracking-widest hover:text-red-400 transition-colors">⚠️ Factory Reset</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TabTracker = ({ score, daily, updateDaily, cfg, inDist, setInDist, inPace, setInPace, inHr, setInHr, saveRun, targetWater }) => (
            <div className="space-y-6">
                <section className={`p-6 suunto-card flex items-center justify-between border-l-4 transition-colors ${score===100 ? 'border-l-[#bef264] bg-[#bef264]/5' : 'border-l-zinc-700'}`}>
                    <div><h2 className="text-3xl font-black uppercase text-white">SCORE</h2><p className="text-xs font-bold text-zinc-400 uppercase tracking-widest mt-1">Daily Objective</p></div>
                    <div className={`text-6xl font-black ${score===100 ? 'suunto-accent' : 'text-white'}`}>{score}%</div>
                </section>
                
                <section className="suunto-card p-6">
                    <h3 className="font-black text-sm uppercase text-zinc-300 mb-5 tracking-widest flex items-center gap-2"><span>🍏</span> NUTRITION LOG</h3>
                    <div className="grid grid-cols-2 gap-4">
                        {[ {k:'b',l:'Breakfast'}, {k:'l',l:'Lunch'}, {k:'s',l:'Snack'}, {k:'d',l:'Dinner'} ].map(m => (
                            <button key={m.k} onClick={()=>updateDaily(m.k, !daily[m.k])} className={`p-5 rounded-lg text-sm font-bold uppercase transition-all border-2 ${daily[m.k] ? 'suunto-bg-accent border-[#bef264]' : 'bg-[#1e1e1e] text-zinc-300 border-zinc-800 hover:bg-zinc-800'}`}>{m.l}</button>
                        ))}
                    </div>
                </section>
                
                <section className="suunto-card p-6 flex items-center justify-between">
                    <div><h3 className="font-black text-sm uppercase text-cyan-400 tracking-widest flex items-center gap-2"><span>💧</span> HYDRATION</h3><p className="text-xs text-zinc-400 font-bold uppercase mt-1">Target: {targetWater} Glasses</p></div>
                    <div className="flex items-center gap-5">
                        <button onClick={()=>updateDaily('w', Math.max(0, daily.w-1))} className="w-14 h-14 bg-[#1e1e1e] rounded-xl font-black text-2xl text-zinc-300 border border-zinc-800 active:scale-95 transition-transform">-</button>
                        <span className="text-4xl font-black text-white w-10 text-center">{daily.w}</span>
                        <button onClick={()=>updateDaily('w', daily.w+1)} className="w-14 h-14 bg-cyan-600/20 text-cyan-400 border border-cyan-800 rounded-xl font-black text-2xl active:scale-95 transition-transform hover:bg-cyan-600/40">+</button>
                    </div>
                </section>
                
                <section className="suunto-card p-6">
                    <h3 className="font-black text-sm uppercase suunto-accent mb-3 tracking-widest">🏃‍♂️ WORKOUT: {cfg.name}</h3>
                    <p className="text-base text-zinc-300 mb-6 leading-relaxed font-medium">{cfg.desc}</p>
                    <div className="space-y-4 mb-8">
                        {cfg.ex.map((ex, i) => (
                            <div key={i} onClick={()=>{let nx=[...(daily.ex||[false,false,false])]; nx[i]=!nx[i]; updateDaily('ex', nx);}} className={`p-5 rounded-xl border-2 flex items-center gap-4 cursor-pointer transition-all ${daily.ex?.[i] ? 'bg-[#bef264]/10 border-[#bef264] suunto-accent' : 'bg-[#1e1e1e] border-zinc-800 text-zinc-300 hover:border-zinc-600'}`}>
                                <div className={`w-6 h-6 rounded border-2 flex items-center justify-center shrink-0 ${daily.ex?.[i] ? 'bg-[#bef264] border-[#bef264] text-black' : 'border-zinc-600'}`}>{daily.ex?.[i] && <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}</div>
                                <span className="font-bold text-base tracking-wide">{ex}</span>
                            </div>
                        ))}
                    </div>
                    
                    {cfg.id !== 'rest' && !daily.rLog && (
                        <div className="bg-[#1e1e1e] p-6 rounded-xl border border-zinc-800">
                            <p className="text-xs font-black text-zinc-300 uppercase tracking-widest mb-4">MANUAL RUN LOGGER</p>
                            <div className="grid grid-cols-3 gap-3 mb-6">
                                <input type="number" value={inDist} onChange={e=>setInDist(e.target.value)} className="bg-black p-4 rounded-xl border border-zinc-800 text-center font-bold text-lg text-white outline-none focus:border-[#bef264] transition-colors" placeholder="KM"/>
                                <input type="text" value={inPace} onChange={e=>setInPace(e.target.value)} className="bg-black p-4 rounded-xl border border-zinc-800 text-center font-bold text-lg text-white outline-none focus:border-[#bef264] transition-colors" placeholder="PACE"/>
                                <input type="number" value={inHr} onChange={e=>setInHr(e.target.value)} className="bg-black p-4 rounded-xl border border-zinc-800 text-center font-bold text-lg text-white outline-none focus:border-[#bef264] transition-colors" placeholder="HR"/>
                            </div>
                            <button onClick={saveRun} disabled={!inDist || !inPace} className="w-full suunto-bg-accent py-5 rounded-xl uppercase tracking-widest text-sm font-black disabled:opacity-30 disabled:grayscale transition-all active:scale-95 shadow-[0_0_15px_rgba(190,242,100,0.2)]">SAVE ACTIVITY</button>
                        </div>
                    )}
                    
                    {daily.rLog && (
                        <div className="bg-[#1e1e1e] p-6 rounded-xl border border-zinc-700">
                            <div className="flex justify-between items-start mb-4">
                                <p className="suunto-accent font-black text-sm uppercase tracking-widest">ACTIVITY LOGGED</p>
                                <button onClick={()=>updateDaily('rLog', false)} className="text-xs text-zinc-400 uppercase font-bold hover:text-white transition-colors">EDIT</button>
                            </div>
                            <div className="bg-black p-4 rounded-xl border border-zinc-800 mb-6 grid grid-cols-3 text-center">
                                <div><p className="text-xs text-zinc-400 font-bold uppercase mb-1">DIST</p><p className="text-white font-black text-xl">{daily.rDist} <span className="text-xs font-normal text-zinc-400">km</span></p></div>
                                <div><p className="text-xs text-zinc-400 font-bold uppercase mb-1">PACE</p><p className="text-white font-black text-xl">{daily.rPace}</p></div>
                                <div><p className="text-xs text-zinc-400 font-bold uppercase mb-1">HR</p><p className="text-white font-black text-xl">{daily.rHr} <span className="text-xs font-normal text-zinc-400">bpm</span></p></div>
                            </div>
                            <h4 className="text-xs font-black text-orange-400 uppercase tracking-widest mb-2 flex items-center gap-2"><span>🤖</span> AI COACH FEEDBACK</h4>
                            <p className="text-base font-bold text-zinc-200 leading-relaxed mb-5">{daily.aiFeedback}</p>
                            <span className="text-xs font-black text-black uppercase bg-[#bef264] px-3 py-2 rounded-md inline-block">{daily.perfCondition}</span>
                            
                            {daily.vcrUpgraded && (
                                <div className="mt-5 bg-fuchsia-500/10 border border-fuchsia-500/50 p-4 rounded-xl text-center animate-pulse">
                                    <p className="text-sm text-fuchsia-400 font-black uppercase tracking-widest">🎉 VCR Level Up!</p>
                                    <p className="text-xs text-zinc-200 mt-2 font-bold">สถิติดีขึ้น AI อัปเกรด VCR ให้เป็น {daily.newVcrVal}m อัตโนมัติ</p>
                                </div>
                            )}
                        </div>
                    )}
                </section>
            </div>
        );

        const TabPlan = ({ cfg, prof }) => {
            const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const scheduleMap = { 'rest': 'Rest', 'easy': 'Easy', 'speed': 'Speed', 'long': 'Long Run' };
            const colorMap = { 'rest': 'text-zinc-500', 'easy': 'text-lime-400', 'speed': 'text-orange-400', 'long': 'text-red-400' };
            const todayIdx = new Date().getDay();

            return (
                <div className="space-y-6 pb-10">
                    <section className="suunto-card p-8 border-t-4 border-t-zinc-600">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-4">💬 COACH'S BRIEFING</h2>
                        <p className="text-lg font-bold text-zinc-200 leading-relaxed italic">"{cfg.aiAdvice}"</p>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-5">TRAINING PROTOCOL</h2>
                        <div className="mb-6 pb-6 border-b border-zinc-800">
                            <p className="text-3xl font-black text-white uppercase">{cfg.name}</p>
                            <div className="flex gap-3 mt-4">
                                <span className="bg-[#1e1e1e] border border-zinc-700 px-4 py-2 rounded-lg text-cyan-400 font-black text-xs tracking-widest">PACE: {cfg.pace}</span>
                                <span className="bg-[#1e1e1e] border border-zinc-700 px-4 py-2 rounded-lg text-red-400 font-black text-xs tracking-widest">HR: {cfg.hr}</span>
                            </div>
                        </div>
                        <div className="space-y-6">
                            <div><p className="text-xs font-black text-orange-400 uppercase mb-3 tracking-widest">WARM-UP</p><ul className="list-disc list-inside text-base font-bold text-zinc-300 space-y-2">{cfg.detailedWorkout.warmup.map((i,idx)=><li key={idx}>{i}</li>)}</ul></div>
                            <div><p className="text-xs font-black suunto-accent uppercase mb-3 tracking-widest">MAIN SET</p><p className="text-lg font-black text-white bg-[#1e1e1e] p-5 rounded-xl border border-zinc-800 leading-relaxed">{cfg.detailedWorkout.main}</p></div>
                            <div><p className="text-xs font-black text-cyan-400 uppercase mb-3 tracking-widest">COOL-DOWN</p><ul className="list-disc list-inside text-base font-bold text-zinc-300 space-y-2">{cfg.detailedWorkout.cooldown.map((i,idx)=><li key={idx}>{i}</li>)}</ul></div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-5">NUTRITION GUIDE</h2>
                        <div className="space-y-4 mb-6">
                            {[ {k:'b', t:'Breakfast', c:'text-yellow-400'}, {k:'l', t:'Lunch', c:'text-orange-400'}, {k:'s', t:'Snack', c:'text-fuchsia-400'}, {k:'d', t:'Dinner', c:'text-blue-400'} ].map(m => {
                                const d = cfg.detailedMeals[m.k]; if(!d) return null;
                                return (
                                    <div key={m.k} className="bg-[#1e1e1e] p-5 rounded-xl border border-zinc-800">
                                        <p className={`text-xs font-black uppercase tracking-widest mb-2 ${m.c}`}>{m.t}</p>
                                        <p className="text-base font-black text-white leading-relaxed">{d.menu}</p>
                                        <p className="text-sm text-zinc-300 mt-2 font-bold">{d.detail}</p>
                                    </div>
                                )
                            })}
                        </div>
                        <div className="bg-[#bef264]/10 border border-[#bef264]/30 p-5 rounded-xl flex items-start gap-4">
                            <span className="text-2xl">💡</span>
                            <div>
                                <p className="text-xs font-black text-[#bef264] uppercase tracking-widest mb-2">PROTEIN QUOTA</p>
                                <p className="text-base text-zinc-200 font-bold">{Math.round((prof.weight||90) * 1.5)} - {Math.round((prof.weight||90) * 1.8)} กรัม/วัน</p>
                            </div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-5">WEEKLY SCHEDULE</h2>
                        <div className="space-y-3">
                            {dayNames.map((day, idx) => {
                                const type = prof?.schedule?.[idx] || 'rest';
                                const isToday = todayIdx === idx;
                                return (
                                    <div key={idx} className={`p-5 rounded-xl border flex justify-between items-center transition-colors ${isToday ? 'bg-zinc-800 border-zinc-500 shadow-md' : 'bg-[#1e1e1e] border-zinc-800'}`}>
                                        <span className={`text-sm font-black uppercase tracking-widest ${isToday ? 'text-white' : 'text-zinc-400'}`}>{day} {isToday && '(TODAY)'}</span>
                                        <span className={`text-sm font-black uppercase tracking-widest ${colorMap[type]}`}>{scheduleMap[type]}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </section>
                </div>
            );
        };

        const TabRanking = ({ leaderboardData }) => (
            <section className="space-y-6 pb-10">
                <div className="text-center mb-8 pt-4">
                    <h2 className="text-4xl font-black text-white italic uppercase tracking-tighter">LEADERBOARD</h2>
                    <p className="text-xs font-bold text-zinc-400 uppercase tracking-widest mt-2">Weekly Mileage (7 Days)</p>
                </div>
                <div className="space-y-4">
                    {leaderboardData.length === 0 ? <div className="text-center p-10 suunto-card text-zinc-400 font-bold text-base tracking-widest uppercase">LOADING...</div> : 
                        leaderboardData.map((runner, idx) => {
                            let bg = 'bg-[#121212] border-zinc-800', txt = 'text-white', numColor = 'text-zinc-500';
                            if (idx === 0) { bg = 'bg-[#18181b] border-[#bef264]/50 shadow-lg shadow-[#bef264]/10'; txt = 'suunto-accent'; numColor = 'suunto-accent'; }
                            else if (idx === 1) { txt = 'text-zinc-300'; numColor = 'text-zinc-400'; }
                            else if (idx === 2) { txt = 'text-zinc-400'; numColor = 'text-zinc-500'; }
                            return (
                                <div key={idx} className={`p-6 rounded-2xl border flex items-center justify-between transition-all ${bg}`}>
                                    <div className="flex items-center gap-5">
                                        <div className={`w-10 font-black text-3xl text-center italic ${numColor}`}>{idx + 1}</div>
                                        <div>
                                            <h3 className={`font-black text-xl uppercase tracking-wider ${txt}`}>{runner.name} {idx===0&&'👑'}</h3>
                                            <p className="text-xs text-zinc-400 font-bold uppercase mt-1 tracking-widest">All-Time: {runner.tKm.toFixed(1)} KM</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className={`text-4xl font-black italic ${idx===0?'text-white':'text-zinc-300'}`}>{runner.wKm.toFixed(1)}</p>
                                    </div>
                                </div>
                            )
                        })
                    }
                </div>
            </section>
        );

        const TabStats = ({ prof, vo2Value, tDist, pTime, pSource, fastest5kSecs, fastest10kSecs, longestRun, achievements }) => {
            const bmi = prof.height ? (prof.weight / Math.pow(prof.height/100, 2)).toFixed(1) : '-';
            let vo2Color = "#ef4444", vo2Label = "POOR";
            if (vo2Value >= 35) { vo2Color = "#f97316"; vo2Label = "FAIR"; }
            if (vo2Value >= 40) { vo2Color = "#a3e635"; vo2Label = "GOOD"; }
            if (vo2Value >= 45) { vo2Color = "#60a5fa"; vo2Label = "EXCELLENT"; }
            if (vo2Value >= 50) { vo2Color = "#e879f9"; vo2Label = "SUPERIOR"; }
            
            const offset = 126 - (Math.min(100, ((vo2Value - 20) / 40) * 100) / 100) * 126;
            const mapGoal = 600;
            const mapProgress = Math.min((tDist / mapGoal) * 100, 100);

            return (
                <div className="space-y-6 pb-12">
                    <section className="suunto-card p-10 text-center border-t-4 border-t-zinc-700">
                        <h2 className="font-black text-xs text-zinc-400 uppercase tracking-widest mb-8">PEAK VO2 MAX</h2>
                        <div className="flex justify-center mb-8">
                            <div className="relative w-56 h-28 overflow-hidden">
                                <svg className="w-full h-full" viewBox="0 0 100 50">
                                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#27272a" strokeWidth="8" strokeLinecap="round" />
                                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={vo2Color} strokeWidth="8" strokeLinecap="round" className="gauge-arc" style={{strokeDashoffset: offset}} />
                                </svg>
                                <div className="absolute bottom-0 left-0 right-0 flex flex-col items-center">
                                    <span className="text-6xl font-black tracking-tighter italic" style={{color: vo2Color}}>{vo2Value}</span>
                                </div>
                            </div>
                        </div>
                        <span className="text-xs font-black uppercase tracking-widest px-4 py-2 rounded-lg bg-black border border-zinc-800" style={{color: vo2Color}}>{vo2Label}</span>
                    </section>
                    
                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6 flex items-center gap-2"><span>📍</span> VIRTUAL MAP</h2>
                        <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest mb-4">สะสมระยะทาง {tDist.toFixed(1)} / {mapGoal} KM</p>
                        <div className="relative w-full h-8 bg-[#1e1e1e] rounded-full border border-zinc-800 overflow-visible mb-2">
                            <div className="absolute top-0 left-0 h-full bg-cyan-600/60 rounded-full transition-all duration-1000" style={{width: `${mapProgress}%`}}></div>
                            <div className="absolute top-1/2 -translate-y-1/2 text-3xl drop-shadow-md transition-all duration-1000 z-10" style={{left: `calc(${mapProgress}% - 16px)`}}>🏃‍♂️</div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6">🏆 PERSONAL BESTS</h2>
                        <div className="grid grid-cols-3 gap-4">
                            <div className="bg-[#1e1e1e] p-5 rounded-xl border border-zinc-800 text-center"><p className="text-xs text-zinc-400 font-bold uppercase mb-2">5K</p><p className="text-xl font-black text-white italic">{formatPace(fastest5kSecs)}</p></div>
                            <div className="bg-[#1e1e1e] p-5 rounded-xl border border-zinc-800 text-center"><p className="text-xs text-zinc-400 font-bold uppercase mb-2">10K</p><p className="text-xl font-black text-white italic">{formatPace(fastest10kSecs)}</p></div>
                            <div className="bg-[#1e1e1e] p-5 rounded-xl border border-zinc-800 text-center"><p className="text-xs text-zinc-400 font-bold uppercase mb-2">MAX DIST</p><p className="text-xl font-black text-white italic">{longestRun.toFixed(1)}<span className="text-[10px] ml-1">K</span></p></div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6">🏅 TROPHY ROOM</h2>
                        <div className="grid grid-cols-3 gap-4">
                            <div className={`p-5 rounded-xl border text-center transition-all ${achievements.halfMarathon ? 'bg-yellow-500/10 border-yellow-500/50' : 'bg-[#1e1e1e] border-zinc-800 opacity-50 grayscale'}`}><span className="text-4xl mb-3 block">{achievements.halfMarathon ? '🎖️' : '🔒'}</span><span className={`text-xs font-black uppercase tracking-wider block ${achievements.halfMarathon ? 'text-yellow-400' : 'text-zinc-500'}`}>Half-Way</span></div>
                            <div className={`p-5 rounded-xl border text-center transition-all ${achievements.streakMaster ? 'bg-orange-500/10 border-orange-500/50' : 'bg-[#1e1e1e] border-zinc-800 opacity-50 grayscale'}`}><span className="text-4xl mb-3 block">{achievements.streakMaster ? '⚡' : '🔒'}</span><span className={`text-xs font-black uppercase tracking-wider block ${achievements.streakMaster ? 'text-orange-400' : 'text-zinc-500'}`}>Streak</span></div>
                            <div className={`p-5 rounded-xl border text-center transition-all ${achievements.aquaMan ? 'bg-cyan-500/10 border-cyan-500/50' : 'bg-[#1e1e1e] border-zinc-800 opacity-50 grayscale'}`}><span className="text-4xl mb-3 block">{achievements.aquaMan ? '💦' : '🔒'}</span><span className={`text-xs font-black uppercase tracking-wider block ${achievements.aquaMan ? 'text-cyan-400' : 'text-zinc-500'}`}>Aqua Man</span></div>
                        </div>
                    </section>

                    <section className="suunto-card p-8 border-l-4 border-l-lime-500">
                        <h2 className="font-black text-xs text-zinc-400 uppercase tracking-widest mb-2">AI PREDICTOR</h2>
                        <p className="text-sm text-lime-400 font-black uppercase tracking-widest mb-4">EST. {prof.targetDist}K TIME</p>
                        <p className="text-6xl font-black text-white italic tracking-tighter mb-5">{pTime}</p>
                        <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest">REF: {pSource}</p>
                    </section>
                </div>
            );
        };

        const Dashboard = ({ profileName, onLogout }) => {
            const [activeTab, setActiveTab] = useState('tracker');
            const [showSetup, setShowSetup] = useState(false);
            const [showConfetti, setShowConfetti] = useState(false);
            
            const safeName = profileName.trim().toLowerCase();
            const localKey = `p80_v15_suunto_${safeName}`;
            
            const [prof, setProf] = useState(() => JSON.parse(safeStorage.getItem(localKey)) || {
                initialWeight: null, weight: 90.0, targetWeight: 80.0, height: 175, gender: 'male',
                age: 35, rhr: 60, vcr: 4500, targetDist: 42.195, injury: 'none', lifestyle: 'active',
                schedule: {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'}, records: {}
            });

            const todayStr = new Date().toDateString();
            const [daily, setDaily] = useState(prof.records?.[todayStr] || { w:0, b:false, l:false, s:false, d:false, ex:[false,false,false,false], rLog:false, rDist:'', rPace:'', rHr:'', aiFeedback: '', perfCondition: '', vcrUpgraded: false, newVcrVal: 0 });
            
            const [inDist, setInDist] = useState(daily.rDist || '');
            const [inPace, setInPace] = useState(daily.rPace || '');
            const [inHr, setInHr] = useState(daily.rHr || '');

            const [leaderboardData, setLeaderboardData] = useState([]);

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeName);

            useEffect(() => {
                if(!prof.initialWeight) setShowSetup(true); 
                const unsub = onSnapshot(docRef, snap => {
                    if(snap.exists()) {
                        const d = snap.data();
                        setProf(prev => ({...prev, ...d}));
                        if(!d.initialWeight) setShowSetup(true); 
                        if(d.records?.[todayStr]) setDaily(d.records[todayStr]);
                    }
                });
                
                const boardRef = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                const unsubBoard = onSnapshot(boardRef, snap => {
                    let arr = [];
                    const last7 = Array.from({length:7}, (_,i) => { let d = new Date(); d.setDate(d.getDate()-6+i); return d.toDateString(); });
                    snap.forEach(docSnap => {
                        const data = docSnap.data(); const userName = docSnap.id;
                        let wKm = 0, tKm = 0;
                        if(data.records) {
                            last7.forEach(dt => { if(data.records[dt]?.rLog) wKm += Number(data.records[dt].rDist)||0; });
                            Object.values(data.records).forEach(r => { if(r.rLog) tKm += Number(r.rDist)||0; });
                        }
                        arr.push({ name: userName.toUpperCase(), wKm, tKm });
                    });
                    arr.sort((a, b) => b.wKm - a.wKm);
                    setLeaderboardData(arr);
                });

                return () => { unsub(); unsubBoard(); };
            }, []);

            const updateDaily = (key, val) => {
                const nd = {...daily, [key]:val};
                setDaily(nd);
                const nRecords = {...prof.records, [todayStr]: nd};
                setProf(p => ({...p, records: nRecords})); 
                setDoc(docRef, { records: nRecords }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify({...prof, records: nRecords}));
            };

            const saveRun = () => {
                const rSecs = parsePace(inPace); const dNum = parseFloat(inDist);
                let currentVcr = prof.vcr || 4500; let upgraded = false;
                if (rSecs !== Infinity && dNum >= 3) {
                    const equiv = (1800 / rSecs) * 1000;
                    if (equiv > currentVcr + 100) { currentVcr = Math.round(equiv); upgraded = true; }
                }
                const cfgToday = getDayConfig(new Date(), 0, false, prof);
                const ai = generateFeedback(dNum, inPace, inHr, cfgToday.pace);
                const perf = calcCondition(inHr, inPace);
                const nd = {...daily, rLog: true, rDist: inDist, rPace: inPace, rHr: inHr, aiFeedback: ai, perfCondition: perf, vcrUpgraded: upgraded, newVcrVal: currentVcr};
                
                setDaily(nd);
                const nProf = {...prof, vcr: currentVcr, records: {...prof.records, [todayStr]: nd}};
                setProf(nProf);
                setDoc(docRef, { vcr: currentVcr, records: nProf.records }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify(nProf));
            };

            const updateWeight = (amt) => {
                const w = Number((prof.weight + amt).toFixed(1));
                setProf(p => ({...p, weight: w}));
                setDoc(docRef, { weight: w }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify({...prof, weight: w}));
            };

            const raceDate = new Date(2026, 10, 15); const planStart = new Date(2026, 5, 1);
            const totalDays = Math.ceil((raceDate - planStart)/(1000*3600*24));
            let diff = Math.ceil((new Date() - planStart)/(1000*3600*24));
            const weekIdx = Math.max(0, Math.min(23, Math.ceil(diff/7)-1));
            const cfg = getDayConfig(new Date(), weekIdx, false, prof);

            let tDist = 0, tSecs = 0, f5k = Infinity, f10k = Infinity, longestRun = 0, maxStreakCount = 0, streakCount = 0, maxAquaCount = 0, aquaCount = 0;
            const sortedDates = Object.keys(prof.records || {}).sort((a,b)=>new Date(a)-new Date(b));
            sortedDates.forEach(dt => {
                const r = prof.records[dt];
                if(r.rLog && r.rDist && r.rPace) {
                    const d = parseFloat(r.rDist), s = parsePace(r.rPace);
                    if(!isNaN(d) && isFinite(s)) {
                        tDist += d; tSecs += (s*d);
                        if(d>=5 && s<f5k) f5k = s; if(d>=10 && s<f10k) f10k = s;
                        if(d>longestRun) longestRun = d;
                    }
                    streakCount++;
                } else streakCount = 0;
                if(streakCount > maxStreakCount) maxStreakCount = streakCount;
                if(r.w >= 8) aquaCount++; else aquaCount = 0;
                if(aquaCount > maxAquaCount) maxAquaCount = aquaCount;
            });

            const achievements = { halfMarathon: longestRun >= 21.1, streakMaster: maxStreakCount >= 7, aquaMan: maxAquaCount >= 3 };
            
            let bestMin = (prof.vcr || 4500) / 30;
            if (f5k !== Infinity) bestMin = Math.max(bestMin, 5000 / (f5k / 60));
            if (f10k !== Infinity) bestMin = Math.max(bestSpeedMin, 10000 / (f10k / 60));
            let vo2Value = parseFloat(((bestMin * 0.2) + 3.5).toFixed(1));

            let pTime = "NEED DATA", pSource = "Run 5K to unlock";
            if(f10k !== Infinity) { pTime = calcPredictor(f10k*10, 10, prof.targetDist).str; pSource = "Fastest 10K"; }
            else if(f5k !== Infinity) { pTime = calcPredictor(f5k*5, 5, prof.targetDist).str; pSource = "Fastest 5K"; }

            const targetWater = getTargetWater(prof.lifestyle);
            let score = 0;
            if(daily.b) score+=10; if(daily.l) score+=10; if(daily.s) score+=10; if(daily.d) score+=10;
            if(daily.w >= targetWater) score+=20; else score += Math.round((daily.w / targetWater) * 20);
            score += Math.round(((daily.ex||[]).filter(Boolean).length / cfg.ex.length) * 40);

            useEffect(() => { if (score === 100) { setShowConfetti(true); setTimeout(() => setShowConfetti(false), 5000); } }, [score]);

            return (
                <div className="min-h-screen bg-[#000000] p-6 pb-32 relative">
                    {showConfetti && <Confetti />}
                    {showSetup && <SetupModal initialProf={prof} onSave={(d)=>{setProf(p=>({...p, ...d, initialWeight: p.initialWeight || d.weight})); setDoc(docRef, {...d, initialWeight: prof.initialWeight || d.weight}, {merge:true}); safeStorage.setItem(localKey, JSON.stringify({...prof, ...d})); setShowSetup(false);}} onCancel={()=> prof.initialWeight && setShowSetup(false)} />}
                    
                    <header className="flex justify-between items-start mb-8 pt-4">
                        <div>
                            <p className="text-zinc-400 font-black text-xs tracking-[0.3em] uppercase mb-2">ROAD TO BANGSAEN42</p>
                            <h1 className="text-6xl font-black text-white tracking-tighter uppercase italic">PRO <span className="suunto-accent">80</span></h1>
                            <p className="text-sm font-bold text-zinc-400 mt-3 tracking-widest uppercase">Runner: <span className="text-white">{profileName}</span></p>
                        </div>
                        <button onClick={onLogout} className="suunto-card p-4 w-16 h-16 flex flex-col items-center justify-center active:scale-95 transition-transform hover:bg-[#1e1e1e]">
                            <svg className="w-6 h-6 text-zinc-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                            <span className="text-[10px] font-black uppercase text-zinc-400 tracking-wider">EXIT</span>
                        </button>
                    </header>

                    <div className="suunto-card p-8 mb-8 relative overflow-hidden">
                        <div className="relative z-10">
                            <button onClick={()=>setShowSetup(true)} className="flex items-center gap-2 mb-4 group">
                                <span className="text-zinc-400 font-black text-xs uppercase tracking-widest group-hover:text-white transition-colors">TARGET WEIGHT</span>
                                <svg className="w-5 h-5 text-zinc-500 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                            <div className="flex items-baseline gap-3 mb-8">
                                <span className="text-7xl font-black text-white italic tracking-tighter">{prof.weight}</span>
                                <span className="text-zinc-400 font-bold text-2xl uppercase">KG</span>
                            </div>
                            <div className="flex gap-3 w-[160px]">
                                <button onClick={()=>updateWeight(0.1)} className="flex-1 h-14 bg-[#1e1e1e] rounded-xl text-zinc-300 font-black text-3xl active:scale-95 border border-zinc-800 hover:bg-zinc-800">+</button>
                                <button onClick={()=>updateWeight(-0.1)} className="flex-1 h-14 suunto-bg-accent rounded-xl text-black font-black text-4xl active:scale-95 transition-transform pb-1 hover:bg-[#a3e635]">-</button>
                            </div>
                        </div>
                        <div className="absolute top-6 right-6 z-20">
                            <span className="suunto-bg-accent px-4 py-2 rounded-md text-xs font-black uppercase tracking-widest">{cfg.name}</span>
                        </div>
                        <div className="absolute bottom-[-15px] right-2 z-0 scale-125 opacity-90">
                            <EliteAvatar activity={cfg.id} />
                        </div>
                    </div>

                    <nav className="flex gap-3 mb-8">
                        {[ {id:'tracker', label:'TRACK'}, {id:'plan', label:'PLAN'}, {id:'ranking', label:'RANK'}, {id:'stats', label:'DATA'} ].map(t => (
                            <button key={t.id} onClick={()=>setActiveTab(t.id)} 
                                className={`flex-1 py-5 rounded-xl font-black text-xs tracking-widest uppercase transition-all border-2 ${activeTab===t.id ? 'suunto-bg-accent border-[#bef264]' : 'bg-[#121212] border-zinc-800 text-zinc-400 hover:bg-[#1e1e1e]'}`}>
                                {t.label}
                            </button>
                        ))}
                    </nav>

                    <main className="animate-in fade-in duration-300">
                        {activeTab === 'tracker' && <TabTracker score={score} daily={daily} updateDaily={updateDaily} cfg={cfg} inDist={inDist} setInDist={setInDist} inPace={inPace} setInPace={setInPace} inHr={inHr} setInHr={setInHr} saveRun={saveRun} targetWater={targetWater} />}
                        {activeTab === 'plan' && <TabPlan cfg={cfg} prof={prof} />}
                        {activeTab === 'ranking' && <TabRanking leaderboardData={leaderboardData} />}
                        {activeTab === 'stats' && <TabStats prof={prof} vo2Value={vo2Value} tDist={tDist} pTime={pTime} pSource={pSource} fastest5kSecs={f5k} fastest10kSecs={f10k} longestRun={longestRun} achievements={achievements} />}
                    </main>
                </div>
            );
        };

        const MainApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(() => safeStorage.getItem('p80_user_v16'));

            useEffect(() => {
                signInAnonymously(auth).catch(e => console.error(e));
                const unsub = onAuthStateChanged(auth, u => { setUser(u); setLoading(false); });
                return unsub;
            }, []);

            if (loading) return <div className="min-h-screen bg-black flex items-center justify-center"><p className="suunto-accent font-black tracking-widest uppercase animate-pulse text-lg">SYNCING SATELLITE...</p></div>;
            if (!user || !currentUser) return <LoginScreen onLogin={n=>{setCurrentUser(n); safeStorage.setItem('p80_user_v16', n);}} />;
            return <Dashboard profileName={currentUser} onLogout={()=>{setCurrentUser(null); safeStorage.removeItem('p80_user_v16'); window.location.reload();}} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><MainApp /></ErrorBoundary>);
    </script>
</body>
</html>
